<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What's New & Coming Soon — LazyDogTemplates</title>
  <meta name="description" content="See what's new at LazyDogTemplates and what's coming next — new template designs, features, and improvements." />
  <link rel="canonical" href="https://www.lazydogtemplates.com/whats_new.html" />
  <meta property="og:title" content="What's New & Coming Soon — LazyDogTemplates" />
  <meta property="og:description" content="The latest additions and what we're building next at LazyDogTemplates." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.lazydogtemplates.com/whats_new.html" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared-styles.css" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root { --accent:#d4af37; --bg:#07071a; --card:#0d0d26; --text:#e8eaf0; --muted:#8899aa; }
    body { font-family:'Inter','Segoe UI',sans-serif; background:var(--bg); color:var(--text);
           background-image:repeating-linear-gradient(-52deg,transparent,transparent 38px,rgba(160,160,160,0.04) 38px,rgba(160,160,160,0.04) 39px); }
    .wn-wrap { max-width:820px; margin:0 auto; padding:48px 20px 80px; }
    .wn-hero { text-align:center; margin-bottom:36px; }
    .wn-hero h1 { font-family:'Poppins',sans-serif; font-weight:900; font-size:clamp(1.9rem,5vw,2.8rem);
                  background:linear-gradient(90deg,#fff,var(--accent)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .wn-hero p { color:var(--muted); margin-top:10px; font-size:15px; }
    .wn-tabs { display:flex; gap:8px; justify-content:center; margin-bottom:32px; flex-wrap:wrap; }
    .wn-tab { background:var(--card); border:1px solid rgba(255,255,255,0.1); color:var(--text);
              padding:11px 22px; border-radius:0; font-family:'Poppins',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:all .2s; }
    .wn-tab.active { background:linear-gradient(135deg,#5b7fff,#b464ff); border-color:transparent; }
    .wn-panel { display:none; }
    .wn-panel.active { display:block; animation:wnFade .3s ease; }
    @keyframes wnFade { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
    .wn-card { background:var(--card); border:1px solid rgba(255,255,255,0.08); border-radius:0; padding:20px 22px; margin-bottom:14px;
               box-shadow:0 8px 30px rgba(0,0,0,0.3); }
    .wn-card-top { display:flex; align-items:center; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
    .wn-card h3 { font-family:'Poppins',sans-serif; font-size:16.5px; font-weight:700; color:#fff; }
    .wn-card p { color:var(--muted); font-size:14px; line-height:1.6; }
    .wn-badge { font-size:10.5px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; padding:4px 10px; border-radius:0; font-family:'Poppins',sans-serif; }
    .b-feature{background:rgba(91,127,255,0.18);color:#8ea6ff;} .b-design{background:rgba(212,175,55,0.18);color:var(--accent);}
    .b-improvement{background:rgba(80,200,140,0.18);color:#57c98b;} .b-fix{background:rgba(224,80,80,0.18);color:#e07070;}
    .b-soon{background:rgba(80,200,140,0.18);color:#57c98b;} .b-in-progress{background:rgba(91,127,255,0.18);color:#8ea6ff;} .b-planned{background:rgba(136,153,170,0.18);color:var(--muted);}
    .wn-date { color:var(--muted); font-size:12px; margin-left:auto; }
    .wn-empty { text-align:center; color:var(--muted); padding:40px 0; }
    .wn-note { text-align:center; color:var(--muted); font-size:12.5px; margin-top:26px; }
    .wn-note a { color:var(--accent); text-decoration:none; }
  </style>
</head>
<body>
  <div class="wn-wrap">
    <div class="wn-hero">
      <h1>What's New</h1>
      <p>The latest additions to LazyDogTemplates — and a peek at what we're building next.</p>
    </div>

    <div class="wn-tabs">
      <button class="wn-tab active" data-tab="new" onclick="wnShow('new', this)">✨ Just Added</button>
      <button class="wn-tab" data-tab="coming" onclick="wnShow('coming', this)">🚀 Coming Soon</button>
    </div>

    <div class="wn-panel active" id="wn-new"></div>
    <div class="wn-panel" id="wn-coming"></div>

    <p class="wn-note">Have an idea for what we should build next? Ask <a href="#" onclick="if(window.toggleBot){toggleBot();}return false;">Hexa</a> or email <a href="mailto:support@lazydogtemplates.com">support@lazydogtemplates.com</a>.</p>
  </div>

  <script src="va_dictionary.js"></script>
  <script src="navbar.js"></script>
  <script src="footerbar.js"></script>
  <script src="updates_data.js"></script>
  <script>
    function wnEsc(s){ return String(s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
    function wnShow(which, btn){
      document.querySelectorAll('.wn-tab').forEach(function(t){ t.classList.remove('active'); });
      document.querySelectorAll('.wn-panel').forEach(function(p){ p.classList.remove('active'); });
      if(btn) btn.classList.add('active');
      var panel = document.getElementById('wn-'+which); if(panel) panel.classList.add('active');
    }
    function wnRenderNew(){
      var el = document.getElementById('wn-new');
      var items = window.WHATS_NEW || [];
      if(!items.length){ el.innerHTML = '<div class="wn-empty">Nothing here yet — check back soon.</div>'; return; }
      el.innerHTML = items.map(function(it){
        return '<div class="wn-card"><div class="wn-card-top">' +
          '<span class="wn-badge b-'+(it.tag||'feature')+'">'+wnEsc(it.tag||'update')+'</span>' +
          '<h3>'+wnEsc(it.title)+'</h3>' +
          (it.date ? '<span class="wn-date">'+wnEsc(it.date)+'</span>' : '') +
          '</div><p>'+wnEsc(it.text)+'</p></div>';
      }).join('');
    }
    function wnRenderComing(){
      var el = document.getElementById('wn-coming');
      var items = window.WHATS_COMING || [];
      if(!items.length){ el.innerHTML = '<div class="wn-empty">Roadmap coming soon.</div>'; return; }
      el.innerHTML = items.map(function(it){
        var label = (it.status||'planned').replace('-',' ');
        return '<div class="wn-card"><div class="wn-card-top">' +
          '<span class="wn-badge b-'+(it.status||'planned')+'">'+wnEsc(label)+'</span>' +
          '<h3>'+wnEsc(it.title)+'</h3>' +
          '</div><p>'+wnEsc(it.text)+'</p></div>';
      }).join('');
    }
    wnRenderNew(); wnRenderComing();
    if (location.hash === '#coming') { wnShow('coming', document.querySelector('.wn-tab[data-tab="coming"]')); }
  </script>
</body>
</html>
