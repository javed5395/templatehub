<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untitled design - Presentation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
/* ============================================
   1. Custom Properties & Reset
   ============================================ */
:root {
  --accent: #7C3AED;
  --accent-hover: #6D28D9;
  --accent-light: #EDE9FE;
  --accent-subtle: #F5F3FF;
  --upgrade: #E8590C;
  --upgrade-hover: #C2410C;
  --bg-canvas: #E4E4E7;
  --bg-surface: #FFFFFF;
  --bg-hover: #F4F4F5;
  --bg-active: #E4E4E7;
  --text-primary: #0F172A;
  --text-secondary: #64748B;
  --text-muted: #94A3B8;
  --border: #E2E8F0;
  --border-strong: #CBD5E1;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 9999px;
  --sidebar-w: 72px;
  --panel-w: 300px;
  --header-h: 56px;
  --bottom-h: 48px;
  --font: 'DM Sans', system-ui, sans-serif;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --fast: 150ms var(--ease);
  --normal: 250ms var(--ease);
  --slow: 350ms var(--ease);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: var(--font);
  color: var(--text-primary);
  background: var(--bg-canvas);
  display: flex;
  flex-direction: column;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ============================================
   2. Layout Shell
   ============================================ */
.header {
  height: var(--header-h);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  flex-shrink: 0;
  z-index: 100;
  gap: 8px;
}
.workspace {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}
.bottom-bar {
  height: var(--bottom-h);
  background: var(--bg-surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  flex-shrink: 0;
  z-index: 100;
  gap: 8px;
}

/* ============================================
   3. Header Components
   ============================================ */
.header-left { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.header-center { flex:1; display:flex; align-items:center; justify-content:center; gap:4px; min-width:0; }
.header-right { display:flex; align-items:center; gap:6px; flex-shrink:0; }

.btn-icon {
  width: 36px; height: 36px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--radius-md);
  transition: background var(--fast);
  position: relative;
}
.btn-icon:hover { background: var(--bg-hover); }
.btn-icon:active { background: var(--bg-active); }
.btn-icon .material-icons-outlined { font-size: 22px; }
.btn-icon.disabled { opacity: 0.4; pointer-events: none; }

.mode-tabs {
  display: flex;
  background: var(--bg-hover);
  border-radius: var(--radius-full);
  padding: 3px;
  gap: 2px;
}
.mode-tab {
  padding: 5px 14px;
  border-radius: var(--radius-full);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  transition: all var(--fast);
  white-space: nowrap;
}
.mode-tab:hover { color: var(--text-primary); }
.mode-tab.active {
  background: var(--bg-surface);
  color: var(--text-primary);
  box-shadow: var(--shadow-sm);
}

.doc-title {
  font-size: 14px;
  font-weight: 600;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  transition: all var(--fast);
  max-width: 260px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.doc-title:hover { border-color: var(--border); }
.doc-title:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--accent-subtle);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.doc-type { font-size:14px; color:var(--text-muted); white-space:nowrap; }

.btn-upgrade {
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--upgrade);
  border-radius: var(--radius-full);
  transition: all var(--fast);
  white-space: nowrap;
}
.btn-upgrade:hover { background: #FFF7ED; }

.btn-outline {
  padding: 7px 16px;
  font-size: 13px;
  font-weight: 600;
  border: 1.5px solid var(--border-strong);
  border-radius: var(--radius-full);
  transition: all var(--fast);
  white-space: nowrap;
}
.btn-outline:hover { background: var(--bg-hover); border-color: var(--text-muted); }
.btn-outline:active { background: var(--bg-active); }

.btn-primary {
  padding: 7px 20px;
  font-size: 13px;
  font-weight: 600;
  background: var(--accent);
  color: #fff;
  border-radius: var(--radius-full);
  transition: all var(--fast);
  white-space: nowrap;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:active { transform: scale(0.97); }

/* Dropdown Menu */
.dropdown {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  min-width: 200px;
  padding: 6px;
  z-index: 200;
  opacity: 0;
  transform: translateY(-8px) scale(0.96);
  pointer-events: none;
  transition: all var(--normal);
}
.dropdown.open {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}
.dropdown-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-md);
  font-size: 13px;
  color: var(--text-primary);
  transition: background var(--fast);
  width: 100%;
  text-align: left;
}
.dropdown-item:hover { background: var(--bg-hover); }
.dropdown-item .material-icons-outlined { font-size: 18px; color: var(--text-secondary); }
.dropdown-sep { height:1px; background:var(--border); margin:4px 8px; }

/* ============================================
   4. Sidebar
   ============================================ */
.sidebar {
  display: flex;
  flex-shrink: 0;
  z-index: 50;
  height: 100%;
}
.sidebar-rail {
  width: var(--sidebar-w);
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 8px 0;
  overflow-y: auto;
  overflow-x: hidden;
  flex-shrink: 0;
}
.sidebar-rail::-webkit-scrollbar { width:0; }

.tool-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 4px 6px;
  gap: 3px;
  width: 100%;
  border-radius: 0;
  transition: all var(--fast);
  position: relative;
  flex-shrink: 0;
}
.tool-btn::after {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%) scaleY(0);
  width: 3px; height: 24px;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
  transition: transform var(--fast);
}
.tool-btn:hover { background: var(--bg-hover); }
.tool-btn.active { background: var(--accent-subtle); color: var(--accent); }
.tool-btn.active::after { transform: translateY(-50%) scaleY(1); }
.tool-btn .material-icons-outlined { font-size: 22px; transition: color var(--fast); }
.tool-btn .tool-label { font-size: 10px; font-weight: 500; line-height: 1; white-space: nowrap; }

/* ============================================
   5. Side Panel
   ============================================ */
.side-panel {
  width: 0;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  overflow: hidden;
  transition: width var(--normal);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.side-panel.open { width: var(--panel-w); }

.panel-header {
  padding: 14px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.panel-title { font-size: 15px; font-weight: 700; }
.panel-close {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  transition: background var(--fast);
}
.panel-close:hover { background: var(--bg-hover); }
.panel-close .material-icons-outlined { font-size: 18px; }

.panel-search {
  padding: 10px 16px;
  flex-shrink: 0;
}
.search-input {
  width: 100%;
  padding: 8px 12px 8px 34px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  font-size: 13px;
  background: var(--bg-surface);
  transition: all var(--fast);
  position: relative;
}
.search-input:focus { outline:none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
.search-wrap { position:relative; }
.search-wrap .material-icons-outlined {
  position:absolute; left:10px; top:50%; transform:translateY(-50%);
  font-size:16px; color:var(--text-muted); pointer-events:none;
}

.panel-tabs {
  display: flex;
  gap: 4px;
  padding: 0 16px 10px;
  overflow-x: auto;
  flex-shrink: 0;
}
.panel-tabs::-webkit-scrollbar { height:0; }
.panel-tab {
  padding: 5px 12px;
  border-radius: var(--radius-full);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  white-space: nowrap;
  transition: all var(--fast);
  flex-shrink: 0;
}
.panel-tab:hover { background: var(--bg-hover); }
.panel-tab.active { background: var(--accent); color: #fff; }

.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 16px;
}

/* Template Cards */
.template-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.template-card {
  border-radius: var(--radius-md);
  overflow: hidden;
  cursor: pointer;
  transition: all var(--fast);
  border: 2px solid transparent;
}
.template-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--accent-light); }
.template-card:active { transform: scale(0.97); }
.template-preview {
  width: 100%;
  aspect-ratio: 4/3;
  position: relative;
  overflow: hidden;
}
.template-label {
  display: block;
  padding: 6px 8px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
  background: var(--bg-surface);
  border-top: 1px solid var(--border);
}
.tpl-line {
  position: absolute;
  border-radius: 2px;
}

/* Element Grid */
.element-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.element-card {
  aspect-ratio: 1;
  border-radius: var(--radius-md);
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all var(--fast);
  background: #FAFAFA;
}
.element-card:hover { border-color: var(--accent); background: var(--accent-subtle); transform: scale(1.05); }
.element-card:active { transform: scale(0.95); }
.element-card svg { width:40%; height:40%; }

/* Text Options */
.text-option {
  padding: 14px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--fast);
  margin-bottom: 8px;
}
.text-option:hover { border-color: var(--accent); background: var(--accent-subtle); }
.text-option:active { transform: scale(0.98); }
.text-option .text-preview { margin-bottom: 2px; }
.text-option .text-meta { font-size: 11px; color: var(--text-muted); }

/* Generic Panel Content */
.panel-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
  color: var(--text-secondary);
}
.panel-placeholder .material-icons-outlined { font-size: 48px; color: var(--text-muted); margin-bottom: 12px; }
.panel-placeholder p { font-size: 13px; line-height: 1.5; }

/* ============================================
   6. Canvas Area
   ============================================ */
.canvas-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(circle, #D4D4D8 0.8px, transparent 0.8px);
  background-size: 24px 24px;
  background-color: var(--bg-canvas);
}
.canvas-viewport {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.slide-frame {
  position: relative;
  display: inline-block;
  background: transparent;
  box-shadow: 0 2px 20px rgba(0,0,0,0.10), 0 0 0 1px rgba(0,0,0,0.04);
  border-radius: 2px;
  cursor: default;
  line-height: 0;
}
.slide-frame:hover { box-shadow: 0 4px 28px rgba(0,0,0,0.14), 0 0 0 1px rgba(0,0,0,0.06); }
.slide-frame.selected {
  box-shadow: 0 0 0 2px var(--accent), 0 4px 28px rgba(0,0,0,0.14);
}

/* ============================================
   7. Bottom Bar
   ============================================ */
.bottom-left { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.bottom-center { flex:1; display:flex; align-items:center; justify-content:center; gap:6px; overflow-x:auto; min-width:0; }
.bottom-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }

.btn-text-sm {
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  transition: all var(--fast);
  white-space: nowrap;
}
.btn-text-sm:hover { background: var(--bg-hover); color: var(--text-primary); }
.btn-text-sm.active { background: var(--accent-light); color: var(--accent); }

/* Timer */
.timer-wrap {
  display: flex;
  align-items: center;
  gap: 4px;
}
.timer-display {
  font-size: 13px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  min-width: 48px;
  text-align: center;
  color: var(--text-secondary);
}
.timer-btn {
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  transition: background var(--fast);
}
.timer-btn:hover { background: var(--bg-hover); }
.timer-btn .material-icons-outlined { font-size: 16px; }

/* Page Thumbnails */
.page-thumb {
  width: 40px; height: 22px;
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  transition: all var(--fast);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: var(--text-muted);
  font-weight: 600;
}
.page-thumb:hover { border-color: var(--text-muted); }
.page-thumb.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
.page-add-btn {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px dashed var(--border-strong);
  border-radius: 3px;
  transition: all var(--fast);
  flex-shrink: 0;
}
.page-add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-subtle); }
.page-add-btn .material-icons-outlined { font-size: 14px; }

.page-info {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 500;
  white-space: nowrap;
}

/* Zoom Controls */
.zoom-controls {
  display: flex;
  align-items: center;
  gap: 4px;
}
.zoom-btn {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  transition: background var(--fast);
}
.zoom-btn:hover { background: var(--bg-hover); }
.zoom-btn:active { background: var(--bg-active); }
.zoom-btn .material-icons-outlined { font-size: 18px; }
.zoom-slider {
  width: 80px;
  -webkit-appearance: none;
  height: 4px;
  background: var(--border-strong);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
.zoom-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  transition: transform var(--fast);
}
.zoom-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
.zoom-value {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  min-width: 36px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}

/* ============================================
   8. Notes Panel
   ============================================ */
.notes-panel {
  position: absolute;
  bottom: var(--bottom-h);
  left: var(--sidebar-w);
  right: 0;
  height: 0;
  background: var(--bg-surface);
  border-top: 1px solid var(--border);
  z-index: 60;
  overflow: hidden;
  transition: height var(--normal);
}
.notes-panel.open { height: 180px; }
.notes-panel-inner {
  padding: 12px 20px;
  height: 100%;
  display: flex;
  flex-direction: column;
}
.notes-panel-inner label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.notes-textarea {
  flex: 1;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.6;
  resize: none;
  transition: border-color var(--fast);
}
.notes-textarea:focus { outline:none; border-color: var(--accent); }

/* ============================================
   9. Toast Notifications
   ============================================ */
.toast-container {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  pointer-events: none;
}
.toast {
  padding: 10px 20px;
  background: var(--text-primary);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  border-radius: var(--radius-full);
  box-shadow: var(--shadow-lg);
  opacity: 0;
  transform: translateY(12px) scale(0.95);
  transition: all var(--normal);
  pointer-events: auto;
  white-space: nowrap;
}
.toast.show { opacity:1; transform:translateY(0) scale(1); }

/* ============================================
   10. Context Menu (restyled from engine donor)
   ============================================ */
.ctx-menu {
  display: none;
  position: fixed;
  z-index: 9000;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 6px 0;
  min-width: 220px;
  box-shadow: var(--shadow-lg);
  font-family: var(--font);
}
.ctx-menu.open { display: block; }
.ctx-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 16px;
  font-size: 13px;
  color: var(--text-primary);
  cursor: pointer;
  transition: background var(--fast);
  width: 100%;
  text-align: left;
  gap: 20px;
}
.ctx-item:hover { background: var(--bg-hover); color: var(--accent); }
.ctx-item-left { display: flex; align-items: center; gap: 10px; }
.ctx-item-left .material-icons-outlined { font-size: 16px; color: var(--text-secondary); }
.ctx-item:hover .ctx-item-left .material-icons-outlined { color: var(--accent); }
.ctx-shortcut { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
.ctx-divider { height: 1px; background: var(--border); margin: 4px 0; }

/* ============================================
   11. Animations
   ============================================ */
@keyframes fadeInUp {
  from { opacity:0; transform:translateY(8px); }
  to { opacity:1; transform:translateY(0); }
}
.panel-content .template-card,
.panel-content .element-card,
.panel-content .text-option {
  animation: fadeInUp 0.3s var(--ease) both;
}

/* ============================================
   12. Responsive
   ============================================ */
@media (max-width: 768px) {
  .sidebar-rail { width: 56px; }
  .tool-btn .tool-label { display: none; }
  .tool-btn { padding: 10px 4px; }
  .side-panel.open { width: 260px; position: absolute; z-index: 55; height: 100%; box-shadow: var(--shadow-lg); }
  .btn-upgrade, .doc-type { display: none; }
  .mode-tab { padding: 5px 10px; font-size: 12px; }
  .doc-title { max-width: 140px; font-size: 13px; }
  .zoom-slider { width: 50px; }
  .notes-panel { left: 56px; }
}
@media (max-width: 480px) {
  .btn-outline { display: none; }
  .header-center { display: none; }
  .zoom-slider { display: none; }
}

function showToast(message, duration = 2500) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  dom.toastContainer.appendChild(toast);
  requestAnimationFrame(() => { toast.classList.add('show'); });
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

/* ============================================
   SIDEBAR CONTROLLER
   ============================================ */
function renderSidebarTools() {
  const tools = state.mode === 'design' ? designTools : editingTools;
  dom.sidebarRail.innerHTML = tools.map(t =>
    `<button class="tool-btn${state.activeTool === t.id ? ' active' : ''}" data-tool="${t.id}" aria-label="${t.label}" title="${t.label}">
      <span class="material-icons-outlined">${t.icon}</span>
      <span class="tool-label">${t.label}</span>
    </button>`
  ).join('');
}

function selectTool(toolId) {
  const wasActive = state.activeTool === toolId;
  state.activeTool = wasActive ? null : toolId;

  // Update active states on buttons
  $$('.tool-btn', dom.sidebarRail).forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tool === state.activeTool);
  });

  // Update panel
  if (state.activeTool) {
    openPanel(state.activeTool);
  } else {
    closePanel();
  }

  if (state.activeTool !== 'scissor') stopScissorMode(false);
}

/* ============================================
   PANEL CONTROLLER
   ============================================ */
function openPanel(toolId) {
  const tools = state.mode === 'design' ? designTools : editingTools;
  const tool = tools.find(t => t.id === toolId);
  if (!tool) return;

  dom.panelTitle.textContent = tool.label;
  dom.panelSearch.value = '';

  // Show/hide search and tabs based on tool
  const data = panelData[toolId];
  const hasSearch = !!data;
  const hasTabs = data && data.tabs;
  dom.panelSearchWrap.style.display = hasSearch ? '' : 'none';
  dom.panelTabs.style.display = hasTabs ? '' : 'none';

  // Render tabs
  if (hasTabs) {
    dom.panelTabs.innerHTML = data.tabs.map(t =>
      `<button class="panel-tab${t === data.activeTab ? ' active' : ''}" data-ptab="${t}" role="tab">${t}</button>`
    ).join('');
  } else {
    dom.panelTabs.innerHTML = '';
  }

  // Render content
  renderPanelContent(toolId);

  dom.sidePanel.classList.add('open');
}

function closePanel() {
  dom.sidePanel.classList.remove('open');
  state.activeTool = null;
  $$('.tool-btn', dom.sidebarRail).forEach(btn => btn.classList.remove('active'));
}

function renderPanelContent(toolId) {
  const data = panelData[toolId];
  if (data && data.generate) {
    dom.panelContent.innerHTML = data.generate();
  } else {
    const tools = state.mode === 'design' ? designTools : editingTools;
    const tool = tools.find(t => t.id === toolId);
    dom.panelContent.innerHTML = genericPanelContent(toolId, tool ? tool.label : toolId);
  }
}

/* ── DEBUG X-RAY (Ctrl+Shift+B) ─────────────────────────────────────────────

   WHICH object owns any stray pixel (e.g. the phantom white hairline). */

    var r = new fabric.Rect({ left: b.left, top: b.top, width: b.width, height: b.height, fill: '', stroke: 'rgba(255,0,0,0.95)', strokeWidth: 1.5, strokeDashArray: [4,3], selectable: false, evented: false });

function initFabric() {
  /* 1920 logical resolution + forced 2x supersampling: the canvas backing
     store renders at double density and downscales to CSS size — kills the
     "milky fog" of plain-density canvas rendering. */
  fabric.devicePixelRatio = Math.max(2, window.devicePixelRatio || 1);
  fc = new fabric.Canvas('canvas', { width: 1920, height: 1080, backgroundColor: '#ffffff', enableRetinaScaling: true, preserveObjectStacking: true }); /* selected objects keep their layer — default fabric painted the selection on TOP, so clicking the full-bleed background hid every element behind it */
  fc._baseWidth = 1920;
  fc._baseHeight = 1080;
  fc._pxPerPt = 2; /* blank 1920px canvas = 960pt slide; import overwrites with true scale */
  fc.on('object:modified', function(){ saveState(); });
  fc.on('object:added', function(){ saveState(); });
  fc.on('mouse:dblclick', function (opt) {
    var t = opt.target;
    if (t && t.mediaSrc) openMediaPlayer(t.mediaSrc, t.mediaKind || 'video');
  });
  fc.on('mouse:down', function (opt) {
    var t = opt.target;
    if (t && t.mediaSrc) {
      if (opt.e && opt.e.detail >= 2) { openMediaPlayer(t.mediaSrc, t.mediaKind || 'video'); }
      else showToast('Media object — double-click to play');
    }
  });
}

/* ── FREE SCISSOR TOOL (Editing rail) ───────────────────────────────────────
   Cloth-cutting: user places dots around the part to cut; clicking back on

   plain images afterwards (movable/deletable, PPTX-exportable). Esc cancels. */
var _sciss = null; /* { target, pts, dots[], line } */
/* pressing the panel button decides: punch (shape on element) or dot mode */
function goScissor() {
  if (!fc) return;
  var o = fc.getActiveObject();
  if (!o) { showToast('Select the cutter shape (or the element itself) first'); return; }
  if (_sciss) { stopScissorMode(false); }
  var ob = o.getBoundingRect(true, true);
  var under = null, objs = fc.getObjects();
  for (var i = objs.length - 1; i >= 0; i--) {
    var t = objs[i];
    if (t === o || t.isBg || !t.visible) continue;
    var tb = t.getBoundingRect(true, true);
    /* never auto-punch a near-full-slide image (unflagged backgrounds):
       cutting the backdrop produces an invisible camouflage patch */
    if (tb.width > fc._baseWidth * 0.8 && tb.height > fc._baseHeight * 0.8) continue;
    var ix = Math.max(ob.left, tb.left), iy = Math.max(ob.top, tb.top);
    var ix2 = Math.min(ob.left + ob.width, tb.left + tb.width), iy2 = Math.min(ob.top + ob.height, tb.top + tb.height);
    if (ix2 - ix > 4 && iy2 - iy > 4) { under = t; break; }
  }
  if (under) { performPunchCut(o, under); return; }

}
function startScissorMode(o) {
  if (!fc || !o) return;
  _sciss = { target: o, pts: [], dots: [], line: null };

  fc.selection = false;
  fc.forEachObject(function (ob) { ob.__sciSel = ob.selectable; ob.selectable = false; ob.evented = false; });
  fc.defaultCursor = 'crosshair';
  fc.on('mouse:down', scissorClick);
  fc.on('mouse:dblclick', scissorDbl);
  fc.renderAll();
  showToast('Scissor: place dots around the part — double-click / Enter / first dot / Cut-now button to cut. Esc cancels');
}
function stopScissorMode(done) {
  if (!_sciss || !fc) { _sciss = null; return; }
  fc.off('mouse:down', scissorClick);
  fc.off('mouse:dblclick', scissorDbl);
  _sciss.dots.forEach(function (d) { fc.remove(d); });
  if (_sciss.line) fc.remove(_sciss.line);
  fc.forEachObject(function (ob) { if (ob.__sciSel !== undefined) { ob.selectable = ob.__sciSel; ob.evented = ob.__sciSel; delete ob.__sciSel; } });

  fc.defaultCursor = 'default';

function scissorClick(opt) {

  var p = fc.getPointer(opt.e);

    var d0 = Math.hypot(p.x - pts[0].x, p.y - pts[0].y);
    if (d0 < 30 / fc.getZoom()) { performScissorCut(); return; } /* generous snap-to-close */
  }
  pts.push({ x: p.x, y: p.y });
  var r0 = pts.length === 1 ? 9 : 5; /* big first dot = easy close target */

  fc.add(dot);

    _sciss.line = new fabric.Polyline(pts.map(function (q) { return { x: q.x, y: q.y }; }), { fill: '', stroke: '#7C3AED', strokeWidth: 1.5, strokeDashArray: [6, 4], selectable: false, evented: false });

function performPunchCut(cutter, target) {

    var W = fc._baseWidth, H = fc._baseHeight, M = 2;

        var tt = new fabric.StaticCanvas(null, { width: W * M, height: H * M }); tt.setZoom(M); tt.add(tc); tt.renderAll();

        function solidify(s) { try { s.set({ fill: '#000', stroke: '#000', opacity: 1 }); } catch (e) {} }
        if (cc.forEachObject) cc.forEachObject(solidify);
        solidify(cc);
        var mm = new fabric.StaticCanvas(null, { width: W * M, height: H * M }); mm.setZoom(M); mm.add(cc); mm.renderAll();

        x1.drawImage(mm.lowerCanvasEl, -px * M, -py * M);

function scissorDbl() { if (_sciss && _sciss.pts.length >= 3) performScissorCut(); }
document.addEventListener('keydown', function (e) {

document.addEventListener('click', function (e) {
  if (e.target.closest && e.target.closest('#sciss-go')) { goScissor(); return; }

function performScissorCut() {
  try {
  var S = _sciss, o = S.target, pts = S.pts.slice();
  var W = fc._baseWidth, H = fc._baseHeight, M = 2; /* 2x for sharpness */
  o.clone(function (c) {
    var tmp = new fabric.StaticCanvas(null, { width: W * M, height: H * M });
    tmp.setZoom(M);
    tmp.add(c); tmp.renderAll();
    var src = tmp.lowerCanvasEl;
    var b = o.getBoundingRect(true, true);
    /* polygon bbox clamped to the object's bounds */
    var px = Math.max(b.left, Math.min.apply(null, pts.map(function(q){return q.x;})));
    var py = Math.max(b.top, Math.min.apply(null, pts.map(function(q){return q.y;})));
    var px2 = Math.min(b.left + b.width, Math.max.apply(null, pts.map(function(q){return q.x;})));
    var py2 = Math.min(b.top + b.height, Math.max.apply(null, pts.map(function(q){return q.y;})));
    if (px2 - px < 2 || py2 - py < 2) { stopScissorMode(false); showToast('Cut area does not touch the element'); return; }

      ctx.beginPath();
      ctx.moveTo((pts[0].x - ox) * M, (pts[0].y - oy) * M);
      for (var i = 1; i < pts.length; i++) ctx.lineTo((pts[i].x - ox) * M, (pts[i].y - oy) * M);

    var c1 = document.createElement('canvas'); c1.width = Math.ceil((px2 - px) * M); c1.height = Math.ceil((py2 - py) * M);

    x1.drawImage(src, -px * M, -py * M);
    x1.restore();
    /* remainder with the hole */
    var c2 = document.createElement('canvas'); c2.width = Math.ceil(b.width * M); c2.height = Math.ceil(b.height * M);
    var x2 = c2.getContext('2d');
    x2.drawImage(src, -b.left * M, -b.top * M);
    x2.globalCompositeOperation = 'destination-out';
    poly(x2, b.left, b.top); x2.fill();
    tmp.dispose();
    var placed = 0;
    fabric.Image.fromURL(c2.toDataURL('image/png'), function (imgRest) {
      imgRest.set({ left: b.left, top: b.top, scaleX: 1 / M, scaleY: 1 / M });
      fabric.Image.fromURL(c1.toDataURL('image/png'), function (imgPiece) {
        imgPiece.set({ left: px, top: py, scaleX: 1 / M, scaleY: 1 / M });
        fc.remove(o);
        fc.add(imgRest); fc.add(imgPiece);
        stopScissorMode(true);
        fc.setActiveObject(imgPiece);
        fc.renderAll();
        saveState();
        showToast('Cut into 2 pieces — the patch is selected');

}

/* ── STRAIGHT SCISSOR: trim selected element along the SLIDE border ─────────
   PowerPoint's crop works in the element's own rotated frame, so a tilted
   image can never be cropped along the slide edge. This rasterizes the
   element exactly as drawn, cuts it at the slide-aligned boundary (any
   rotation), and swaps in the trimmed result — a permanent cut that also
   exports cleanly to PPTX as a plain positioned image. */
function ctxTrimToSlide() {
  var o = fc && fc.getActiveObject();
  if (!o) { showToast('Select an element first'); return; }
  var W = fc._baseWidth || fc.getWidth() / fc.getZoom();
  var H = fc._baseHeight || fc.getHeight() / fc.getZoom();
  var b = o.getBoundingRect(true, true); /* scene coords, ignore viewport */
  var ix = Math.max(0, b.left), iy = Math.max(0, b.top);
  var ix2 = Math.min(W, b.left + b.width), iy2 = Math.min(H, b.top + b.height);
  if (ix2 - ix <= 1 || iy2 - iy <= 1) { fc.remove(o); fc.discardActiveObject(); fc.renderAll(); saveState(); showToast('Element was fully outside — removed'); return; }
  if (b.left >= -0.5 && b.top >= -0.5 && b.left + b.width <= W + 0.5 && b.top + b.height <= H + 0.5) { showToast('Nothing hangs outside the slide'); return; }
  o.clone(function (c) {
    var tmp = new fabric.StaticCanvas(null, { width: W, height: H });
    tmp.add(c);
    tmp.renderAll();
    var mult = 2; /* keep retina sharpness on the cut piece */
    var url = tmp.toDataURL({ left: ix, top: iy, width: ix2 - ix, height: iy2 - iy, multiplier: mult, format: 'png' });
    tmp.dispose();
    fabric.Image.fromURL(url, function (img) {
      img.set({ left: ix, top: iy, scaleX: 1 / mult, scaleY: 1 / mult, irOrigin: o.irOrigin });
      fc.remove(o);
      fc.add(img);
      fc.setActiveObject(img);
      fc.renderAll();
      saveState();
      showToast('Trimmed along the slide border');
    });
  }, FABRIC_JSON_PROPS);
}

function ctxCopy()      { fc && fc.getActiveObject() && fc.getActiveObject().clone(function(c){ _clip=c; showToast('Copied'); }); }

function ctxSetBg()     { var o=fc&&fc.getActiveObject(); if(!o||o.type!=='image'){showToast('Select an image first');return;} fc.setBackgroundImage(o,fc.renderAll.bind(fc),{scaleX:fc.getWidth()/fc.getZoom()/o.width,scaleY:fc.getHeight()/fc.getZoom()/o.height}); fc.remove(o); fc.renderAll(); showToast('Set as background'); }
function ctxInfo()      { var o=fc&&fc.getActiveObject(); if(!o){showToast('Select an element first');return;} showToast('Type: '+o.type+' | W:'+Math.round(o.getScaledWidth())+'px | H:'+Math.round(o.getScaledHeight())+'px | X:'+Math.round(o.left)+' Y:'+Math.round(o.top)); }
function ctxLink()      { var o=fc&&fc.getActiveObject(); if(!o){showToast('Select an element first');return;} var url=prompt('Enter URL:','https://'); if(url){ o.set('data',{link:url}); showToast('Link added: '+url); } }
function ctxAltText()   { var o=fc&&fc.getActiveObject(); if(!o){showToast('Select an element first');return;} var t=prompt('Enter alternative text:',o.altText||''); if(t!==null){ o.altText=t; showToast('Alt text set: '+t); } }
function ctxApplyColor(){ var o=fc&&fc.getActiveObject(); if(!o){showToast('Select an element first');return;} var c=o.fill||o.stroke||'#7C3AED'; fc.setBackgroundColor(c,fc.renderAll.bind(fc)); showToast('Page colour applied'); }

/* ============================================
   TEXT / SHAPES / UPLOADS (engine actions)
   ============================================ */
function addText(type) {
  if (!fc) return;
  var props = {
    heading:    { text:'Add a heading',    fontSize:44, fontWeight:'700', fill:'#0F172A', upper:false },
    subheading: { text:'Add a subheading', fontSize:28, fontWeight:'600', fill:'#0F172A', upper:false },
    body:       { text:'Add body text',    fontSize:16, fontWeight:'400', fill:'#334155', upper:false },
    caption:    { text:'Add a caption',    fontSize:12, fontWeight:'500', fill:'#64748B', upper:true  }
  }[type] || { text:'Text', fontSize:16, fontWeight:'400', fill:'#0F172A', upper:false };

  var t = new fabric.IText(props.upper ? props.text.toUpperCase() : props.text, {
    left: 80, top: 80, fontFamily: 'DM Sans, sans-serif',
    fontSize: props.fontSize, fontWeight: props.fontWeight, fill: props.fill, editable: true
  });
  fc.add(t).setActiveObject(t).renderAll();
  saveState();
  showToast(`Added ${type} text to slide`);
}

function makeStarPoints(outerR, innerR) {
  var spikes = 5, points = [];
  for (var i = 0; i < spikes * 2; i++) {
    var r = (i % 2 === 0) ? outerR : innerR;
    var angle = (Math.PI / spikes) * i - Math.PI / 2;
    points.push({ x: r * Math.cos(angle), y: r * Math.sin(angle) });
  }
  return points;
}

function addShape(type) {
  if (!fc) return;
  var defaults = { left: 100, top: 100, fill: '#7C3AED', opacity: 0.9 };
  var s;
  if (type === 'rect')          s = new fabric.Rect(Object.assign({}, defaults, { width:160, height:100 }));
  else if (type === 'circle')   s = new fabric.Circle(Object.assign({}, defaults, { radius:70 }));
  else if (type === 'triangle') s = new fabric.Triangle(Object.assign({}, defaults, { width:140, height:120 }));
  else if (type === 'line')     s = new fabric.Line([50,50,300,50], { left:100, top:150, stroke:'#7C3AED', strokeWidth:3 });
  else if (type === 'rounded-rect') s = new fabric.Rect(Object.assign({}, defaults, { width:160, height:100, rx:24, ry:24 }));
  else if (type === 'star')     s = new fabric.Polygon(makeStarPoints(70, 30), Object.assign({}, defaults, { left:120, top:100 }));
  if (s) { fc.add(s).setActiveObject(s).renderAll(); saveState(); }
  showToast('Element added to slide');
}

function handleUploadImg(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    fabric.Image.fromURL(e.target.result, function(img) {
      img.scaleToWidth(Math.min(img.width, fc.getWidth() / fc.getZoom() * 0.5));
      img.set({ left:80, top:80 });
      fc.add(img).setActiveObject(img).renderAll();
      saveState();
      showToast('Image uploaded');
    });
  };
  reader.readAsDataURL(input.files[0]);
  input.value = '';
}

/* ============================================
   EDIT MODE
   ============================================ */
function setEditMode(mode) {
  if (!fc) return;
  if (mode === 'view')    { fc.selection = false; fc.getObjects().forEach(function(o){ o.selectable = false; }); }
  else if (mode === 'edit') { fc.selection = true; fc.getObjects().forEach(function(o){ if (!o.isBg) o.selectable = true; }); }
  else if (mode === 'comment') { fc.selection = false; }
  fc.renderAll();
}

/* ============================================
   UNDO / REDO  (Phase 2: PER-PAGE undo stack)
   Each state.pages[i] owns { history:[], historyIndex:-1 } — replaces the
   old single global editHistory/historyIndex so undo/redo never crosses
   between slides.
   ============================================ */
var _restoring = false;

function currentPageObj() {
  return state.pages[state.currentPage] || null;
}

/* Snapshot fabric props we need to round-trip: isBg (background image flag),
   svgText (raw SVG source kept on svg-derived groups for Phase 3 custGeom work),
   irId/irOrigin (traceability back to the IR element that produced this object). */
var FABRIC_JSON_PROPS = ['isBg', 'svgText', 'irId', 'irOrigin', 'irPara', 'irBody', 'irTable', 'mediaSrc', 'mediaKind'];

function saveState() {
  if (!fc || _restoring || window._bulkLoad) return;
  var page = currentPageObj();
  if (!page) return;
  var json = JSON.stringify(fc.toJSON(FABRIC_JSON_PROPS));
  var idx = page.historyIndex == null ? -1 : page.historyIndex;
  page.history = (page.history || []).slice(0, idx + 1);
  page.history.push(json);
  if (page.history.length > 60) page.history.shift();
  page.historyIndex = page.history.length - 1;
  page.canvasJSON = json; // keep the "last edited state" mirror current
  updateUndoRedo();
}
function doUndo() {
  var page = currentPageObj();
  if (!page || page.historyIndex <= 0) return;
  page.historyIndex--;
  restoreState();
}
function doRedo() {
  var page = currentPageObj();
  if (!page || page.historyIndex >= page.history.length - 1) return;
  page.historyIndex++;
  restoreState();
}
function restoreState() {
  var page = currentPageObj();
  if (!page || !page.history || !page.history[page.historyIndex]) return;
  _restoring = true;
  fc.loadFromJSON(page.history[page.historyIndex], function() {
    fc.getObjects().forEach(function(o){ if (o.isBg) { o.selectable = true; o.evented = true; } });
    fc.renderAll();
    page.canvasJSON = page.history[page.historyIndex];
    _restoring = false;
    updateUndoRedo();
  });
}
/* Seed a page's undo stack with its current on-canvas state, but only if it
   doesn't already have one — called after a fresh IR render / blank init /
   JSON load so every page has an undo baseline without clobbering history
   the user already built up on a page they're revisiting. */
function ensurePageHistory(index) {
  var page = state.pages[index];
  if (!page) return;
  if (!page.history || !page.history.length) {
    var json = JSON.stringify(fc.toJSON(FABRIC_JSON_PROPS));
    page.history = [json];
    page.historyIndex = 0;
    page.canvasJSON = json;
  }
  updateUndoRedo();
}
function updateUndoRedo() {
  var page = currentPageObj();
  var canUndo = !!(page && page.historyIndex > 0);
  var canRedo = !!(page && page.history && page.historyIndex < page.history.length - 1);
  if (dom.undoBtn) dom.undoBtn.style.opacity = canUndo ? '1' : '0.4';
  if (dom.redoBtn) dom.redoBtn.style.opacity = canRedo ? '1' : '0.4';
}

/* ============================================
   CANVAS / ZOOM CONTROLLER (Fabric-backed)
   ============================================ */
function selectSlide(selected) {
  state.slideSelected = selected;
  dom.slideFrame.classList.toggle('selected', selected);
}

function calculateFitZoom() {
  const area = dom.canvasArea.getBoundingClientRect();
  const padding = 60;
  const maxW = area.width - padding * 2;
  const maxH = area.height - padding * 2;
  const baseW = (fc && fc._baseWidth) || 960;
  const baseH = (fc && fc._baseHeight) || 540;
  const scaleW = maxW / baseW;
  const scaleH = maxH / baseH;
  return Math.min(scaleW, scaleH, 2) * 100;
}

function doZoom(percent) {
  if (!fc) return;
  var z = percent / 100;
  var w = fc._baseWidth || 960;
  var h = fc._baseHeight || 540;
  fc.setZoom(z);
  fc.setWidth(w * z);
  fc.setHeight(h * z);
  fc.renderAll();
}

function setZoom(value) {
  state.zoom = Math.max(25, Math.min(200, Math.round(value)));
  dom.zoomSlider.value = state.zoom;
  dom.zoomValue.textContent = state.zoom + '%';
  doZoom(state.zoom);
}

/* ── MATCH CANVAS ASPECT TO SLIDE (used by the PPTX importer) ── */
function setSlideAspect(emuW, emuH) {
  if (!fc || !emuW || !emuH) return;
  var baseW = fc._baseWidth || 960;
  var baseH = Math.round(baseW * (emuH / emuW));
  fc._baseWidth = baseW;
  fc._baseHeight = baseH;
  /* true canvas-px per PowerPoint-pt for THIS deck — the font panel divides
     by this so the size box shows the same number PowerPoint shows */
  fc._pxPerPt = baseW * 12700 / emuW;
  var z = state.zoom / 100;
  fc.setWidth(baseW * z);
  fc.setHeight(baseH * z);
  fc.setZoom(z);
  fc.renderAll();
}

/* ============================================
   PAGES CONTROLLER  (Phase 2 Part C: per-slide persistence)
   Each page now owns its own ir / canvasJSON / thumb / undo-history, so
   pages never misalign regardless of how many were imported vs. added blank.
   ============================================ */
function renderPageThumbs() {
  let html = '';
  state.pages.forEach((page, i) => {
    var inner = page.thumb
      ? `<img src="${page.thumb}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:2px;display:block;">`
      : String(i + 1);
    html += `<div class="page-thumb${i === state.currentPage ? ' active' : ''}" data-page="${i}" title="Slide ${i + 1}">${inner}</div>`;
  });
  html += `<button class="page-add-btn" data-action="add-page" aria-label="Add page"><span class="material-icons-outlined">add</span></button>`;
  dom.pageThumbs.innerHTML = html;
  dom.pageInfo.textContent = `${state.currentPage + 1} of ${state.pages.length}`;
}

/* Capture the page we're LEAVING: serialize its fabric state + a small thumb,
   so returning to it later restores exactly what was on screen. */
function captureCurrentPage() {
  if (!fc) return;
  var page = currentPageObj();
  if (!page) return;
  page.canvasJSON = fc.toJSON(FABRIC_JSON_PROPS);
  try { page.thumb = fc.toDataURL({ format: 'png', multiplier: 0.08 }); } catch (e) { /* canvas may be tainted by cross-origin images; keep old thumb */ }
}

/* Load a page's content onto the live canvas: canvasJSON (already edited) wins,
   else fresh IR render (PPTX import, never touched), else a blank white slide. */
async function loadPageIntoCanvas(index) {
  var page = state.pages[index];
  if (!page || !fc) return;
  window._bulkLoad = true;
  if (page.canvasJSON) {
    await new Promise(function(resolve){
      fc.loadFromJSON(page.canvasJSON, function () {
        fc.getObjects().forEach(function(o){ if (o.isBg) { o.selectable = true; o.evented = true; } });
        fc.renderAll();
        resolve();
      });
    });
  } else if (page.ir) {
    if (window._deckIR) setSlideAspect(window._deckIR.size.w, window._deckIR.size.h);
    await renderSlideIR(page.ir, window._deckIR, fc);
  } else {
    fc.clear();
    fc.setBackgroundColor('#ffffff', fc.renderAll.bind(fc));
  }
  window._bulkLoad = false;
  ensurePageHistory(index);
}

async function switchPage(index) {
  if (index < 0 || index >= state.pages.length || index === state.currentPage) return;
  captureCurrentPage();
  state.notes[state.currentPage] = dom.notesTextarea.value;
  state.currentPage = index;
  dom.notesTextarea.value = state.notes[state.currentPage] || '';
  selectSlide(false);
  await loadPageIntoCanvas(index);
  renderPageThumbs();
}

function addPage() {
  if (state.pages.length >= 40) { showToast('Maximum 40 slides allowed'); return; }
  captureCurrentPage();
  var page = makeBlankPage(Date.now());
  state.pages.push(page);
  state.notes.push('');
  state.currentPage = state.pages.length - 1;
  dom.notesTextarea.value = '';
  selectSlide(false);
  window._bulkLoad = true;
  fc.clear();
  fc.setBackgroundColor('#ffffff', fc.renderAll.bind(fc));
  window._bulkLoad = false;
  ensurePageHistory(state.currentPage);
  renderPageThumbs();
  showToast('Slide added');
}

async function deletePage() {
  if (state.pages.length <= 1) { showToast('Cannot delete the last slide'); return; }
  state.pages.splice(state.currentPage, 1);
  state.notes.splice(state.currentPage, 1);
  if (state.currentPage >= state.pages.length) state.currentPage = state.pages.length - 1;
  dom.notesTextarea.value = state.notes[state.currentPage] || '';
  await loadPageIntoCanvas(state.currentPage);
  renderPageThumbs();
  showToast('Slide deleted');
}

/* ============================================
   TIMER CONTROLLER
   ============================================ */
function formatTime(seconds) {
  const m = String(Math.floor(seconds / 60)).padStart(2, '0');
  const s = String(seconds % 60).padStart(2, '0');
  return `${m}:${s}`;
}

function toggleTimer() {
  if (state.timerRunning) {
    clearInterval(state.timerInterval);
    state.timerRunning = false;
    dom.timerToggle.querySelector('.material-icons-outlined').textContent = 'play_arrow';
  } else {
    state.timerRunning = true;
    dom.timerToggle.querySelector('.material-icons-outlined').textContent = 'pause';
    dom.timerReset.style.opacity = '1';
    dom.timerReset.style.pointerEvents = 'auto';
    state.timerInterval = setInterval(() => {
      state.timerSeconds++;
      dom.timerDisplay.textContent = formatTime(state.timerSeconds);
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(state.timerInterval);
  state.timerRunning = false;
  state.timerSeconds = 0;
  dom.timerDisplay.textContent = '00:00';
  dom.timerToggle.querySelector('.material-icons-outlined').textContent = 'play_arrow';
  dom.timerReset.style.opacity = '0';
  dom.timerReset.style.pointerEvents = 'none';
}

/* ============================================
   NOTES CONTROLLER
   ============================================ */
function toggleNotes() {
  state.notesOpen = !state.notesOpen;
  dom.notesPanel.classList.toggle('open', state.notesOpen);
  dom.notesToggle.classList.toggle('active', state.notesOpen);
  if (state.notesOpen) dom.notesTextarea.focus();
}

function openDropdown(id) {

function closeDropdowns() {

/* ══════════════════════════════════════════════════════════════════════
   ==== PPTX PARSER: XML → IR ====
   Pure functions only: no fabric, no DOM access beyond DOMParser. Signature
   `async function parsePptx(arrayBufferOrBlob, deps) → deckIR` — deps lets
   Node-based tests inject { JSZip, DOMParser } instead of relying on globals.

   IR schema v1 (see spec):
     deckIR  = { size:{w,h} (EMU), theme:{colors,majorFont,minorFont}, slides:[slideIR] }
     slideIR = { id, background:Fill, elements:[Element] }   // master, then layout, then slide (z-order)
     Element = { id, type:'shape'|'text'|'image'|'line'|'table', origin:'master'|'layout'|'slide',
                 x,y,w,h (EMU, groups already flattened), rot, flipH, flipV, ... }
     Fill = {type:'solid',color} | {type:'gradient',stops:[{pos,color}],angleDeg} | {type:'none'}
   ══════════════════════════════════════════════════════════════════════ */

const THEME_FALLBACK = { dk1:'#000000', lt1:'#ffffff', dk2:'#1a1a2e', lt2:'#f5f5f5',
  accent1:'#6c63ff', accent2:'#e03030', accent3:'#2d6a4f', accent4:'#fca311',
  accent5:'#0096c7', accent6:'#f77f00', hlink:'#0000ff', folHlink:'#800080' };

function applyBackgroundIR(fill, fc, cw, ch) {
  if (!fill || fill.type === 'none') { fc.setBackgroundColor('#ffffff', function () {}); return; }
  if (fill.type === 'solid') { fc.setBackgroundColor(fill.color, function () {}); return; }
  if (fill.type === 'gradient') {
    var stops = (fill.stops || []).map(function (s) { return { offset: s.pos, color: s.color }; });
    if (!stops.length) { fc.setBackgroundColor('#ffffff', function () {}); return; }
    var rad = (fill.angleDeg || 0) * Math.PI / 180;
    var cx = cw / 2, cy = ch / 2;
    var x1 = cx - Math.cos(rad) * cw / 2, y1 = cy - Math.sin(rad) * ch / 2;
    var x2 = cx + Math.cos(rad) * cw / 2, y2 = cy + Math.sin(rad) * ch / 2;
    var grad = new fabric.Gradient({ type: 'linear', coords: { x1: x1, y1: y1, x2: x2, y2: y2 }, colorStops: stops });
    fc.setBackgroundColor(grad, function () {});
  }
}
function gradientForBox(fillIR, w, h) {
  var stops = (fillIR.stops || []).map(function (s) { return { offset: s.pos, color: s.color }; });
  if (fillIR.radial) {
    /* focus point comes from the file's fillToRect; the 1.84 factor is a
       CALIBRATION of PowerPoint's renderer (its falloff extends well past
       the geometric corner — fitted once against PPT pixel samples, applies
       to every deck, not tuned per file) */
    var fx = (fillIR.focus ? fillIR.focus.fx : 0.5) * w;
    var fy = (fillIR.focus ? fillIR.focus.fy : 0.5) * h;
    var dxm = Math.max(fx, w - fx), dym = Math.max(fy, h - fy);
    var rFar = Math.sqrt(dxm * dxm + dym * dym);
    return new fabric.Gradient({ type: 'radial',
      coords: { x1: fx, y1: fy, r1: 0, x2: fx, y2: fy, r2: rFar * 1.84 },
      colorStops: stops });
  }
  var rad = (fillIR.angleDeg || 0) * Math.PI / 180;
  var x1 = w / 2 - Math.cos(rad) * w / 2, y1 = h / 2 - Math.sin(rad) * h / 2;
  var x2 = w / 2 + Math.cos(rad) * w / 2, y2 = h / 2 + Math.sin(rad) * h / 2;
  return new fabric.Gradient({ type: 'linear', coords: { x1: x1, y1: y1, x2: x2, y2: y2 }, colorStops: stops });
}
/* pattern fill → repeating tile (hatch families cover the OOXML presets) */
function patternForFill(fillIR) {
  /* EXACT-PIXEL 8x8 hatch tiles (PowerPoint/GDI style). Written as raw
     ImageData: no anti-aliasing, so lines are 1px crisp and full-strength —
     the earlier stroked tiles rendered fuzzy and washed-out. Our canvas is
     96dpi-equivalent (1920px / 20in), matching PPT's hatch scale 1:1. */
  var p = (fillIR.prst || 'ltDnDiag');
  function pix(x, y) {
    if (/diagBrick/i.test(p)) return x + y === 7 || (x === y && x > 3); /* runs "/" like PowerPoint — mirrored from first attempt */
    if (/wdDnDiag/i.test(p))  return (x - y + 16) % 8 < 2;
    if (/dkDnDiag/i.test(p))  return (x - y + 16) % 4 < 2;
    if (/dnDiag/i.test(p))    return (x - y + 16) % 4 === 0;
    if (/wdUpDiag/i.test(p))  return (x + y) % 8 < 2;
    if (/dkUpDiag/i.test(p))  return (x + y) % 4 < 2;
    if (/upDiag/i.test(p))    return (x + y) % 4 === 0;
    if (/diagCross|openDmnd|dotDmnd/i.test(p)) return (x - y + 16) % 8 === 0 || (x + y) % 8 === 0;
    if (/smCheck|lgCheck|weave|trellis/i.test(p)) return (x - y + 16) % 4 === 0 || (x + y) % 4 === 0;
    if (/smGrid/i.test(p))    return x % 4 === 0 || y % 4 === 0;
    if (/lgGrid|cross|plaid/i.test(p)) return x === 0 || y === 0;
    if (/ltHorz|dkHorz/i.test(p)) return y % 4 === 0;
    if (/horz/i.test(p))      return y === 0;
    if (/ltVert|dkVert/i.test(p)) return x % 4 === 0;
    if (/vert/i.test(p))      return x === 0;
    if (/pct90|pct80|pct75/i.test(p)) return !((x % 2 === 0) && (y % 2 === 0));
    if (/pct5\b|pct10/i.test(p)) return x % 8 === 0 && y % 8 === 0;
    if (/pct2[05]|pct30/i.test(p)) return (x % 4 === 0 && y % 4 === 0) || ((x + 2) % 4 === 0 && (y + 2) % 4 === 0);
    if (/pct|dot/i.test(p))   return (x % 2 === 0 && y % 2 === 0);
    return (x - y + 16) % 4 === 0; /* default: light down-diagonal */
  }
  function hex2rgb(css) {
    var m = /^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})/i.exec(String(css).replace('#',''));
    if (m) return [parseInt(m[1],16), parseInt(m[2],16), parseInt(m[3],16), 255];
    var r = /rgba?\((\d+),\s*(\d+),\s*(\d+)/.exec(String(css));
    return r ? [+r[1], +r[2], +r[3], 255] : [0, 0, 0, 255];
  }
  var fg = hex2rgb(fillIR.fg || '#000000'), bg = hex2rgb(fillIR.bg || '#FFFFFF');
  var t = document.createElement('canvas'); t.width = 8; t.height = 8;
  var g = t.getContext('2d');
  var im = g.createImageData(8, 8);
  for (var y = 0; y < 8; y++) for (var x = 0; x < 8; x++) {
    var c = pix(x, y) ? fg : bg, o = (y * 8 + x) * 4;
    im.data[o] = c[0]; im.data[o+1] = c[1]; im.data[o+2] = c[2]; im.data[o+3] = c[3];
  }
  g.putImageData(im, 0, 0);
  var pat = new fabric.Pattern({ source: t, repeat: 'repeat' });
  /* PPT hatches have a FIXED physical period (8px @ 96dpi = 1/12 inch).
     Our canvas dpi varies with slide size (1920px / slide-width-in), so
     scale the tile to keep the true physical spacing — unscaled tiles
     rendered 1.5x too dense on 13.3in decks and read as thick/heavy. */
  var pxPerPt = (typeof fc !== 'undefined' && fc && fc._pxPerPt) ? fc._pxPerPt : 2;
  var k = pxPerPt * 0.75; /* 96dpi ⇒ 1.333 px/pt ⇒ k=1 */
  if (Math.abs(k - 1) > 0.05) pat.patternTransform = [k, 0, 0, k, 0, 0];
  return pat;
}
function fillIRToFabric(fillIR, w, h) {
  if (!fillIR || fillIR.type === 'none') return '';
  if (fillIR.type === 'solid') return fillIR.color;
  if (fillIR.type === 'gradient') return gradientForBox(fillIR, w, h);
  if (fillIR.type === 'pattern') return patternForFill(fillIR);
  return '';
}

async function handlePPTXUpload(input) {
  if (!input.files || !input.files[0]) { showToast('No file selected'); return; }
  if (!fc) { alert('Editor not ready — please wait a moment and try again.'); return; }
  if (typeof JSZip === 'undefined') { alert('JSZip library failed to load. Check internet connection and reload.'); return; }
  var file = input.files[0];
  input.value = '';
  showToast('Parsing PPTX…');
  try {
    var _pr = await fetch(ENGINE + '/parse', { method: 'POST', body: file });
    if (!_pr.ok) throw new Error('engine /parse ' + _pr.status);
    var deckIR = await _pr.json();
    window._deckIR = deckIR;

    /* Collect the deck's font names and load matching webfonts BEFORE the
       first render, so imported text displays and wraps in its true fonts. */
    try {
      var _fontSet = {};
      deckIR.slides.forEach(function (s) { (s.elements || []).forEach(function (e) {
        if (e.type === 'text' && e.paragraphs) e.paragraphs.forEach(function (p) { (p.runs || []).forEach(function (r) { if (r.font) _fontSet[r.font] = 1; }); });
      }); });
      var _fontNames = Object.keys(_fontSet);
      if (window.loadDeckFonts && _fontNames.length) {
        showToast('Loading fonts…');
        await new Promise(function (res) { window.loadDeckFonts(_fontNames, res); });
      }
    } catch (e) { console.warn('font preload skipped', e); }

    // Replace the page list wholesale: one page per parsed slide, each
    // holding a reference to its IR (rendered fresh the first time it's
    // visited) so blank "add page" slides can coexist without index drift.
    state.pages = deckIR.slides.map(function (slideIR, i) { return Object.assign(makeBlankPage(Date.now() + i), { ir: slideIR }); });
    state.notes = state.pages.map(function () { return ''; });
    state.currentPage = 0;

    setSlideAspect(deckIR.size.w, deckIR.size.h);
    await loadPageIntoCanvas(0);

    /* ---- loss report: the engine says out loud what it changed/skipped ---- */
    var totalEls = deckIR.slides.reduce(function (a, s) { return a + s.elements.length; }, 0);
    if (deckIR.report && deckIR.report.length) {
      var items = deckIR.report.map(function (r) { return r.kind + ' (slide ' + r.slide + ')'; }).join(', ');
      showToast('Imported ' + deckIR.slides.length + ' slides / ' + totalEls + ' elements. Notes: ' + items, 10000);
      console.warn('Import loss report:', deckIR.report);
    } else {
      showToast('Imported ' + deckIR.slides.length + ' slides / ' + totalEls + ' elements — nothing lost', 4000);
    }
    // Thumbnails are generated LAZILY: a numbered placeholder shows until a
    // slide is first visited, at which point switchPage()/captureCurrentPage()
    // snapshots it. This avoids flicker from eagerly re-rendering every slide
    // over the one visible canvas. Capture slide 0's thumb now since it won't
    // otherwise get "left" until the user navigates away from it.
    try { state.pages[0].thumb = fc.toDataURL({ format: 'png', multiplier: 0.08 }); } catch (e) { /* ignore */ }

    renderPageThumbs();
    showToast('Loaded ' + state.pages.length + ' slide(s) ✓');
  } catch (e) {
    console.error(e);
    alert('PPTX error: ' + e.message);
  }
}

    });
  });

  // --- Header: Action Buttons ---
  document.addEventListener('click', e => {
    const action = e.target.closest('[data-action]');
    if (!action) return;
    const act = action.dataset.action;

    switch (act) {
      case 'toggle-sidebar':
        state.sidebarVisible = !state.sidebarVisible;
        dom.sidebar.style.display = state.sidebarVisible ? '' : 'none';
        // Adjust notes panel position
        dom.notesPanel.style.left = state.sidebarVisible ? 'var(--sidebar-w)' : '0';
        break;
      case 'upgrade':
        showToast('Upgrade options would open here');
        break;
      case 'present':
        if (dom.canvasArea.requestFullscreen) { dom.canvasArea.requestFullscreen().catch(()=>{}); }
        showToast('Presentation mode starting...');
        break;
      case 'share':
        if (state.openDropdown === 'share') closeDropdowns();
        else openDropdown('share');
        break;
      case 'more-menu':
        if (state.openDropdown === 'more') closeDropdowns();
        else openDropdown('more');
        break;
      case 'close-panel':
        closePanel();
        break;
      case 'toggle-notes':
        toggleNotes();
        break;
      case 'add-page':
        addPage();
        break;
      case 'use-template':
        showToast(`Applied template: ${action.dataset.name}`);
        break;
      case 'add-element':
        addShape(action.dataset.shape);
        break;
      case 'add-text':
        addText(action.dataset.type);
        break;
      case 'upload-image':
        dom.uploadImgInput.click();
        break;
      case 'upload-pptx':
        dom.uploadPptxInput.click();
        break;
      case 'undo':
        doUndo();
        break;
      case 'redo':
        doRedo();
        break;
    }
  });

  // --- Upload inputs ---
  dom.uploadImgInput.addEventListener('change', () => handleUploadImg(dom.uploadImgInput));
  dom.uploadPptxInput.addEventListener('change', () => handlePPTXUpload(dom.uploadPptxInput));

  // --- Dropdown items ---
  document.addEventListener('click', e => {
    const item = e.target.closest('[data-share]');
    if (item) {
      if (item.dataset.share === 'download') {
        exportCanvasPNG();
        closeDropdowns();
        return;
      }
      if (item.dataset.share === 'pptx') {
        exportPptxFile();
        closeDropdowns();
        return;
      }
      const msgs = { link: 'Link copied to clipboard', email: 'Share via email dialog would open', schedule: 'Schedule dialog would open' };
      showToast(msgs[item.dataset.share] || 'Action triggered');
      closeDropdowns();
      return;
    }
    const more = e.target.closest('[data-more]');
    if (more) {
      const msgs = { new: 'New design dialog would open', open: 'Open file dialog would open', settings: 'Settings panel would open', shortcuts: 'Keyboard shortcuts reference would open', help: 'Help center would open' };
      showToast(msgs[more.dataset.more] || 'Action triggered');
      closeDropdowns();
    }
  });

  // --- Close dropdowns on outside click ---
  document.addEventListener('click', e => {
    if (state.openDropdown && !e.target.closest('[data-action="share"]') && !e.target.closest('#share-dropdown') && !e.target.closest('[data-action="more-menu"]') && !e.target.closest('#more-dropdown')) {
      closeDropdowns();
    }
  });

  // --- Sidebar Tool Buttons ---
  dom.sidebarRail.addEventListener('click', e => {
    const btn = e.target.closest('.tool-btn');
    if (btn) selectTool(btn.dataset.tool);
  });

  // --- Panel Tabs ---
  dom.panelTabs.addEventListener('click', e => {
    const tab = e.target.closest('.panel-tab');
    if (!tab) return;
    const tabName = tab.dataset.ptab;
    $$('.panel-tab', dom.panelTabs).forEach(t => t.classList.toggle('active', t === tab));
    const data = panelData[state.activeTool];
    if (data) { data.activeTab = tabName; renderPanelContent(state.activeTool); }
  });

  // --- Panel Search ---
  dom.panelSearch.addEventListener('input', () => {
    const query = dom.panelSearch.value.toLowerCase().trim();
    if (!query) { renderPanelContent(state.activeTool); return; }
    // Simple filter: hide non-matching cards
    $$('.template-card, .element-card, .text-option', dom.panelContent).forEach(card => {
      const text = card.textContent.toLowerCase();
      card.style.display = text.includes(query) ? '' : 'none';
    });
  });

  // --- Canvas: Click slide to select ---
  dom.slideFrame.addEventListener('click', e => {
    e.stopPropagation();
    selectSlide(true);
  });
  dom.canvasArea.addEventListener('click', e => {
    if (e.target === dom.canvasArea || e.target === dom.canvasViewport) {
      selectSlide(false);
    }
  });

  // --- Canvas: Ctrl+Scroll to zoom ---
  dom.canvasArea.addEventListener('wheel', e => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -5 : 5;
      setZoom(state.zoom + delta);
    }
  }, { passive: false });

  // --- Page Thumbnails ---
  dom.pageThumbs.addEventListener('click', e => {
    const thumb = e.target.closest('.page-thumb');
    if (thumb) switchPage(parseInt(thumb.dataset.page));
  });

  // --- Zoom Controls ---
  $('[data-zoom="in"]').addEventListener('click', () => setZoom(state.zoom + 10));
  $('[data-zoom="out"]').addEventListener('click', () => setZoom(state.zoom - 10));
  $('[data-zoom="fit"]').addEventListener('click', () => setZoom(calculateFitZoom()));
  dom.zoomSlider.addEventListener('input', () => setZoom(parseInt(dom.zoomSlider.value)));

  // --- Timer ---
  dom.timerToggle.addEventListener('click', toggleTimer);
  dom.timerReset.addEventListener('click', resetTimer);

  // --- Notes auto-save ---
  dom.notesTextarea.addEventListener('input', () => {
    state.notes[state.currentPage] = dom.notesTextarea.value;
  });

  // --- Keyboard Shortcuts ---
  document.addEventListener('keydown', e => {
    // Don't trigger when typing in inputs / contenteditable
    if (e.target.matches('input, textarea, [contenteditable]')) {
      if (e.key === 'Escape') e.target.blur();
      return;
    }
    // Don't trigger while a Fabric IText is being edited on the canvas
    if (fc && fc.getActiveObject() && fc.getActiveObject().isEditing) {
      return;
    }

    const ctrl = e.ctrlKey || e.metaKey;

    if (ctrl && (e.key === 'z' || e.key === 'Z')) { e.preventDefault(); doUndo(); return; }
    if (ctrl && (e.key === 'y' || e.key === 'Y')) { e.preventDefault(); doRedo(); return; }
    if (ctrl && (e.key === 'c' || e.key === 'C')) { ctxCopy(); return; }
    if (ctrl && (e.key === 'v' || e.key === 'V')) { ctxPaste(); return; }
    if (ctrl && (e.key === 'd' || e.key === 'D')) { e.preventDefault(); ctxDuplicate(); return; }

    switch (e.key) {
      case 'Escape':
        if (state.openDropdown) closeDropdowns();
        else if (_sciss) stopScissorMode(false);
        else if (dom.ctxMenu.classList.contains('open')) dom.ctxMenu.classList.remove('open');
        else if (state.notesOpen) toggleNotes();
        else if (state.activeTool) closePanel();
        else selectSlide(false);
        break;
      case 'Delete':
      case 'Backspace': {
        const activeObj = fc && fc.getActiveObject();
        if (activeObj) {
          fc.remove(activeObj);
          fc.discardActiveObject();
          fc.renderAll();
          saveState();
        } else if (state.slideSelected) {
          deletePage();
          selectSlide(false);
        }
        break;
      }
      case '+':
      case '=':
        if (ctrl) { e.preventDefault(); setZoom(state.zoom + 10); }
        break;
      case '-':
        if (ctrl) { e.preventDefault(); setZoom(state.zoom - 10); }
        break;
      case '0':
        if (ctrl) { e.preventDefault(); setZoom(calculateFitZoom()); }
        break;
      case 'ArrowLeft':
        if (state.currentPage > 0) switchPage(state.currentPage - 1);
        break;
      case 'ArrowRight':
        if (state.currentPage < state.pages.length - 1) switchPage(state.currentPage + 1);
        break;
    }
  });

  // --- Window Resize: Recalculate fit zoom ---
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      // Keep current zoom but update if it was "fit"
    }, 200);
  });
}

/* ============================================
   INITIALIZATION
   ============================================ */
function init() {
  initFabric();
  renderSidebarTools();
  ensurePageHistory(0); // seed page 0's per-page undo stack with the blank canvas
  renderPageThumbs();
  setZoom(Math.max(70, calculateFitZoom())); /* open at 70% minimum */
  initEvents();

  // Add a second page for demo purposes
  state.pages.push(makeBlankPage(2));
  state.notes.push('');
  renderPageThumbs();
}

// Start the app
init();

</script>

    "Winky Sans", "Wire One", "Wittgenstein", "Wix Madefor Display", "Wix Madefor Text", "Workbench",
    "Xanh Mono", "Yaldevi", "Yantramanav", "Yarndings 12", "Yarndings 12 Charted", "Yarndings 20",
    "Yarndings 20 Charted", "Yatra One", "Yeon Sung", "Yomogi", "Young Serif", "Yrsa",
    "Ysabeau", "Ysabeau Infant", "Ysabeau Office", "Ysabeau SC", "Yuji Boku", "Yuji Hentaigana Akari",
    "Yuji Hentaigana Akebono", "Yuji Mai", "Yuji Syuku", "Yusei Magic", "ZCOOL KuaiLe", "ZCOOL QingKe HuangYou",
    "ZCOOL XiaoWei", "Zain", "Zalando Sans", "Zalando Sans Expanded", "Zalando Sans SemiExpanded", "Zen Antique",
    "Zen Antique Soft", "Zen Dots", "Zen Kaku Gothic Antique", "Zen Kaku Gothic New", "Zen Kurenaido", "Zen Loop",
    "Zen Maru Gothic", "Zen Old Mincho", "Zen Tokyo Zoo", "Zeyada", "Zhi Mang Xing", "Zilla Slab Highlight"
  ];

  /* Fontshare (Indian Type Foundry, free/OFL) — second loadable source with
     its own CSS API. Names not available on Google Fonts (Satoshi, General
     Sans, Clash Display, Cabinet Grotesk...). */
  var FONTSHARE_FONTS = [
    "Kihim",
    "Gambetta",
    "Gambarino",
    "Comico",
    "Rowan",
    "Synonym",
    "Technor",
    "General Sans",
    "Sentient",

    "Boxing",
