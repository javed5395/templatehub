  if (kind === 'Text') {
    h += card('fx-toggle','shadow','filter_drama','Shadow', !!on('shadow'))
       + card('fx-toggle','glow','blur_on','Glow', !!on('glow'))
       + card('fx-toggle','outline','format_color_text','Outline', !!on('outline'))
       + card('fx-curve','','waves','Curve', !!f.curve);
    h += '</div>';
    if (f.shadow && f.shadow.on) {
      h += fxRow('Shadow blur', (f.shadow.blur == null ? 12 : f.shadow.blur))
        + '<input type="range" class="anim-range" min="0" max="40" value="' + (f.shadow.blur == null ? 12 : f.shadow.blur) + '" data-fx="shadow.blur">'
        + fxRow('Offset Y', (f.shadow.y == null ? 8 : f.shadow.y))
        + '<input type="range" class="anim-range" min="-30" max="30" value="' + (f.shadow.y == null ? 8 : f.shadow.y) + '" data-fx="shadow.y">'
        + '<button class="cm-mini" data-action="fx-colour" data-t="shadow"><span class="material-icons-outlined">palette</span>Shadow colour</button>';
    }
    if (f.glow && f.glow.on) {
      h += fxRow('Glow size', (f.glow.blur == null ? 18 : f.glow.blur))
        + '<input type="range" class="anim-range" min="2" max="60" value="' + (f.glow.blur == null ? 18 : f.glow.blur) + '" data-fx="glow.blur">'
        + '<button class="cm-mini" data-action="fx-colour" data-t="glow"><span class="material-icons-outlined">palette</span>Glow colour</button>';
    }
    if (f.outline && f.outline.on) {
      h += fxRow('Outline width', (f.outline.w == null ? 2 : f.outline.w))
        + '<input type="range" class="anim-range" min="0.5" max="8" step="0.5" value="' + (f.outline.w == null ? 2 : f.outline.w) + '" data-fx="outline.w">'
        + '<button class="cm-mini" data-action="fx-colour" data-t="outline"><span class="material-icons-outlined">palette</span>Outline colour</button>';
    }
    if (f.curve) {
      h += fxRow('Curve', f.curve)
        + '<input type="range" class="anim-range" min="-100" max="100" value="' + f.curve + '" data-fx="~curve">';
    }
  } else if (kind === 'Image') {
    h += card('fx-blur','','blur_on','Blur', (f.blur||0) > 0)
       + card('fx-toggle','vintage','filter_vintage','Vintage', !!f.vintage)
       + card('fx-colour','duotone','contrast','Duotone', !!f.duotone)
       + card('fx-bright','','light_mode','Brightness', f.brightness != null && f.brightness !== 0);
    h += '</div>';
    h += fxRow('Blur', (f.blur || 0).toFixed ? (f.blur || 0) : 0)
      + '<input type="range" class="anim-range" min="0" max="0.5" step="0.01" value="' + (f.blur || 0) + '" data-fx="~blur">'
      + fxRow('Brightness', (f.brightness || 0))
      + '<input type="range" class="anim-range" min="-0.6" max="0.6" step="0.02" value="' + (f.brightness || 0) + '" data-fx="~brightness">'
      + fxRow('Contrast', (f.contrast || 0))
      + '<input type="range" class="anim-range" min="-0.5" max="0.5" step="0.02" value="' + (f.contrast || 0) + '" data-fx="~contrast">';
    if (f.duotone) {
      h += '<button class="cm-mini" data-action="fx-colour" data-t="duotone"><span class="material-icons-outlined">palette</span>Duotone colour</button>'
        + '<button class="cm-mini" data-action="fx-unduo"><span class="material-icons-outlined">close</span>Remove duotone</button>';
    }
  } else {
    h += card('fx-toggle','shadow','filter_drama','Shadow', !!on('shadow'))
       + card('fx-toggle','glow','blur_on','Glow', !!on('glow'))
       + card('fx-toggle','glass','opacity','Glass', !!on('glass'));
    h += '</div>';
    if (f.shadow && f.shadow.on) {
      h += fxRow('Shadow blur', (f.shadow.blur == null ? 12 : f.shadow.blur))
        + '<input type="range" class="anim-range" min="0" max="50" value="' + (f.shadow.blur == null ? 12 : f.shadow.blur) + '" data-fx="shadow.blur">'
        + fxRow('Offset Y', (f.shadow.y == null ? 8 : f.shadow.y))
        + '<input type="range" class="anim-range" min="-40" max="40" value="' + (f.shadow.y == null ? 8 : f.shadow.y) + '" data-fx="shadow.y">'
        + '<button class="cm-mini" data-action="fx-colour" data-t="shadow"><span class="material-icons-outlined">palette</span>Shadow colour</button>';
    }
    if (f.glow && f.glow.on) {
      h += fxRow('Glow size', (f.glow.blur == null ? 18 : f.glow.blur))
        + '<input type="range" class="anim-range" min="2" max="70" value="' + (f.glow.blur == null ? 18 : f.glow.blur) + '" data-fx="glow.blur">'
        + '<button class="cm-mini" data-action="fx-colour" data-t="glow"><span class="material-icons-outlined">palette</span>Glow colour</button>';
    }
    if (f.glass && f.glass.on) {
      h += fxRow('Transparency', Math.round((1 - (f.glass.opacity == null ? 0.45 : f.glass.opacity)) * 100) + '%')
        + '<input type="range" class="anim-range" min="0.1" max="0.9" step="0.05" value="'
        + (f.glass.opacity == null ? 0.45 : f.glass.opacity) + '" data-fx="glass.opacity">'
        + '<div class="panel-hint">Canvas cannot blur what is behind an object, so Glass is '
        + 'transparency plus a light rim and soft shadow — the look, not a true backdrop blur.</div>';
    }
  }

  h += '<button class="cm-mini" data-action="fx-clear" style="margin-top:8px">'
    + '<span class="material-icons-outlined">layers_clear</span>Clear all effects</button>';
  return h;
}

/* ════════════════════════════════════════════════════════════
   ANIMATIONS
   Entrance animations on objects, plus a per-slide transition. Both are
   stored as intent (type + timing), never baked into geometry — the
   object's real position is always its resting position, so a saved slide
   is never captured mid-flight.
   PPTX export drops motion (policy D in the interop notes), so this plays
   in the editor and in Present, and the panel says as much.
   ════════════════════════════════════════════════════════════ */
var OBJ_ANIMS = [
  { id:'fade',   name:'Fade',   icon:'gradient',        dirs:false },
  { id:'zoom',   name:'Zoom',   icon:'zoom_out_map',    dirs:false },
  { id:'fly',    name:'Fly',    icon:'flight',          dirs:true  },
  { id:'rise',   name:'Rise',   icon:'arrow_upward',    dirs:false },
  { id:'bounce', name:'Bounce', icon:'sports_basketball',dirs:false },
];
var ANIM_DIRS = [
  { id:'left',  name:'From left',  icon:'west' },
  { id:'right', name:'From right', icon:'east' },
  { id:'top',   name:'From top',   icon:'north' },
  { id:'bottom',name:'From bottom',icon:'south' },
];
var PAGE_TRANSITIONS = [
  { id:'none',     name:'None',     icon:'block' },
  { id:'fade',     name:'Fade',     icon:'gradient' },
  { id:'slide',    name:'Slide',    icon:'swipe_left' },
  { id:'push',     name:'Push',     icon:'east' },
  { id:'dissolve', name:'Dissolve', icon:'blur_on' },
];

function animObjects() {
  if (!fc || !fc.getObjects) return [];
  return (fc.getObjects() || [])
    .filter(function (o) { return o.animType; })
    .sort(function (a, b) { return (a.animOrder || 0) - (b.animOrder || 0); });
}

function animSet(type) {
  var o = fc && fc.getActiveObject();
  if (!o) { showToast('Select an object first'); return; }
  if (type === 'none') {
    o.animType = null; o.animOrder = null;
    showToast('Animation removed');
  } else {
    o.animType = type;
    if (o.animMs == null) o.animMs = 600;
    if (o.animDelay == null) o.animDelay = 0;
    if (!o.animDir) o.animDir = 'left';
    if (o.animOrder == null) o.animOrder = animObjects().length + 1;
    showToast(type + ' — press Play to preview');
  }
  saveState(); animRefresh();
}

function animSetDir(dir) {
  var o = fc && fc.getActiveObject();
  if (!o || !o.animType) { showToast('Give the object an animation first'); return; }
  o.animDir = dir; saveState(); animRefresh();
}

function animSetTiming(field, val) {
  var o = fc && fc.getActiveObject();
  if (!o || !o.animType) return;
  o[field] = Math.max(0, Math.min(5000, parseInt(val, 10) || 0));
  saveState(); animRefresh();
}

function animReorder(dir) {
  var o = fc && fc.getActiveObject();
  if (!o || !o.animType) { showToast('Select an animated object'); return; }
  var list = animObjects();
  var i = list.indexOf(o);
  var j = i + dir;
  if (i < 0 || j < 0 || j >= list.length) return;
  var tmp = list[i].animOrder; list[i].animOrder = list[j].animOrder; list[j].animOrder = tmp;
  saveState(); animRefresh();
}

/* ── Preview ─────────────────────────────────────────────
   Each object is moved to a start state, then animated back to where it
   actually lives. Because the end state IS the resting state, an
   interrupted preview can always be repaired by restoring the snapshot. */
var _animPlaying = false;

function animStartState(o, base) {
  /* a NaN here would move the object to an unreachable position, so fall
     back to sane slide dimensions rather than trusting the canvas */
  var z = fc.getZoom() || 1;
  var W = fc.getWidth() / z, H = fc.getHeight() / z;
  if (!isFinite(W) || W <= 0) W = 960;
  if (!isFinite(H) || H <= 0) H = 540;
  var s = { opacity: 0 };
  if (o.animType === 'zoom')   { s.scaleX = base.scaleX * 0.4; s.scaleY = base.scaleY * 0.4; }
  if (o.animType === 'rise')   { s.top = base.top + Math.min(120, H * 0.18); }
  if (o.animType === 'bounce') { s.top = base.top - Math.min(160, H * 0.25); s.opacity = 1; }
  if (o.animType === 'fly') {
    if (o.animDir === 'left')   s.left = base.left - W * 0.6;
    if (o.animDir === 'right')  s.left = base.left + W * 0.6;
    if (o.animDir === 'top')    s.top  = base.top  - H * 0.6;
    if (o.animDir === 'bottom') s.top  = base.top  + H * 0.6;
    s.opacity = 1;
  }
  return s;
}

function animPlay() {
  if (!fc || _animPlaying) return;
  var list = animObjects();
  if (!list.length) { showToast('Nothing on this slide is animated'); return; }
  if (typeof fabric === 'undefined' || !list[0].animate) { showToast('Preview unavailable'); return; }

  _animPlaying = true;
  var snaps = list.map(function (o) {
    return { o: o, base: { left:o.left, top:o.top, opacity:(o.opacity==null?1:o.opacity),
                           scaleX:o.scaleX||1, scaleY:o.scaleY||1 } };
  });

  var ease = (fabric.util && fabric.util.ease) || {};
  var done = 0;
  var finish = function () {
    if (++done < snaps.length) return;
    snaps.forEach(function (s) { s.o.set(s.base); s.o.setCoords(); });
    fc.requestRenderAll();
    _animPlaying = false;
  };

  var clock = 0;
  snaps.forEach(function (s) {
    var o = s.o, base = s.base;
    var delay = clock + (o.animDelay || 0);
    clock = delay + (o.animMs || 600) * 0.55;   /* slight overlap, like PowerPoint */
    o.set(animStartState(o, base));
    fc.requestRenderAll();
    setTimeout(function () {
      var easing = o.animType === 'bounce' ? (ease.easeOutBounce || ease.easeOutCubic)
                 : o.animType === 'zoom'   ? (ease.easeOutBack || ease.easeOutCubic)
                 : (ease.easeOutCubic || undefined);
      o.animate(base, {
        duration: o.animMs || 600,
        easing: easing,
        onChange: function () { fc.requestRenderAll(); },
        onComplete: finish
      });
    }, delay);
  });
  showToast('Playing ' + snaps.length + ' animation' + (snaps.length === 1 ? '' : 's'));
}

/* ── Page transitions ───────────────────────────────────── */
function pageTransition(i) {
  var p = state.pages[i == null ? state.currentPage : i];
  return (p && p.transition) || { type: 'none', ms: 500 };
}

function transSet(type) {
  var p = state.pages[state.currentPage];
  if (!p) return;
  p.transition = { type: type, ms: (p.transition && p.transition.ms) || 500 };
  animRefresh();
  showToast(type === 'none' ? 'Transition removed' : 'Transition: ' + type);
  if (type !== 'none') transPlay();
}

function transSetMs(v) {
  var p = state.pages[state.currentPage];
  if (!p) return;
  p.transition = p.transition || { type: 'fade', ms: 500 };
  p.transition.ms = Math.max(100, Math.min(3000, parseInt(v, 10) || 500));
  animRefresh();
}

/* The transition is a CSS animation on the slide frame — the canvas
   content is untouched, so nothing can be left in a broken state. */
function transPlay() {
  var t = pageTransition();
  var frame = document.getElementById('slide-frame');
  if (!frame || t.type === 'none') { showToast('No transition on this slide'); return; }
  frame.style.setProperty('--trans-ms', t.ms + 'ms');
  var cls = 'trans-' + t.type;
  frame.classList.remove('trans-fade','trans-slide','trans-push','trans-dissolve');
  void frame.offsetWidth;                     /* restart the animation */
  frame.classList.add(cls);
  setTimeout(function () { frame.classList.remove(cls); }, t.ms + 60);
}

function animRefresh() {
  if (typeof state !== 'undefined' && state.activeTool === 'animations') renderPanelContent('animations');
}

function renderAnimPanel(tab) {
  if (tab === 'Transition') {
    var t = pageTransition();
    return '<div class="panel-subhead">Slide ' + (state.currentPage + 1) + ' transition</div>'
      + '<div class="anim-grid">' + PAGE_TRANSITIONS.map(function (x) {
          return '<button class="anim-card' + (t.type === x.id ? ' on' : '') + '"'
            + ' data-action="trans-set" data-t="' + x.id + '">'
            + '<span class="material-icons-outlined">' + x.icon + '</span>'
            + '<span>' + x.name + '</span></button>';
        }).join('') + '</div>'
      + '<label class="brand-lbl">Duration — ' + t.ms + 'ms</label>'
      + '<input type="range" class="anim-range" min="100" max="2000" step="50" value="' + t.ms
        + '" data-animrange="trans">'
      + '<button class="anim-play" data-action="trans-play">'
        + '<span class="material-icons-outlined">play_arrow</span>Preview transition</button>'
      + '<div class="panel-hint">Transitions play in the editor and in Present. '
        + 'PowerPoint export keeps the slides but not the motion.</div>';
  }

  var o = fc && fc.getActiveObject();
  var cur = o && o.animType;
  var list = animObjects();

  var head = '<div class="panel-subhead">Object animation'
    + (o ? '' : ' <span>select something</span>') + '</div>'
    + '<div class="anim-grid">'
    + '<button class="anim-card' + (o && !cur ? ' on' : '') + '" data-action="anim-set" data-t="none">'
      + '<span class="material-icons-outlined">block</span><span>None</span></button>'
    + OBJ_ANIMS.map(function (a) {
        return '<button class="anim-card' + (cur === a.id ? ' on' : '') + '"'
          + ' data-action="anim-set" data-t="' + a.id + '">'
          + '<span class="material-icons-outlined">' + a.icon + '</span>'
          + '<span>' + a.name + '</span></button>';
      }).join('') + '</div>';

  if (cur) {
    var def = OBJ_ANIMS.filter(function (a) { return a.id === cur; })[0];
    if (def && def.dirs) {
      head += '<label class="brand-lbl">Direction</label><div class="anim-grid four">'
        + ANIM_DIRS.map(function (d) {
            return '<button class="anim-card' + (o.animDir === d.id ? ' on' : '') + '"'
              + ' data-action="anim-dir" data-t="' + d.id + '">'
              + '<span class="material-icons-outlined">' + d.icon + '</span>'
              + '<span>' + d.name.replace('From ', '') + '</span></button>';
          }).join('') + '</div>';
    }
    head += '<label class="brand-lbl">Duration — ' + (o.animMs || 600) + 'ms</label>'
      + '<input type="range" class="anim-range" min="100" max="2500" step="50" value="'
        + (o.animMs || 600) + '" data-animrange="ms">'
      + '<label class="brand-lbl">Delay — ' + (o.animDelay || 0) + 'ms</label>'
      + '<input type="range" class="anim-range" min="0" max="2000" step="50" value="'
        + (o.animDelay || 0) + '" data-animrange="delay">';
  }

  head += '<button class="anim-play" data-action="anim-play">'
    + '<span class="material-icons-outlined">play_arrow</span>Play this slide</button>';

  if (list.length) {
    head += '<div class="panel-subhead">Play order <span>' + list.length + '</span></div>'
      + '<div class="anim-order">' + list.map(function (x, i) {
          var active = x === o;
          return '<div class="anim-item' + (active ? ' active' : '') + '">'
            + '<span class="anim-n">' + (i + 1) + '</span>'
            + '<span class="material-icons-outlined anim-i">' + layerIcon(x) + '</span>'
            + '<span class="anim-l">' + commentEsc(layerLabel(x)) + '</span>'
            + '<span class="anim-t">' + x.animType + '</span>'
            + '</div>';
        }).join('') + '</div>'
      + '<div class="anim-ordbtns">'
        + '<button data-action="anim-up"><span class="material-icons-outlined">arrow_upward</span>Earlier</button>'
        + '<button data-action="anim-down"><span class="material-icons-outlined">arrow_downward</span>Later</button>'
      + '</div>';
  }

  head += '<div class="panel-hint">Animations play in the editor and in Present. '
    + 'PowerPoint export keeps the objects but not the motion.</div>';
  return head;
}

/* ════════════════════════════════════════════════════════════
   COMMENTS
   Stored with the deck, so they travel when a project is saved. Anchoring:
   if something is selected when you comment, the comment attaches to that
   object and clicking it re-selects it; otherwise it is a slide comment.
   Mentions are parsed and highlighted, but nothing is notified — there is
   no backend yet, and the panel says so instead of pretending.
   ════════════════════════════════════════════════════════════ */
function commentAuthor() {
  var n = null;
  try { n = localStorage.getItem('ld_comment_author'); } catch (e) {}
  return n || 'You';
}
function commentSetAuthor() {
  var n = prompt('Your name (shown on comments):', commentAuthor());
  if (n === null) return;
  try { localStorage.setItem('ld_comment_author', n.trim() || 'You'); } catch (e) {}
  commentRefresh();
}
function commentPeople() { return iconStore('ld_comment_people', []); }
function commentAddPerson() {
  var n = prompt('Add a name you want to @mention:');
  if (!n || !n.trim()) return;
  var p = commentPeople();
  if (p.indexOf(n.trim()) === -1) p.push(n.trim());
  iconSave('ld_comment_people', p.slice(0, 30));
  commentRefresh();
}

function commentAll() {
  if (!state.comments) state.comments = [];
  return state.comments;
}

function commentEsc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* @name → highlighted chip. Escaped first, so comment text can never
   inject markup into the panel. */
function commentFormat(text) {
  return commentEsc(text).replace(/@([\w][\w .'-]{0,28}\w|\w)/g, function (m, n) {
    return '<em class="cm-at">@' + n + '</em>';
  });
}

function commentTargetLabel(c) {
  if (!c.objId) return null;
  var o = layerFind(c.objId);
  return o ? layerLabel(o) : 'deleted object';
}

function commentAdd() {
  var box = document.getElementById('cm-input');
  var text = box ? box.value.trim() : '';
  if (!text) { showToast('Write something first'); return; }
  var sel = fc && fc.getActiveObject();
  commentAll().push({
    id: 'cm' + Date.now(),
    page: state.currentPage,
    objId: sel ? layerId(sel) : null,
    author: commentAuthor(),
    text: text,
    ts: Date.now(),
    resolved: false,
    replies: []
  });
  if (box) box.value = '';
  commentRefresh();
  showToast(sel ? 'Comment added to the selected object' : 'Comment added to this slide');
}

function commentReply(id) {
  var c = commentAll().filter(function (x) { return x.id === id; })[0];
  if (!c) return;
  var t = prompt('Reply:');
  if (!t || !t.trim()) return;
  c.replies.push({ author: commentAuthor(), text: t.trim(), ts: Date.now() });
  commentRefresh();
}

function commentResolve(id) {
  var c = commentAll().filter(function (x) { return x.id === id; })[0];
  if (!c) return;
  c.resolved = !c.resolved;
  commentRefresh();
  showToast(c.resolved ? 'Resolved' : 'Reopened');
}

function commentDelete(id) {
  state.comments = commentAll().filter(function (x) { return x.id !== id; });
  commentRefresh();
}

function commentGoto(id) {
  var c = commentAll().filter(function (x) { return x.id === id; })[0];
  if (!c) return;
  var after = function () {
    if (c.objId) {
      var o = layerFind(c.objId);
      if (o && o.selectable !== false) { fc.setActiveObject(o); fc.renderAll(); }
    }
    commentRefresh();
  };
  if (c.page !== state.currentPage) switchPage(c.page).then(after); else after();
}

function commentAgo(ts) { return projAgo(ts); }

function commentRefresh() {
  if (typeof state !== 'undefined' && state.activeTool === 'comments') renderPanelContent('comments');
}

function renderCommentPanel(tab) {
  var all = commentAll();
  var list = all.filter(function (c) {
    if (tab === 'Resolved') return c.resolved;
    if (tab === 'All slides') return !c.resolved;
    return !c.resolved && c.page === state.currentPage;
  }).sort(function (a, b) { return b.ts - a.ts; });

  var people = commentPeople();
  var openCount = all.filter(function (c) { return !c.resolved; }).length;

  var head = '<div class="cm-compose">'
    + '<textarea id="cm-input" class="cm-box" rows="3" placeholder="Write a comment… use @ to mention someone"></textarea>'
    + '<div class="cm-compose-row">'
      + '<button class="cm-mini" data-action="cm-person" title="Add a mentionable name">'
        + '<span class="material-icons-outlined">person_add</span></button>'
      + '<button class="cm-mini" data-action="cm-author" title="Set your display name">'
        + '<span class="material-icons-outlined">badge</span>' + commentEsc(commentAuthor()) + '</button>'
      + '<button class="cm-send" data-action="cm-add">Comment</button>'
    + '</div>'
    + (people.length
      ? '<div class="cm-people">' + people.map(function (p) {
          return '<button class="cm-chip" data-action="cm-mention" data-n="' + commentEsc(p) + '">@'
            + commentEsc(p) + '</button>';
        }).join('') + '</div>'
      : '')
    + '</div>'
    + '<div class="panel-hint">Comments are saved with the project on this device. '
      + 'Mentions are not sent anywhere until there is a backend.</div>';

  if (!list.length) {
    return head + '<div class="panel-placeholder">'
      + '<span class="material-icons-outlined">chat_bubble_outline</span>'
      + '<p><strong>' + (tab === 'Resolved' ? 'Nothing resolved yet' : 'No comments') + '</strong><br>'
      + (tab === 'This slide' && openCount
          ? openCount + ' open on other slides — see All slides.'
          : 'Select an object first to pin a comment to it.') + '</p></div>';
  }

  return head + '<div class="cm-list">' + list.map(function (c) {
    var target = commentTargetLabel(c);
    return '<div class="cm-card' + (c.resolved ? ' done' : '') + '">'
      + '<div class="cm-top">'
        + '<span class="cm-who">' + commentEsc(c.author) + '</span>'
        + '<span class="cm-when">' + commentAgo(c.ts) + '</span>'
        + '<button data-action="cm-resolve" data-id="' + c.id + '" title="'
          + (c.resolved ? 'Reopen' : 'Resolve') + '"><span class="material-icons-outlined">'
          + (c.resolved ? 'replay' : 'check_circle') + '</span></button>'
        + '<button data-action="cm-del" data-id="' + c.id + '" title="Delete" class="danger">'
          + '<span class="material-icons-outlined">delete</span></button>'
      + '</div>'
      + '<div class="cm-text">' + commentFormat(c.text) + '</div>'
      + '<div class="cm-meta">'
        + '<button data-action="cm-goto" data-id="' + c.id + '">'
          + '<span class="material-icons-outlined">my_location</span>Slide ' + (c.page + 1)
          + (target ? ' · ' + commentEsc(target) : '') + '</button>'
        + '<button data-action="cm-reply" data-id="' + c.id + '">'
          + '<span class="material-icons-outlined">reply</span>Reply'
          + (c.replies.length ? ' (' + c.replies.length + ')' : '') + '</button>'
      + '</div>'
      + (c.replies.length
        ? '<div class="cm-replies">' + c.replies.map(function (r) {
            return '<div class="cm-reply"><b>' + commentEsc(r.author) + '</b> '
              + '<i>' + commentAgo(r.ts) + '</i><div>' + commentFormat(r.text) + '</div></div>';
          }).join('') + '</div>'
        : '')
      + '</div>';
  }).join('') + '</div>';
}

/* ════════════════════════════════════════════════════════════
   PAGES — slide manager with sections
   The bottom strip is the quick rail; this is the overview. Sections work
   the PowerPoint way: a section is a MARKER on the slide where it starts,
   and every slide after it belongs to that section until the next marker.
   That survives reordering without any separate bookkeeping.
   ════════════════════════════════════════════════════════════ */
var _sectionCollapsed = {};

function pageTitle(p, i) {
  return p.title || ('Slide ' + (i + 1));
}

/* Walk the deck and resolve which section each slide sits in. */
function pageSections() {
  var out = [], cur = null;
  (state.pages || []).forEach(function (p, i) {
    if (p.sectionStart) {
      cur = { name: p.sectionStart, start: i, items: [] };
      out.push(cur);
    }
    if (!cur) {
      cur = { name: '', start: 0, items: [] };
      out.unshift(cur);
    }
    cur.items.push(i);
  });
  return out;
}

function renderPagePanel() {
  if (!state || !state.pages || !state.pages.length) {
    return '<div class="panel-placeholder"><span class="material-icons-outlined">auto_awesome_motion</span>'
      + '<p><strong>No slides</strong></p></div>';
  }
  var head = '<div class="layer-head">'
    + '<button class="layer-hbtn" data-action="add-page" title="Add slide">'
      + '<span class="material-icons-outlined">add</span></button>'
    + '<button class="layer-hbtn" data-action="page-dup" title="Duplicate this slide">'
      + '<span class="material-icons-outlined">content_copy</span></button>'
    + '<button class="layer-hbtn" data-action="page-del" title="Delete this slide">'
      + '<span class="material-icons-outlined">delete</span></button>'
    + '<button class="layer-hbtn" data-action="page-section" title="Start a section here">'
      + '<span class="material-icons-outlined">bookmark_add</span></button>'
    + '<span class="layer-count">' + state.pages.length + ' slide'
      + (state.pages.length === 1 ? '' : 's') + '</span></div>'
    + '<div class="panel-hint">Drag to reorder. A section starts at the slide you mark.</div>';

  return head + pageSections().map(function (sec) {
    var collapsed = !!_sectionCollapsed[sec.name || '_none'];
    var h = '';
    if (sec.name) {
      h += '<div class="page-sec">'
        + '<button class="page-sec-tw" data-action="page-sec-toggle" data-sec="' + sec.name + '">'
          + '<span class="material-icons-outlined">'
          + (collapsed ? 'chevron_right' : 'expand_more') + '</span></button>'
        + '<span class="page-sec-name">' + sec.name + '</span>'
        + '<span class="page-sec-n">' + sec.items.length + '</span>'
        + '<button class="page-sec-x" data-action="page-sec-rename" data-i="' + sec.start + '" title="Rename section">'
          + '<span class="material-icons-outlined">edit</span></button>'
        + '<button class="page-sec-x" data-action="page-sec-remove" data-i="' + sec.start + '" title="Remove section">'
          + '<span class="material-icons-outlined">close</span></button>'
        + '</div>';
    }
    if (collapsed) return h;

    h += '<div class="page-list">' + sec.items.map(function (i) {
      var p = state.pages[i];
      var active = i === state.currentPage;
      return '<div class="page-card' + (active ? ' active' : '') + '" draggable="true" data-pidx="' + i + '">'
        + '<span class="page-num">' + (i + 1) + '</span>'
        + '<div class="page-thumb-lg" data-action="page-go" data-i="' + i + '">'
          + (p.thumb ? '<img src="' + p.thumb + '" alt="">' : '<div class="page-blank"></div>')
        + '</div>'
        + '<div class="page-info-col">'
          + '<b data-action="page-rename" data-i="' + i + '" title="Rename slide">'
            + pageTitle(p, i) + '</b>'
          + '<div class="page-tools">'
            + '<button data-action="page-dup-i" data-i="' + i + '" title="Duplicate">'
              + '<span class="material-icons-outlined">content_copy</span></button>'
            + '<button data-action="page-del-i" data-i="' + i + '" title="Delete" class="danger">'
              + '<span class="material-icons-outlined">delete</span></button>'
          + '</div>'
        + '</div></div>';
    }).join('') + '</div>';
    return h;
  }).join('');
}

function pageRefresh() {
  if (typeof state !== 'undefined' && state.activeTool === 'pages') renderPanelContent('pages');
}

function pageGo(i) {
  switchPage(i).then(function () { pageRefresh(); });
}

function pageRenameAt(i) {
  var p = state.pages[i];
  if (!p) return;
  var n = prompt('Slide name:', pageTitle(p, i));
  if (n === null) return;
  p.title = n.trim() || null;
  pageRefresh();
  showToast('Slide renamed');
}

function pageDuplicateAt(i) {
  if (state.pages.length >= 40) { showToast('Maximum 40 slides'); return; }
  var run = function () {
    captureCurrentPage();
    var src = state.pages[state.currentPage];
    var copy = makeBlankPage(Date.now());
    copy.canvasJSON = src.canvasJSON ? JSON.parse(JSON.stringify(src.canvasJSON)) : null;
    copy.ir = src.ir ? JSON.parse(JSON.stringify(src.ir)) : null;
    copy.thumb = src.thumb;
    copy.title = src.title ? src.title + ' copy' : null;
    /* a copy must never inherit the section marker — that would split the
       section in two at the wrong place */
    copy.sectionStart = null;
    state.pages.splice(state.currentPage + 1, 0, copy);
    state.notes.splice(state.currentPage + 1, 0, state.notes[state.currentPage] || '');
    state.currentPage++;
    loadPageIntoCanvas(state.currentPage).then(function () {
      renderPageThumbs(); pageRefresh(); showToast('Slide duplicated');
    });
  };
  if (i !== state.currentPage) switchPage(i).then(run); else run();
}

function pageDeleteAt(i) {
  if (state.pages.length <= 1) { showToast('Cannot delete the last slide'); return; }
  var run = function () {
    /* if this slide started a section, hand the marker to the next slide
       so the section is not silently lost */
    var p = state.pages[state.currentPage];
    if (p && p.sectionStart && state.pages[state.currentPage + 1]) {
      state.pages[state.currentPage + 1].sectionStart = p.sectionStart;
    }
    deletePage().then ? deletePage().then(pageRefresh) : (deletePage(), pageRefresh());
  };
  if (i !== state.currentPage) switchPage(i).then(run); else run();
}

function pageAddSection() {
  var n = prompt('Section name:', 'Section ' + (pageSections().filter(function (s) { return s.name; }).length + 1));
  if (!n || !n.trim()) return;
  state.pages[state.currentPage].sectionStart = n.trim();
  pageRefresh();
  showToast('Section “' + n.trim() + '” starts at slide ' + (state.currentPage + 1));
}

function pageSectionRename(i) {
  var p = state.pages[i];
  if (!p || !p.sectionStart) return;
  var n = prompt('Rename section:', p.sectionStart);
  if (n === null) return;
  if (!n.trim()) { p.sectionStart = null; } else { p.sectionStart = n.trim(); }
  pageRefresh();
}

function pageSectionRemove(i) {
  var p = state.pages[i];
  if (!p) return;
  p.sectionStart = null;
  pageRefresh();
  showToast('Section removed — slides stay put');
}

function pageReorder(from, to) {
  if (from === to || !state.pages[from]) return;
  captureCurrentPage();
  var wasCurrent = state.pages[state.currentPage];
  var pg = state.pages.splice(from, 1)[0];
  var nt = state.notes.splice(from, 1)[0];
  var dest = to > from ? to - 1 : to;
  state.pages.splice(dest, 0, pg);
  state.notes.splice(dest, 0, nt);
  state.currentPage = state.pages.indexOf(wasCurrent);
  if (state.currentPage < 0) state.currentPage = dest;
  renderPageThumbs();
  pageRefresh();
  showToast('Moved to position ' + (dest + 1));
}

/* ════════════════════════════════════════════════════════════
   LAYERS
   A live view of the current slide's object stack, top-most first (which
   is the reverse of fabric's array order — index 0 paints first, so it is
   the BOTTOM layer). Groups expand to show their children.
   ════════════════════════════════════════════════════════════ */
var _layerOpen = {};        /* which groups are expanded, by object id */

function layerId(o) {
  if (!o._lid) o._lid = 'L' + (Math.random().toString(36).slice(2, 9));
  return o._lid;
}

/* A name that tells you what the thing IS, derived from what built it. */
function layerLabel(o) {
  if (o.layerName) return o.layerName;
  if (o.isIcon)     return o.iconName ? o.iconName.replace(/_/g, ' ') : 'Icon';
  if (o.isIllo)     return o.illoName || 'Illustration';
  if (o.isSticker)  return o.stickerName || 'Sticker';
  if (o.isFrame)    return (FRAME_DEFS[o.frameKind] && FRAME_DEFS[o.frameKind].label)
                            || (o.frameKind === 'grid-cell' ? 'Grid cell' : 'Frame');
  if (o.chartType)  return 'Chart · ' + o.chartType;
  if (o.isBrandLogo) return 'Logo';
  if (o.isBg)       return 'Background';
  if (/text/.test(o.type || '')) {
    var t = (o.text || '').trim().replace(/\s+/g, ' ');
    return t ? (t.length > 26 ? t.slice(0, 26) + '…' : t) : 'Text';
  }
  if (o.type === 'image') return 'Image';
  if (o.type === 'group') return 'Group';
  if (o.type === 'path')  return 'Shape';
  if (o.type === 'line')  return 'Line';
  return (o.type || 'Object').charAt(0).toUpperCase() + (o.type || 'object').slice(1);
}

function layerIcon(o) {
  if (o.isIcon)    return 'emoji_symbols';
  if (o.isIllo)    return 'palette';
  if (o.isSticker) return 'auto_awesome';
  if (o.isFrame)   return 'crop_original';
  if (o.chartType) return 'bar_chart';
  if (o.isBg)      return 'wallpaper';
  if (/text/.test(o.type || '')) return 'title';
  if (o.type === 'image') return 'image';
  if (o.type === 'group') return 'folder';
  if (o.type === 'line')  return 'horizontal_rule';
  return 'category';
}

function layerRow(o, depth, idx, isChild) {
  var id = layerId(o);
  var active = fc && fc.getActiveObject() === o;
  var kids = (o.type === 'group' && o._objects && o._objects.length) ? o._objects : null;
  var open = !!_layerOpen[id];
  var locked = !!o.lockMovementX;
  var hidden = o.visible === false;

  var h = '<div class="layer-row' + (active ? ' active' : '') + (hidden ? ' hidden' : '') + '"'
    + ' data-lid="' + id + '"' + (isChild ? '' : ' draggable="true" data-lidx="' + idx + '"')
    + ' style="padding-left:' + (6 + depth * 14) + 'px">';

  h += kids
    ? '<button class="layer-tw" data-action="layer-twist" data-lid="' + id + '">'
      + '<span class="material-icons-outlined">' + (open ? 'expand_more' : 'chevron_right') + '</span></button>'
    : '<span class="layer-tw"></span>';

  h += '<span class="material-icons-outlined layer-ico">' + layerIcon(o) + '</span>'
    + '<span class="layer-name" data-action="layer-select" data-lid="' + id + '"'
    + ' title="' + layerLabel(o) + '">' + layerLabel(o) + '</span>'
    + '<span class="layer-btns">'
    + '<button data-action="layer-rename" data-lid="' + id + '" title="Rename">'
      + '<span class="material-icons-outlined">edit</span></button>'
    + '<button data-action="layer-lock" data-lid="' + id + '" title="'
      + (locked ? 'Unlock' : 'Lock') + '"' + (locked ? ' class="on"' : '') + '>'
      + '<span class="material-icons-outlined">' + (locked ? 'lock' : 'lock_open') + '</span></button>'
    + '<button data-action="layer-vis" data-lid="' + id + '" title="'
      + (hidden ? 'Show' : 'Hide') + '"' + (hidden ? ' class="on"' : '') + '>'
      + '<span class="material-icons-outlined">' + (hidden ? 'visibility_off' : 'visibility') + '</span></button>'
    + '</span></div>';

  if (kids && open) {
    /* children top-most first, same convention as the top level */
    h += kids.slice().reverse().map(function (c) {
      return layerRow(c, depth + 1, -1, true);
    }).join('');
  }
  return h;
}

function renderLayerPanel() {
  if (!fc || !fc.getObjects) {
    return '<div class="panel-placeholder"><span class="material-icons-outlined">layers</span>'
      + '<p><strong>No slide yet</strong></p></div>';
  }
  var objs = fc.getObjects() || [];
  if (!objs.length) {
    return '<div class="panel-placeholder"><span class="material-icons-outlined">layers_clear</span>'
      + '<p><strong>This slide is empty</strong><br>Anything you add appears here.</p></div>';
  }
  var head = '<div class="layer-head">'
    + '<button class="layer-hbtn" data-action="layer-up" title="Bring forward">'
      + '<span class="material-icons-outlined">arrow_upward</span></button>'
    + '<button class="layer-hbtn" data-action="layer-down" title="Send backward">'
      + '<span class="material-icons-outlined">arrow_downward</span></button>'
    + '<button class="layer-hbtn" data-action="layer-group" title="Group selection">'
      + '<span class="material-icons-outlined">library_add</span></button>'
    + '<button class="layer-hbtn" data-action="layer-ungroup" title="Ungroup">'
      + '<span class="material-icons-outlined">library_add_check</span></button>'
    + '<span class="layer-count">' + objs.length + ' layer' + (objs.length === 1 ? '' : 's') + '</span>'
    + '</div><div class="panel-hint">Top of this list is the front of the slide. Drag to reorder.</div>';

  /* reverse: last painted = front = top row */
  var rows = objs.map(function (o, i) { return { o: o, i: i }; }).reverse()
    .map(function (r) { return layerRow(r.o, 0, r.i, false); }).join('');

  return head + '<div class="layer-list" id="layer-list">' + rows + '</div>';
}

function layerFind(lid) {
  var found = null;
  function walk(list) {
    (list || []).forEach(function (o) {
      if (found) return;
      if (layerId(o) === lid) { found = o; return; }
      if (o.type === 'group' && o._objects) walk(o._objects);
    });
  }
  if (fc && fc.getObjects) walk(fc.getObjects() || []);
  return found;
}

function layerRefresh() {
  if (typeof state !== 'undefined' && state.activeTool === 'layers') renderPanelContent('layers');
}

function layerSelect(lid) {
  var o = layerFind(lid);
  if (!o || !fc) return;
  /* a child inside a group cannot be the canvas selection — select its group */
  var roots = fc.getObjects() || [];
  var top = roots.indexOf(o) > -1 ? o : null;
  if (!top) {
    roots.forEach(function (g) {
      if (g.type === 'group' && g._objects && g._objects.indexOf(o) > -1) top = g;
    });
  }
  if (top && top.visible !== false && !top.lockMovementX) {
    fc.setActiveObject(top);
    fc.renderAll();
  }
  layerRefresh();
}

function layerToggleVis(lid) {
  var o = layerFind(lid);
  if (!o) return;
  o.visible = o.visible === false;
  if (o.visible === false && fc.getActiveObject() === o) fc.discardActiveObject();
  if (o.group) o.group.dirty = true;
  fc.renderAll(); saveState(); layerRefresh();
}

function layerToggleLock(lid) {
  var o = layerFind(lid);
  if (!o) return;
  var lock = !o.lockMovementX;
  o.set({ lockMovementX: lock, lockMovementY: lock, lockScalingX: lock, lockScalingY: lock,
          lockRotation: lock, hasControls: !lock, selectable: !lock, evented: !lock });
  if (lock && fc.getActiveObject() === o) fc.discardActiveObject();
  fc.renderAll(); saveState(); layerRefresh();
}

function layerRename(lid) {
  var o = layerFind(lid);
  if (!o) return;
  var n = prompt('Layer name:', layerLabel(o));
  if (n === null) return;
  o.layerName = n.trim() || null;
  saveState(); layerRefresh();
}

function layerMove(dir) {
  var o = fc && fc.getActiveObject();
  if (!o) { showToast('Select a layer first'); return; }
  if (dir > 0) o.bringForward(); else o.sendBackwards();
  fc.renderAll(); saveState(); layerRefresh();
}

function layerGroup() {
  var a = fc && fc.getActiveObject();
  if (!a || a.type !== 'activeSelection') { showToast('Select two or more layers on the canvas'); return; }
  a.toGroup();
  fc.renderAll(); saveState(); layerRefresh();
  showToast('Grouped');
}

function layerUngroup() {
  var a = fc && fc.getActiveObject();
  if (!a || a.type !== 'group') { showToast('Select a group first'); return; }
  a.toActiveSelection();
  fc.renderAll(); saveState(); layerRefresh();
  showToast('Ungrouped');
}

/* Drag a row to restack. Fabric index 0 is the BACK, so the visual list
   index has to be flipped before calling moveTo. */
function layerReorder(fromIdx, toIdx) {
  if (!fc || !fc.getObjects) return;
  var objs = fc.getObjects() || [];
  var n = objs.length;
  if (fromIdx < 0 || fromIdx >= n) return;
  var o = objs[fromIdx];
  var dest = Math.max(0, Math.min(n - 1, toIdx));
  if (dest === fromIdx) return;
  o.moveTo(dest);
  fc.renderAll(); saveState(); layerRefresh();
}

/* keep the panel honest as the canvas changes */
(function () {
  var t = setInterval(function () {
    if (typeof fc === 'undefined' || !fc || !fc.on) return;
    clearInterval(t);
    ['object:added', 'object:removed', 'selection:created',
     'selection:updated', 'selection:cleared'].forEach(function (ev) {
      fc.on(ev, function () {
        if (typeof state !== 'undefined' && state.activeTool === 'layers') layerRefresh();
      });
    });
  }, 300);
})();

/* ════════════════════════════════════════════════════════════
   PROJECTS
   A saved deck is megabytes (slide JSON plus embedded images), which is
   far past what localStorage can hold, so projects live in IndexedDB.
   If IDB is unavailable the store falls back to localStorage and simply
   holds fewer projects rather than failing.
   Everything is device-local: "shared" is a local flag until there is a
   backend to share through, and the panel says so rather than pretending.
   ════════════════════════════════════════════════════════════ */
var PROJ_DB = 'lazydog_projects', PROJ_STORE = 'projects', PROJ_LS = 'ld_projects_fallback';
var ASSET_STORE = 'assets', SNAP_STORE = 'snapshots';
var _projDb = null, _projList = [], _projLoaded = false;

/* DB v2 adds the assets store. The upgrade creates whatever is missing,
   so a machine that already has v1 projects keeps them. */
function projOpenDb() {
  return new Promise(function (resolve) {
    if (_projDb) return resolve(_projDb);
    var idb = (typeof indexedDB !== 'undefined') ? indexedDB : null;
    if (!idb) return resolve(null);
    var req;
    try { req = idb.open(PROJ_DB, 3); } catch (e) { return resolve(null); }
    req.onupgradeneeded = function (e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains(PROJ_STORE)) db.createObjectStore(PROJ_STORE, { keyPath: 'id' });
      if (!db.objectStoreNames.contains(ASSET_STORE)) db.createObjectStore(ASSET_STORE, { keyPath: 'id' });
      if (!db.objectStoreNames.contains(SNAP_STORE)) db.createObjectStore(SNAP_STORE, { keyPath: 'id' });
    };
    req.onsuccess = function (e) { _projDb = e.target.result; resolve(_projDb); };
    req.onerror = function () { resolve(null); };
  });
}

function projPut(rec) {
  return projOpenDb().then(function (db) {
    if (!db) {                                   /* localStorage fallback */
      var all = iconStore(PROJ_LS, []).filter(function (p) { return p.id !== rec.id; });
      all.unshift(rec);
      try { localStorage.setItem(PROJ_LS, JSON.stringify(all.slice(0, 4))); }
      catch (e) { showToast('Storage full — delete a project first'); return false; }
      return true;
    }
    return new Promise(function (res) {
      var tx = db.transaction(PROJ_STORE, 'readwrite');
      tx.objectStore(PROJ_STORE).put(rec);
      tx.oncomplete = function () { res(true); };
      tx.onerror = function () { showToast('Could not save the project'); res(false); };
    });
  });
}

function projAll() {
  return projOpenDb().then(function (db) {
    if (!db) return iconStore(PROJ_LS, []);
    return new Promise(function (res) {
      var out = [];
      var tx = db.transaction(PROJ_STORE, 'readonly');
      var cur = tx.objectStore(PROJ_STORE).openCursor();
      cur.onsuccess = function (e) {
        var c = e.target.result;
        if (c) { out.push(c.value); c.continue(); } else res(out);
      };
      cur.onerror = function () { res([]); };
    });
  });
}

function projDelete(id) {
  return projOpenDb().then(function (db) {
    if (!db) {
      var all = iconStore(PROJ_LS, []).filter(function (p) { return p.id !== id; });
      try { localStorage.setItem(PROJ_LS, JSON.stringify(all)); } catch (e) {}
      return true;
    }
    return new Promise(function (res) {
      var tx = db.transaction(PROJ_STORE, 'readwrite');
      tx.objectStore(PROJ_STORE).delete(id);
      tx.oncomplete = function () { res(true); };
      tx.onerror = function () { res(false); };
    });
  });
}

function projRefresh() {
  return projAll().then(function (list) {
    _projList = list.sort(function (a, b) { return (b.updated || 0) - (a.updated || 0); });
    _projLoaded = true;
    if (state && state.activeTool === 'projects') renderPanelContent('projects');
    return _projList;
  });
}

var _currentProjectId = null;

/* Save (or update) the whole deck — every page, notes included. */
function projSaveCurrent(asNew) {
  if (!fc) return;
  captureCurrentPage();
  if (typeof stickerFreeze === 'function') stickerFreeze();

  var existing = _projList.filter(function (p) { return p.id === _currentProjectId; })[0];
  var name = existing && !asNew ? existing.name
    : prompt('Project name:', (existing && existing.name) || 'Untitled design');
  if (!name) return;

  var thumb = '';
  try { thumb = fc.toDataURL({ format: 'png', multiplier: 0.1 }); } catch (e) {}

  var rec = {
    id: (!asNew && _currentProjectId) || ('pr' + Date.now()),
    name: name,
    updated: Date.now(),
    starred: existing ? !!existing.starred : false,
    shared: existing ? !!existing.shared : false,
    folder: existing ? (existing.folder || '') : '',
    thumb: thumb,
    slideCount: state.pages.length,
    pages: JSON.parse(JSON.stringify(state.pages)),
    notes: JSON.parse(JSON.stringify(state.notes || [])),
    comments: JSON.parse(JSON.stringify(state.comments || []))
  };

  projPut(rec).then(function (ok) {
    if (!ok) return;
    _currentProjectId = rec.id;
    showToast('Saved “' + rec.name + '”');
    projRefresh();
  });
}

function projOpen(id) {
  var p = _projList.filter(function (x) { return x.id === id; })[0];
  if (!p || !fc) return;
  if (!confirm('Open “' + p.name + '”? Unsaved changes to the current design will be lost.')) return;
  state.pages = JSON.parse(JSON.stringify(p.pages || []));
  state.notes = JSON.parse(JSON.stringify(p.notes || []));
  state.comments = JSON.parse(JSON.stringify(p.comments || []));
  if (!state.pages.length) state.pages = [makeBlankPage(Date.now())];
  state.currentPage = 0;
  _currentProjectId = p.id;
  loadPageIntoCanvas(0).then(function () {
    renderPageThumbs();
    showToast('Opened “' + p.name + '”');
  });
}

function projDuplicate(id) {
  var p = _projList.filter(function (x) { return x.id === id; })[0];
  if (!p) return;
  var copy = JSON.parse(JSON.stringify(p));
  copy.id = 'pr' + Date.now();
  copy.name = p.name + ' copy';
  copy.updated = Date.now();
  copy.starred = false;
  projPut(copy).then(function () { showToast('Duplicated'); projRefresh(); });
}

function projRename(id) {
  var p = _projList.filter(function (x) { return x.id === id; })[0];
  if (!p) return;
  var n = prompt('Rename project:', p.name);
  if (!n) return;
  p.name = n; p.updated = Date.now();
  projPut(p).then(function () { showToast('Renamed'); projRefresh(); });
}

/* Move = put it in a folder. Folders are just a label on the record. */
function projMove(id) {
  var p = _projList.filter(function (x) { return x.id === id; })[0];
  if (!p) return;
  var folders = {};
  _projList.forEach(function (x) { if (x.folder) folders[x.folder] = 1; });
  var known = Object.keys(folders);
  var f = prompt('Move to folder' + (known.length ? ' (existing: ' + known.join(', ') + ')' : '')
    + '\nLeave blank for no folder:', p.folder || '');
  if (f === null) return;
  p.folder = f.trim(); p.updated = Date.now();
  projPut(p).then(function () {
    showToast(p.folder ? 'Moved to ' + p.folder : 'Removed from folder');
    projRefresh();
  });
}

function projToggle(id, field) {
  var p = _projList.filter(function (x) { return x.id === id; })[0];
  if (!p) return;
  p[field] = !p[field];
  projPut(p).then(function () { projRefresh(); });
}

function projRemove(id) {
  var p = _projList.filter(function (x) { return x.id === id; })[0];
  if (!p) return;
  if (!confirm('Delete “' + p.name + '” permanently?')) return;
  projDelete(id).then(function () {
    if (_currentProjectId === id) _currentProjectId = null;
    showToast('Deleted');
    projRefresh();
  });
}

function projAgo(ts) {
  var s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  if (s < 604800) return Math.floor(s / 86400) + 'd ago';
  return new Date(ts).toLocaleDateString();
}

function renderProjectPanel(tab) {
  if (!_projLoaded) { projRefresh(); }

  var list = _projList;
  if (tab === 'Starred') list = list.filter(function (p) { return p.starred; });
  if (tab === 'Shared')  list = list.filter(function (p) { return p.shared; });

  var head = '<div class="brand-actions">'
    + '<button class="brand-btn primary" data-action="proj-save">'
      + '<span class="material-icons-outlined">save</span>Save project</button>'
    + '<button class="brand-btn" data-action="proj-saveas">'
      + '<span class="material-icons-outlined">content_copy</span>Save as new</button>'
    + '</div>';

  if (tab === 'Shared') {
    head += '<div class="panel-hint">Sharing needs the cloud backend — for now this is a local'
         + ' flag so you can mark what is meant to be shared.</div>';
  }

  if (!list.length) {
    return head + '<div class="panel-placeholder">'
      + '<span class="material-icons-outlined">folder_open</span>'
      + '<p><strong>' + (tab === 'Recent' ? 'No projects yet' : 'Nothing here') + '</strong><br>'
      + (tab === 'Recent' ? 'Save this design to keep it.' : 'Mark a project to see it here.')
      + '</p></div>';
  }

  /* group by folder so Move is visible in the UI */
  var groups = {}, order = [];
  list.forEach(function (p) {
    var f = p.folder || '';
    if (!groups[f]) { groups[f] = []; order.push(f); }
    groups[f].push(p);
  });
  order.sort(function (a, b) { return a === '' ? -1 : b === '' ? 1 : a.localeCompare(b); });

  return head + order.map(function (f) {
    return '<div class="panel-subhead">' + (f || 'All projects')
      + ' <span>' + groups[f].length + '</span></div>'
      + '<div class="proj-list">' + groups[f].map(function (p) {
        return '<div class="proj-card">'
          + '<div class="proj-thumb" data-action="proj-open" data-id="' + p.id + '" title="Open">'
            + (p.thumb ? '<img src="' + p.thumb + '" alt="">' : '')
            + (p.id === _currentProjectId ? '<em class="proj-open-badge">open</em>' : '')
          + '</div>'
          + '<div class="proj-meta">'
            + '<b>' + p.name + '</b>'
            + '<i>' + (p.slideCount || 0) + ' slide' + ((p.slideCount === 1) ? '' : 's')
              + ' · ' + projAgo(p.updated) + '</i>'
            + '<div class="proj-tools">'
              + '<button data-action="proj-star" data-id="' + p.id + '" title="Star">'
                + '<span class="material-icons-outlined">' + (p.starred ? 'star' : 'star_border') + '</span></button>'
              + '<button data-action="proj-share" data-id="' + p.id + '" title="Mark shared">'
                + '<span class="material-icons-outlined">' + (p.shared ? 'group' : 'group_add') + '</span></button>'
              + '<button data-action="proj-rename" data-id="' + p.id + '" title="Rename">'
                + '<span class="material-icons-outlined">edit</span></button>'
              + '<button data-action="proj-move" data-id="' + p.id + '" title="Move to folder">'
                + '<span class="material-icons-outlined">drive_file_move</span></button>'
              + '<button data-action="proj-dup" data-id="' + p.id + '" title="Duplicate">'
                + '<span class="material-icons-outlined">content_copy</span></button>'
              + '<button data-action="proj-del" data-id="' + p.id + '" title="Delete" class="danger">'
                + '<span class="material-icons-outlined">delete</span></button>'
            + '</div>'
          + '</div></div>';
      }).join('') + '</div>';
  }).join('');
}

/* ════════════════════════════════════════════════════════════
   BRAND KIT
   Device-local (localStorage), like Hexa's memory — no server, nothing
   leaves the machine. Logos are downscaled before storing because
   localStorage is a ~5MB budget shared with everything else.
   ════════════════════════════════════════════════════════════ */
var BRAND_KEY = 'ld_brand_kit';

function brandKit() {
  var k = iconStore(BRAND_KEY, null);
  if (!k) k = { logos: [], colors: [], fonts: { heading: '', body: '' }, templates: [] };
  k.logos = k.logos || []; k.colors = k.colors || [];
  k.fonts = k.fonts || { heading: '', body: '' }; k.templates = k.templates || [];
  return k;
}

function brandSave(k, quiet) {
  try {
    localStorage.setItem(BRAND_KEY, JSON.stringify(k));
    if (!quiet) showToast('Brand kit saved');
    return true;
  } catch (e) {
    showToast('Brand kit is full — remove a logo or template first');
    return false;
  }
}

/* Downscale so a 4MB logo doesn't eat the whole storage budget. */
function brandShrinkImage(dataUrl, max) {
  return new Promise(function (resolve) {
    var im = new Image();
    im.onload = function () {
      var s = Math.min(1, max / Math.max(im.width, im.height));
      if (s >= 1 && dataUrl.length < 120000) { resolve({ src: dataUrl, w: im.width, h: im.height }); return; }
      var cv = document.createElement('canvas');
      cv.width = Math.max(1, Math.round(im.width * s));
      cv.height = Math.max(1, Math.round(im.height * s));
      cv.getContext('2d').drawImage(im, 0, 0, cv.width, cv.height);
      var out;
      try { out = cv.toDataURL('image/png'); } catch (e) { out = dataUrl; }
      resolve({ src: out, w: cv.width, h: cv.height });
    };
    im.onerror = function () { resolve(null); };
    im.src = dataUrl;
  });
}

function brandAddLogo(input) {
  var f = input && input.files && input.files[0];
  input.value = '';
  if (!f) return;
  var rd = new FileReader();
  rd.onload = function (e) {
    brandShrinkImage(e.target.result, 420).then(function (img) {
      if (!img) { showToast('Could not read that image'); return; }
      var k = brandKit();
      k.logos.unshift({ id: 'lg' + Date.now(), src: img.src, w: img.w, h: img.h });
      k.logos = k.logos.slice(0, 8);
      if (brandSave(k, true)) { showToast('Logo added'); renderPanelContent('brand'); }
    });
  };
  rd.readAsDataURL(f);
}

function brandInsertLogo(id) {
  var k = brandKit();
  var lg = k.logos.filter(function (l) { return l.id === id; })[0];
  if (!lg || !fc) return;
  fabric.Image.fromURL(lg.src, function (img) {
    var slideW = fc.getWidth() / fc.getZoom();
    var slideH = fc.getHeight() / fc.getZoom();
    var w = Math.min(slideW * 0.25, lg.w);
    img.set({ scaleX: w / img.width, scaleY: w / img.width, isBrandLogo: true });
    img.set({ left: (slideW - img.getScaledWidth()) / 2, top: (slideH - img.getScaledHeight()) / 2 });
    fc.add(img).setActiveObject(img);
    fc.renderAll(); saveState();
    showToast('Logo added to slide');
  });
}

function brandRemove(kind, id) {
  var k = brandKit();
  if (kind === 'logo')     k.logos = k.logos.filter(function (l) { return l.id !== id; });
  if (kind === 'colour')   k.colors = k.colors.filter(function (c) { return c !== id; });
  if (kind === 'template') k.templates = k.templates.filter(function (t) { return t.id !== id; });
  brandSave(k, true);
  renderPanelContent('brand');
}

function brandAddColour() {
  var c = prompt('Brand colour (hex):', '#7C3AED');
  if (!c) return;
  c = c.trim();
  if (!/^#[0-9A-Fa-f]{6}$/.test(c)) { showToast('Use a 6-digit hex, e.g. #7C3AED'); return; }
  var k = brandKit();
  if (k.colors.indexOf(c.toUpperCase()) > -1) { showToast('Already in the kit'); return; }
  k.colors.unshift(c.toUpperCase());
  k.colors = k.colors.slice(0, 18);
  brandSave(k, true);
  renderPanelContent('brand');
}

/* Clicking a brand colour paints the selection — shapes, frames, text,
   illustrations all understand it. */
function brandApplyColour(hex) {
  var o = fc && fc.getActiveObject();
  if (!o) { showToast('Select something first'); return; }
  if (o.isFrame) { o.frameFill = hex; refreshFrame(o); }
  else if (o.isIllo) {
    (o._objects || []).forEach(function (p) {
      if (p.illoStroke) p.set('stroke', hex); else p.set('fill', hex);
    });
    o.dirty = true;
  } else if (o.type === 'group' && o._objects) {
    o._objects.forEach(function (p) { p.set('fill', hex); });
    o.dirty = true;
  } else {
    o.set('fill', hex);
  }
  fc.renderAll(); saveState();
  showToast('Applied ' + hex);
}

function brandSetFont(which, name) {
  var k = brandKit();
  k.fonts[which] = name;
  brandSave(k, true);
  renderPanelContent('brand');
  showToast((which === 'heading' ? 'Heading' : 'Body') + ' font: ' + (name || 'none'));
}

/* ── Apply branding ───────────────────────────────────────
   Fonts go on every text object: the largest text on the slide is treated
   as heading, everything else as body. Colour is applied ONLY to objects
   still sitting on the editor's default accent, so anything you coloured
   deliberately is left alone. */
function brandApplyToSlide() {
  var k = brandKit();
  if (!fc) return;
  var objs = fc.getObjects();
  var texts = objs.filter(function (o) { return /text/.test(o.type || ''); });
  var changed = 0;

  if (k.fonts.heading || k.fonts.body) {
    var sizes = texts.map(function (t) { return t.fontSize || 0; });
    var maxSize = Math.max.apply(null, sizes.concat([0]));
    var names = [];
    if (k.fonts.heading) names.push(k.fonts.heading);
    if (k.fonts.body) names.push(k.fonts.body);

    var applyFonts = function () {
      texts.forEach(function (t) {
        var isHeading = (t.fontSize || 0) >= maxSize * 0.85;
        var f = isHeading ? (k.fonts.heading || k.fonts.body) : (k.fonts.body || k.fonts.heading);
        if (f) { t.set('fontFamily', f); changed++; }
      });
      fc.renderAll(); saveState();
      showToast('Branding applied to ' + changed + ' object' + (changed === 1 ? '' : 's'));
    };
    if (window.loadDeckFonts && names.length) window.loadDeckFonts(names, applyFonts);
    else applyFonts();
  }

  if (k.colors.length) {
    var primary = k.colors[0];
    var DEFAULT = '#7C3AED';
    objs.forEach(function (o) {
      if (o.isFrame && !o.frameSrc && (o.frameFill || '').toUpperCase() === DEFAULT) {
        o.frameFill = primary; refreshFrame(o); changed++;
      } else if (typeof o.fill === 'string' && o.fill.toUpperCase() === DEFAULT) {
        o.set('fill', primary); changed++;
      }
    });
    fc.renderAll();
  }

  if (!k.fonts.heading && !k.fonts.body && !k.colors.length) {
    showToast('Brand kit is empty — add colours or fonts first');
  }
}

/* ── Save branding ────────────────────────────────────────
   Harvest what this slide is actually using, so a design you like becomes
   the kit rather than having to retype hexes. */
function brandSaveFromSlide() {
  if (!fc) return;
  var k = brandKit();
  var objs = fc.getObjects();
  var found = 0;

  var texts = objs.filter(function (o) { return /text/.test(o.type || ''); });
  if (texts.length) {
    var sorted = texts.slice().sort(function (a, b) { return (b.fontSize || 0) - (a.fontSize || 0); });
    if (sorted[0] && sorted[0].fontFamily) { k.fonts.heading = sorted[0].fontFamily; found++; }
    var body = sorted[sorted.length - 1];
    if (body && body.fontFamily) { k.fonts.body = body.fontFamily; found++; }
  }

  var seen = {};
  objs.forEach(function (o) {
    var c = o.isFrame ? o.frameFill : (typeof o.fill === 'string' ? o.fill : null);
    if (!c || !/^#[0-9A-Fa-f]{6}$/.test(c)) return;
    c = c.toUpperCase();
    if (seen[c]) return;
    seen[c] = 1;
    if (k.colors.indexOf(c) === -1) { k.colors.push(c); found++; }
  });
  k.colors = k.colors.slice(0, 18);

  if (!found) { showToast('Nothing on this slide to learn from'); return; }
  brandSave(k);
  renderPanelContent('brand');
}

/* ── Brand templates: whole slides you can reuse ── */
function brandSaveTemplate() {
  if (!fc) return;
  var name = prompt('Name this brand template:', 'Template ' + (brandKit().templates.length + 1));
  if (!name) return;
  if (typeof stickerFreeze === 'function') stickerFreeze();
  var k = brandKit();
  var thumb = '';
  try { thumb = fc.toDataURL({ format: 'png', multiplier: 0.12 }); } catch (e) {}
  k.templates.unshift({
    id: 'tp' + Date.now(), name: name, thumb: thumb,
    json: fc.toJSON(FABRIC_JSON_PROPS)
  });
  k.templates = k.templates.slice(0, 6);
  if (brandSave(k, true)) { showToast('Template saved'); renderPanelContent('brand'); }
}

function brandUseTemplate(id) {
  var k = brandKit();
  var t = k.templates.filter(function (x) { return x.id === id; })[0];
  if (!t || !fc) return;
  captureCurrentPage();
  var page = makeBlankPage(Date.now());
  page.canvasJSON = JSON.parse(JSON.stringify(t.json));
  state.pages.splice(state.currentPage + 1, 0, page);
  state.notes.splice(state.currentPage + 1, 0, '');
  state.currentPage = state.currentPage + 1;
  loadPageIntoCanvas(state.currentPage).then(function () {
    renderPageThumbs();
    showToast('Added slide from “' + t.name + '”');
  });
}

   ════════════════════════════════════════════════════════════ */
