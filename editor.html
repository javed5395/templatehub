  var ALL_FONTS = SYSTEM_FONTS.concat(GOOGLE_FONTS).map(function(n){
    return { name:n, system: SYSTEM_FONTS.indexOf(n) !== -1 };
  });
  FONTSHARE_FONTS.forEach(function(n){
    if (!ALL_FONTS.some(function(f){ return f.name.toLowerCase() === n.toLowerCase(); })) {
      ALL_FONTS.push({ name:n, system:false, fs:true });
    }
  });

  /* engine consults this to avoid stripping style words that are part of a
     REAL family name ("Archivo Black") during font normalization */
  window.LAZYDOG_FONT_LIB = ALL_FONTS.map(function(f){ return f.name.toLowerCase(); });

  var _loaded = {};
  function ensureFontLoaded(fontObj, cb){
    if (!fontObj || fontObj.system || _loaded[fontObj.name]) { cb && cb(); return; }
    var linkId = 'ffab-gf-' + fontObj.name.replace(/\s+/g,'-');
    if (document.getElementById(linkId)) { _loaded[fontObj.name] = true; cb && cb(); return; }
    var link = document.createElement('link');
    link.id = linkId;
    link.rel = 'stylesheet';
    link.href = fontObj.fs
      ? 'https://api.fontshare.com/v2/css?f[]=' + fontObj.name.toLowerCase().replace(/\s+/g,'-') + '&display=swap'
      : 'https://fonts.googleapis.com/css2?family=' +
        encodeURIComponent(fontObj.name).replace(/%20/g,'+') +
        ':wght@300;400;500;600;700&display=swap';
    link.onload = function(){
      _loaded[fontObj.name] = true;
      if (document.fonts && document.fonts.load) {
        document.fonts.load('16px "' + fontObj.name + '"').then(function(){ cb && cb(); }).catch(function(){ cb && cb(); });
      } else { cb && cb(); }
    };
    link.onerror = function(){ cb && cb(); };
    document.head.appendChild(link);
  }

  /* Auto-load every font an imported deck uses (import flow calls this
     BEFORE first render, so text draws and wraps with its true face). */
  window.loadDeckFonts = function(names, done){
    var todo = [];
    (names || []).forEach(function(n){
      if (!n) return;
      var f = ALL_FONTS.find(function(x){ return x.name.toLowerCase() === String(n).toLowerCase(); });
      if (f && !f.system) todo.push(f);
    });
    if (!todo.length) { done && done(); return; }
    var left = todo.length, fired = false;
    function one(){ left--; if (left <= 0 && !fired) { fired = true; done && done(); } }
    todo.forEach(function(f){ ensureFontLoaded(f, one); });
    setTimeout(function(){ if (!fired) { fired = true; done && done(); } }, 4000); /* never block an import on a slow font CDN */
  };

  /* canvas px ↔ PowerPoint pt (the engine sets fc._pxPerPt per deck) */
  function pxPerPt(){ return (window.fc && window.fc._pxPerPt) || 2; }
  function toPt(px){ return Math.round(px / pxPerPt() * 10) / 10; }
  function toPx(pt){ return pt * pxPerPt(); }

  function isTextObject(o){
    return !!o && (o.type === 'i-text' || o.type === 'textbox' || o.type === 'text');
  }

  function currentTextObject(){
    return window.fc && window.fc.getActiveObject ? window.fc.getActiveObject() : null;
  }

  /* Imported text keeps its REAL formatting in per-character styles, which
     override object-level props — reading obj.fontSize alone always showed
     Fabric's default (16). Read the first defined char style instead. */
  function effectiveTextProp(obj, prop, dflt){
    if (obj && obj.styles) {
      var lis = Object.keys(obj.styles);
      for (var i = 0; i < lis.length; i++) {
        var cis = Object.keys(obj.styles[lis[i]]);
        for (var j = 0; j < cis.length; j++) {
          var v = obj.styles[lis[i]][cis[j]][prop];
          if (v !== undefined && v !== null) return v;
        }
      }
    }
    return (obj && obj[prop] !== undefined && obj[prop] !== null) ? obj[prop] : dflt;
  }

  function buildPanelHTML(){
    var obj = currentTextObject();
    var hasText = isTextObject(obj);
    var currentFont = hasText ? String(effectiveTextProp(obj, 'fontFamily', '')).split(',')[0].trim() : '';
    var currentSize = hasText ? toPt(effectiveTextProp(obj, 'fontSize', 16)) : 16;
    var fw = hasText ? effectiveTextProp(obj, 'fontWeight', 'normal') : 'normal';
    var isBold = hasText && (fw === 'bold' || fw === 700 || fw === '700');
    var isItalic = hasText && effectiveTextProp(obj, 'fontStyle', 'normal') === 'italic';
    var isUnderline = hasText && !!effectiveTextProp(obj, 'underline', false);

    var html = '<div id="font-fab-sizerow">' +
      '<label>Size</label>' +
      '<button class="font-fab-step" type="button" data-fs-step="-1">−</button>' +
      '<input type="number" id="font-fab-size-input" min="1" max="999" step="0.1" value="' + currentSize + '">' +
      '<button class="font-fab-step" type="button" data-fs-step="1">+</button>' +
      '<button class="font-fab-style' + (isBold ? ' font-fab-style-active' : '') + '" type="button" data-style-toggle="bold" title="Bold" aria-pressed="' + isBold + '"><b>B</b></button>' +
      '<button class="font-fab-style' + (isItalic ? ' font-fab-style-active' : '') + '" type="button" data-style-toggle="italic" title="Italic" aria-pressed="' + isItalic + '"><i>I</i></button>' +
      '<button class="font-fab-style' + (isUnderline ? ' font-fab-style-active' : '') + '" type="button" data-style-toggle="underline" title="Underline" aria-pressed="' + isUnderline + '"><u>U</u></button>' +
      '<span id="font-fab-hint">' + (hasText ? '' : 'Select text') + '</span>' +
      '</div>';

    /* Font-identity box (like PowerPoint's font field): shows the EXACT font
       name the selected text carries, plus whether the engine can actually
       render it — so a silent fallback substitution is visible instantly. */
    if (hasText) {
      var inLib = ALL_FONTS.some(function(f){ return f.name.toLowerCase() === currentFont.toLowerCase(); });
      var avail = false;
      try { avail = !!(currentFont && document.fonts && document.fonts.check && document.fonts.check('16px "' + currentFont + '"')); } catch(err){}
      var status, sColor;
      if (inLib && avail)       { status = 'In library — rendering correctly';            sColor = '#059669'; }
      else if (!inLib && avail) { status = 'Not in library — rendered by system font';    sColor = '#B45309'; }
      else if (inLib && !avail) { status = 'In library — not loaded yet';                 sColor = '#B45309'; }
      else                      { status = 'MISSING — browser fallback font in use';      sColor = '#DC2626'; }
      html += '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:0 0 10px 0;margin-bottom:10px;border-bottom:1px solid var(--border,#E2E8F0);">' +
        '<label style="font-size:12px;font-weight:600;color:var(--text-secondary,#64748B);flex:0 0 auto;">Font</label>' +
        '<input readonly id="font-fab-name" value="' + (currentFont || '(none)').replace(/"/g,'&quot;') + '" style="flex:1;min-width:90px;padding:5px 8px;border:1px solid var(--border,#E2E8F0);border-radius:6px;font-size:12px;color:var(--text-primary,#0F172A);background:#FAFAFA;outline:none;">' +
        '<span style="flex-basis:100%;font-size:11px;font-weight:600;color:' + sColor + ';">' + status + '</span>' +
        '</div>';
    }

    if (!hasText) {
      html += '<div id="font-fab-nosel">Click a text box on the slide to choose its font and size here.</div>';
    }

    for (var i = 0; i < ALL_FONTS.length; i++) {
      var f = ALL_FONTS[i];
      var active = (f.name === currentFont) ? ' font-fab-active' : '';
      html += '<div class="text-option font-fab-item' + active + '" data-action="apply-font" data-font="' + f.name.replace(/"/g,'&quot;') + '" style="animation-delay:' + Math.min(i * 0.01, 0.3) + 's">' +
        '<div class="text-preview" style="font-family:\'' + f.name + '\', sans-serif;">' + f.name + '</div>' +
        '<div class="text-meta">' + (f.system ? 'System font' : (f.fs ? 'Fontshare font' : 'Google font')) + '</div>' +
      '</div>';
    }
    return html;
  }

  function refreshPanelIfOpen(){
    /* state/dom are top-level `const` in the engine — consts never become
       window properties, so window.state was always undefined and this
       refresh silently never ran (panel showed stale size until reopened).
       Bare identifiers reach the global lexical scope correctly. */
    if (typeof state !== 'undefined' && state.activeTool === 'fontfab' && typeof dom !== 'undefined' && dom.panelContent) {
      dom.panelContent.innerHTML = buildPanelHTML();
    }
  }

  /* Imported text carries per-character styles (exact run fidelity), and in
     Fabric those OVERRIDE object-level properties. So every font command must
     write through to the char styles too, or imported text ignores it.
     If the user selected a text range while editing, style just the range. */
  function applyTextProps(obj, props){
    if (obj.isEditing && obj.selectionStart !== obj.selectionEnd && typeof obj.setSelectionStyles === 'function') {
      obj.setSelectionStyles(props);
      return;
    }
    obj.set(props);
    if (obj.styles) {
      Object.keys(obj.styles).forEach(function(li){
        Object.keys(obj.styles[li]).forEach(function(ci){
          Object.assign(obj.styles[li][ci], props);
        });
      });
      if (typeof obj.initDimensions === 'function') obj.initDimensions();
    }
  }

  function applyFont(fontName){
    var obj = currentTextObject();
    if (!isTextObject(obj)) { if (typeof showToast === 'function') showToast('Select a text box first'); return; }
    var fontObj = ALL_FONTS.find(function(f){ return f.name === fontName; });
    ensureFontLoaded(fontObj, function(){
      applyTextProps(obj, { fontFamily: fontName + ', sans-serif' });
      window.fc.requestRenderAll();
      if (typeof saveState === 'function') saveState();
      refreshPanelIfOpen();
    });
  }

  function applySize(delta, explicitValue){
    var obj = currentTextObject();
    if (!isTextObject(obj)) { if (typeof showToast === 'function') showToast('Select a text box first'); return; }
    var next; /* all in PowerPoint points */
    if (typeof explicitValue === 'number' && !isNaN(explicitValue)) {
      next = explicitValue;
    } else {
      next = toPt(effectiveTextProp(obj, 'fontSize', 16)) + delta;
    }
    next = Math.max(1, Math.min(999, Math.round(next * 10) / 10));
    applyTextProps(obj, { fontSize: toPx(next) });
    window.fc.requestRenderAll();
    if (typeof saveState === 'function') saveState();
    var input = document.getElementById('font-fab-size-input');
    if (input) input.value = next;
  }

  function applyStyleToggle(kind){
    var obj = currentTextObject();
    if (!isTextObject(obj)) { if (typeof showToast === 'function') showToast('Select a text box first'); return; }
    if (kind === 'bold') {
      var isBold = (obj.fontWeight === 'bold' || obj.fontWeight === 700 || obj.fontWeight === '700');
      applyTextProps(obj, { fontWeight: isBold ? 'normal' : 'bold' });
    } else if (kind === 'italic') {
      applyTextProps(obj, { fontStyle: obj.fontStyle === 'italic' ? 'normal' : 'italic' });
    } else if (kind === 'underline') {
      applyTextProps(obj, { underline: !obj.underline });
    }
    window.fc.requestRenderAll();
    if (typeof saveState === 'function') saveState();
    refreshPanelIfOpen();
  }

  /* ---- Register as a normal sidebar tool (same system as Templates/Elements/Text) ---- */
  function registerTool(){
    if (typeof designTools === 'undefined' || typeof panelData === 'undefined') return false;
    if (designTools.some(function(t){ return t.id === 'fontfab'; })) return true;
    designTools.splice(2, 0, { id: 'fontfab', icon: 'text_fields', label: 'Font' });
    panelData.fontfab = { tabs: null, generate: buildPanelHTML };
    if (typeof renderSidebarTools === 'function') renderSidebarTools();
    return true;
  }

  /* ---- Delegated click handling for our own data-action values ---- */
  document.addEventListener('click', function(e){
    var el = e.target.closest('[data-action="apply-font"]');
    if (el) { applyFont(el.getAttribute('data-font')); return; }
    var step = e.target.closest('[data-fs-step]');
    if (step) { applySize(parseInt(step.getAttribute('data-fs-step'), 10)); return; }
    var styleBtn = e.target.closest('[data-style-toggle]');
    if (styleBtn) { applyStyleToggle(styleBtn.getAttribute('data-style-toggle')); return; }
  });
  document.addEventListener('change', function(e){
    if (e.target && e.target.id === 'font-fab-size-input') {
      applySize(0, parseFloat(e.target.value)); /* parseFloat: "126.4" stays 126.4 (parseInt turned it into garbage) */
    }
  });

  /* ---- Keep the panel in sync with canvas selection while it's open ---- */
  function hookCanvasEvents(){
    if (!window.fc || window.fc._fontFabHooked) return;
    window.fc._fontFabHooked = true;
    window.fc.on('selection:created', refreshPanelIfOpen);
    window.fc.on('selection:updated', refreshPanelIfOpen);
    window.fc.on('selection:cleared', refreshPanelIfOpen);
    window.fc.on('text:editing:entered', refreshPanelIfOpen);
  }

  function init(){
    registerTool();
    var tries = 0;
    var poll = setInterval(function(){
      tries++;
      if (window.fc) { hookCanvasEvents(); clearInterval(poll); }
      if (tries > 200) clearInterval(poll); // ~20s safety cutoff
    }, 100);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

window.LD_BACKEND = window.LD_BACKEND || 'http://localhost:8080';
window.ldHeaders = function (ct) {
  var h = { 'Content-Type': ct };
  if (window.LD_AUTH_TOKEN) h['Authorization'] = 'Bearer ' + window.LD_AUTH_TOKEN;

window.loadDeckIRIntoEditor = async function (deckIR) {
  window._deckIR = deckIR;
  try {
    var fs = {}; deckIR.slides.forEach(function(s){(s.elements||[]).forEach(function(e){
      if (e.type==='text'&&e.paragraphs) e.paragraphs.forEach(function(p){(p.runs||[]).forEach(function(r){if(r.font)fs[r.font]=1;});});});});
    var names = Object.keys(fs);
    if (window.loadDeckFonts && names.length) await new Promise(function(res){ window.loadDeckFonts(names, res); });
  } catch (e) {}
  state.pages = deckIR.slides.map(function (slideIR, i) { return Object.assign(makeBlankPage(Date.now() + i), { ir: slideIR }); });
  state.notes = state.pages.map(function () { return ''; });
  state.currentPage = 0;
  setSlideAspect(deckIR.size.w, deckIR.size.h);
  await loadPageIntoCanvas(0);
  renderPageThumbs && renderPageThumbs();
  showToast('Design loaded ✓');
};
window.ldCompose = async function (sentence) {
  showToast('Designing in LazyDog cloud…');
  var r = await fetch(window.LD_BACKEND + '/compose_ir', { method:'POST',
    headers: window.ldHeaders('application/json'), body: JSON.stringify({ sentence: sentence }) });
  if (!r.ok) { showToast('Compose failed: ' + r.status); return; }
  var d = await r.json();
  await window.loadDeckIRIntoEditor(d.deck);
};
(function () {
  var q = new URLSearchParams(location.search).get('compose');
  if (q) { var t = setInterval(function(){ if (window.loadDeckIRIntoEditor && typeof fc!=='undefined' && fc) { clearInterval(t); window.ldCompose(q); } }, 400); }
})();
