/* ════════════════════════════════════════════════════════════
   ASSETS
   A personal library, separate from Uploads: Uploads is "files I brought
   in", Assets is "things I made and want again". Anything on the canvas
   can be saved, and it comes back as a real editable object because what
   is stored is the fabric JSON, not a picture of it.
   ════════════════════════════════════════════════════════════ */
var ASSET_LS = 'ld_assets_fallback';
var _assetList = [], _assetLoaded = false;

function assetKind(o) {
  if (!o) return 'component';
  if (o.isIcon) return 'icon';
  if (o.isIllo || o.isSticker) return 'illustration';
  if (o.type === 'image' && !o.isFrame) return 'image';
  return 'component';
}

function assetPut(rec) {
  return projOpenDb().then(function (db) {
    if (!db) {
      var all = iconStore(ASSET_LS, []).filter(function (a) { return a.id !== rec.id; });
      all.unshift(rec);
      try { localStorage.setItem(ASSET_LS, JSON.stringify(all.slice(0, 12))); }
      catch (e) { showToast('Storage full — remove an asset first'); return false; }
      return true;
    }
    return new Promise(function (res) {
      var tx = db.transaction(ASSET_STORE, 'readwrite');
      tx.objectStore(ASSET_STORE).put(rec);
      tx.oncomplete = function () { res(true); };
      tx.onerror = function () { showToast('Could not save that asset'); res(false); };
    });
  });
}

function assetAll() {
  return projOpenDb().then(function (db) {
    if (!db) return iconStore(ASSET_LS, []);
    return new Promise(function (res) {
      var out = [];
      var tx = db.transaction(ASSET_STORE, 'readonly');
      var cur = tx.objectStore(ASSET_STORE).openCursor();
      cur.onsuccess = function (e) {
        var c = e.target.result;
        if (c) { out.push(c.value); c.continue(); } else res(out);
      };
      cur.onerror = function () { res([]); };
    });
  });
}

function assetDeleteRec(id) {
  return projOpenDb().then(function (db) {
    if (!db) {
      var all = iconStore(ASSET_LS, []).filter(function (a) { return a.id !== id; });
      try { localStorage.setItem(ASSET_LS, JSON.stringify(all)); } catch (e) {}
      return true;
    }
    return new Promise(function (res) {
      var tx = db.transaction(ASSET_STORE, 'readwrite');
      tx.objectStore(ASSET_STORE).delete(id);
      tx.oncomplete = function () { res(true); };
      tx.onerror = function () { res(false); };
    });
  });
}

function assetRefresh() {
  return assetAll().then(function (list) {
    _assetList = list.sort(function (a, b) { return (b.ts || 0) - (a.ts || 0); });
    _assetLoaded = true;
    if (state && state.activeTool === 'assets') renderPanelContent('assets');
    return _assetList;
  });
}

function assetSaveSelected() {
  var o = fc && fc.getActiveObject();
  if (!o) { showToast('Select something to save'); return; }
  if (o.type === 'activeSelection') {
    showToast('Group the selection first, then save it as a component');
    return;
  }
  var kind = assetKind(o);
  var name = prompt('Asset name:', layerLabel(o));
  if (!name) return;

  var thumb = '';
  try { thumb = o.toDataURL({ format: 'png', multiplier: Math.min(1, 120 / Math.max(o.width || 120, o.height || 120)) }); }
  catch (e) { /* cross-origin image — save without a preview rather than failing */ }

  /* store the object itself, so it returns fully editable */
  var json = null;
  try { json = o.toObject(FABRIC_JSON_PROPS); } catch (e) {}
  if (!json) { showToast('Could not serialise that object'); return; }

  assetPut({
    id: 'as' + Date.now(), kind: kind, name: name.trim(),
    thumb: thumb, json: json, ts: Date.now()
  }).then(function (ok) {
    if (ok) { showToast('Saved to Assets'); assetRefresh(); }
  });
}

function assetInsert(id) {
  var a = _assetList.filter(function (x) { return x.id === id; })[0];
  if (!a || !fc || typeof fabric === 'undefined' || !fabric.util) return;
  fabric.util.enlivenObjects([a.json], function (objs) {
    var o = objs && objs[0];
    if (!o) { showToast('Could not rebuild that asset'); return; }
    var W = fc.getWidth() / fc.getZoom(), H = fc.getHeight() / fc.getZoom();
    o.set({ left: Math.max(0, (W - o.getScaledWidth()) / 2),
            top:  Math.max(0, (H - o.getScaledHeight()) / 2) });
    fc.add(o).setActiveObject(o);
    /* frames and effects are parameter-driven, so rebuild them */
    if (o.isFrame && typeof refreshFrame === 'function') {
      if (o.frameSrc) {
        var im = new Image();
        im.onload = function () { o._frameImg = im; refreshFrame(o); };
        im.src = o.frameSrc;
      } else refreshFrame(o);
    }
    if (o.fx && typeof fxApply === 'function') { try { fxApply(o); } catch (e) {} }
    fc.renderAll(); saveState();
    showToast('“' + a.name + '” added');
  });
}

function assetRename(id) {
  var a = _assetList.filter(function (x) { return x.id === id; })[0];
  if (!a) return;
  var n = prompt('Rename asset:', a.name);
  if (!n) return;
  a.name = n.trim(); a.ts = Date.now();
  assetPut(a).then(function () { assetRefresh(); });
}

function assetRemove(id) {
  var a = _assetList.filter(function (x) { return x.id === id; })[0];
  if (!a) return;
  if (!confirm('Delete “' + a.name + '” from your assets?')) return;
  assetDeleteRec(id).then(function () { showToast('Deleted'); assetRefresh(); });
}

var ASSET_TABS = { 'All': null, 'Icons': 'icon', 'Images': 'image',
                   'Illustrations': 'illustration', 'Components': 'component' };

function renderAssetPanel(tab) {
  if (!_assetLoaded) assetRefresh();
  var want = ASSET_TABS[tab];
  var list = want ? _assetList.filter(function (a) { return a.kind === want; }) : _assetList;

  var head = '<button class="brand-btn primary" style="width:100%" data-action="asset-save">'
    + '<span class="material-icons-outlined">bookmark_add</span>Save selection to Assets</button>'
    + '<div class="panel-hint">Assets keep the object itself, so anything you save comes back '
      + 'fully editable — not a flattened picture.</div>';

  if (!list.length) {
    return head + '<div class="panel-placeholder">'
      + '<span class="material-icons-outlined">inventory_2</span>'
      + '<p><strong>' + (tab === 'All' ? 'No saved assets' : 'Nothing in ' + tab) + '</strong><br>'
      + 'Select something on the slide and save it here.</p></div>';
  }

  return head + '<div class="asset-grid">' + list.map(function (a) {
    return '<div class="asset-card" data-action="asset-insert" data-id="' + a.id + '" '
      + 'title="' + commentEsc(a.name) + '">'
      + '<div class="asset-thumb">'
        + (a.thumb ? '<img src="' + a.thumb + '" alt="">'
                   : '<span class="material-icons-outlined">' + (
                       a.kind === 'icon' ? 'emoji_symbols' :
                       a.kind === 'image' ? 'image' :
                       a.kind === 'illustration' ? 'palette' : 'widgets') + '</span>')
      + '</div>'
      + '<span class="asset-name">' + commentEsc(a.name) + '</span>'
      + '<span class="asset-tools">'
        + '<button data-action="asset-rename" data-id="' + a.id + '" title="Rename">'
          + '<span class="material-icons-outlined">edit</span></button>'
        + '<button data-action="asset-del" data-id="' + a.id + '" title="Delete" class="danger">'
          + '<span class="material-icons-outlined">close</span></button>'
      + '</span></div>';
  }).join('') + '</div>';
}

/* ════════════════════════════════════════════════════════════
   AI
   Three different realities here, and the panel does not blur them:
     · Deck + slide generation already works — it goes through the existing
       composer proxy via window.ldCompose (the cloud glue, untouched).
     · Text tasks go to the existing chat_http cascade (Groq → Gemini →
       Cloudflare). Configurable via window.LD_CHAT_URL.
     · Image generation has no endpoint yet. It lights up automatically
       when window.LD_IMAGE_URL exists; until then it says so.
     · Remove background runs LOCALLY — a flood fill from the edges, not
       AI matting. Honest about what it is and what it is good at.
   ════════════════════════════════════════════════════════════ */
window.LD_CHAT_URL = window.LD_CHAT_URL
  || 'https://us-central1-templatehub-16cd7.cloudfunctions.net/chat_http';

var _aiBusy = false;

function aiSetBusy(on, msg) {
  _aiBusy = on;
  var el = document.getElementById('ai-status');
  if (el) el.textContent = on ? (msg || 'Working…') : '';
  aiRefresh();
}

/* One call into the existing free-provider cascade. */
function aiAsk(prompt) {
  return fetch(window.LD_CHAT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: prompt })
  }).then(function (r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }).then(function (d) {
    var t = d && (d.reply || d.text || d.message || d.answer);
    if (!t) throw new Error('empty reply');
    return String(t).replace(/^ACTION:.*$/gm, '').trim();
  });
}

function aiSelectedText() {
  var o = fc && fc.getActiveObject();
  if (!o || !/text/.test(o.type || '')) return null;
  return o;
}

function aiTextTask(kind) {
  var o = aiSelectedText();
  if (!o) { showToast('Select a text box first'); return; }
  var src = (o.text || '').trim();
  if (!src) { showToast('That text box is empty'); return; }

  var prompt;
  if (kind === 'rewrite') {
    prompt = 'Rewrite this presentation text so it is clearer and punchier. '
      + 'Keep the same meaning and roughly the same length. '
      + 'Reply with the rewritten text only, no preamble:\n\n' + src;
  } else if (kind === 'summarize') {
    prompt = 'Summarise this into one short slide-friendly line. '
      + 'Reply with the line only:\n\n' + src;
  } else {
    var lang = prompt_lang();
    if (!lang) return;
    prompt = 'Translate this into ' + lang
      + '. Keep it natural and slide-friendly. Reply with the translation only:\n\n' + src;
  }

  aiSetBusy(true, kind === 'translate' ? 'Translating…' : (kind === 'rewrite' ? 'Rewriting…' : 'Summarising…'));
  aiAsk(prompt).then(function (out) {
    o._aiBefore = src;                       /* so Undo change is possible */
    o.set('text', out);
    o.dirty = true;
    fc.requestRenderAll();
    saveState();
    aiSetBusy(false);
    showToast('Done — use Revert if you prefer the original');
  }).catch(function (e) {
    aiSetBusy(false);
    showToast('AI unavailable (' + e.message + ') — is the function deployed?');
  });
}

function prompt_lang() {
  var l = prompt('Translate into which language?', 'Spanish');
  return l && l.trim();
}

function aiRevert() {
  var o = aiSelectedText();
  if (!o || !o._aiBefore) { showToast('Nothing to revert'); return; }
  o.set('text', o._aiBefore);
  o._aiBefore = null;
  o.dirty = true;
  fc.requestRenderAll(); saveState(); aiRefresh();
  showToast('Reverted');
}

/* Deck + slide generation reuse the composer that already exists. */
function aiGenerateDeck(oneSlide) {
  if (typeof window.ldCompose !== 'function') {
    showToast('Designer backend not reachable from here');
    return;
  }
  var q = prompt(oneSlide
    ? 'Describe the slide you want:\n(e.g. "a dark fintech title slide with a bold headline")'
    : 'Describe the deck you want:\n(e.g. "a hospital media kit, black background, 8 slides, lots of images")');
  if (!q || !q.trim()) return;
  var sentence = oneSlide ? (q.trim() + ', 1 slide') : q.trim();
  aiSetBusy(true, 'Designing in the cloud…');
  try {
    var p = window.ldCompose(sentence);
    if (p && p.then) p.then(function () { aiSetBusy(false); })
                     .catch(function () { aiSetBusy(false); });
    else setTimeout(function () { aiSetBusy(false); }, 1500);
  } catch (e) {
    aiSetBusy(false);
    showToast('Compose failed');
  }
}

function aiGenerateImage() {
  if (!window.LD_IMAGE_URL) {
    showToast('Image generation needs a backend endpoint — not deployed yet');
    return;
  }
  var q = prompt('Describe the image:');
  if (!q || !q.trim()) return;
  aiSetBusy(true, 'Generating image…');
  fetch(window.LD_IMAGE_URL, {
    method: 'POST',
    headers: (window.ldHeaders ? window.ldHeaders('application/json') : { 'Content-Type': 'application/json' }),
    body: JSON.stringify({ prompt: q.trim() })
  }).then(function (r) { return r.json(); }).then(function (d) {
    var src = d && (d.image || d.url || d.dataUrl);
    if (!src) throw new Error('no image');
    fabric.Image.fromURL(src, function (img) {
      var W = fc.getWidth() / fc.getZoom();
      img.scaleToWidth(W * 0.5);
      img.set({ left: W * 0.25, top: 60 });
      fc.add(img).setActiveObject(img);
      fc.renderAll(); saveState();
    }, { crossOrigin: 'anonymous' });
    aiSetBusy(false);
  }).catch(function () {
    aiSetBusy(false);
    showToast('Image generation failed');
  });
}

/* ── Remove background (local) ─────────────────────────────
   Flood fill inward from the edges, clearing pixels close in colour to
   the border. Excellent on flat/studio backdrops, poor on busy photos —
   which is exactly what the panel tells you.                           */
function aiRemoveBg() {
  var o = fc && fc.getActiveObject();
  if (!o || o.type !== 'image') { showToast('Select an image first'); return; }
  var el = o._originalElement || o._element;
  if (!el) { showToast('Image not ready'); return; }

  var w = el.naturalWidth || el.width, h = el.naturalHeight || el.height;
  if (!w || !h) { showToast('Image not ready'); return; }

  var cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  var ctx = cv.getContext('2d');
  try { ctx.drawImage(el, 0, 0, w, h); } catch (e) { showToast('Cannot read this image'); return; }

  var img;
  try { img = ctx.getImageData(0, 0, w, h); }
  catch (e) { showToast('Image is cross-origin — cannot edit its pixels'); return; }

  var d = img.data;
  var tol = 42;                              /* colour distance threshold */
  var seen = new Uint8Array(w * h);
  var stack = [];

  /* seed from every border pixel */
  for (var x = 0; x < w; x++) { stack.push(x, 0); stack.push(x, h - 1); }
  for (var y = 0; y < h; y++) { stack.push(0, y); stack.push(w - 1, y); }

  function at(i) { return [d[i], d[i + 1], d[i + 2]]; }
  var seedI = 0;
  var sr = d[0], sg = d[1], sb = d[2];

  while (stack.length) {
    var py = stack.pop(), px = stack.pop();
    if (px < 0 || py < 0 || px >= w || py >= h) continue;
    var p = py * w + px;
    if (seen[p]) continue;
    var i = p * 4;
    var dr = d[i] - sr, dg = d[i + 1] - sg, db = d[i + 2] - sb;
    if (Math.sqrt(dr * dr + dg * dg + db * db) > tol) continue;
    seen[p] = 1;
    d[i + 3] = 0;
    stack.push(px + 1, py); stack.push(px - 1, py);
    stack.push(px, py + 1); stack.push(px, py - 1);
  }

  /* soften the cut so the edge is not a hard staircase */
  for (var yy = 1; yy < h - 1; yy++) {
    for (var xx = 1; xx < w - 1; xx++) {
      var q = yy * w + xx;
      if (seen[q]) continue;
      var n = seen[q - 1] + seen[q + 1] + seen[q - w] + seen[q + w];
      if (n >= 2) d[q * 4 + 3] = Math.min(d[q * 4 + 3], 110);
      else if (n === 1) d[q * 4 + 3] = Math.min(d[q * 4 + 3], 190);
    }
  }

  var cleared = 0;
  for (var k = 0; k < seen.length; k++) cleared += seen[k];
  if (cleared < (w * h) * 0.01) {
    showToast('Background too varied for a clean cut — try a flat backdrop');
    return;
  }

  ctx.putImageData(img, 0, 0);
  var left = o.left, top = o.top, sx = o.scaleX, sy = o.scaleY, ang = o.angle;
  o.setSrc(cv.toDataURL('image/png'), function () {
    o.set({ left: left, top: top, scaleX: sx, scaleY: sy, angle: ang });
    fc.requestRenderAll(); saveState();
    showToast('Background removed (' + Math.round(cleared / (w * h) * 100) + '% cleared)');
  });
}

function aiRefresh() {
  if (typeof state !== 'undefined' && state.activeTool === 'ai') renderPanelContent('ai');
}

function renderAIPanel() {
  var o = fc && fc.getActiveObject();

    + card('ai-rewrite', 'edit_note', 'Rewrite', 'Clearer and punchier', hasText)
    + card('ai-summarize', 'compress', 'Summarize', 'Down to one line', hasText)
    + card('ai-translate', 'translate', 'Translate', 'Into any language', hasText)
    + '</div>'
    + (canRevert
      ? '<button class="cm-mini" data-action="ai-revert"><span class="material-icons-outlined">undo</span>'
        + 'Revert to the original wording</button>' : '')

    + '<div class="panel-subhead">Image' + (hasImg ? '' : ' <span>select an image</span>') + '</div>'

    + 'flat or studio backdrops and poorly on busy photos. It is not AI matting.</div>';
}

/* ════════════════════════════════════════════════════════════
   DATA
   Datasets feed the charts. Layout convention: first row = series names,
   first column = category labels — the shape almost every spreadsheet
   already has.
   No new libraries: CSV is parsed here, and XLSX is read with the JSZip
   that is already loaded for PPTX (an .xlsx is a zip of XML).
   ════════════════════════════════════════════════════════════ */
function dataSets() {
  if (!state.datasets) state.datasets = [];
  return state.datasets;
}

/* CSV that survives quoted fields, embedded commas, quotes and CRLF. */
function parseCSV(text) {
  var rows = [], row = [], cur = '', q = false;
  text = String(text).replace(/^﻿/, '');
  for (var i = 0; i < text.length; i++) {
    var c = text[i];
    if (q) {
      if (c === '"') {
        if (text[i + 1] === '"') { cur += '"'; i++; }
        else q = false;
      } else cur += c;
    } else if (c === '"') q = true;
    else if (c === ',') { row.push(cur); cur = ''; }
    else if (c === '\n') { row.push(cur); rows.push(row); row = []; cur = ''; }
    else if (c === '\r') { /* skip */ }
    else cur += c;
  }
  if (cur.length || row.length) { row.push(cur); rows.push(row); }
  return rows.filter(function (r) { return r.some(function (v) { return String(v).trim() !== ''; }); });
}

/* rows → {cats, series}. Non-numeric cells become 0 rather than NaN,
   which would silently break every chart that used them. */
function rowsToDataset(rows, name) {
  if (!rows.length) return null;
  var header = rows[0];
  var seriesNames = header.slice(1).map(function (h, i) {
    return String(h).trim() || ('Series ' + (i + 1));
  });
  var cats = [], series = seriesNames.map(function (n) { return { name: n, data: [] }; });
  for (var r = 1; r < rows.length; r++) {
    cats.push(String(rows[r][0] == null ? '' : rows[r][0]).trim() || ('Row ' + r));
    for (var c = 0; c < series.length; c++) {
      var raw = String(rows[r][c + 1] == null ? '' : rows[r][c + 1]).replace(/[^0-9.eE+-]/g, '');
      var v = parseFloat(raw);
      series[c].data.push(isFinite(v) ? v : 0);
    }
  }
  if (!cats.length || !series.length) return null;
  return { id: 'ds' + Date.now(), name: name, source: 'csv', cats: cats, series: series, ts: Date.now() };
}

/* .xlsx is a zip of XML — JSZip is already here for PPTX, so no new dep. */
function parseXLSX(arrayBuffer) {
  if (typeof JSZip === 'undefined') return Promise.resolve(null);
  return JSZip.loadAsync(arrayBuffer).then(function (zip) {
    var sheetFile = null;
    zip.forEach(function (path) {
      if (!sheetFile && /^xl\/worksheets\/sheet1\.xml$/i.test(path)) sheetFile = path;
    });
    if (!sheetFile) return null;
    var shared = zip.file('xl/sharedStrings.xml');
    return Promise.all([
      zip.file(sheetFile).async('string'),
      shared ? shared.async('string') : Promise.resolve('')
    ]).then(function (res) {
      var sheetXml = res[0], sharedXml = res[1];
      var strings = [];
      if (sharedXml) {
        var si = sharedXml.match(/<si>[\s\S]*?<\/si>/g) || [];
        strings = si.map(function (blk) {
          return (blk.match(/<t[^>]*>([\s\S]*?)<\/t>/g) || [])
            .map(function (t) { return t.replace(/<[^>]+>/g, ''); }).join('');
        });
      }
      var grid = {}, maxC = 0, maxR = 0;
      (sheetXml.match(/<c [^>]*?r="([A-Z]+)(\d+)"[^>]*>(?:[\s\S]*?)<\/c>|<c [^>]*\/>/g) || [])
        .forEach(function (cell) {
          var ref = cell.match(/r="([A-Z]+)(\d+)"/);
          if (!ref) return;
          var col = 0;
          for (var k = 0; k < ref[1].length; k++) col = col * 26 + (ref[1].charCodeAt(k) - 64);
          col -= 1;
          var rowN = parseInt(ref[2], 10) - 1;
          var isStr = /t="s"/.test(cell);
          var vm = cell.match(/<v>([\s\S]*?)<\/v>/);
          var inline = cell.match(/<t[^>]*>([\s\S]*?)<\/t>/);
          var val = vm ? vm[1] : (inline ? inline[1].replace(/<[^>]+>/g, '') : '');
          if (isStr && vm) val = strings[parseInt(vm[1], 10)] || '';
          grid[rowN + ':' + col] = val;
          if (col > maxC) maxC = col;
          if (rowN > maxR) maxR = rowN;
        });
      var rows = [];
      for (var r = 0; r <= maxR; r++) {
        var row = [];
        for (var c = 0; c <= maxC; c++) row.push(grid[r + ':' + c] == null ? '' : grid[r + ':' + c]);
        rows.push(row);
      }
      return rows;
    });
  }).catch(function () { return null; });
}

function dataAdd(ds) {
  if (!ds) { showToast('Could not read that file'); return; }
  dataSets().unshift(ds);
  state.datasets = dataSets().slice(0, 20);
  dataRefreshPanel();
  showToast('Loaded “' + ds.name + '” — ' + ds.cats.length + ' rows, ' + ds.series.length + ' series');
}

function dataUploadCsv(input) {
  var f = input && input.files && input.files[0];
  input.value = '';
  if (!f) return;
  var rd = new FileReader();
  rd.onload = function (e) {
    dataAdd(rowsToDataset(parseCSV(e.target.result), f.name.replace(/\.[^.]+$/, '')));
  };
  rd.readAsText(f);
}

function dataUploadXlsx(input) {
  var f = input && input.files && input.files[0];
  input.value = '';
  if (!f) return;
  var rd = new FileReader();
  rd.onload = function (e) {
    parseXLSX(e.target.result).then(function (rows) {
      if (!rows) { showToast('Could not read that spreadsheet'); return; }
      var ds = rowsToDataset(rows, f.name.replace(/\.[^.]+$/, ''));
      if (ds) ds.source = 'xlsx';
      dataAdd(ds);
    });
  };
  rd.readAsArrayBuffer(f);
}

/* Google Sheets: a published-to-web CSV link. Fetched live, so Refresh
   genuinely re-pulls. A private sheet cannot work without OAuth, and the
   panel says so rather than failing mysteriously. */
function dataConnectSheet() {
  var url = prompt('Paste a Google Sheets “Publish to web” CSV link:\n\n'
    + 'File → Share → Publish to web → Comma-separated values (.csv)');
  if (!url) return;
  url = url.trim();
  if (!/^https?:\/\//i.test(url)) { showToast('That does not look like a link'); return; }
  showToast('Fetching sheet…');
  fetch(url).then(function (r) {
    if (!r.ok) throw new Error(r.status);
    return r.text();
  }).then(function (txt) {
    var ds = rowsToDataset(parseCSV(txt), 'Google Sheet');
    if (!ds) throw new Error('empty');
    ds.source = 'sheet'; ds.url = url;
    dataAdd(ds);
  }).catch(function () {
    showToast('Could not fetch — is the sheet published to the web?');
  });
}

function dataRefreshOne(id) {
  var ds = dataSets().filter(function (d) { return d.id === id; })[0];
  if (!ds) return;
  if (ds.source !== 'sheet' || !ds.url) {
    showToast('Only linked sheets can refresh — re-upload the file to update it');
    return;
  }
  showToast('Refreshing…');
  fetch(ds.url).then(function (r) { return r.text(); }).then(function (txt) {
    var fresh = rowsToDataset(parseCSV(txt), ds.name);
    if (!fresh) throw new Error('empty');
    ds.cats = fresh.cats; ds.series = fresh.series; ds.ts = Date.now();
    dataRepaintCharts(ds.id);
    dataRefreshPanel();
    showToast('Refreshed');
  }).catch(function () { showToast('Refresh failed'); });
}

function dataRemove(id) {
  state.datasets = dataSets().filter(function (d) { return d.id !== id; });
  dataRefreshPanel();
}

/* ── Binding data to charts ── */
function chartRedraw(o, def) {
  if (!o || !o.chartType || !fc) return;
  var W = Math.round((o.width || 600) * (o.scaleX || 1));
  var H = Math.round((o.height || 380) * (o.scaleY || 1));
  var dpr = 2;
  var cv = document.createElement('canvas');
  cv.width = W * dpr; cv.height = H * dpr;
  var ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);
  drawChart(ctx, W, H, o.chartType, def);
  var left = o.left, top = o.top, angle = o.angle;
  o.setSrc(cv.toDataURL('image/png'), function () {
    o.set({ left: left, top: top, angle: angle,
            scaleX: W / o.width, scaleY: H / o.height });
    fc.requestRenderAll();
  });
}

function dataConnect(id) {
  var ds = dataSets().filter(function (d) { return d.id === id; })[0];
  var o = fc && fc.getActiveObject();
  if (!ds) return;
  if (!o || !o.chartType) { showToast('Select a chart first'); return; }
  o.datasetId = ds.id;
  o.chartDef = { cats: ds.cats, series: ds.series };
  chartRedraw(o, o.chartDef);
  saveState();
  showToast('“' + ds.name + '” connected to this chart');
}

function dataRepaintCharts(dsId) {
  var ds = dataSets().filter(function (d) { return d.id === dsId; })[0];
  if (!ds || !fc || !fc.getObjects) return;
  (fc.getObjects() || []).forEach(function (o) {
    if (o.datasetId === dsId) {
      o.chartDef = { cats: ds.cats, series: ds.series };
      chartRedraw(o, o.chartDef);
    }
  });
}

/* ════════════════════════════════════════════════════════════
   EFFECTS
   Every effect is stored as parameters in obj.fx and REBUILT from those
   parameters, never applied incrementally. That means an effect can be
   dialled up, down and off without accumulating artefacts, and image
   filters are rebuilt from scratch each time instead of stacking.
   ════════════════════════════════════════════════════════════ */
function fxOf(o) {
  if (!o.fx) o.fx = {};
  return o.fx;
}

function fxTargetKind(o) {
  if (!o) return null;
  if (/text/.test(o.type || '')) return 'Text';
  if (o.type === 'image' && !o.isFrame) return 'Image';
  return 'Shape';
}

/* ── Rebuild shadow / glow / outline from parameters ── */
function fxApplyCommon(o) {
  var f = fxOf(o);
  if (typeof fabric === 'undefined' || !fabric.Shadow) return;

  if (f.glow && f.glow.on) {
    o.set('shadow', new fabric.Shadow({
      color: f.glow.color || '#7C3AED',
      blur: f.glow.blur == null ? 18 : f.glow.blur,
      offsetX: 0, offsetY: 0
    }));
  } else if (f.shadow && f.shadow.on) {
    o.set('shadow', new fabric.Shadow({
      color: f.shadow.color || 'rgba(0,0,0,0.35)',
      blur: f.shadow.blur == null ? 12 : f.shadow.blur,
      offsetX: f.shadow.x == null ? 6 : f.shadow.x,
      offsetY: f.shadow.y == null ? 8 : f.shadow.y
    }));
  } else {
    o.set('shadow', null);
  }

  if (f.outline && f.outline.on) {
    o.set({ stroke: f.outline.color || '#1B1B1B',
            strokeWidth: f.outline.w == null ? 2 : f.outline.w,
            paintFirst: 'stroke', strokeUniform: true });
  } else if (f.outline) {
    o.set({ strokeWidth: 0 });
  }

  if (f.glass && f.glass.on) {
    o.set({ opacity: f.glass.opacity == null ? 0.45 : f.glass.opacity });
    if (o.isFrame) {
      var ap = frameAperture(o);
      if (ap) ap.set({ stroke: 'rgba(255,255,255,0.65)', strokeWidth: 1.5 });
    } else {
      o.set({ stroke: 'rgba(255,255,255,0.65)', strokeWidth: 1.5 });
    }
    if (!(f.shadow && f.shadow.on) && !(f.glow && f.glow.on)) {
      o.set('shadow', new fabric.Shadow({ color: 'rgba(0,0,0,0.22)', blur: 22, offsetX: 0, offsetY: 10 }));
    }
  } else if (f.glass) {
    o.set({ opacity: 1 });
  }

  o.dirty = true;
}

/* ── Image filters: always rebuilt from fx, never appended ── */
function fxApplyImage(o) {
  if (o.type !== 'image' || typeof fabric === 'undefined' || !fabric.Image || !fabric.Image.filters) return;
  var F = fabric.Image.filters, f = fxOf(o), out = [];

  if (f.blur > 0 && F.Blur) out.push(new F.Blur({ blur: f.blur }));
  if (f.vintage && F.Sepia) {
    out.push(new F.Sepia());
    if (F.Contrast) out.push(new F.Contrast({ contrast: 0.12 }));
    if (F.Saturation) out.push(new F.Saturation({ saturation: -0.15 }));
  }
  if (f.duotone && F.Grayscale && F.BlendColor) {
    out.push(new F.Grayscale());
    out.push(new F.BlendColor({ color: f.duotone, mode: 'tint', alpha: 0.85 }));
  }
  if (f.brightness != null && f.brightness !== 0 && F.Brightness) {
    out.push(new F.Brightness({ brightness: f.brightness }));
  }
  if (f.contrast != null && f.contrast !== 0 && F.Contrast) {
    out.push(new F.Contrast({ contrast: f.contrast }));
  }

  o.filters = out;
  try { o.applyFilters(); } catch (e) {}
}

/* ── Curved text: fabric renders text along a path ── */
function fxApplyCurve(o) {
  if (!/text/.test(o.type || '') || typeof fabric === 'undefined' || !fabric.Path) return;
  var f = fxOf(o);
  var amt = f.curve || 0;
  if (!amt) { o.set('path', null); o.dirty = true; return; }

  /* a symmetric arc whose sagitta is the curve amount; negative arcs the
     other way, which is how "curve up" vs "curve down" reads */
  var w = Math.max(60, (o.width || 200));
  var sag = (amt / 100) * (w * 0.45);
  var d = 'M 0 0 Q ' + (w / 2) + ' ' + (-sag * 2) + ' ' + w + ' 0';
  try {
    o.set('path', new fabric.Path(d, { visible: false }));
    o.pathSide = 'left';
    o.pathAlign = 'center';
    o.dirty = true;
  } catch (e) {}
}

function fxApply(o) {
  if (!o) return;
  histLabel('Effect changed');
  fxApplyCommon(o);
  if (o.type === 'image') fxApplyImage(o);
  if (/text/.test(o.type || '')) fxApplyCurve(o);
  fc && fc.requestRenderAll();
}

function fxSelected() { return fc && fc.getActiveObject(); }

function fxToggle(name) {
  var o = fxSelected();
  if (!o) { showToast('Select something first'); return; }
  var f = fxOf(o);
  if (name === 'vintage') { f.vintage = !f.vintage; }
  else {
    f[name] = f[name] || {};
    f[name].on = !f[name].on;
    /* glow and shadow both drive the same shadow slot — only one wins */
    if (name === 'glow' && f.glow.on && f.shadow) f.shadow.on = false;
    if (name === 'shadow' && f.shadow.on && f.glow) f.glow.on = false;
  }
  fxApply(o); saveState(); fxRefresh();
}

function fxParam(name, key, val) {
  var o = fxSelected();
  if (!o) return;
  var f = fxOf(o);
  if (name === null) { f[key] = val; }
  else { f[name] = f[name] || {}; f[name][key] = val; }
  fxApply(o); fxRefresh();
}

function fxColour(name) {
  var o = fxSelected();
  if (!o) { showToast('Select something first'); return; }
  var f = fxOf(o);
  var cur = name === 'duotone' ? (f.duotone || '#7C3AED')
          : ((f[name] && f[name].color) || (name === 'glow' ? '#7C3AED' : '#1B1B1B'));
  var c = prompt(name + ' colour (hex):', cur);
  if (!c) return;
  if (name === 'duotone') f.duotone = c;
  else { f[name] = f[name] || { on: true }; f[name].color = c; f[name].on = true; }
  fxApply(o); saveState(); fxRefresh();
}

function fxClear() {
  var o = fxSelected();
  if (!o) { showToast('Select something first'); return; }
  o.fx = {};
  o.set({ shadow: null, strokeWidth: 0, opacity: 1 });
  if (/text/.test(o.type || '')) o.set('path', null);
  if (o.type === 'image') { o.filters = []; try { o.applyFilters(); } catch (e) {} }
  o.dirty = true;
  fc.requestRenderAll(); saveState(); fxRefresh();
  showToast('Effects cleared');
}

function fxRefresh() {
  if (typeof state !== 'undefined' && state.activeTool === 'effects2') renderPanelContent('effects2');
}

function fxRow(label, value) {
  return '<label class="brand-lbl">' + label + (value != null ? ' — ' + value : '') + '</label>';
}

function renderEffectsPanel(tab) {
  var o = fxSelected();
  var kind = fxTargetKind(o);

  if (!o) {
    return '<div class="panel-placeholder"><span class="material-icons-outlined">auto_fix_high</span>'
      + '<p><strong>Nothing selected</strong><br>Pick an object to style it.</p></div>';
  }
  if (tab !== kind) {
    return '<div class="panel-placeholder"><span class="material-icons-outlined">swap_horiz</span>'
      + '<p><strong>' + kind + ' selected</strong><br>Open the ' + kind + ' tab for its effects.</p></div>';
  }

  var f = fxOf(o);
  var on = function (n) { return f[n] && f[n].on ? ' on' : ''; };
  var card = function (act, arg, icon, name, isOn) {
    return '<button class="anim-card' + (isOn ? ' on' : '') + '" data-action="' + act + '"'
      + ' data-t="' + arg + '"><span class="material-icons-outlined">' + icon + '</span>'

  var h = '<div class="panel-subhead">' + kind + ' effects <span>'
