/* SVG path text → the [cmd, x, y, ...] command array the IR/writer expects. */
function framePathToCmds(d) {
  var out = [], re = /([MLCZ])([^MLCZ]*)/gi, m;
  while ((m = re.exec(d))) {
    var c = m[1].toUpperCase();
    if (c === 'Z') { out.push(['Z']); continue; }
    var nums = (m[2].match(/-?\d*\.?\d+/g) || []).map(Number);
    out.push([c].concat(nums));
  }
  return out;
}

/* Paint the photo, cover-fitted, for a frame that has one. */
function frameFace(obj, wPx, hPx) {
  var cv = document.createElement('canvas');
  cv.width = Math.max(2, Math.round(wPx));
  cv.height = Math.max(2, Math.round(hPx));
  var g = cv.getContext('2d');
  var im = obj._frameImg, fr = obj.frameRect;
  if (fr) {
    /* PPT stretch fillRect: insets as fractions of the box.
       Negative = the photo overflows the mask = Canva's cover-crop. */
    g.drawImage(im, cv.width * fr.l, cv.height * fr.t,
                    cv.width * (1 - fr.l - fr.r), cv.height * (1 - fr.t - fr.b));
  } else {
    var sc = Math.max(cv.width / im.width, cv.height / im.height);
    g.drawImage(im, (cv.width - im.width * sc) / 2, (cv.height - im.height * sc) / 2,
                im.width * sc, im.height * sc);
  }
  return cv;
}

/* The empty drop-target look: grey field + photo glyph. Only used by the
   Frames group; a plain shape stays a plain coloured shape until filled. */
function framePlaceholder(wPx, hPx) {
  var cv = document.createElement('canvas');
  cv.width = Math.max(2, Math.round(wPx));
  cv.height = Math.max(2, Math.round(hPx));
  var g = cv.getContext('2d');
  g.fillStyle = '#E9EAEE'; g.fillRect(0, 0, cv.width, cv.height);
  var s = Math.max(18, Math.min(cv.width, cv.height) * 0.22);
  var cx = cv.width / 2, cy = cv.height / 2;
  g.strokeStyle = '#9AA0AC'; g.lineWidth = Math.max(2, s * 0.07); g.lineJoin = 'round';
  g.strokeRect(cx - s / 2, cy - s * 0.4, s, s * 0.8);
  g.beginPath();
  g.moveTo(cx - s / 2, cy + s * 0.4);
  g.lineTo(cx - s * 0.1, cy - s * 0.05);
  g.lineTo(cx + s * 0.16, cy + s * 0.18);
  g.lineTo(cx + s * 0.3, cy + s * 0.05);
  g.lineTo(cx + s / 2, cy + s * 0.4);
  g.stroke();
  g.beginPath(); g.arc(cx + s * 0.22, cy - s * 0.18, s * 0.09, 0, Math.PI * 2); g.stroke();
  return cv;
}

/* Rebuild a frame group's visual from its own stored state, in place.
   Three states: photo inside · empty placeholder · plain coloured shape. */
function frameAperture(grp) {
  var objs = (grp && grp._objects) || [];
  for (var i = 0; i < objs.length; i++) if (objs[i].isAperture) return objs[i];
  return objs[0] || null;
}

function refreshFrame(grp) {
  if (!grp || !grp.isFrame) return;
  var path = frameAperture(grp);
  if (!path) return;
  /* the photo fills the APERTURE, which on a device frame is smaller than
     the group (the bezel takes the rest) */
  var wPx = (path.width  || grp.width)  * (grp.scaleX || 1);
  var hPx = (path.height || grp.height) * (grp.scaleY || 1);

  if (grp._frameImg) {
    path.set({ fill: new fabric.Pattern({ source: frameFace(grp, wPx, hPx), repeat: 'no-repeat' }),
               stroke: '', strokeDashArray: null, strokeWidth: 0 });
  } else if (grp.frameLook === 'placeholder') {
    path.set({ fill: new fabric.Pattern({ source: framePlaceholder(wPx, hPx), repeat: 'no-repeat' }),
               stroke: '#C3C7D1', strokeDashArray: [6, 5], strokeWidth: 1.5 });
  } else {
    /* plain shape — still a frame, still accepts a photo */
    path.set({ fill: grp.frameFill || '#7C3AED',
               stroke: '', strokeDashArray: null, strokeWidth: 0 });
  }
  grp.dirty = true;
  fc && fc.requestRenderAll();
}

/* Core builder. EVERY filled element on the canvas is one of these, so
   everything absorbs pictures — there are no dead shapes.
   opts: d, pathW, pathH, kind, look ('placeholder'|'solid'), fill, boxW, evenOdd */
function makeFrameShape(opts) {
  if (!fc) return null;
  var kx = opts.boxW / opts.pathW;
  var boxH = opts.boxW * opts.pathH / opts.pathW;
  var ky = boxH / opts.pathH;
  /* scale the normalised path into the on-canvas box */
  var d = framePathToCmds(opts.d).map(function (c) {
    if (c[0] === 'Z') return 'Z';
    var o = [c[0]];
    for (var j = 1; j < c.length; j += 2) o.push(c[j] * kx, c[j + 1] * ky);
    return o.join(' ');
  }).join(' ');

  function scaled(pathData) {
    return framePathToCmds(pathData).map(function (c) {
      if (c[0] === 'Z') return 'Z';
      var o = [c[0]];
      for (var j = 1; j < c.length; j += 2) o.push(c[j] * kx, c[j + 1] * ky);
      return o.join(' ');
    }).join(' ');
  }

  var p = new fabric.Path(d, {
    fill: opts.fill || '#7C3AED',
    fillRule: opts.evenOdd ? 'evenodd' : 'nonzero',
    selectable: false, evented: false,
    originX: 'left', originY: 'top',
    isAperture: true
  });

  /* device bezel: decorative paths that never take a photo */
  var members = [], back = [], front = [];
  (opts.deco || []).forEach(function (dc) {
    var dp = new fabric.Path(scaled(dc[0]), {
      fill: dc[1], selectable: false, evented: false,
      originX: 'left', originY: 'top', objectCaching: false
    });
    (dc[2] === 'front' ? front : back).push(dp);
  });
  members = back.concat([p], front);

  var slideW2 = fc.getWidth() / fc.getZoom();
  var slideH2 = fc.getHeight() / fc.getZoom();
  var grp = new fabric.Group(members, {
    isFrame: true,
    frameKind: opts.kind || 'shape',
    framePath: opts.d, framePathW: opts.pathW, framePathH: opts.pathH,
    frameSrc: null, frameRect: null,
    frameLook: opts.look || 'solid',
    frameFill: opts.fill || '#7C3AED',
    frameDevice: !!opts.deco
  });
  if (opts.at) {
    grp.set({ left: opts.at[0], top: opts.at[1] });
  } else {
    grp.set({ left: Math.max(0, (slideW2 - grp.getScaledWidth()) / 2),
              top:  Math.max(0, (slideH2 - grp.getScaledHeight()) / 2) });
  }
  fc.add(grp);
  if (!opts.quiet) fc.setActiveObject(grp);
  refreshFrame(grp);
  if (!opts.quiet) { fc.renderAll(); saveState(); }
  return grp;
}

function addFrame(kind, atX, atY) {
  var def = FRAME_DEFS[kind] || FRAME_DEFS.square;
  var slideW = fc ? fc.getWidth() / fc.getZoom() : 800;
  var g = makeFrameShape({ d: def.d, pathW: def.w, pathH: def.h, kind: kind,
                           look: 'placeholder', deco: def.deco || null,
                           boxW: Math.max(160, slideW * (def.device ? 0.34 : 0.3)) });
  if (g && atX != null) {
    g.set({ left: atX - g.getScaledWidth() / 2, top: atY - g.getScaledHeight() / 2 });
    fc.renderAll();
  }
  if (g) showToast(def.label + ' frame added — drag a photo onto it');
  return g;
}

/* Keep the mask crisp when the frame is resized. */
(function () {
  var t = setInterval(function () {
    if (typeof fc === 'undefined' || !fc || !fc.on) return;
    clearInterval(t);
    fc.on('object:scaling', function (e) { if (e.target && e.target.isFrame) e.target.dirty = true; });
    fc.on('object:modified', function (e) { if (e.target && e.target.isFrame) refreshFrame(e.target); });
  }, 300);
})();

/* ── Frames panel ─────────────────────────────────────────── */
var FRAME_GROUPS = [
  { name:'Basic',   note:'drop a photo in',
    kinds:['square','landscape','portrait','rounded','circle','diamond','triangle','hexagon','arch','heart'] },
  { name:'Devices', note:'mockups',
    kinds:['phone','tablet','laptop','browser','polaroid'] },
];

function framePreviewSvg(kind, size) {
  var def = FRAME_DEFS[kind];
  if (!def) return '';
  var vb = '0 0 ' + def.w + ' ' + def.h;
  var h = Math.round(size * def.h / def.w);
  var parts = '';
  (def.deco || []).filter(function (d) { return d[2] !== 'front'; })
    .forEach(function (d) { parts += '<path d="' + d[0] + '" fill="' + d[1] + '"/>'; });
  parts += '<path d="' + def.d + '" fill="#C3C7D1"/>';
  (def.deco || []).filter(function (d) { return d[2] === 'front'; })
    .forEach(function (d) { parts += '<path d="' + d[0] + '" fill="' + d[1] + '"/>'; });
  return '<svg viewBox="' + vb + '" width="' + size + '" height="' + h + '">' + parts + '</svg>';
}

function renderFramePanel(tab) {
  return FRAME_GROUPS.filter(function (g) { return !tab || tab === 'All' || g.name === tab; })
    .map(function (g) {
      return '<div class="panel-subhead">' + g.name + ' <span>' + g.note + '</span></div>'
        + '<div class="frame-grid">' + g.kinds.map(function (k) {
            return '<div class="frame-card" draggable="true" data-action="add-frame-card"'
              + ' data-frame="' + k + '" title="' + FRAME_DEFS[k].label + '">'
              + framePreviewSvg(k, 62)
              + '<span>' + FRAME_DEFS[k].label + '</span></div>';
          }).join('') + '</div>';
    }).join('');
}

/* ════════════════════════════════════════════════════════════
   RIBBON COMMANDS
   Everything the ribbon needs that did not already exist. Rules kept from
   the original build: a ribbon button never duplicates a sidebar tool, and
   nothing is added that cannot actually run.
   ════════════════════════════════════════════════════════════ */
function rbSel() { return fc && fc.getActiveObject(); }
function rbText() {
  var o = rbSel();
  return (o && /text/.test(o.type || '')) ? o : null;
}
function rbNeed(o, msg) {
  if (!o) { showToast(msg || 'Select something first'); return false; }
  return true;
}

/* ── Format painter: copy a style, then paint it onto the next click ── */
var _painter = null;
function rbPainterPick() {
  var o = rbSel();
  if (!rbNeed(o)) return;
  _painter = {
    fill: o.fill, stroke: o.stroke, strokeWidth: o.strokeWidth,
    fontFamily: o.fontFamily, fontSize: o.fontSize, fontWeight: o.fontWeight,
    fontStyle: o.fontStyle, underline: o.underline, linethrough: o.linethrough,
    textAlign: o.textAlign, lineHeight: o.lineHeight, opacity: o.opacity,
    fx: o.fx ? JSON.parse(JSON.stringify(o.fx)) : null
  };
  showToast('Style copied — now click what you want to paint');
}
function rbPainterApply(target) {
  if (!_painter || !target) return false;
  var isText = /text/.test(target.type || '');
  Object.keys(_painter).forEach(function (k) {
    if (k === 'fx') return;
    if (!isText && ['fontFamily','fontSize','fontWeight','fontStyle','underline',
                    'linethrough','textAlign','lineHeight'].indexOf(k) > -1) return;
    if (_painter[k] !== undefined) target.set(k, _painter[k]);
  });
  if (_painter.fx && typeof fxApply === 'function') {
    target.fx = JSON.parse(JSON.stringify(_painter.fx));
    try { fxApply(target); } catch (e) {}
  }
  target.dirty = true;
  fc.requestRenderAll();
  saveState();
  _painter = null;
  showToast('Style painted');
  return true;
}
(function () {
  var t = setInterval(function () {
    if (typeof fc === 'undefined' || !fc || !fc.on) return;
    clearInterval(t);
    fc.on('mouse:down', function (e) {
      if (_painter && e.target) rbPainterApply(e.target);
    });
  }, 300);
})();

/* ── Text ── */
function rbFontFamily() {
  var o = rbText();
  if (!rbNeed(o, 'Select a text box first')) return;
  var fonts = (window.ldAllFonts || []).map(function (f) { return f.name; });
  var n = prompt('Font family:\n(' + fonts.length + ' available — type any name)', o.fontFamily || 'DM Sans');
  if (!n) return;
  var apply = function () { o.set('fontFamily', n.trim()); fc.renderAll(); saveState(); };
  if (window.loadDeckFonts) window.loadDeckFonts([n.trim()], apply); else apply();
}
function rbFontSize(delta) {
  var o = rbText();
  if (!rbNeed(o, 'Select a text box first')) return;
  var cur = o.fontSize || 24;
  var next = delta === 0 ? parseFloat(prompt('Font size (px):', cur)) : cur + delta;
  if (!isFinite(next) || next <= 0) return;
  o.set('fontSize', Math.max(4, Math.min(400, Math.round(next))));
  fc.renderAll(); saveState();
}
function rbTextStyle(prop) {
  var o = rbText();
  if (!rbNeed(o, 'Select a text box first')) return;
  if (prop === 'bold') o.set('fontWeight', o.fontWeight === 'bold' ? 'normal' : 'bold');
  if (prop === 'italic') o.set('fontStyle', o.fontStyle === 'italic' ? 'normal' : 'italic');
  if (prop === 'underline') o.set('underline', !o.underline);
  if (prop === 'strike') o.set('linethrough', !o.linethrough);
  fc.renderAll(); saveState();
}
function rbClearFormatting() {
  var o = rbSel();
  if (!rbNeed(o)) return;
  if (/text/.test(o.type || '')) {
    o.set({ fontWeight:'normal', fontStyle:'normal', underline:false, linethrough:false,
            textBackgroundColor:'', charSpacing:0, lineHeight:1.16, textAlign:'left' });
  }
  o.set({ stroke:'', strokeWidth:0, shadow:null, opacity:1 });
  if (o.fx) { o.fx = {}; if (typeof fxApply === 'function') { try { fxApply(o); } catch (e) {} } }
  o.dirty = true; fc.renderAll(); saveState();
  showToast('Formatting cleared');
}
function rbHighlight() {
  var o = rbText();
  if (!rbNeed(o, 'Select a text box first')) return;
  var c = prompt('Highlight colour (hex), or blank to remove:', o.textBackgroundColor || '#FDE047');
  if (c === null) return;
  o.set('textBackgroundColor', c.trim());
  fc.renderAll(); saveState();
}

/* ── Paragraph ── */
function rbAlignText(mode) {
  var o = rbText();
  if (!rbNeed(o, 'Select a text box first')) return;
  o.set('textAlign', mode);
  fc.renderAll(); saveState();
}
function rbList(kind) {
  var o = rbText();
  if (!rbNeed(o, 'Select a text box first')) return;
  var lines = String(o.text || '').split('\n');
  var bulleted = lines.every(function (l) { return !l.trim() || /^\s*([•]|\d+\.)\s/.test(l); });
  var out;
  if (bulleted) {
    out = lines.map(function (l) { return l.replace(/^\s*([•]|\d+\.)\s+/, ''); });
  } else {
    var n = 0;
    out = lines.map(function (l) {
      if (!l.trim()) return l;
      n++;
      return (kind === 'number' ? (n + '. ') : '• ') + l.replace(/^\s+/, '');
    });
  }
  o.set('text', out.join('\n'));
  o.dirty = true; fc.renderAll(); saveState();
}
function rbIndent(dir) {
  var o = rbText();
  if (!rbNeed(o, 'Select a text box first')) return;
  var lines = String(o.text || '').split('\n');
  o.set('text', lines.map(function (l) {
    if (dir > 0) return '    ' + l;
    return l.replace(/^ {1,4}/, '');
  }).join('\n'));
  o.dirty = true; fc.renderAll(); saveState();
}
function rbLineSpacing() {
  var o = rbText();
  if (!rbNeed(o, 'Select a text box first')) return;
  var v = parseFloat(prompt('Line spacing (1 = single, 1.5, 2…):', o.lineHeight || 1.16));
  if (!isFinite(v) || v <= 0) return;
  o.set('lineHeight', Math.max(0.5, Math.min(4, v)));
  fc.renderAll(); saveState();
}

/* ── Selection ── */
function rbSelectAll() {
  if (!fc) return;
  var objs = (fc.getObjects() || []).filter(function (o) { return o.selectable !== false && o.visible !== false; });
  if (!objs.length) { showToast('Nothing to select'); return; }
  fc.discardActiveObject();
  var sel = new fabric.ActiveSelection(objs, { canvas: fc });
  fc.setActiveObject(sel);
  fc.requestRenderAll();
  showToast(objs.length + ' object' + (objs.length === 1 ? '' : 's') + ' selected');
}
function rbDeselect() {
  if (!fc) return;
  fc.discardActiveObject();
  fc.requestRenderAll();
}
function rbFind() {
  var q = prompt('Find text on this slide:');
  if (!q || !q.trim()) return;
  var needle = q.trim().toLowerCase();
  var hits = (fc.getObjects() || []).filter(function (o) {
    return /text/.test(o.type || '') && String(o.text || '').toLowerCase().indexOf(needle) > -1;
  });
  if (!hits.length) { showToast('“' + q + '” not found on this slide'); return; }
  fc.setActiveObject(hits[0]);
  fc.requestRenderAll();
  showToast('Found ' + hits.length + ' match' + (hits.length === 1 ? '' : 'es') + ' — first selected');
}

/* ── Arrange ── */
function rbAlign(edge) {
  var o = rbSel();
  if (!rbNeed(o)) return;
  var W = fc.getWidth() / fc.getZoom(), H = fc.getHeight() / fc.getZoom();
  var w = o.getScaledWidth(), h = o.getScaledHeight();
  if (edge === 'left')   o.set('left', 0);
  if (edge === 'hcenter')o.set('left', (W - w) / 2);
  if (edge === 'right')  o.set('left', W - w);
  if (edge === 'top')    o.set('top', 0);
  if (edge === 'vcenter')o.set('top', (H - h) / 2);
  if (edge === 'bottom') o.set('top', H - h);
  o.setCoords(); fc.renderAll(); saveState();
}
function rbDistribute(axis) {
  var a = rbSel();
  if (!a || a.type !== 'activeSelection' || !a._objects || a._objects.length < 3) {
    showToast('Select three or more objects to distribute'); return;
  }
  var objs = a._objects.slice();
  var key = axis === 'h' ? 'left' : 'top';
  var sizeKey = axis === 'h' ? 'getScaledWidth' : 'getScaledHeight';
  objs.sort(function (x, y) { return x[key] - y[key]; });
  var first = objs[0], last = objs[objs.length - 1];
  var span = (last[key] + last[sizeKey]()) - first[key];
  var totalSize = objs.reduce(function (s, o) { return s + o[sizeKey](); }, 0);
  var gap = (span - totalSize) / (objs.length - 1);
  var cursor = first[key];
  objs.forEach(function (o) {
    o.set(key, cursor);
    cursor += o[sizeKey]() + gap;
    o.setCoords();
  });
  fc.requestRenderAll(); saveState();
  showToast('Distributed ' + objs.length + ' objects');
}
function rbRotate(deg) {
  var o = rbSel();
  if (!rbNeed(o)) return;
  o.rotate(((o.angle || 0) + deg + 360) % 360);
  o.setCoords(); fc.renderAll(); saveState();
}
function rbFlip(axis) {
  var o = rbSel();
  if (!rbNeed(o)) return;
  o.set(axis === 'h' ? 'flipX' : 'flipY', !(axis === 'h' ? o.flipX : o.flipY));
  fc.renderAll(); saveState();
}
function rbLock(on) {
  var o = rbSel();
  if (!rbNeed(o)) return;
  o.set({ lockMovementX:on, lockMovementY:on, lockScalingX:on, lockScalingY:on,
          lockRotation:on, hasControls:!on, selectable:!on, evented:!on });
  if (on) fc.discardActiveObject();
  fc.renderAll(); saveState();
  showToast(on ? 'Locked' : 'Unlocked');
}
function rbUnlockAll() {
  (fc.getObjects() || []).forEach(function (o) {
    o.set({ lockMovementX:false, lockMovementY:false, lockScalingX:false, lockScalingY:false,
            lockRotation:false, hasControls:true, selectable:true, evented:true });
  });
  fc.renderAll(); saveState();
  showToast('All objects unlocked');
}

/* ── Design ── */
function rbSaveTheme() {
  var th = themeCurrent();
  var name = prompt('Save this theme as:', th.name === 'Custom' ? 'My theme' : th.name);
  if (!name) return;
  var saved = iconStore('ld_saved_themes', []);
  var rec = JSON.parse(JSON.stringify(th));
  rec.id = 'saved-' + Date.now();
  rec.name = name.trim();
  saved.unshift(rec);
  iconSave('ld_saved_themes', saved.slice(0, 12));
  /* make it selectable straight away */
  THEME_PRESETS.unshift(rec);
  themeRefresh();
  showToast('Theme “' + rec.name + '” saved');
}
function rbThemeAccent() {
  var th = themeCurrent();
  var c = prompt('Theme accent colour (hex):', th.accent);
  if (!c || !/^#[0-9A-Fa-f]{6}$/.test(c.trim())) { if (c) showToast('Use a 6-digit hex'); return; }
  th.accent = c.trim().toUpperCase(); th.id = 'custom'; th.name = 'Custom';
  themeApply(null);
}
function rbThemeFont() {
  var th = themeCurrent();
  var n = prompt('Heading font for the whole deck:', th.hFont);
  if (!n) return;
  var b = prompt('Body font:', th.bFont);
  th.hFont = n.trim(); if (b) th.bFont = b.trim();
  th.id = 'custom'; th.name = 'Custom';
  themeApply(null);
}
function rbPageSize() {
  var pick = prompt('Page size:\n1 = 16:9 widescreen\n2 = 4:3 standard\n3 = A4 landscape\n4 = Square', '1');
  var map = { '1':[12192000,6858000], '2':[9144000,6858000],
              '3':[10692130,7560310], '4':[9144000,9144000] };
  var r = map[String(pick || '').trim()];
  if (!r) return;

/* ── Export ── */
function rbDownload(dataUrl, filename) {

  a.href = dataUrl; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
}
/* Walk EVERY slide, run `grab` on each, then put the user back where they
   were. Everything that exports the deck goes through this, so the page
   restore and the sticker freeze can never be forgotten in one of them. */
function rbEachSlide(grab) {
  return new Promise(function (resolve) {
    if (!fc) return resolve([]);
    captureCurrentPage();
    if (typeof stickerFreeze === 'function') stickerFreeze();
    var startedOn = state.currentPage;
    var out = [], i = 0;
    var step = function () {
      if (i >= state.pages.length) {
        switchPage(startedOn).then(function () { resolve(out); });
        return;
      }
      switchPage(i).then(function () {
        /* a beat for fonts and images to settle before the snapshot */
        setTimeout(function () {
          if (typeof stickerFreeze === 'function') stickerFreeze();
          try { out.push(grab(i)); } catch (e) { out.push(null); }
          i++; step();
        }, 130);
      });
    };
    step();
  });
}

function rbSlideName(i, ext) {
  return 'slide-' + String(i + 1).padStart(2, '0') + '.' + ext;
}

/* One file downloads directly; a deck is bundled into a zip, because
   browsers block a burst of individual downloads. */
function rbDeliver(files, ext, label) {
  var good = files.filter(function (f) { return f && f.data; });
  if (!good.length) { showToast('Nothing could be exported'); return; }

  if (good.length === 1) {
    rbDownload(good[0].url, good[0].name);
    showToast(label + ' downloaded');
    return;
  }
  if (typeof JSZip === 'undefined') {
    showToast('Cannot bundle — JSZip missing');
    return;
  }
  var zip = new JSZip();
  good.forEach(function (f) { zip.file(f.name, f.data, { base64: f.base64 }); });
  showToast('Bundling ' + good.length + ' slides…');
  zip.generateAsync({ type: 'blob' }).then(function (blob) {
    var url = URL.createObjectURL(blob);
    rbDownload(url, 'presentation-' + ext + '.zip');
    setTimeout(function () { URL.revokeObjectURL(url); }, 5000);
    showToast(good.length + ' slides downloaded as ' + label);
  }).catch(function () { showToast('Could not build the zip'); });
}

function rbExportImage(fmt) {
  if (!fc) return;
  var mime = fmt === 'jpg' ? 'jpeg' : 'png';
  showToast('Rendering all slides…');
  rbEachSlide(function (i) {
    var url = fc.toDataURL({ format: mime, quality: 0.92, multiplier: 2 });
    return { name: rbSlideName(i, fmt), url: url,
             data: url.split(',')[1], base64: true };
  }).then(function (files) {
    if (!files.filter(Boolean).length) {
      showToast('Export blocked — an image in this deck is cross-origin');
      return;
    }
    rbDeliver(files, fmt, fmt.toUpperCase());
  });
}

function rbExportSvg() {
  if (!fc || !fc.toSVG) return;
  showToast('Rendering all slides…');
  rbEachSlide(function (i) {

             url: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),
             data: svg, base64: false };

}
/* PDF: render every slide to an image and hand them to the browser's own
   print-to-PDF. No PDF library needed, and it keeps vector text crisp
   enough at 2x while staying dependency-free. */
function rbExportPdf() {
  if (!fc) return;
  showToast('Rendering all slides…');
  rbEachSlide(function () {
    return { url: fc.toDataURL({ format: 'png', multiplier: 2 }) };
  }).then(function (files) {
    var imgs = files.filter(Boolean).map(function (f) { return f.url; });
    if (!imgs.length) { showToast('Nothing to export'); return; }
    var w = window.open('', '_blank');
    if (!w) { showToast('Allow pop-ups to export a PDF'); return; }
    w.document.write('<!doctype html><title>Presentation</title><style>'
      + '@page{size:landscape;margin:0}html,body{margin:0;padding:0}'
      + 'img{width:100%;display:block;page-break-after:always}'
      + 'img:last-child{page-break-after:auto}'
      + '</style>'
      + imgs.map(function (s) { return '<img src="' + s + '">'; }).join(''));
    w.document.close();
    setTimeout(function () { w.focus(); w.print(); }, 500);

/* ════════════════════════════════════════════════════════════
   ACCESSIBILITY
   Real WCAG maths, not a traffic light: relative luminance per the spec,
   the 4.5:1 / 3:1 thresholds, and the large-text exemption. The report
   reads every slide from its saved JSON, so it covers the whole deck
   rather than only what is on screen.
   ════════════════════════════════════════════════════════════ */
function a11yRgb(c) {
  if (!c || typeof c !== 'string') return null;
  c = c.trim();
  var m = c.match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i);
  if (m) {
    var h = m[1];
    if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
    return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
  }
  m = c.match(/^rgba?\(([^)]+)\)$/i);
  if (m) {
    var p = m[1].split(',').map(function (x) { return parseFloat(x); });
    if (p.length >= 3) return [p[0], p[1], p[2]];
  }
  return null;
}

/* WCAG 2.1 relative luminance */
function a11yLum(rgb) {
  var v = rgb.map(function (x) {
    x = x / 255;
    return x <= 0.03928 ? x / 12.92 : Math.pow((x + 0.055) / 1.055, 2.4);
  });
  return 0.2126 * v[0] + 0.7152 * v[1] + 0.0722 * v[2];
}

function a11yRatio(fg, bg) {
  var a = a11yRgb(fg), b = a11yRgb(bg);
  if (!a || !b) return null;
  var l1 = a11yLum(a), l2 = a11yLum(b);
  return (Math.max(l1, l2) + 0.05) / (Math.min(l1, l2) + 0.05);
}

/* WCAG: 18pt+, or 14pt+ bold, counts as large text (3:1 instead of 4.5:1) */
function a11yIsLarge(o) {
  var px = o.fontSize || 0;
  var pt = px * 0.75;
  var bold = String(o.fontWeight || '') === 'bold' || +o.fontWeight >= 600;
  return pt >= 18 || (bold && pt >= 14);
}

/* What sits behind this text: the topmost filled object it overlaps,
   else the slide background. */
function a11yBgBehind(obj, objects, slideBg) {
  var idx = objects.indexOf(obj);
  var cx = (obj.left || 0) + ((obj.width || 0) * (obj.scaleX || 1)) / 2;
  var cy = (obj.top || 0) + ((obj.height || 0) * (obj.scaleY || 1)) / 2;
  for (var i = idx - 1; i >= 0; i--) {
    var o = objects[i];
    if (!o || o.visible === false) continue;
    /* text is never a background for other text — only filled surfaces are */
    if (/text/.test(o.type || '')) continue;
    var fill = o.isFrame ? o.frameFill : o.fill;
    if (!a11yRgb(typeof fill === 'string' ? fill : null)) continue;
    var w = (o.width || 0) * (o.scaleX || 1), h = (o.height || 0) * (o.scaleY || 1);
    /* a zero-size object covers nothing; without this it matches everything
       positioned at the origin */
    if (w <= 0 || h <= 0) continue;
    var x = o.left || 0, y = o.top || 0;
    if (cx >= x && cx <= x + w && cy >= y && cy <= y + h) return fill;
  }
  return slideBg || '#FFFFFF';
}

/* Scan one serialised slide. Returns a list of findings. */
function a11yScanSlide(json, pageIndex) {
  var out = [];
  if (!json || !json.objects) return out;
  var bg = typeof json.background === 'string' ? json.background : '#FFFFFF';
  var objs = json.objects;

  objs.forEach(function (o, i) {
    if (o.visible === false) return;

    if (/text/.test(o.type || '')) {
      var behind = a11yBgBehind(o, objs, bg);
      var ratio = a11yRatio(typeof o.fill === 'string' ? o.fill : null, behind);
      var large = a11yIsLarge(o);
      var need = large ? 3 : 4.5;
      if (ratio != null && ratio < need) {
        out.push({ page: pageIndex, i: i, kind: 'contrast',
          sev: ratio < need * 0.75 ? 'high' : 'med',
          label: (o.text || 'Text').slice(0, 30),
          detail: ratio.toFixed(2) + ':1 against ' + behind + ' — needs ' + need + ':1'
            + (large ? ' (large text)' : ''),
          ratio: ratio, need: need });
      }
      var pt = (o.fontSize || 0) * 0.75;
      if (pt && pt < 12) {
        out.push({ page: pageIndex, i: i, kind: 'size', sev: 'med',
          label: (o.text || 'Text').slice(0, 30),
          detail: Math.round(pt) + 'pt — hard to read on a projector' });
      }
    }

    var needsAlt = (o.type === 'image' && !o.isFrame) || o.chartType
                   || (o.isFrame && o.frameSrc);
    if (needsAlt && !(o.altText && String(o.altText).trim())) {
      out.push({ page: pageIndex, i: i, kind: 'alt', sev: 'high',
        label: o.chartType ? ('Chart · ' + o.chartType) : 'Image',
        detail: 'No alternative text' });
    }
  });

  return out;
}

function a11yScanDeck() {
  if (typeof captureCurrentPage === 'function') captureCurrentPage();
  var all = [];
  (state.pages || []).forEach(function (p, i) {
    if (p.canvasJSON) {
      var json = typeof p.canvasJSON === 'string' ? JSON.parse(p.canvasJSON) : p.canvasJSON;
      all = all.concat(a11yScanSlide(json, i));
    }
  });
  return all;
}

/* ── Alt text ── */
function a11yAltTargets() {
  if (!fc || !fc.getObjects) return [];
  return (fc.getObjects() || []).filter(function (o) {
    return (o.type === 'image' && !o.isFrame) || o.chartType || (o.isFrame && o.frameSrc);
  });
}

function a11ySetAlt(lid) {
  var o = layerFind(lid);
  if (!o) return;
  var t = prompt('Describe this for someone who cannot see it:', o.altText || '');
  if (t === null) return;
  o.altText = t.trim();
  saveState(); a11yRefresh();
  showToast(o.altText ? 'Alt text set' : 'Alt text cleared');
}

/* ── Reading order ── */
function a11yReadingList() {
  if (!fc || !fc.getObjects) return [];
  var objs = (fc.getObjects() || []).filter(function (o) { return o.visible !== false; });
  return objs.slice().sort(function (a, b) {
    var ao = a.readOrder, bo = b.readOrder;
    if (ao != null && bo != null) return ao - bo;
    if (ao != null) return -1;
    if (bo != null) return 1;
    /* unset: fall back to reading position, top row first */
    var dy = (a.top || 0) - (b.top || 0);
    if (Math.abs(dy) > 24) return dy;
    return (a.left || 0) - (b.left || 0);
  });
}

function a11yAutoOrder() {
  var list = a11yReadingList();
  list.forEach(function (o, i) { o.readOrder = i; });
  saveState(); a11yRefresh();
  showToast('Reading order set top to bottom');
}

function a11yMoveOrder(lid, dir) {
  var list = a11yReadingList();
  var o = layerFind(lid);
  var i = list.indexOf(o);
  if (i < 0) return;
  var j = i + dir;
  if (j < 0 || j >= list.length) return;
  list.splice(i, 1);
  list.splice(j, 0, o);
  list.forEach(function (x, k) { x.readOrder = k; });
  saveState(); a11yRefresh();
}

function a11yClearOrder() {
  (fc.getObjects() || []).forEach(function (o) { o.readOrder = null; });
  saveState(); a11yRefresh();
  showToast('Reading order reset to layout order');
}

function a11yGoto(page, idx) {
  var after = function () { a11yRefresh(); };
  if (page !== state.currentPage) switchPage(page).then(after); else after();
}

function a11yRefresh() {
  if (typeof state !== 'undefined' && state.activeTool === 'a11y') renderPanelContent('a11y');
}

function renderA11yPanel(tab) {

  if (tab === 'Report') {
    var found = a11yScanDeck();
    var byKind = { contrast: 0, alt: 0, size: 0 };
    found.forEach(function (f) { byKind[f.kind] = (byKind[f.kind] || 0) + 1; });
    var slides = (state.pages || []).length;

    var head = '<div class="a11y-score">'
      + '<b>' + found.length + '</b><span>issue' + (found.length === 1 ? '' : 's')
      + ' across ' + slides + ' slide' + (slides === 1 ? '' : 's') + '</span></div>'
      + '<div class="a11y-tiles">'
      + '<div class="a11y-tile' + (byKind.contrast ? ' bad' : ' ok') + '">'
        + '<b>' + byKind.contrast + '</b><span>contrast</span></div>'
      + '<div class="a11y-tile' + (byKind.alt ? ' bad' : ' ok') + '">'
        + '<b>' + byKind.alt + '</b><span>alt text</span></div>'
      + '<div class="a11y-tile' + (byKind.size ? ' bad' : ' ok') + '">'
        + '<b>' + byKind.size + '</b><span>text size</span></div>'
      + '</div>';

    if (!found.length) {
      return head + '<div class="panel-placeholder">'
        + '<span class="material-icons-outlined">verified</span>'
        + '<p><strong>Nothing flagged</strong><br>Contrast, alt text and text size all pass '
        + 'on every slide with saved content.</p></div>';
    }

    return head + '<div class="a11y-list">' + found.slice(0, 60).map(function (f) {
        return '<button class="a11y-row ' + (f.sev === 'high' ? 'bad' : 'warn') + '"'
          + ' data-action="a11y-goto" data-p="' + f.page + '" data-i="' + f.i + '">'
          + '<span class="material-icons-outlined">'
            + (f.kind === 'contrast' ? 'contrast' : f.kind === 'alt' ? 'image_not_supported' : 'text_fields')
          + '</span>'
          + '<span class="a11y-main"><b>Slide ' + (f.page + 1) + ' · '
            + commentEsc(f.label) + '</b><i>' + commentEsc(f.detail) + '</i></span></button>';
      }).join('') + '</div>'
      + (found.length > 60 ? '<div class="panel-hint">Showing the first 60.</div>' : '')
      + '<div class="panel-hint">Slides you have not opened yet are not scanned — they have no '
        + 'saved content to read.</div>';
  }

  /* Contrast checker — live, on the current selection */
  var o = fc && fc.getActiveObject();
  if (!o || !/text/.test(o.type || '')) {
    return '<div class="panel-placeholder"><span class="material-icons-outlined">contrast</span>'
      + '<p><strong>Select some text</strong><br>Its contrast against what sits behind it '
      + 'is checked live.</p></div>';
  }
  var objs = fc.getObjects() || [];
  var bgc = a11yBgBehind(o, objs, (typeof fc.backgroundColor === 'string' ? fc.backgroundColor : '#FFFFFF'));
  var fgc = typeof o.fill === 'string' ? o.fill : null;
  var ratio2 = a11yRatio(fgc, bgc);
  var large2 = a11yIsLarge(o);
  var needAA = large2 ? 3 : 4.5, needAAA = large2 ? 4.5 : 7;

  if (ratio2 == null) {
    return '<div class="panel-placeholder"><span class="material-icons-outlined">help_outline</span>'
      + '<p><strong>Cannot measure</strong><br>This text or its background uses a gradient or '
      + 'pattern rather than a flat colour.</p></div>';
  }

  var pass = function (n) {
    return ratio2 >= n
      ? '<span class="a11y-pass">pass</span>'
      : '<span class="a11y-fail">fail</span>';
  };
  return '<div class="panel-subhead">Contrast</div>'
    + '<div class="a11y-demo" style="background:' + bgc + ';color:' + fgc + '">'
      + commentEsc((o.text || 'Sample text').slice(0, 40)) + '</div>'
    + '<div class="a11y-ratio">' + ratio2.toFixed(2) + ':1</div>'
    + '<div class="a11y-checks">'
      + '<div><span>AA ' + (large2 ? '(large)' : '') + ' — ' + needAA + ':1</span>' + pass(needAA) + '</div>'
      + '<div><span>AAA ' + (large2 ? '(large)' : '') + ' — ' + needAAA + ':1</span>' + pass(needAAA) + '</div>'
    + '</div>'
    + '<div class="panel-hint">' + (large2
        ? 'This counts as large text (18pt+, or 14pt+ bold), so the bar is lower.'
        : 'Text under 18pt needs 4.5:1 for AA.')
      + ' Measured against ' + bgc + ', the nearest filled thing behind it.</div>';
}

/* ════════════════════════════════════════════════════════════
   PRESENTER TOOLS
   Notes and the timer already exist in the bottom bar; this panel drives
   the SAME state rather than keeping a second copy. Rehearsal times your
   slides for real, and Recording captures the canvas via MediaRecorder —
   with an honest note about what it does and does not capture.
   ════════════════════════════════════════════════════════════ */
var _rehearsal = null;      /* {start, marks:[{page,t}], timer} */
var _recorder = null, _recChunks = [], _recStream = null, _recStart = 0;

/* ── Speaker notes ── */
function presNoteSet(v) {
  if (!state.notes) state.notes = [];
  state.notes[state.currentPage] = v;
  if (dom.notesTextarea) dom.notesTextarea.value = v;
}

function presNoteFor(i) {
  return (state.notes && state.notes[i]) || '';
}

/* ── Timer (drives the existing bottom-bar timer state) ── */
function presTimerToggle() {
  if (typeof toggleTimer === 'function') { toggleTimer(); presRefresh(); return; }
  presRefresh();
}
function presTimerReset() {
  if (typeof resetTimer === 'function') resetTimer();
  else if (typeof state !== 'undefined') { state.timerSeconds = 0; }
  presRefresh();
}
function presTimerText() {
  var s = (typeof state !== 'undefined' && state.timerSeconds) || 0;
  return (typeof formatTime === 'function') ? formatTime(s) : '00:00';
}

/* ── Rehearsal ──────────────────────────────────────────────
   Watches which slide is showing and records how long each one was up.
   Polling rather than patching switchPage, so nothing existing changes. */
function rehearseStart() {
  if (_rehearsal) return;
  _rehearsal = { start: Date.now(), marks: [{ page: state.currentPage, t: Date.now() }], timer: null };
  _rehearsal.timer = setInterval(function () {
    var last = _rehearsal.marks[_rehearsal.marks.length - 1];
    if (last.page !== state.currentPage) {
      _rehearsal.marks.push({ page: state.currentPage, t: Date.now() });
    }
    presRefresh();
  }, 400);
  showToast('Rehearsal started — move through your slides');
  presRefresh();
}

function rehearseStop() {
  if (!_rehearsal) return;
  clearInterval(_rehearsal.timer);
  _rehearsal.end = Date.now();
  var r = rehearseReport();
  _rehearsal.report = r;
  _rehearsal.timer = null;
  showToast('Rehearsal finished — ' + presFmt(r.total) + ' total');
  presRefresh();
}

function rehearseClear() { _rehearsal = null; presRefresh(); }

/* Sum the time each slide was on screen, in slide order. */
function rehearseReport() {
  if (!_rehearsal) return { per: {}, total: 0 };
  var end = _rehearsal.end || Date.now();
  var per = {}, marks = _rehearsal.marks;
  for (var i = 0; i < marks.length; i++) {
    var to = (i + 1 < marks.length) ? marks[i + 1].t : end;
    per[marks[i].page] = (per[marks[i].page] || 0) + (to - marks[i].t);
  }
  return { per: per, total: end - _rehearsal.start };
}

function presFmt(ms) {
  var s = Math.round(ms / 1000);
  var m = Math.floor(s / 60);
  return m + ':' + String(s % 60).padStart(2, '0');
}

/* ── Recording ──────────────────────────────────────────────
   Captures the canvas element as a video stream. It records the SLIDE,
   not the whole browser window, and the panel says so.               */
function recSupported() {
  return typeof MediaRecorder !== 'undefined'
    && fc && fc.lowerCanvasEl && typeof fc.lowerCanvasEl.captureStream === 'function';
}

function recStart(withAudio) {
  if (!recSupported()) { showToast('Recording is not supported in this browser'); return; }
  if (_recorder) return;

  var go = function (audioTrack) {
    try {
      _recStream = fc.lowerCanvasEl.captureStream(30);
      if (audioTrack) _recStream.addTrack(audioTrack);
      var mime = ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm']
        .filter(function (m) { return MediaRecorder.isTypeSupported(m); })[0];
      _recorder = new MediaRecorder(_recStream, mime ? { mimeType: mime } : undefined);
      _recChunks = [];
      _recorder.ondataavailable = function (e) { if (e.data && e.data.size) _recChunks.push(e.data); };
      _recorder.onstop = function () {
        var blob = new Blob(_recChunks, { type: 'video/webm' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'presentation-' + new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-') + '.webm';
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(function () { URL.revokeObjectURL(url); }, 4000);
        if (_recStream) _recStream.getTracks().forEach(function (t) { t.stop(); });
        _recorder = null; _recStream = null; _recChunks = [];
        showToast('Recording saved');
        presRefresh();
      };
      _recorder.start();
      _recStart = Date.now();
      showToast('Recording — move through your slides');
      presRefresh();
    } catch (e) {
      showToast('Could not start recording');
      _recorder = null;
    }
  };

  if (withAudio && navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function (s) {
      go(s.getAudioTracks()[0]);
    }).catch(function () {
      showToast('Microphone denied — recording video only');
      go(null);
    });
  } else go(null);
}

function recStop() {
  if (!_recorder) return;
  try { _recorder.stop(); } catch (e) { _recorder = null; presRefresh(); }
}

function presRefresh() {
  if (typeof state !== 'undefined' && state.activeTool === 'presenter') renderPanelContent('presenter');
}

/* The panel clock has to tick on its own — panels otherwise only redraw
   when something asks them to. Only runs while the tab is actually open. */
(function () {
  setInterval(function () {
    if (typeof state === 'undefined' || state.activeTool !== 'presenter') return;
    var d = panelData.presenter;
    var tab = d && d.activeTab;
    var live = (tab === 'Timer' && state.timerRunning)
            || (tab === 'Record' && _recorder);
    if (live) presRefresh();
  }, 1000);
})();

function renderPresenterPanel(tab) {
  if (tab === 'Notes') {
    var here = presNoteFor(state.currentPage);
    var others = (state.pages || []).map(function (p, i) { return { i: i, n: presNoteFor(i) }; })
      .filter(function (x) { return x.i !== state.currentPage && x.n.trim(); });

    return '<div class="panel-subhead">Slide ' + (state.currentPage + 1) + ' notes</div>'
      + '<textarea id="pres-note" class="cm-box" rows="7" '
        + 'placeholder="What you want to say on this slide…">' + commentEsc(here) + '</textarea>'
      + '<div class="panel-hint">Same notes as the bottom Notes pane — one copy, two places.</div>'
      + (others.length
        ? '<div class="panel-subhead">Other slides <span>' + others.length + '</span></div>'
          + '<div class="pres-notes">' + others.map(function (x) {
              return '<button class="pres-note" data-action="page-go" data-i="' + x.i + '">'
                + '<b>' + (x.i + 1) + '</b><span>' + commentEsc(x.n.slice(0, 90))
                + (x.n.length > 90 ? '…' : '') + '</span></button>';
            }).join('') + '</div>'
        : '');
  }

  if (tab === 'Rehearse') {
    var running = !!(_rehearsal && _rehearsal.timer);
    var rep = _rehearsal ? (_rehearsal.report || rehearseReport()) : null;
    var h = '<div class="panel-subhead">Rehearsal</div>'
      + '<div class="pres-clock">' + (rep ? presFmt(rep.total) : '0:00') + '</div>'
      + '<div class="brand-actions">'
      + (running
        ? '<button class="brand-btn primary" data-action="reh-stop">'
          + '<span class="material-icons-outlined">stop</span>Stop</button>'
        : '<button class="brand-btn primary" data-action="reh-start">'
          + '<span class="material-icons-outlined">play_arrow</span>Start</button>')
      + '<button class="brand-btn" data-action="reh-clear">'
        + '<span class="material-icons-outlined">restart_alt</span>Reset</button>'
      + '</div>';

    if (rep && Object.keys(rep.per).length) {
      var avg = rep.total / Math.max(1, Object.keys(rep.per).length);
      h += '<div class="panel-subhead">Per slide</div><div class="pres-bars">'
        + Object.keys(rep.per).sort(function (a, b) { return a - b; }).map(function (k) {
            var ms = rep.per[k];
            var pct = Math.max(3, Math.round(ms / Math.max(1, rep.total) * 100));
            var slow = ms > avg * 1.6;
            return '<button class="pres-bar' + (slow ? ' slow' : '') + '"'
              + ' data-action="page-go" data-i="' + k + '">'
              + '<span class="pb-n">' + (+k + 1) + '</span>'
              + '<span class="pb-track"><i style="width:' + pct + '%"></i></span>'
              + '<span class="pb-t">' + presFmt(ms) + '</span></button>';
          }).join('') + '</div>'
        + '<div class="panel-hint">Bars marked in orange ran well over your average — '
          + 'usually the slides worth trimming.</div>';
    } else {
      h += '<div class="panel-hint">Press Start, then present as you normally would. '
        + 'Time on each slide is measured as you move through the deck.</div>';
    }
    return h;
  }

  if (tab === 'Record') {
    var rec = !!_recorder;
    return '<div class="panel-subhead">Record</div>'
      + (recSupported()
        ? '<div class="brand-actions">'
          + (rec
            ? '<button class="brand-btn primary" data-action="rec-stop">'
              + '<span class="material-icons-outlined">stop</span>Stop and save</button>'
            : '<button class="brand-btn primary" data-action="rec-start-a">'
              + '<span class="material-icons-outlined">mic</span>Record + voice</button>'
              + '<button class="brand-btn" data-action="rec-start">'
              + '<span class="material-icons-outlined">videocam</span>Video only</button>')
          + '</div>'
          + (rec ? '<div class="pres-rec">● recording</div>' : '')
          + '<div class="panel-hint">Records the <b>slide canvas</b> as a .webm video — not the '
            + 'whole browser window, and not the panels. Move through your slides while it runs; '
            + 'the file downloads when you stop. Voice needs microphone permission.</div>'
        : '<div class="panel-placeholder"><span class="material-icons-outlined">videocam_off</span>'
          + '<p><strong>Not supported here</strong><br>This browser has no MediaRecorder or '
          + 'canvas capture.</p></div>');
  }

  /* Timer */
  var running2 = !!(typeof state !== 'undefined' && state.timerRunning);
  return '<div class="panel-subhead">Timer</div>'
    + '<div class="pres-clock">' + presTimerText() + '</div>'
    + '<div class="brand-actions">'
    + '<button class="brand-btn primary" data-action="pres-timer">'
      + '<span class="material-icons-outlined">' + (running2 ? 'pause' : 'play_arrow') + '</span>'
      + (running2 ? 'Pause' : 'Start') + '</button>'
    + '<button class="brand-btn" data-action="pres-timer-reset">'
      + '<span class="material-icons-outlined">restart_alt</span>Reset</button>'
    + '</div>'
    + '<div class="panel-hint">The same timer as the bottom bar. Use Rehearse instead if you '
      + 'want per-slide times rather than one running clock.</div>';
}

/* ════════════════════════════════════════════════════════════
   HISTORY
   Two different things, kept separate because they answer different
   questions:
     Undo history — the step-by-step stack for THIS slide, already
       maintained by saveState. The panel reads it, never duplicates it.
     Restore points — a named snapshot of the WHOLE deck, taken on
       purpose before something risky.
   ════════════════════════════════════════════════════════════ */
var _historyLabel = null;
var _snapList = [], _snapLoaded = false;

/* Callers can name the next step: histLabel('Applied theme') */
function histLabel(t) { _historyLabel = t; }

function snapPut(rec) {
  return projOpenDb().then(function (db) {
    if (!db) { showToast('Restore points need IndexedDB — unavailable here'); return false; }
    return new Promise(function (res) {
      var tx = db.transaction(SNAP_STORE, 'readwrite');
      tx.objectStore(SNAP_STORE).put(rec);
      tx.oncomplete = function () { res(true); };
      tx.onerror = function () { showToast('Could not save the restore point'); res(false); };
    });
  });
}

function snapAll() {
  return projOpenDb().then(function (db) {
    if (!db) return [];
    return new Promise(function (res) {
      var out = [];
      var tx = db.transaction(SNAP_STORE, 'readonly');
      var cur = tx.objectStore(SNAP_STORE).openCursor();
      cur.onsuccess = function (e) {
        var c = e.target.result;
        if (c) { out.push(c.value); c.continue(); } else res(out);
      };
      cur.onerror = function () { res([]); };
    });
  });
}

function snapDelete(id) {
  return projOpenDb().then(function (db) {
    if (!db) return false;
    return new Promise(function (res) {
      var tx = db.transaction(SNAP_STORE, 'readwrite');
      tx.objectStore(SNAP_STORE).delete(id);
      tx.oncomplete = function () { res(true); };
      tx.onerror = function () { res(false); };
    });
  });
}

function snapRefresh() {
  return snapAll().then(function (list) {
    _snapList = list.sort(function (a, b) { return (b.ts || 0) - (a.ts || 0); });
    _snapLoaded = true;
    if (state && state.activeTool === 'history') renderPanelContent('history');
    return _snapList;
  });
}

function snapCreate() {
  if (!fc) return;
  var name = prompt('Name this restore point:', 'Before ' + new Date().toLocaleTimeString());
  if (!name) return;
  captureCurrentPage();
  if (typeof stickerFreeze === 'function') stickerFreeze();
  var thumb = '';
  try { thumb = fc.toDataURL({ format: 'png', multiplier: 0.1 }); } catch (e) {}
  /* history stacks are deliberately NOT included — a restore point is the
     content, not the undo trail, and keeping stacks would multiply size */
  var pages = (state.pages || []).map(function (p) {
    return { id: p.id, canvasJSON: p.canvasJSON, ir: p.ir, thumb: p.thumb,
             title: p.title, sectionStart: p.sectionStart, transition: p.transition };
  });
  snapPut({
    id: 'sn' + Date.now(), name: name.trim(), ts: Date.now(), thumb: thumb,
    slideCount: pages.length, pages: pages,
    notes: JSON.parse(JSON.stringify(state.notes || [])),
    theme: state.theme ? JSON.parse(JSON.stringify(state.theme)) : null
  }).then(function (ok) {
    if (ok) { showToast('Restore point saved'); snapRefresh(); }
  });
}

function snapRestore(id) {
  var s = _snapList.filter(function (x) { return x.id === id; })[0];
  if (!s || !fc) return;
  if (!confirm('Restore “' + s.name + '”?\n\nThis replaces all ' + (state.pages || []).length
    + ' current slide(s) with the ' + s.slideCount + ' saved in this point.')) return;

  state.pages = s.pages.map(function (p) {
    return { id: p.id || Date.now(), canvasJSON: p.canvasJSON, ir: p.ir, thumb: p.thumb,
             title: p.title, sectionStart: p.sectionStart, transition: p.transition,
             history: [], historyIndex: -1, historyMeta: [] };
  });
  state.notes = JSON.parse(JSON.stringify(s.notes || []));
  if (s.theme) state.theme = JSON.parse(JSON.stringify(s.theme));
  if (!state.pages.length) state.pages = [makeBlankPage(Date.now())];
  state.currentPage = 0;
  loadPageIntoCanvas(0).then(function () {
    ensurePageHistory(0);
    renderPageThumbs();
    snapRefresh();
    showToast('Restored “' + s.name + '”');
  });
}

function snapRemove(id) {
  var s = _snapList.filter(function (x) { return x.id === id; })[0];
  if (!s) return;
  if (!confirm('Delete restore point “' + s.name + '”?')) return;
  snapDelete(id).then(function () { showToast('Deleted'); snapRefresh(); });
}

/* Jump the current slide to any step in its undo stack. */
function histJump(i) {
  var page = currentPageObj();
  if (!page || !page.history || i < 0 || i >= page.history.length) return;
  page.historyIndex = i;
  restoreState();
  if (typeof state !== 'undefined' && state.activeTool === 'history') renderPanelContent('history');
}

function histClear() {
  var page = currentPageObj();
  if (!page || !page.history) return;
  if (!confirm('Clear the undo history for this slide?\nThe slide itself is unchanged.')) return;
  var keep = page.history[page.historyIndex];
  var keepMeta = (page.historyMeta || [])[page.historyIndex];
  page.history = [keep];
  page.historyMeta = [keepMeta || { t: Date.now(), n: 0 }];
  page.historyIndex = 0;
  updateUndoRedo();
  renderPanelContent('history');
  showToast('History cleared for this slide');
}

function renderHistoryPanel(tab) {
  if (tab === 'Restore points') {
    if (!_snapLoaded) snapRefresh();
    var head = '<button class="brand-btn primary" style="width:100%" data-action="snap-create">'
      + '<span class="material-icons-outlined">bookmark_add</span>Create restore point</button>'
      + '<div class="panel-hint">A restore point saves every slide as it is now. '
        + 'Take one before a theme change or a big edit.</div>';
    if (!_snapList.length) {
      return head + '<div class="panel-placeholder">'
        + '<span class="material-icons-outlined">history_toggle_off</span>'
        + '<p><strong>No restore points</strong><br>Nothing saved yet.</p></div>';
    }
    return head + '<div class="proj-list">' + _snapList.map(function (s) {
      return '<div class="proj-card">'
        + '<div class="proj-thumb" data-action="snap-restore" data-id="' + s.id + '" title="Restore">'
          + (s.thumb ? '<img src="' + s.thumb + '" alt="">' : '') + '</div>'
        + '<div class="proj-meta"><b>' + commentEsc(s.name) + '</b>'
          + '<i>' + s.slideCount + ' slide' + (s.slideCount === 1 ? '' : 's')
            + ' · ' + projAgo(s.ts) + '</i>'
          + '<div class="proj-tools">'
            + '<button data-action="snap-restore" data-id="' + s.id + '" title="Restore">'
              + '<span class="material-icons-outlined">restore</span></button>'
            + '<button data-action="snap-del" data-id="' + s.id + '" title="Delete" class="danger">'
              + '<span class="material-icons-outlined">delete</span></button>'
          + '</div></div></div>';
    }).join('') + '</div>';
  }

  var page = currentPageObj();
  var hist = (page && page.history) || [];
  if (!hist.length) {
    return '<div class="panel-placeholder"><span class="material-icons-outlined">history</span>'
      + '<p><strong>No history yet</strong><br>Edits to this slide appear here.</p></div>';
  }
  var meta = page.historyMeta || [];
  var cur = page.historyIndex == null ? hist.length - 1 : page.historyIndex;

  var rows = [];
  for (var i = hist.length - 1; i >= 0; i--) {
    var m = meta[i] || {};
    var isCur = i === cur;
    var ahead = i > cur;
    rows.push('<button class="hist-row' + (isCur ? ' now' : '') + (ahead ? ' ahead' : '') + '"'
      + ' data-action="hist-jump" data-i="' + i + '">'
      + '<span class="hist-dot"></span>'
      + '<span class="hist-lab">' + commentEsc(m.label || (i === 0 ? 'Opened' : 'Edit ' + i)) + '</span>'
      + '<span class="hist-n">' + (m.n == null ? '' : m.n + ' obj') + '</span>'
      + '<span class="hist-t">' + (m.t ? projAgo(m.t) : '') + '</span>'
      + '</button>');
  }

  return '<div class="panel-subhead">Slide ' + (state.currentPage + 1) + ' history <span>'
      + hist.length + ' step' + (hist.length === 1 ? '' : 's') + '</span></div>'
    + '<div class="panel-hint">Undo history is per slide. Steps below the current point '
      + 'are still here until you make a new edit.</div>'
    + '<div class="hist-list">' + rows.join('') + '</div>'

/* ════════════════════════════════════════════════════════════
   THEMES
   Brand Kit is "our brand". A theme is a design system applied to the
   WHOLE deck. Slides other than the current one exist only as saved JSON,
   so theming transforms that JSON directly rather than loading every
   slide — otherwise a 30-slide deck would flicker through 30 renders.
   Objects are tagged with a themeRole on first apply, so re-theming is
   exact instead of guessing from colours a second time.
   ════════════════════════════════════════════════════════════ */
var THEME_PRESETS = [
  { id:'clean',   name:'Clean',    bg:'#FFFFFF', surface:'#F1F5F9', accent:'#7C3AED',
    heading:'#0F172A', body:'#475569', hFont:'DM Sans',    bFont:'DM Sans' },
  { id:'midnight',name:'Midnight', bg:'#0B0C0E', surface:'#1E293B', accent:'#A78BFA',
    heading:'#F8FAFC', body:'#CBD5E1', hFont:'Montserrat', bFont:'Lato' },
  { id:'paper',   name:'Paper',    bg:'#FAF7F2', surface:'#EFE9DF', accent:'#993C1D',
    heading:'#2C2C2A', body:'#5F5E5A', hFont:'PT Serif',   bFont:'PT Sans' },
  { id:'ocean',   name:'Ocean',    bg:'#F0F7FF', surface:'#DBEAFE', accent:'#185FA5',
    heading:'#042C53', body:'#33556F', hFont:'Raleway',    bFont:'Open Sans' },
  { id:'forest',  name:'Forest',   bg:'#F6FAF2', surface:'#E3EFD6', accent:'#3B6D11',
    heading:'#173404', body:'#4A5B3C', hFont:'Roboto Slab',bFont:'Roboto' },
  { id:'mono',    name:'Mono',     bg:'#FFFFFF', surface:'#F1EFE8', accent:'#2C2C2A',
    heading:'#0B0B0B', body:'#5F5E5A', hFont:'Oswald',     bFont:'Roboto Mono' },
  { id:'sunset',  name:'Sunset',   bg:'#FFF8F3', surface:'#FFE9DC', accent:'#D85A30',
    heading:'#4A1B0C', body:'#7A5244', hFont:'Playfair Display', bFont:'Lato' },
  { id:'grape',   name:'Grape',    bg:'#1A0B2E', surface:'#2D1650', accent:'#C4B5FD',
    heading:'#FFFFFF', body:'#C9BEDD', hFont:'Poppins',    bFont:'Poppins' },
];

var THEME_SPACING = {
  compact: { name:'Compact', line: 1.08, scale: 0.94 },
  normal:  { name:'Normal',  line: 1.25, scale: 1.00 },
  roomy:   { name:'Roomy',   line: 1.5,  scale: 1.06 },
};

function themeCurrent() {
  if (!state.theme) {
    state.theme = JSON.parse(JSON.stringify(THEME_PRESETS[0]));
    state.theme.spacing = 'normal';
  }
  if (!state.theme.spacing) state.theme.spacing = 'normal';
  return state.theme;
}

/* Decide a role for an object the first time it is themed. */
function themeRoleFor(obj, maxFont) {
  if (obj.themeRole) return obj.themeRole;
  var t = obj.type || '';
  if (/text/.test(t)) {
    return (obj.fontSize || 0) >= maxFont * 0.8 ? 'heading' : 'body';
  }
  if (obj.isIcon) return 'accent';
  var fill = typeof obj.fill === 'string' ? obj.fill.toUpperCase() : '';
  if (fill === '#7C3AED' || fill === '#FFFFFF' || fill === '') return 'accent';
  return null;                       /* deliberately coloured — leave alone */
}

/* Transform ONE serialised slide in place. Used for every page, including
   the live one (via its JSON) so the rules can never diverge. */
function themeTransformSlide(json, th) {
  if (!json || !json.objects) return 0;
  var sp = THEME_SPACING[th.spacing] || THEME_SPACING.normal;
  var maxFont = 0;
  json.objects.forEach(function (o) {
    if (/text/.test(o.type || '')) maxFont = Math.max(maxFont, o.fontSize || 0);
  });
  if (!maxFont) maxFont = 1;

  var n = 0;
  json.objects.forEach(function (o) {
    var role = themeRoleFor(o, maxFont);
    if (!role) return;
    o.themeRole = role;
    if (role === 'heading' || role === 'body') {
      o.fill = role === 'heading' ? th.heading : th.body;
      o.fontFamily = role === 'heading' ? th.hFont : th.bFont;
      o.lineHeight = sp.line;
      if (o._themeBaseSize == null) o._themeBaseSize = o.fontSize;
      o.fontSize = Math.max(6, Math.round(o._themeBaseSize * sp.scale));
      n++;
    } else if (role === 'accent') {
      if (o.isFrame) { o.frameFill = th.accent; }
      else if (typeof o.fill === 'string') { o.fill = th.accent; }
      n++;
    }
    /* frames holding photos keep the photo; only empty ones recolour */
    if (o.isFrame && o.frameSrc) { o.frameFill = th.accent; }
  });
  json.background = th.bg;
  return n;
}

function themeApply(id) {
  var preset = id ? THEME_PRESETS.filter(function (t) { return t.id === id; })[0] : null;
  var th = themeCurrent();
  if (preset) {
    Object.keys(preset).forEach(function (k) { th[k] = preset[k]; });
  }
  if (!fc) return;

  captureCurrentPage();
  var touched = 0, slides = 0;
  (state.pages || []).forEach(function (p) {
    if (!p.canvasJSON) {
      /* a slide never visited yet has only its imported IR — set the
         background so it is at least consistent when opened */
      p.pendingTheme = th.bg;
      return;
    }
    touched += themeTransformSlide(p.canvasJSON, th);
    slides++;
  });

  var names = [th.hFont, th.bFont].filter(Boolean);
  var finish = function () {
    loadPageIntoCanvas(state.currentPage).then(function () {
      renderPageThumbs();
      themeRefresh();
      showToast('“' + (th.name || 'Theme') + '” applied to ' + slides
        + ' slide' + (slides === 1 ? '' : 's') + ' · ' + touched + ' objects');
    });
  };
  if (window.loadDeckFonts && names.length) window.loadDeckFonts(names, finish);
  else finish();
}

function themeSetColour(key) {
  var th = themeCurrent();
  var c = prompt(key + ' colour (hex):', th[key] || '#000000');
  if (!c || !/^#[0-9A-Fa-f]{6}$/.test(c.trim())) {
    if (c) showToast('Use a 6-digit hex');
    return;
  }
  th[key] = c.trim().toUpperCase();
  th.id = 'custom'; th.name = 'Custom';
  themeRefresh();
}

function themeSetFont(which, name) {
  var th = themeCurrent();
  th[which === 'heading' ? 'hFont' : 'bFont'] = name;
  th.id = 'custom'; th.name = 'Custom';
  themeRefresh();
}

function themeSetSpacing(key) {
  themeCurrent().spacing = key;
  themeRefresh();
}

function themeRefresh() {
  if (typeof state !== 'undefined' && state.activeTool === 'themes') renderPanelContent('themes');
}

/* ════════════════════════════════════════════════════════════
   COMPONENTS
   Pre-built compositions with a real master/instance relationship:
     Insert  → an instance, tagged with its component id
     Detach  → drops the tag; it becomes ordinary objects
     Update  → this instance becomes the new master definition
   Masters that you have edited are stored locally as overrides, so an
   updated component keeps its shape for future inserts.
   ════════════════════════════════════════════════════════════ */
var CMP_OVERRIDE_KEY = 'ld_component_masters';

function cmpOverrides() { return iconStore(CMP_OVERRIDE_KEY, {}); }
function cmpSaveOverride(id, json) {
  var all = cmpOverrides();
  all[id] = json;
  try { localStorage.setItem(CMP_OVERRIDE_KEY, JSON.stringify(all)); return true; }
  catch (e) { showToast('Storage full — could not update the master'); return false; }
}
function cmpClearOverride(id) {
  var all = cmpOverrides();
  delete all[id];
  try { localStorage.setItem(CMP_OVERRIDE_KEY, JSON.stringify(all)); } catch (e) {}
}

function cmpDef(id) {
  return COMPONENT_LIB.filter(function (c) { return c.id === id; })[0];
}

function cmpInsert(id) {
  histLabel('Inserted component');
  var def = cmpDef(id);
  if (!def || !fc) return;
  var over = cmpOverrides()[id];

  var place = function (g) {
    var W = fc.getWidth() / fc.getZoom(), H = fc.getHeight() / fc.getZoom();
    var maxW = W * 0.8;
    if (g.width > maxW) g.scaleToWidth(maxW);
    g.set({ left: Math.max(0, (W - g.getScaledWidth()) / 2),
            top:  Math.max(0, (H - g.getScaledHeight()) / 2),
            isComponent: true, componentId: id, componentName: def.name });
    fc.add(g).setActiveObject(g);
    fc.renderAll(); saveState();
    showToast(def.name + ' added');
  };

  if (over && fabric.util && fabric.util.enlivenObjects) {
    fabric.util.enlivenObjects([over], function (objs) {
      if (objs && objs[0]) place(objs[0]);
      else place(new fabric.Group(def.build(), { objectCaching: false }));
    });
  } else {
    place(new fabric.Group(def.build(), { objectCaching: false }));
  }
}

function cmpDetach() {
  var o = fc && fc.getActiveObject();
  if (!o || !o.isComponent) { showToast('Select a component instance first'); return; }
  var name = o.componentName;
  o.isComponent = false;
  o.componentId = null;
  o.componentName = null;
  saveState(); cmpRefresh();
  showToast('Detached — “' + name + '” is now plain objects');
}

/* Update: this instance becomes the master. Other instances ON THIS SLIDE
   are rebuilt to match; instances on other slides are left alone, because
   silently rewriting slides you cannot see is worse than not doing it. */
function cmpUpdate() {
  var o = fc && fc.getActiveObject();
  if (!o || !o.isComponent) { showToast('Select a component instance first'); return; }
  var id = o.componentId;
  var json;
  try { json = o.toObject(FABRIC_JSON_PROPS); } catch (e) { json = null; }
  if (!json) { showToast('Could not capture that instance'); return; }
  if (!cmpSaveOverride(id, json)) return;

  var others = (fc.getObjects() || []).filter(function (x) {
    return x !== o && x.isComponent && x.componentId === id;
  });
  if (!others.length) {
    cmpRefresh();
    showToast('Master updated — future inserts use this version');
    return;
  }
  var pending = others.length;
  others.forEach(function (x) {
    fabric.util.enlivenObjects([json], function (objs) {
      var n = objs && objs[0];
      if (n) {
        n.set({ left:x.left, top:x.top, scaleX:x.scaleX, scaleY:x.scaleY, angle:x.angle,
                isComponent:true, componentId:id, componentName:x.componentName });
        fc.remove(x); fc.add(n);
      }
      if (--pending === 0) {
        fc.renderAll(); saveState(); cmpRefresh();
        showToast('Master updated — ' + others.length + ' instance(s) on this slide refreshed');
      }
    });
  });
}

function cmpReset(id) {
  cmpClearOverride(id);
  cmpRefresh();
  showToast('Reset to the built-in version');
}

function cmpRefresh() {
  if (typeof state !== 'undefined' && state.activeTool === 'components') renderPanelContent('components');
}

function cmpPreviewSvg(def) {
  /* a schematic preview: boxes where the parts sit, so the card reads
     at a glance without rendering fabric off-screen */
  var parts;
  try { parts = def.build(); } catch (e) { parts = []; }
  if (!parts.length) return '';
  var maxX = 1, maxY = 1;
  parts.forEach(function (p) {
    maxX = Math.max(maxX, (p.left || 0) + (p.width || p.radius * 2 || 40));
    maxY = Math.max(maxY, (p.top || 0) + (p.height || p.radius * 2 || 20));
  });
  var W = 150, s = W / maxX, H = Math.max(28, maxY * s);
  return '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" height="' + Math.min(96, H) + '">'
    + parts.map(function (p) {
        var x = (p.left || 0) * s, y = (p.top || 0) * s;
        var isTxt = /text/.test(p.type || '');
        var w = ((p.width || (p.radius ? p.radius * 2 : 40))) * s;
        var h = ((p.height || (p.radius ? p.radius * 2 : (p.fontSize || 14) * 1.3))) * s;
        var fill = (typeof p.fill === 'string' && p.fill) ? p.fill : '#CBD5E1';
        if (p.radius) {
          return '<circle cx="' + (x + w/2) + '" cy="' + (y + h/2) + '" r="' + (w/2)
            + '" fill="' + fill + '"/>';
        }
        return '<rect x="' + x + '" y="' + y + '" width="' + Math.max(1, w)
          + '" height="' + Math.max(1.5, isTxt ? h * 0.5 : h) + '" rx="' + (isTxt ? 1 : 2)
          + '" fill="' + fill + '"' + (fill === '' ? ' stroke="#CBD5E1"' : '') + '/>';
      }).join('') + '</svg>';
}

function renderComponentPanel(tab) {
  var o = fc && fc.getActiveObject();
  var isInst = !!(o && o.isComponent);
  var over = cmpOverrides();

    + '</div>';

  var list = COMPONENT_LIB.filter(function (c) { return !tab || tab === 'All' || c.cat === tab; });

              + 'title="' + c.name + '">'
