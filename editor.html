var GRID_GAP = 8;      /* px between cells */

function gridPreviewSvg(g, w, h) {
  return '<svg viewBox="0 0 ' + w + ' ' + h + '" width="' + w + '" height="' + h + '">'
    + g.cells.map(function (c) {
        var pad = 1.2;
        return '<rect x="' + (c[0] * w + pad) + '" y="' + (c[1] * h + pad)
          + '" width="' + Math.max(1, c[2] * w - pad * 2)
          + '" height="' + Math.max(1, c[3] * h - pad * 2)
          + '" rx="2" fill="currentColor"/>';
      }).join('') + '</svg>';
}

function renderGridPanel(tab) {
  var list = GRID_LAYOUTS.filter(function (g) { return !tab || tab === 'All' || g.c === tab; });
  return '<button class="grid-autofill" data-action="grid-autofill">'
      + '<span class="material-icons-outlined">burst_mode</span>Auto-fill images…</button>'
    + '<div class="panel-hint">Fills every empty frame on this slide, in order.</div>'
    + GRID_CATS.filter(function (c) { return !tab || tab === 'All' || c === tab; }).map(function (cat) {
        var items = list.filter(function (g) { return g.c === cat; });
        if (!items.length) return '';
        return '<div class="panel-subhead">' + cat + '</div><div class="grid-grid">'
          + items.map(function (g) {
              return '<button class="grid-card" data-action="add-grid" data-grid="'
                + GRID_LAYOUTS.indexOf(g) + '" title="' + g.n + ' — ' + g.cells.length + ' cells">'
                + gridPreviewSvg(g, 74, 46)
                + '<span>' + g.n + '</span></button>';
            }).join('') + '</div>';
      }).join('');
}

function addGrid(idx) {
  histLabel('Added grid');
  var g = GRID_LAYOUTS[idx];
  if (!g || !fc) return;
  var slideW = fc.getWidth() / fc.getZoom();
  var slideH = fc.getHeight() / fc.getZoom();
  var margin = Math.round(Math.min(slideW, slideH) * 0.06);
  var areaW = slideW - margin * 2, areaH = slideH - margin * 2;

  var made = [];
  g.cells.forEach(function (c) {
    var w = Math.max(12, c[2] * areaW - GRID_GAP);
    var h = Math.max(12, c[3] * areaH - GRID_GAP);
    var x = margin + c[0] * areaW + GRID_GAP / 2;
    var y = margin + c[1] * areaH + GRID_GAP / 2;
    /* aperture is a plain rectangle in its own coordinate space, so the
       cell keeps its exact aspect ratio instead of being squared off */
    var pw = 1000, ph = Math.max(1, Math.round(1000 * h / w));
    var frame = makeFrameShape({
      d: 'M 0 0 H ' + pw + ' V ' + ph + ' H 0 Z',
      pathW: pw, pathH: ph,
      kind: 'grid-cell', look: 'placeholder',
      boxW: w, at: [x, y], quiet: true
    });
    if (frame) made.push(frame);
  });

  if (made.length) {
    fc.setActiveObject(made[0]);
    fc.renderAll();
    saveState();
    showToast(g.n + ' grid — ' + made.length + ' frames. Drop photos in, or Auto-fill.');
  }
}

/* ── Auto-fill ────────────────────────────────────────────
   Reading order (top row first, then left to right), so the images land
   where a person expects rather than in canvas z-order. */
function emptyFramesInReadingOrder() {
  if (!fc) return [];
  return fc.getObjects()
    .filter(function (o) { return o.isFrame && !o.frameSrc; })
    .sort(function (a, b) {
      var dy = (a.top || 0) - (b.top || 0);
      if (Math.abs(dy) > 12) return dy;
      return (a.left || 0) - (b.left || 0);
    });
}

function fillFrameWithDataUrl(frame, dataUrl) {
  return new Promise(function (resolve) {
    var im = new Image();
    im.onload = function () {
      var ap = frameAperture(frame);
      var fw = (ap && ap.width  ? ap.width  : frame.width)  * (frame.scaleX || 1);
      var fh = (ap && ap.height ? ap.height : frame.height) * (frame.scaleY || 1);
      var fAR = fw / Math.max(1, fh), iAR = im.width / im.height;
      var fr = { l:0, t:0, r:0, b:0 };
      if (iAR > fAR)      { var ov = (1 - iAR / fAR) / 2; fr.l = ov; fr.r = ov; }
      else if (iAR < fAR) { var o2 = (1 - fAR / iAR) / 2; fr.t = o2; fr.b = o2; }
      frame._frameImg = im;
      frame.frameSrc = dataUrl;
      frame.frameRect = fr;
      refreshFrame(frame);
      resolve();
    };
    im.onerror = function () { resolve(); };
    im.src = dataUrl;
  });
}

function gridAutoFill(input) {
  var files = input && input.files ? Array.prototype.slice.call(input.files) : [];
  input.value = '';
  if (!files.length) return;
  var targets = emptyFramesInReadingOrder();
  if (!targets.length) { showToast('No empty frames on this slide'); return; }

  var n = Math.min(files.length, targets.length);
  var jobs = [];
  for (var i = 0; i < n; i++) {
    (function (file, frame) {
      jobs.push(new Promise(function (res) {
        var rd = new FileReader();
        rd.onload = function (e) { fillFrameWithDataUrl(frame, e.target.result).then(res); };
        rd.onerror = function () { res(); };
        rd.readAsDataURL(file);
      }));
    })(files[i], targets[i]);
  }
  Promise.all(jobs).then(function () {
    fc.renderAll();
    saveState();
    var extra = files.length > targets.length
      ? ' (' + (files.length - targets.length) + ' image(s) had no free frame)'
      : targets.length > files.length
        ? ' (' + (targets.length - files.length) + ' frame(s) still empty)' : '';
    showToast('Filled ' + n + ' frame' + (n === 1 ? '' : 's') + extra);
  });
}

/* ── Crop inside frame ────────────────────────────────────
   Panning and zooming the photo WITHIN the mask. All it does is move the
   fillRect insets, which is exactly the crop PowerPoint and Canva store,
   so the crop survives export. */
var _cropFrame = null;

function frameCropStart() {
  var o = fc && fc.getActiveObject();
  if (!o || !o.isFrame) { showToast('Select a frame first'); return; }
  if (!o.frameSrc) { showToast('This frame has no photo yet'); return; }
  _cropFrame = o;
  fc.defaultCursor = 'move';
  showToast('Drag to reposition · +/− to zoom · Esc when done');
  renderRibbon();
}

function frameCropEnd() {
  if (!_cropFrame) return;
  _cropFrame = null;
  if (fc) fc.defaultCursor = 'default';
  saveState();
  showToast('Crop applied');
  renderRibbon();
}

/* Zoom = shrink or grow the visible window into the photo, keeping centre. */
function frameCropZoom(dir) {
  var o = _cropFrame || (fc && fc.getActiveObject());
  if (!o || !o.isFrame || !o.frameSrc) { showToast('Select a framed photo first'); return; }
  var fr = o.frameRect || { l:0, t:0, r:0, b:0 };
  var step = dir * 0.05;
  var cx = (fr.l - fr.r) / 2, cy = (fr.t - fr.b) / 2;
  var spanX = 1 - fr.l - fr.r, spanY = 1 - fr.t - fr.b;
  spanX = Math.max(0.2, Math.min(3, spanX - step));
  spanY = Math.max(0.2, Math.min(3, spanY - step));
  o.frameRect = { l: cx + (1 - spanX) / 2, r: -cx + (1 - spanX) / 2,
                  t: cy + (1 - spanY) / 2, b: -cy + (1 - spanY) / 2 };
  refreshFrame(o);
}

function frameCropReset() {
  var o = _cropFrame || (fc && fc.getActiveObject());
  if (!o || !o.isFrame || !o._frameImg) { showToast('Select a framed photo first'); return; }
  var ap = frameAperture(o);
  var fw = (ap && ap.width  ? ap.width  : o.width)  * (o.scaleX || 1);
  var fh = (ap && ap.height ? ap.height : o.height) * (o.scaleY || 1);
  var im = o._frameImg;
  var fAR = fw / Math.max(1, fh), iAR = im.width / im.height;
  var fr = { l:0, t:0, r:0, b:0 };
  if (iAR > fAR)      { var ov = (1 - iAR / fAR) / 2; fr.l = ov; fr.r = ov; }
  else if (iAR < fAR) { var o2 = (1 - fAR / iAR) / 2; fr.t = o2; fr.b = o2; }
  o.frameRect = fr;
  refreshFrame(o);
  saveState();
  showToast('Crop reset to fill');
}

/* Drag inside the frame while cropping pans the photo. */
(function () {
  var t = setInterval(function () {
    if (typeof fc === 'undefined' || !fc || !fc.on) return;
    clearInterval(t);
    var last = null;
    fc.on('mouse:down', function (e) { if (_cropFrame) last = e.pointer; });
    fc.on('mouse:move', function (e) {
      if (!_cropFrame || !last || !e.pointer) return;
      var ap = frameAperture(_cropFrame);
      var fw = (ap && ap.width  ? ap.width  : _cropFrame.width)  * (_cropFrame.scaleX || 1);
      var fh = (ap && ap.height ? ap.height : _cropFrame.height) * (_cropFrame.scaleY || 1);
      var dx = (e.pointer.x - last.x) / Math.max(1, fw);
      var dy = (e.pointer.y - last.y) / Math.max(1, fh);
      var fr = _cropFrame.frameRect || { l:0, t:0, r:0, b:0 };
      _cropFrame.frameRect = { l: fr.l + dx, r: fr.r - dx, t: fr.t + dy, b: fr.b - dy };
      refreshFrame(_cropFrame);
      last = e.pointer;
    });
    fc.on('mouse:up', function () { last = null; });
  }, 300);
})();

document.addEventListener('keydown', function (e) {
  if (!_cropFrame) return;
  if (e.key === 'Escape') { frameCropEnd(); e.preventDefault(); }
  else if (e.key === '+' || e.key === '=') { frameCropZoom(1); e.preventDefault(); }
  else if (e.key === '-' || e.key === '_') { frameCropZoom(-1); e.preventDefault(); }
});

/* Any non-data src (blob:, http:) is baked to a data URL FIRST. The cloud
   writer's media map only accepts data:image/...;base64 — a blob src would
   make the element vanish from the exported PPTX. */
function frameSrcToDataURL(img) {
  var src = img.currentSrc || img.src || '';
  if (/^data:image\//.test(src)) return src;
  try {
    var c = document.createElement('canvas');
    c.width = img.naturalWidth || img.width;
    c.height = img.naturalHeight || img.height;
    c.getContext('2d').drawImage(img, 0, 0);
    return c.toDataURL('image/png');
  } catch (e) {
    return null;   /* cross-origin taint — caller aborts rather than exporting a blank */
  }
}

/* The Canva move: drop a picture onto a frame, the frame swallows it. */
function dropImageIntoFrame(imgObj, grp) {
  histLabel('Photo into frame');
  var natural = imgObj._originalElement || imgObj._element;
  if (!natural) return false;
  var iw = natural.naturalWidth || natural.width;
  var ih = natural.naturalHeight || natural.height;
  if (!iw || !ih) return false;
  var src = frameSrcToDataURL(natural);
  if (!src) { showToast('That image is cross-origin and cannot be framed'); return false; }

  /* cover-fit → the same negative-inset fillRect math Canva writes */
  var frameAR = (grp.width * (grp.scaleX || 1)) / Math.max(1, grp.height * (grp.scaleY || 1));
  var imgAR = iw / ih;
  var fr = { l: 0, t: 0, r: 0, b: 0 };
  if (imgAR > frameAR)      { var ov = (1 - imgAR / frameAR) / 2; fr.l = ov; fr.r = ov; }
  else if (imgAR < frameAR) { var ov2 = (1 - frameAR / imgAR) / 2; fr.t = ov2; fr.b = ov2; }

  grp.frameSrc = src;
  grp.frameRect = fr;
  grp._frameImg = natural;
  fc.remove(imgObj);
  refreshFrame(grp);
  fc.setActiveObject(grp);
  saveState();
  showToast('Photo fitted into frame ✓');
  return true;
}

/* Hit-test: an image released with its centre over a frame gets swallowed. */
(function () {
  var t = setInterval(function () {
    if (typeof fc === 'undefined' || !fc || !fc.on) return;
    clearInterval(t);
    fc.on('object:modified', function (ev) {
      var o = ev.target;
      if (!o || o.isFrame || o.type !== 'image') return;
      var c = o.getCenterPoint();
      var frames = fc.getObjects().filter(function (g) { return g.isFrame; });
      for (var i = 0; i < frames.length; i++) {
        var b = frames[i].getBoundingRect(true, true);
        if (c.x >= b.left && c.x <= b.left + b.width &&
            c.y >= b.top && c.y <= b.top + b.height) {
          dropImageIntoFrame(o, frames[i]);
          return;
        }
      }
    });
  }, 300);
})();

/* Frames restored from JSON (page switch / undo) need their photo re-attached. */
function rehydrateFrames() {
  if (!fc) return;
  fc.getObjects().forEach(function (o) {
    if (!o.isFrame) return;
    if (o.frameSrc && !o._frameImg) {
      var im = new Image();
      im.onload = function () { o._frameImg = im; refreshFrame(o); };
      im.src = o.frameSrc;
    } else {
      refreshFrame(o);
    }
  });
}

function handleUploadImg(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    /* Ribbon "Drop photo" armed a frame — send this picture straight into it
       instead of dropping a loose image on the slide. */
    if (_frameFillTarget && _frameFillTarget.isFrame) {
      var target = _frameFillTarget;
      _frameFillTarget = null;
      var im = new Image();
      im.onload = function () {
        target._frameImg = im;
        target.frameSrc = e.target.result;
        var fAR = (target.width * (target.scaleX || 1)) /
                  Math.max(1, target.height * (target.scaleY || 1));
        var iAR = im.width / im.height;
        var fr = { l:0, t:0, r:0, b:0 };
        if (iAR > fAR)      { var ov = (1 - iAR / fAR) / 2; fr.l = ov; fr.r = ov; }
        else if (iAR < fAR) { var o2 = (1 - fAR / iAR) / 2; fr.t = o2; fr.b = o2; }
        target.frameRect = fr;
        refreshFrame(target);
        saveState();
        showToast('Photo fitted into frame ✓');
      };
      im.src = e.target.result;
      return;
    }
    fabric.Image.fromURL(e.target.result, function(img) {
      img.scaleToWidth(Math.min(img.width, fc.getWidth() / fc.getZoom() * 0.5));
      img.set({ left:80, top:80 });
      fc.add(img).setActiveObject(img).renderAll();
      saveState();
      showToast('Image uploaded');
    });
  };
  reader.readAsDataURL(input.files[0]);
  input.value = '';
}

/* ============================================
   EDIT MODE
   ============================================ */
function setEditMode(mode) {
  if (!fc) return;
  if (mode === 'view')    { fc.selection = false; fc.getObjects().forEach(function(o){ o.selectable = false; }); }
  else if (mode === 'edit') { fc.selection = true; fc.getObjects().forEach(function(o){ if (!o.isBg) o.selectable = true; }); }
  else if (mode === 'comment') { fc.selection = false; }
  fc.renderAll();
}

/* ============================================
   UNDO / REDO  (Phase 2: PER-PAGE undo stack)
   Each state.pages[i] owns { history:[], historyIndex:-1 } — replaces the
   old single global editHistory/historyIndex so undo/redo never crosses
   between slides.
   ============================================ */
var _restoring = false;

function currentPageObj() {
  return state.pages[state.currentPage] || null;
}

/* Snapshot fabric props we need to round-trip: isBg (background image flag),
   svgText (raw SVG source kept on svg-derived groups for Phase 3 custGeom work),
   irId/irOrigin (traceability back to the IR element that produced this object). */
var FABRIC_JSON_PROPS = ['isBg', 'svgText', 'irId', 'irOrigin', 'irPara', 'irBody', 'irTable', 'irChart', 'irChartRole', 'irChartSi', 'irChartCi', 'irReflOf', 'irHasRefl', 'reflGap', 'reflAlpha', 'irGlowOf', 'irHasGlow', 'glowPad', 'irGlowRadPx', 'irGlowColor', 'irSoftOf', 'irHasSoft', 'irSoftRadPx', 'softPad', 'mediaSrc', 'mediaKind',
  /* Canva-style live frames (Element 106): the frame carries its own geometry
     + photo so it survives page switch, undo and export. */
  'isFrame', 'frameKind', 'framePath', 'framePathW', 'framePathH', 'frameSrc', 'frameRect',
  'frameLook', 'frameFill', 'frameDevice', 'isAperture',
  /* charts keep their type + data so they can become live charts later */
  'chartType', 'chartDef',
  /* icons keep their glyph name + wght so colour and stroke stay editable */
  'isIcon', 'iconName', 'iconWeight',
  /* illustrations keep palette roles per path, so recolour survives reload */
  'isIllo', 'illoIndex', 'illoPalette', 'illoName', 'illoRole', 'illoStroke',
  /* stickers keep their motion type (_animBase is runtime-only, never saved) */
  'isSticker', 'stickerName', 'stickerAnim',
  /* layers: custom name, plus visible/lock so hide and lock survive a reload */
  'layerName', 'visible', 'isBrandLogo',
  /* animations are stored as intent, never baked into geometry */
  'animType', 'animMs', 'animDelay', 'animDir', 'animOrder',
  /* effects are parameters, so they can be rebuilt exactly on reload */
  'fx',
  /* component instances keep their link to the master */
  'isComponent', 'componentId', 'componentName',
  /* theming: the role decides how re-theming treats an object, and the
     original size lets spacing changes be reversed exactly */
  'themeRole', '_themeBaseSize',
  /* accessibility: alt text and screen-reader order travel with the object */
  'altText', 'readOrder',
  /* charts remember which dataset feeds them */
  'datasetId'];

function saveState() {
  if (!fc || _restoring || window._bulkLoad) return;
  var page = currentPageObj();
  if (!page) return;
  var json = JSON.stringify(fc.toJSON(FABRIC_JSON_PROPS));
  var idx = page.historyIndex == null ? -1 : page.historyIndex;
  page.history = (page.history || []).slice(0, idx + 1);
  page.history.push(json);
  /* a parallel label track, kept in lockstep with history, so the History
     panel can show what each step was instead of "state 14" */
  page.historyMeta = (page.historyMeta || []).slice(0, idx + 1);
  page.historyMeta.push({
    t: Date.now(),
    n: (fc.getObjects() || []).length,
    label: (typeof _historyLabel !== 'undefined' && _historyLabel) || null
  });
  if (typeof _historyLabel !== 'undefined') _historyLabel = null;
  if (page.history.length > 60) { page.history.shift(); page.historyMeta.shift(); }
  page.historyIndex = page.history.length - 1;
  page.canvasJSON = json; // keep the "last edited state" mirror current
  updateUndoRedo();
  if (typeof state !== 'undefined' && state.activeTool === 'history'
      && typeof renderPanelContent === 'function') renderPanelContent('history');
}
function doUndo() {
  var page = currentPageObj();
  if (!page || page.historyIndex <= 0) return;
  page.historyIndex--;
  restoreState();
}
function doRedo() {
  var page = currentPageObj();
  if (!page || page.historyIndex >= page.history.length - 1) return;
  page.historyIndex++;
  restoreState();
}
function restoreState() {
  var page = currentPageObj();
  if (!page || !page.history || !page.history[page.historyIndex]) return;
  _restoring = true;
  fc.loadFromJSON(page.history[page.historyIndex], function() {
    fc.getObjects().forEach(function(o){ if (o.isBg) { o.selectable = true; o.evented = true; } });
    fc.renderAll();
    page.canvasJSON = page.history[page.historyIndex];
    _restoring = false;
    updateUndoRedo();
  });
}
/* Seed a page's undo stack with its current on-canvas state, but only if it
   doesn't already have one — called after a fresh IR render / blank init /
   JSON load so every page has an undo baseline without clobbering history
   the user already built up on a page they're revisiting. */
function ensurePageHistory(index) {
  var page = state.pages[index];
  if (!page) return;
  if (!page.history || !page.history.length) {
    var json = JSON.stringify(fc.toJSON(FABRIC_JSON_PROPS));
    page.history = [json];
    page.historyIndex = 0;
    page.canvasJSON = json;
  }
  updateUndoRedo();
}
function updateUndoRedo() {
  var page = currentPageObj();
  var canUndo = !!(page && page.historyIndex > 0);
  var canRedo = !!(page && page.history && page.historyIndex < page.history.length - 1);
  if (dom.undoBtn) dom.undoBtn.style.opacity = canUndo ? '1' : '0.4';
  if (dom.redoBtn) dom.redoBtn.style.opacity = canRedo ? '1' : '0.4';
}

/* ============================================
   CANVAS / ZOOM CONTROLLER (Fabric-backed)
   ============================================ */
function selectSlide(selected) {
  state.slideSelected = selected;
  dom.slideFrame.classList.toggle('selected', selected);
}

function calculateFitZoom() {
  const area = dom.canvasArea.getBoundingClientRect();
  const padding = 60;
  const maxW = area.width - padding * 2;
  const maxH = area.height - padding * 2;
  const baseW = (fc && fc._baseWidth) || 960;
  const baseH = (fc && fc._baseHeight) || 540;
  const scaleW = maxW / baseW;
  const scaleH = maxH / baseH;
  return Math.min(scaleW, scaleH, 2) * 100;
}

function doZoom(percent) {
  if (!fc) return;
  var z = percent / 100;
  var w = fc._baseWidth || 960;
  var h = fc._baseHeight || 540;
  fc.setZoom(z);
  fc.setWidth(w * z);
  fc.setHeight(h * z);
  fc.renderAll();
}

function setZoom(value) {
  state.zoom = Math.max(25, Math.min(200, Math.round(value)));
  dom.zoomSlider.value = state.zoom;
  dom.zoomValue.textContent = state.zoom + '%';
  doZoom(state.zoom);
}

/* ── MATCH CANVAS ASPECT TO SLIDE (used by the PPTX importer) ── */
function setSlideAspect(emuW, emuH) {
  if (!fc || !emuW || !emuH) return;
  var baseW = fc._baseWidth || 960;
  var baseH = Math.round(baseW * (emuH / emuW));
  fc._baseWidth = baseW;
  fc._baseHeight = baseH;
  /* true canvas-px per PowerPoint-pt for THIS deck — the font panel divides
     by this so the size box shows the same number PowerPoint shows */
  fc._pxPerPt = baseW * 12700 / emuW;
  var z = state.zoom / 100;
  fc.setWidth(baseW * z);
  fc.setHeight(baseH * z);
  fc.setZoom(z);
  fc.renderAll();
}

/* ============================================
   PAGES CONTROLLER  (Phase 2 Part C: per-slide persistence)
   Each page now owns its own ir / canvasJSON / thumb / undo-history, so
   pages never misalign regardless of how many were imported vs. added blank.
   ============================================ */
function renderPageThumbs() {
  let html = '';
  state.pages.forEach((page, i) => {
    var inner = (page.thumb
      ? `<img src="${page.thumb}" alt="" style="width:100%;height:100%;object-fit:cover;display:block;">`
      : '') + `<span class="pt-num">${i + 1}</span>`;
    var acts = `<span class="pt-actions">`
      + `<button class="pt-act" data-pt="dup" data-page="${i}" title="Duplicate slide"><span class="material-icons-outlined">content_copy</span></button>`
      + (state.pages.length > 1
          ? `<button class="pt-act danger" data-pt="del" data-page="${i}" title="Delete slide"><span class="material-icons-outlined">close</span></button>`
          : '')
      + `</span>`;
    html += `<div class="page-thumb${i === state.currentPage ? ' active' : ''}" data-page="${i}" draggable="true" title="Slide ${i + 1} — drag to reorder">${inner}${acts}</div>`;
  });
  html += `<button class="page-add-btn" data-action="add-page" aria-label="Add page"><span class="material-icons-outlined">add</span></button>`;
  dom.pageThumbs.innerHTML = html;
  var actv = dom.pageThumbs.querySelector('.page-thumb.active');
  if (actv && actv.scrollIntoView) actv.scrollIntoView({ block: 'nearest', inline: 'nearest' });
  /* the "1 of N" counter was removed from the bottom bar — guard rather than
     assume it exists, or every thumbnail render throws */

  var page = currentPageObj();

  if (typeof stickerFreeze === 'function') stickerFreeze();
  page.canvasJSON = fc.toJSON(FABRIC_JSON_PROPS);
  try { page.thumb = fc.toDataURL({ format: 'png', multiplier: 0.15 }); } catch (e) { /* canvas may be tainted by cross-origin images; keep old thumb */ }

   else fresh IR render (PPTX import, never touched), else a blank white slide. */
async function loadPageIntoCanvas(index) {
  var page = state.pages[index];

  window._bulkLoad = true;

    await new Promise(function(resolve){
      fc.loadFromJSON(page.canvasJSON, function () {

async function switchPage(index) {
  if (index < 0 || index >= state.pages.length || index === state.currentPage) return;
  captureCurrentPage();
  state.notes[state.currentPage] = dom.notesTextarea.value;
  state.currentPage = index;
  dom.notesTextarea.value = state.notes[state.currentPage] || '';
  selectSlide(false);
  await loadPageIntoCanvas(index);
  renderPageThumbs();
}

function addPage() {
  if (state.pages.length >= 40) { showToast('Maximum 40 slides allowed'); return; }
  captureCurrentPage();
  var page = makeBlankPage(Date.now());
  state.pages.push(page);
  state.notes.push('');
  state.currentPage = state.pages.length - 1;
  dom.notesTextarea.value = '';
  selectSlide(false);
  window._bulkLoad = true;
  fc.clear();
  fc.setBackgroundColor('#ffffff', fc.renderAll.bind(fc));
  window._bulkLoad = false;
  ensurePageHistory(state.currentPage);
  renderPageThumbs();
  showToast('Slide added');
}

async function deletePage() {
  if (state.pages.length <= 1) { showToast('Cannot delete the last slide'); return; }
  state.pages.splice(state.currentPage, 1);
  state.notes.splice(state.currentPage, 1);
  if (state.currentPage >= state.pages.length) state.currentPage = state.pages.length - 1;
  dom.notesTextarea.value = state.notes[state.currentPage] || '';
  await loadPageIntoCanvas(state.currentPage);
  renderPageThumbs();
  showToast('Slide deleted');
}

/* ============================================
   TIMER CONTROLLER
   ============================================ */
function formatTime(seconds) {
  const m = String(Math.floor(seconds / 60)).padStart(2, '0');
  const s = String(seconds % 60).padStart(2, '0');
  return `${m}:${s}`;
}

function toggleTimer() {
  if (state.timerRunning) {
    clearInterval(state.timerInterval);
    state.timerRunning = false;
    dom.timerToggle.querySelector('.material-icons-outlined').textContent = 'play_arrow';
  } else {
    state.timerRunning = true;
    dom.timerToggle.querySelector('.material-icons-outlined').textContent = 'pause';
    dom.timerReset.style.opacity = '1';
    dom.timerReset.style.pointerEvents = 'auto';
    state.timerInterval = setInterval(() => {
      state.timerSeconds++;
      dom.timerDisplay.textContent = formatTime(state.timerSeconds);
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(state.timerInterval);
  state.timerRunning = false;
  state.timerSeconds = 0;
  dom.timerDisplay.textContent = '00:00';
  dom.timerToggle.querySelector('.material-icons-outlined').textContent = 'play_arrow';
  dom.timerReset.style.opacity = '0';
  dom.timerReset.style.pointerEvents = 'none';
}

/* ============================================
   NOTES CONTROLLER
   ============================================ */
function toggleNotes() {
  state.notesOpen = !state.notesOpen;
  dom.notesPanel.classList.toggle('open', state.notesOpen);
  dom.notesToggle.classList.toggle('active', state.notesOpen);
  if (state.notesOpen) dom.notesTextarea.focus();
}

/* ============================================
   DROPDOWN CONTROLLER
   ============================================ */
function openDropdown(id) {
  closeDropdowns();
  const el = id === 'share' ? dom.shareDropdown
           : id === 'upload' ? dom.uploadDropdown
           : dom.moreDropdown;
  if (!el) return;
  el.classList.add('open');
  state.openDropdown = id;
}

function closeDropdowns() {
  [dom.shareDropdown, dom.uploadDropdown, dom.moreDropdown].forEach(function (el) {
    if (el) el.classList.remove('open');
  });
  state.openDropdown = null;
}

/* ============================================
   PNG EXPORT (Share > Download, phase-1)
   ============================================ */
function exportCanvasPNG() {
  if (!fc) { showToast('Editor not ready yet'); return; }
  var dataURL = fc.toDataURL({ format: 'png', multiplier: 2 });
  var a = document.createElement('a');
  a.href = dataURL;
  a.download = 'slide.png';
  document.body.appendChild(a);
  a.click();
  a.remove();
  showToast('Downloading PNG...');
}

async function handlePPTXUpload(input) {
  if (!input.files || !input.files[0]) { showToast('No file selected'); return; }
  if (!fc) { alert('Editor not ready — please wait a moment and try again.'); return; }
  if (typeof JSZip === 'undefined') { alert('JSZip library failed to load. Check internet connection and reload.'); return; }
  var file = input.files[0];
  input.value = '';
  showToast('Parsing PPTX…');
  try {
    var _buf = await file.arrayBuffer();

    /* The /parse backend is behind a locked cloud gate that needs the
       designer's Firebase token. On a cold page load onAuthStateChanged
       may not have resolved yet, so — like ldCompose — give the token a
       few moments to arrive before firing the request. Without this the
       first click after load races auth and the import silently fails. */
    for (var _w = 0; _w < 10 && !window.LD_AUTH_TOKEN; _w++) {
      await new Promise(function (res) { setTimeout(res, 500); });
    }

    var _resp;
    try {
      _resp = await fetch((window.LD_BACKEND || 'http://localhost:8080') + '/parse', {
        method: 'POST', headers: window.ldHeaders('application/octet-stream'), body: _buf });
    } catch (netErr) {
      /* fetch() only throws for network/CORS failures, never for HTTP errors */
      throw new Error('Could not reach the import service. Check your internet connection and try again.');
    }
    if (_resp.status === 401 || _resp.status === 403) {
      throw new Error('Please sign in first — PowerPoint import needs a signed-in designer account.');
    }
    if (!_resp.ok) throw new Error('Import service error (' + _resp.status + '). Please try again in a moment.');
    var deckIR = await _resp.json();
    window._deckIR = deckIR;

    /* Collect the deck's font names and load matching webfonts BEFORE the
       first render, so imported text displays and wraps in its true fonts. */
    try {
      var _fontSet = {};
      deckIR.slides.forEach(function (s) { (s.elements || []).forEach(function (e) {
        if (e.type === 'text' && e.paragraphs) e.paragraphs.forEach(function (p) { (p.runs || []).forEach(function (r) { if (r.font) _fontSet[r.font] = 1; }); });
      }); });
      var _fontNames = Object.keys(_fontSet);
      if (window.loadDeckFonts && _fontNames.length) {
        showToast('Loading fonts…');
        await new Promise(function (res) { window.loadDeckFonts(_fontNames, res); });
      }
    } catch (e) { console.warn('font preload skipped', e); }

    // Replace the page list wholesale: one page per parsed slide, each
    // holding a reference to its IR (rendered fresh the first time it's
    // visited) so blank "add page" slides can coexist without index drift.
    state.pages = deckIR.slides.map(function (slideIR, i) { return Object.assign(makeBlankPage(Date.now() + i), { ir: slideIR }); });
    state.notes = state.pages.map(function () { return ''; });
    state.currentPage = 0;

    setSlideAspect(deckIR.size.w, deckIR.size.h);
    await loadPageIntoCanvas(0);

    /* ---- loss report: the engine says out loud what it changed/skipped ---- */
    var totalEls = deckIR.slides.reduce(function (a, s) { return a + s.elements.length; }, 0);
    if (deckIR.report && deckIR.report.length) {
      var items = deckIR.report.map(function (r) { return r.kind + ' (slide ' + r.slide + ')'; }).join(', ');
      showToast('Imported ' + deckIR.slides.length + ' slides / ' + totalEls + ' elements. Notes: ' + items, 10000);
      console.warn('Import loss report:', deckIR.report);
    } else {
      showToast('Imported ' + deckIR.slides.length + ' slides / ' + totalEls + ' elements — nothing lost', 4000);
    }
    // Thumbnails are generated LAZILY: a numbered placeholder shows until a
    // slide is first visited, at which point switchPage()/captureCurrentPage()
    // snapshots it. This avoids flicker from eagerly re-rendering every slide
    // over the one visible canvas. Capture slide 0's thumb now since it won't
    // otherwise get "left" until the user navigates away from it.
    try { state.pages[0].thumb = fc.toDataURL({ format: 'png', multiplier: 0.08 }); } catch (e) { /* ignore */ }

    renderPageThumbs();
    showToast('Loaded ' + state.pages.length + ' slide(s) ✓');
  } catch (e) {
    console.error('PPTX import failed:', e);
    /* Our thrown messages are already user-friendly; only prefix the raw
       low-level ones (e.g. JSON parse) so the dialog still makes sense. */
    var msg = /sign in|internet|import service|reach the import/i.test(e.message)
      ? e.message
      : 'Could not import this PowerPoint file: ' + e.message;
    alert(msg);
    showToast('PPTX import failed');
  }
}

      case 'anim-up':    animReorder(-1); break;
      case 'anim-down':  animReorder(1); break;
      case 'trans-set':  transSet(action.dataset.t); break;

      case 'page-rename':      pageRenameAt(+action.dataset.i); break;
      case 'page-dup-i':       pageDuplicateAt(+action.dataset.i); break;
      case 'page-del-i':       pageDeleteAt(+action.dataset.i); break;
      case 'page-dup':         pageDuplicateAt(state.currentPage); break;
      case 'page-del':         pageDeleteAt(state.currentPage); break;
      case 'page-section':     pageAddSection(); break;
      case 'page-sec-rename':  pageSectionRename(+action.dataset.i); break;
      case 'page-sec-remove':  pageSectionRemove(+action.dataset.i); break;
      case 'page-sec-toggle': {
        var sk = action.dataset.sec || '_none';
        _sectionCollapsed[sk] = !_sectionCollapsed[sk];

        break;
      }
      case 'layer-select': layerSelect(action.dataset.lid); break;
      case 'layer-vis':    layerToggleVis(action.dataset.lid); break;
      case 'layer-lock':   layerToggleLock(action.dataset.lid); break;
      case 'layer-rename': layerRename(action.dataset.lid); break;
      case 'layer-up':     layerMove(1); break;
      case 'layer-down':   layerMove(-1); break;

      case 'layer-ungroup':layerUngroup(); break;

      }
      case 'proj-save':    projSaveCurrent(false); break;
      case 'proj-saveas':  projSaveCurrent(true); break;
      case 'proj-open':    projOpen(action.dataset.id); break;
      case 'proj-dup':     projDuplicate(action.dataset.id); break;
      case 'proj-rename':  projRename(action.dataset.id); break;
      case 'proj-move':    projMove(action.dataset.id); break;
      case 'proj-star':    projToggle(action.dataset.id, 'starred'); break;
      case 'proj-share':   projToggle(action.dataset.id, 'shared'); break;
      case 'proj-del':     projRemove(action.dataset.id); break;
      case 'brand-apply':      brandApplyToSlide(); break;
      case 'brand-learn':      brandSaveFromSlide(); break;
      case 'brand-add-logo':   dom.brandLogoInput && dom.brandLogoInput.click(); break;
      case 'brand-use-logo':   brandInsertLogo(action.dataset.id); break;
      case 'brand-add-colour': brandAddColour(); break;
      case 'brand-use-colour': brandApplyColour(action.dataset.c); break;
      case 'brand-save-tpl':   brandSaveTemplate(); break;
      case 'brand-use-tpl':    brandUseTemplate(action.dataset.id); break;
      case 'brand-del':        brandRemove(action.dataset.kind, action.dataset.id); break;
      case 'grid-autofill':
        dom.autofillInput && dom.autofillInput.click();
        break;
      case 'frame-crop':       frameCropStart(); break;
      case 'frame-crop-in':    frameCropZoom(1); break;
      case 'frame-crop-out':   frameCropZoom(-1); break;
      case 'frame-crop-reset': frameCropReset(); break;
      case 'frame-crop-done':  frameCropEnd(); break;
      case 'add-sticker':
        addSticker(+action.dataset.sticker);
        break;
      case 'fav-sticker':
        stickerToggleFav(STICKER_LIB[+action.dataset.sticker].n);
        renderPanelContent('stickers');
        break;
      case 'add-illo':
        addIllustration(+action.dataset.illo);
        break;
      case 'fav-illo':
        illoToggleFav(ILLO_LIB[+action.dataset.illo].n);
        renderPanelContent('illustrations');
        break;
      case 'illo-palette':
        _illoPalette = +action.dataset.i;
        renderPanelContent('illustrations');
        break;
      case 'illo-next':  cycleIllustrationColour(1); break;
      case 'illo-prev':  cycleIllustrationColour(-1); break;
      case 'icon-replace':  startIconReplace(); break;
      case 'icon-colour':   setIconColour(); break;
      case 'icon-thinner':  setIconWeight(-1); break;
      case 'icon-thicker':  setIconWeight(1); break;
      case 'add-chart':
        addChart(action.dataset.chart);
        break;
      case 'set-bg-solid':
        applyBgSolid(action.dataset.c);
        break;
      case 'set-bg-grad':
        applyBgGradient(+action.dataset.i);
        break;
      case 'set-bg-pat':
        applyBgPattern(+action.dataset.i);
        break;
      case 'set-bg-custom': {
        var bgc = prompt('Background colour (hex):', '#FFFFFF');
        if (bgc) applyBgSolid(bgc);
        break;
      }
      case 'add-text':
        addText(action.dataset.type);
        break;
      case 'upload-image':
        dom.uploadImgInput.click();
        break;
      case 'upload-pptx':
        dom.uploadPptxInput.click();
        break;
      case 'undo':
        doUndo();
        break;
      case 'redo':
        doRedo();
        break;
    }
  });

  // --- Upload inputs ---
  dom.uploadImgInput.addEventListener('change', () => handleUploadImg(dom.uploadImgInput));
  dom.uploadPptxInput.addEventListener('change', () => handlePPTXUpload(dom.uploadPptxInput));
  if (dom.autofillInput) dom.autofillInput.addEventListener('change', () => gridAutoFill(dom.autofillInput));
  if (dom.brandLogoInput) dom.brandLogoInput.addEventListener('change', () => brandAddLogo(dom.brandLogoInput));
  if (dom.dataCsvInput)  dom.dataCsvInput.addEventListener('change', () => dataUploadCsv(dom.dataCsvInput));
  if (dom.dataXlsxInput) dom.dataXlsxInput.addEventListener('change', () => dataUploadXlsx(dom.dataXlsxInput));
  /* brand font pickers live inside the panel, so listen on the container */
  dom.panelContent.addEventListener('change', (e) => {
    const sel = e.target.closest('[data-brandfont]');
    if (sel) { brandSetFont(sel.dataset.brandfont, sel.value); return; }
    const th = e.target.closest('[data-themefont]');
    if (th) themeSetFont(th.dataset.themefont, th.value);
  });
  /* presenter notes write straight into the shared notes state */
  dom.panelContent.addEventListener('input', (e) => {
    if (e.target && e.target.id === 'pres-note') presNoteSet(e.target.value);
  });
  /* animation + effect sliders: live while dragging */
  dom.panelContent.addEventListener('input', (e) => {
    const r = e.target.closest('[data-animrange]');
    if (r) {
      const kind = r.dataset.animrange;
      if (kind === 'trans') transSetMs(r.value);
      else animSetTiming(kind === 'ms' ? 'animMs' : 'animDelay', r.value);
      return;
    }
    const fx = e.target.closest('[data-fx]');
    if (fx) {
      const key = fx.dataset.fx;
      const v = parseFloat(fx.value);
      /* "~name" = top-level fx key, "group.key" = nested */
      if (key.charAt(0) === '~') fxParam(null, key.slice(1), v);
      else { const p = key.split('.'); fxParam(p[0], p[1], v); }
      /* update the printed value without rebuilding mid-drag */
      const lbl = fx.previousElementSibling;
      if (lbl && lbl.classList.contains('brand-lbl')) {
        lbl.textContent = lbl.textContent.replace(/ — .*$/, '') + ' — ' + v;
      }
    }
  });

  // --- Dropdown items ---
  document.addEventListener('click', e => {
    const item = e.target.closest('[data-share]');
    if (item) {
      if (item.dataset.share === 'download') {
        exportCanvasPNG();
        closeDropdowns();
        return;
      }
      if (item.dataset.share === 'pptx') {
        exportPptxFile();
        closeDropdowns();
        return;
      }
      /* these used to only claim to work — now they actually do */
      if (item.dataset.share === 'link') {
        const url = location.href.split('#')[0];
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url)
            .then(() => showToast('Editor link copied'))
            .catch(() => showToast('Could not copy — copy it from the address bar'));
        } else showToast('Clipboard unavailable — copy from the address bar');
        closeDropdowns();
        return;
      }
      if (item.dataset.share === 'email') {
        const subject = encodeURIComponent('Presentation');
        const body = encodeURIComponent('Here is the editor link:\n\n' + location.href.split('#')[0]
          + '\n\nTo send the deck itself, download it first and attach the file.');
        location.href = 'mailto:?subject=' + subject + '&body=' + body;
        closeDropdowns();
        return;
      }
      showToast('Action triggered');
      closeDropdowns();
      return;
    }
    const more = e.target.closest('[data-more]');
    if (more) {
      const msgs = { new: 'New design dialog would open', open: 'Open file dialog would open', settings: 'Settings panel would open', shortcuts: 'Keyboard shortcuts reference would open', help: 'Help center would open' };
      showToast(msgs[more.dataset.more] || 'Action triggered');
      closeDropdowns();
    }
  });

  // --- Close dropdowns on outside click ---
  document.addEventListener('click', e => {
    if (state.openDropdown && !e.target.closest('[data-action="share"]') && !e.target.closest('#share-dropdown') && !e.target.closest('[data-action="more-menu"]') && !e.target.closest('#more-dropdown') && !e.target.closest('[data-action="upload-menu"]') && !e.target.closest('#upload-dropdown')) {
      closeDropdowns();
    }
  });

  // --- Sidebar Tool Buttons ---
  dom.sidebarRail.addEventListener('click', e => {
    const btn = e.target.closest('.tool-btn');
    if (btn) selectTool(btn.dataset.tool);
  });

  // --- Panel Tabs ---
  dom.panelTabs.addEventListener('click', e => {
    const tab = e.target.closest('.panel-tab');
    if (!tab) return;
    const tabName = tab.dataset.ptab;
    $$('.panel-tab', dom.panelTabs).forEach(t => t.classList.toggle('active', t === tab));
    const data = panelData[state.activeTool];
    if (data) { data.activeTab = tabName; renderPanelContent(state.activeTool); }
  });

  // --- Panel Search ---
  dom.panelSearch.addEventListener('input', () => {
    const query = dom.panelSearch.value.toLowerCase().trim();
    if (!query) { renderPanelContent(state.activeTool); return; }
    /* icons search their whole library, not just the open category */
    if (state.activeTool === 'icons') {
      dom.panelContent.innerHTML = renderIconSearch(query);
      return;
    }
    // Simple filter: hide non-matching cards
    $$('.template-card, .element-card, .text-option', dom.panelContent).forEach(card => {
      const text = card.textContent.toLowerCase();
      card.style.display = text.includes(query) ? '' : 'none';
    });
  });

  // --- Canvas: Click slide to select ---
  dom.slideFrame.addEventListener('click', e => {
    e.stopPropagation();
    selectSlide(true);
  });
  dom.canvasArea.addEventListener('click', e => {
    if (e.target === dom.canvasArea || e.target === dom.canvasViewport) {
      selectSlide(false);
    }
  });

  // --- Canvas: Ctrl+Scroll to zoom ---
  dom.canvasArea.addEventListener('wheel', e => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -5 : 5;
      setZoom(state.zoom + delta);
    }
  }, { passive: false });

  // --- Page Thumbnails ---
  dom.pageThumbs.addEventListener('click', e => {
    const thumb = e.target.closest('.page-thumb');
    if (thumb) switchPage(parseInt(thumb.dataset.page));
  });

  // --- Zoom Controls ---
  $('[data-zoom="in"]').addEventListener('click', () => setZoom(state.zoom + 10));
  $('[data-zoom="out"]').addEventListener('click', () => setZoom(state.zoom - 10));
  /* the fit-screen icon was removed from the bottom bar; Fit page lives in
     ribbon View. Bind only if the button is present. */
  const fitBtn = $('[data-zoom="fit"]');
  if (fitBtn) fitBtn.addEventListener('click', () => setZoom(calculateFitZoom()));
  dom.zoomSlider.addEventListener('input', () => setZoom(parseInt(dom.zoomSlider.value)));

  // --- Timer ---
  dom.timerToggle.addEventListener('click', toggleTimer);
  dom.timerReset.addEventListener('click', resetTimer);

  // --- Notes auto-save ---
  dom.notesTextarea.addEventListener('input', () => {
    state.notes[state.currentPage] = dom.notesTextarea.value;
  });

  // --- Keyboard Shortcuts ---
  document.addEventListener('keydown', e => {
    // Don't trigger when typing in inputs / contenteditable
    if (e.target.matches('input, textarea, [contenteditable]')) {
      if (e.key === 'Escape') e.target.blur();
      return;
    }
    // Don't trigger while a Fabric IText is being edited on the canvas
    if (fc && fc.getActiveObject() && fc.getActiveObject().isEditing) {
      return;
    }

    const ctrl = e.ctrlKey || e.metaKey;

    if (ctrl && (e.key === 'z' || e.key === 'Z')) { e.preventDefault(); doUndo(); return; }
    if (ctrl && (e.key === 'y' || e.key === 'Y')) { e.preventDefault(); doRedo(); return; }
    if (ctrl && (e.key === 'c' || e.key === 'C')) { ctxCopy(); return; }
    if (ctrl && (e.key === 'v' || e.key === 'V')) { ctxPaste(); return; }
    if (ctrl && (e.key === 'd' || e.key === 'D')) { e.preventDefault(); ctxDuplicate(); return; }

    switch (e.key) {
      case 'Escape':
        if (state.openDropdown) closeDropdowns();
        else if (_sciss) stopScissorMode(false);
        else if (dom.ctxMenu.classList.contains('open')) dom.ctxMenu.classList.remove('open');
        else if (state.notesOpen) toggleNotes();
        else if (state.activeTool) closePanel();
        else selectSlide(false);
        break;
      case 'Delete':
      case 'Backspace': {
        const activeObj = fc && fc.getActiveObject();
        if (activeObj) {
          fc.remove(activeObj);
          fc.discardActiveObject();
          fc.renderAll();
          saveState();
        } else if (state.slideSelected) {
          deletePage();
          selectSlide(false);
        }
        break;
      }
      case '+':
      case '=':
        if (ctrl) { e.preventDefault(); setZoom(state.zoom + 10); }
        break;
      case '-':
        if (ctrl) { e.preventDefault(); setZoom(state.zoom - 10); }
        break;
      case '0':
        if (ctrl) { e.preventDefault(); setZoom(calculateFitZoom()); }
        break;
      case 'ArrowLeft':
        if (state.currentPage > 0) switchPage(state.currentPage - 1);
        break;
      case 'ArrowRight':
        if (state.currentPage < state.pages.length - 1) switchPage(state.currentPage + 1);
        break;
    }
  });

  // --- Window Resize: Recalculate fit zoom ---
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      // Keep current zoom but update if it was "fit"
    }, 200);
  });
}

/* ============================================
   INITIALIZATION
   ============================================ */
function init() {
  initFabric();
  renderSidebarTools();
  ensurePageHistory(0); // seed page 0's per-page undo stack with the blank canvas
  renderPageThumbs();
  setZoom(Math.max(62, calculateFitZoom())); /* open at 62% minimum */
  initEvents();

  // Add a second page for demo purposes
  state.pages.push(makeBlankPage(2));
  state.notes.push('');
  renderPageThumbs();
}

// Start the app
init();

</script>

  ready(function () {

    /* ---------- 1. Ribbon ---------- */
    initRibbon();

    /* ---------- 1b. Drag an illustration onto the slide ---------- */
    (function () {
      var panel = document.getElementById('panel-content');
      var frame = document.getElementById('slide-frame');
      if (!panel || !frame) return;
      var dragIdx = null;

      var dragKind = null, dragFrame = null;
      panel.addEventListener('dragstart', function (e) {
        var card = e.target.closest('[data-illo], [data-sticker], [data-frame]');
        if (!card) return;
        if (card.dataset.frame != null) {
          dragKind = 'frame'; dragFrame = card.dataset.frame; dragIdx = 0;
        } else {
          dragKind = card.dataset.illo != null ? 'illo' : 'sticker';
          dragIdx = +(card.dataset.illo != null ? card.dataset.illo : card.dataset.sticker);
        }
        e.dataTransfer.effectAllowed = 'copy';
        try { e.dataTransfer.setData('text/plain', dragKind + ':' + dragIdx); } catch (err) {}
        var svg = card.querySelector('svg');
        if (svg && e.dataTransfer.setDragImage) e.dataTransfer.setDragImage(svg, 39, 39);
      });
      panel.addEventListener('dragend', function () { dragIdx = null; dragKind = null; });

      frame.addEventListener('dragover', function (e) {
        if (dragIdx === null) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
        frame.classList.add('drop-target');
      });
      frame.addEventListener('dragleave', function () { frame.classList.remove('drop-target'); });

      frame.addEventListener('drop', function (e) {
        frame.classList.remove('drop-target');
        if (dragIdx === null || !fc) return;
        e.preventDefault();
        /* drop point → canvas coordinates, so it lands under the cursor */
        var r = fc.upperCanvasEl.getBoundingClientRect();
        var z = fc.getZoom();
        var x = (e.clientX - r.left) / z, y = (e.clientY - r.top) / z;
        if (dragKind === 'frame')        addFrame(dragFrame, x, y);
        else if (dragKind === 'sticker') addSticker(dragIdx, x, y);
        else                             addIllustration(dragIdx, x, y);
        dragIdx = null; dragKind = null; dragFrame = null;
      });
    })();

    /* ---------- 1c. Drag layer rows to restack ---------- */
    (function () {
      var panel = document.getElementById('panel-content');
      if (!panel) return;
      var fromIdx = null, fromEl = null;

      var SEL = '.layer-row[data-lidx], .page-card[data-pidx]';
      var kind = null;

      panel.addEventListener('dragstart', function (e) {
        var row = e.target.closest(SEL);
        if (!row) return;
        kind = row.dataset.lidx != null ? 'layer' : 'page';
        fromIdx = +(kind === 'layer' ? row.dataset.lidx : row.dataset.pidx);
        fromEl = row;
        row.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        try { e.dataTransfer.setData('text/plain', kind + ':' + fromIdx); } catch (err) {}
      });

      panel.addEventListener('dragover', function (e) {
        if (fromIdx === null) return;
        var row = e.target.closest(SEL);
        if (!row || row === fromEl) return;
        e.preventDefault();
        panel.querySelectorAll(SEL).forEach(function (n) {
          n.classList.remove('drop-above', 'drop-below');
        });
        var b = row.getBoundingClientRect();
        row.classList.add(e.clientY < b.top + b.height / 2 ? 'drop-above' : 'drop-below');
      });

      panel.addEventListener('drop', function (e) {
        if (fromIdx === null) return;
        var row = e.target.closest(SEL);
        if (!row) return;
        e.preventDefault();
        var overIdx = +(kind === 'layer' ? row.dataset.lidx : row.dataset.pidx);
        var b = row.getBoundingClientRect();
        var above = e.clientY < b.top + b.height / 2;

        if (kind === 'layer') {
          /* the layer list is drawn front-to-back, so "above" in the list
             means a HIGHER fabric index */
          var dest = above ? overIdx + 1 : overIdx;
          if (dest > fromIdx) dest -= 1;
          layerReorder(fromIdx, dest);
        } else {
          /* the page list reads top-to-bottom, same direction as the array */
          pageReorder(fromIdx, above ? overIdx : overIdx + 1);
        }
        fromIdx = null; fromEl = null; kind = null;
      });

      panel.addEventListener('dragend', function () {
        panel.querySelectorAll('.layer-row, .page-card').forEach(function (n) {
          n.classList.remove('dragging', 'drop-above', 'drop-below');
        });
        fromIdx = null; fromEl = null; kind = null;
      });
    })();

    /* ---------- 2. Resizable side panel ---------- */
    var grip  = document.getElementById('panel-resize');
    var panel = document.getElementById('side-panel');
    var MINW = 240, MAXW = 520;

    try {
      var savedW = parseInt(localStorage.getItem('ld_panel_w'), 10);
      if (savedW >= MINW && savedW <= MAXW) {
        document.documentElement.style.setProperty('--panel-w', savedW + 'px');
      }
    } catch (e) {}

    if (grip && panel) {
      var dragging = false;
      grip.addEventListener('mousedown', function (e) {
        dragging = true;
        grip.classList.add('dragging');
        document.body.classList.add('ld-resizing');
        e.preventDefault();
      });
      document.addEventListener('mousemove', function (e) {
        if (!dragging) return;
        var w = Math.max(MINW, Math.min(MAXW, e.clientX - panel.getBoundingClientRect().left));
        document.documentElement.style.setProperty('--panel-w', w + 'px');
      });
      document.addEventListener('mouseup', function () {
        if (!dragging) return;
        dragging = false;
        grip.classList.remove('dragging');
        document.body.classList.remove('ld-resizing');
        try {
          localStorage.setItem('ld_panel_w',
            parseInt(getComputedStyle(panel).width, 10) || 300);
        } catch (e) {}
        if (typeof calculateFitZoom === 'function' && typeof setZoom === 'function') {
          setZoom(calculateFitZoom());
        }
        window.dispatchEvent(new Event('resize'));
      });
      // double-click the grip resets to the default width
      grip.addEventListener('dblclick', function () {
        document.documentElement.style.setProperty('--panel-w', '300px');
        try { localStorage.setItem('ld_panel_w', 300); } catch (e) {}
        window.dispatchEvent(new Event('resize'));
      });
    }

    /* ---------- 3. Page thumbnails: duplicate / delete ---------- */
    var strip = document.getElementById('page-thumbs');
    if (strip) strip.addEventListener('click', function (e) {
      var act = e.target.closest('[data-pt]');
      if (!act) return;
      e.stopPropagation();          // don't also switch page
      var i = parseInt(act.dataset.page, 10);

      if (act.dataset.pt === 'del') {
        if (state.pages.length <= 1) { showToast('Cannot delete the last slide'); return; }
        (async function () {
          if (i !== state.currentPage) { await switchPage(i); }
          await deletePage();
        })();
        return;
      }

      if (act.dataset.pt === 'dup') {
        if (state.pages.length >= 40) { showToast('Maximum 40 slides allowed'); return; }
        (async function () {
          if (i !== state.currentPage) await switchPage(i);
          captureCurrentPage();
          var src  = state.pages[state.currentPage];
          var copy = makeBlankPage(Date.now());
          // deep-copy the serialized canvas so the two slides stay independent
          copy.canvasJSON = src.canvasJSON ? JSON.parse(JSON.stringify(src.canvasJSON)) : null;
          copy.ir         = src.ir ? JSON.parse(JSON.stringify(src.ir)) : null;
          copy.thumb      = src.thumb;
          state.pages.splice(state.currentPage + 1, 0, copy);
          state.notes.splice(state.currentPage + 1, 0, state.notes[state.currentPage] || '');
          state.currentPage = state.currentPage + 1;
          await loadPageIntoCanvas(state.currentPage);
          renderPageThumbs();
          showToast('Slide duplicated');
        })();
      }
    }, true);

    /* ---------- 4. Page thumbnails: drag to reorder ---------- */
    if (strip) {
      var fromIdx = null;

      strip.addEventListener('dragstart', function (e) {
        var t = e.target.closest('.page-thumb');
        if (!t) return;
        fromIdx = parseInt(t.dataset.page, 10);
        t.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        try { e.dataTransfer.setData('text/plain', String(fromIdx)); } catch (err) {}
      });

      strip.addEventListener('dragover', function (e) {
        var t = e.target.closest('.page-thumb');
        if (fromIdx === null || !t) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        var r = t.getBoundingClientRect();
        var after = (e.clientX - r.left) > r.width / 2;
        strip.querySelectorAll('.page-thumb').forEach(function (n) {
          n.classList.remove('drop-before', 'drop-after');
        });
        t.classList.add(after ? 'drop-after' : 'drop-before');
      });

      function clearMarks() {
        strip.querySelectorAll('.page-thumb').forEach(function (n) {
          n.classList.remove('drop-before', 'drop-after', 'dragging');
        });
      }

      strip.addEventListener('dragleave', function (e) {
        var t = e.target.closest('.page-thumb');
        if (t) t.classList.remove('drop-before', 'drop-after');
      });

      strip.addEventListener('drop', function (e) {
        var t = e.target.closest('.page-thumb');
        if (fromIdx === null || !t) { clearMarks(); fromIdx = null; return; }
        e.preventDefault();
        var overIdx = parseInt(t.dataset.page, 10);
        var r = t.getBoundingClientRect();
        var toIdx = overIdx + (((e.clientX - r.left) > r.width / 2) ? 1 : 0);
        clearMarks();

        if (toIdx === fromIdx || toIdx === fromIdx + 1) { fromIdx = null; return; }

        captureCurrentPage();
        var wasCurrent = state.pages[state.currentPage];

        var pg = state.pages.splice(fromIdx, 1)[0];
        var nt = state.notes.splice(fromIdx, 1)[0];
        var dest = toIdx > fromIdx ? toIdx - 1 : toIdx;
        state.pages.splice(dest, 0, pg);
        state.notes.splice(dest, 0, nt);

        state.currentPage = state.pages.indexOf(wasCurrent);
        if (state.currentPage < 0) state.currentPage = dest;

        renderPageThumbs();
        showToast('Slide moved to position ' + (dest + 1));
        fromIdx = null;
      });

      strip.addEventListener('dragend', function () { clearMarks(); fromIdx = null; });
    }

  });
})();

};

  try {
