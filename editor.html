    "Melodrama",
    "Kohinoor Zerone",
    "New Title",
    "Aktura",
    "Alpino",
    "Amulya",
    "Array",
    "Author",
    "Bespoke Sans",
    "Bespoke Serif",
    "Bespoke Slab",
    "Clash Grotesk",
    "Clash Display",
    "Chubbo",
    "Chillax",
    "Cabinet Grotesk",
    "Britney",
    "Bonny",
    "Bevellier",
    "Pencerio",
    "Erode",
    "Panchang",
    "Pally",
    "Roundo",
    "Kola",
    "Excon",
    "Neco",
    "Nippo",
    "Hoover",
    "Stardom",
    "Segment",
    "Telma",
    "Trench Slab",
    "Ranade",
    "Rosaline",
    "Plein",
    "Recia",
    "Sharpie",
    "Quilon",
    "Satoshi",
    "Zodiak",
    "Rx 100",
    "Styro",
    "Zina",
    "Supreme",
    "Paquito",
    "Pramukh Rounded"
  ];

  var ALL_FONTS = SYSTEM_FONTS.concat(GOOGLE_FONTS).map(function(n){
    return { name:n, system: SYSTEM_FONTS.indexOf(n) !== -1 };
  });
  FONTSHARE_FONTS.forEach(function(n){
    if (!ALL_FONTS.some(function(f){ return f.name.toLowerCase() === n.toLowerCase(); })) {
      ALL_FONTS.push({ name:n, system:false, fs:true });
    }
  });

  /* engine consults this to avoid stripping style words that are part of a
     REAL family name ("Archivo Black") during font normalization */
  window.LAZYDOG_FONT_LIB = ALL_FONTS.map(function(f){ return f.name.toLowerCase(); });

  var _loaded = {};
  function ensureFontLoaded(fontObj, cb){
    if (!fontObj || fontObj.system || _loaded[fontObj.name]) { cb && cb(); return; }
    var linkId = 'ffab-gf-' + fontObj.name.replace(/\s+/g,'-');
    if (document.getElementById(linkId)) { _loaded[fontObj.name] = true; cb && cb(); return; }
    var link = document.createElement('link');
    link.id = linkId;
    link.rel = 'stylesheet';
    link.href = fontObj.fs
      ? 'https://api.fontshare.com/v2/css?f[]=' + fontObj.name.toLowerCase().replace(/\s+/g,'-') + '&display=swap'
      : 'https://fonts.googleapis.com/css2?family=' +
        encodeURIComponent(fontObj.name).replace(/%20/g,'+') +
        ':wght@300;400;500;600;700&display=swap';
    link.onload = function(){
      _loaded[fontObj.name] = true;
      if (document.fonts && document.fonts.load) {
        document.fonts.load('16px "' + fontObj.name + '"').then(function(){ cb && cb(); }).catch(function(){ cb && cb(); });
      } else { cb && cb(); }
    };
    link.onerror = function(){ cb && cb(); };
    document.head.appendChild(link);
  }

  /* Auto-load every font an imported deck uses (import flow calls this
     BEFORE first render, so text draws and wraps with its true face). */
  window.loadDeckFonts = function(names, done){
    var todo = [];
    (names || []).forEach(function(n){
      if (!n) return;
      var f = ALL_FONTS.find(function(x){ return x.name.toLowerCase() === String(n).toLowerCase(); });
      if (f && !f.system) todo.push(f);
    });
    if (!todo.length) { done && done(); return; }
    var left = todo.length, fired = false;
    function one(){ left--; if (left <= 0 && !fired) { fired = true; done && done(); } }
    todo.forEach(function(f){ ensureFontLoaded(f, one); });
    setTimeout(function(){ if (!fired) { fired = true; done && done(); } }, 4000); /* never block an import on a slow font CDN */
  };

  /* canvas px ↔ PowerPoint pt (the engine sets fc._pxPerPt per deck) */
  function pxPerPt(){ return (window.fc && window.fc._pxPerPt) || 2; }
  function toPt(px){ return Math.round(px / pxPerPt() * 10) / 10; }
  function toPx(pt){ return pt * pxPerPt(); }

  function isTextObject(o){
    return !!o && (o.type === 'i-text' || o.type === 'textbox' || o.type === 'text');
  }

  function currentTextObject(){
    return window.fc && window.fc.getActiveObject ? window.fc.getActiveObject() : null;
  }

  /* Imported text keeps its REAL formatting in per-character styles, which
     override object-level props — reading obj.fontSize alone always showed
     Fabric's default (16). Read the first defined char style instead. */
  function effectiveTextProp(obj, prop, dflt){
    if (obj && obj.styles) {
      var lis = Object.keys(obj.styles);
      for (var i = 0; i < lis.length; i++) {
        var cis = Object.keys(obj.styles[lis[i]]);
        for (var j = 0; j < cis.length; j++) {
          var v = obj.styles[lis[i]][cis[j]][prop];
          if (v !== undefined && v !== null) return v;
        }
      }
    }
    return (obj && obj[prop] !== undefined && obj[prop] !== null) ? obj[prop] : dflt;
  }

  function buildPanelHTML(){
    var obj = currentTextObject();
    var hasText = isTextObject(obj);
    var currentFont = hasText ? String(effectiveTextProp(obj, 'fontFamily', '')).split(',')[0].trim() : '';
    var currentSize = hasText ? toPt(effectiveTextProp(obj, 'fontSize', 16)) : 16;
    var fw = hasText ? effectiveTextProp(obj, 'fontWeight', 'normal') : 'normal';
    var isBold = hasText && (fw === 'bold' || fw === 700 || fw === '700');
    var isItalic = hasText && effectiveTextProp(obj, 'fontStyle', 'normal') === 'italic';
    var isUnderline = hasText && !!effectiveTextProp(obj, 'underline', false);

    var html = '<div id="font-fab-sizerow">' +
      '<label>Size</label>' +
      '<button class="font-fab-step" type="button" data-fs-step="-1">−</button>' +
      '<input type="number" id="font-fab-size-input" min="1" max="999" step="0.1" value="' + currentSize + '">' +
      '<button class="font-fab-step" type="button" data-fs-step="1">+</button>' +
      '<button class="font-fab-style' + (isBold ? ' font-fab-style-active' : '') + '" type="button" data-style-toggle="bold" title="Bold" aria-pressed="' + isBold + '"><b>B</b></button>' +
      '<button class="font-fab-style' + (isItalic ? ' font-fab-style-active' : '') + '" type="button" data-style-toggle="italic" title="Italic" aria-pressed="' + isItalic + '"><i>I</i></button>' +
      '<button class="font-fab-style' + (isUnderline ? ' font-fab-style-active' : '') + '" type="button" data-style-toggle="underline" title="Underline" aria-pressed="' + isUnderline + '"><u>U</u></button>' +
      '<span id="font-fab-hint">' + (hasText ? '' : 'Select text') + '</span>' +
      '</div>';

    /* Font-identity box (like PowerPoint's font field): shows the EXACT font
       name the selected text carries, plus whether the engine can actually
       render it — so a silent fallback substitution is visible instantly. */
    if (hasText) {
      var inLib = ALL_FONTS.some(function(f){ return f.name.toLowerCase() === currentFont.toLowerCase(); });
      var avail = false;
      try { avail = !!(currentFont && document.fonts && document.fonts.check && document.fonts.check('16px "' + currentFont + '"')); } catch(err){}
      var status, sColor;
      if (inLib && avail)       { status = 'In library — rendering correctly';            sColor = '#059669'; }
      else if (!inLib && avail) { status = 'Not in library — rendered by system font';    sColor = '#B45309'; }
      else if (inLib && !avail) { status = 'In library — not loaded yet';                 sColor = '#B45309'; }
      else                      { status = 'MISSING — browser fallback font in use';      sColor = '#DC2626'; }
      html += '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:0 0 10px 0;margin-bottom:10px;border-bottom:1px solid var(--border,#E2E8F0);">' +
        '<label style="font-size:12px;font-weight:600;color:var(--text-secondary,#64748B);flex:0 0 auto;">Font</label>' +
        '<input readonly id="font-fab-name" value="' + (currentFont || '(none)').replace(/"/g,'&quot;') + '" style="flex:1;min-width:90px;padding:5px 8px;border:1px solid var(--border,#E2E8F0);border-radius:6px;font-size:12px;color:var(--text-primary,#0F172A);background:#FAFAFA;outline:none;">' +
        '<span style="flex-basis:100%;font-size:11px;font-weight:600;color:' + sColor + ';">' + status + '</span>' +
        '</div>';
    }

    if (!hasText) {
      html += '<div id="font-fab-nosel">Click a text box on the slide to choose its font and size here.</div>';
    }

    for (var i = 0; i < ALL_FONTS.length; i++) {
      var f = ALL_FONTS[i];
      var active = (f.name === currentFont) ? ' font-fab-active' : '';
      html += '<div class="text-option font-fab-item' + active + '" data-action="apply-font" data-font="' + f.name.replace(/"/g,'&quot;') + '" style="animation-delay:' + Math.min(i * 0.01, 0.3) + 's">' +
        '<div class="text-preview" style="font-family:\'' + f.name + '\', sans-serif;">' + f.name + '</div>' +
        '<div class="text-meta">' + (f.system ? 'System font' : (f.fs ? 'Fontshare font' : 'Google font')) + '</div>' +
      '</div>';
    }
    return html;
  }

  function refreshPanelIfOpen(){
    /* state/dom are top-level `const` in the engine — consts never become
       window properties, so window.state was always undefined and this
       refresh silently never ran (panel showed stale size until reopened).
       Bare identifiers reach the global lexical scope correctly. */
    if (typeof state !== 'undefined' && state.activeTool === 'fontfab' && typeof dom !== 'undefined' && dom.panelContent) {
      dom.panelContent.innerHTML = buildPanelHTML();
    }
  }

  /* Imported text carries per-character styles (exact run fidelity), and in
     Fabric those OVERRIDE object-level properties. So every font command must
     write through to the char styles too, or imported text ignores it.
     If the user selected a text range while editing, style just the range. */
  function applyTextProps(obj, props){
    if (obj.isEditing && obj.selectionStart !== obj.selectionEnd && typeof obj.setSelectionStyles === 'function') {
      obj.setSelectionStyles(props);
      return;
    }
    obj.set(props);
    if (obj.styles) {
      Object.keys(obj.styles).forEach(function(li){
        Object.keys(obj.styles[li]).forEach(function(ci){
          Object.assign(obj.styles[li][ci], props);
        });
      });
      if (typeof obj.initDimensions === 'function') obj.initDimensions();
    }
  }

  function applyFont(fontName){
    var obj = currentTextObject();
    if (!isTextObject(obj)) { if (typeof showToast === 'function') showToast('Select a text box first'); return; }
    var fontObj = ALL_FONTS.find(function(f){ return f.name === fontName; });
    ensureFontLoaded(fontObj, function(){
      applyTextProps(obj, { fontFamily: fontName + ', sans-serif' });
      window.fc.requestRenderAll();
      if (typeof saveState === 'function') saveState();
      refreshPanelIfOpen();
    });
  }

  function applySize(delta, explicitValue){
    var obj = currentTextObject();
    if (!isTextObject(obj)) { if (typeof showToast === 'function') showToast('Select a text box first'); return; }
    var next; /* all in PowerPoint points */
    if (typeof explicitValue === 'number' && !isNaN(explicitValue)) {
      next = explicitValue;
    } else {
      next = toPt(effectiveTextProp(obj, 'fontSize', 16)) + delta;
    }
    next = Math.max(1, Math.min(999, Math.round(next * 10) / 10));
    applyTextProps(obj, { fontSize: toPx(next) });
    window.fc.requestRenderAll();
    if (typeof saveState === 'function') saveState();
    var input = document.getElementById('font-fab-size-input');
    if (input) input.value = next;
  }

  function applyStyleToggle(kind){
    var obj = currentTextObject();
    if (!isTextObject(obj)) { if (typeof showToast === 'function') showToast('Select a text box first'); return; }
    if (kind === 'bold') {
      var isBold = (obj.fontWeight === 'bold' || obj.fontWeight === 700 || obj.fontWeight === '700');
      applyTextProps(obj, { fontWeight: isBold ? 'normal' : 'bold' });
    } else if (kind === 'italic') {
      applyTextProps(obj, { fontStyle: obj.fontStyle === 'italic' ? 'normal' : 'italic' });
    } else if (kind === 'underline') {
      applyTextProps(obj, { underline: !obj.underline });
    }
    window.fc.requestRenderAll();
    if (typeof saveState === 'function') saveState();
    refreshPanelIfOpen();
  }

  /* ---- Register as a normal sidebar tool (same system as Templates/Elements/Text) ---- */
  function registerTool(){
    if (typeof designTools === 'undefined' || typeof panelData === 'undefined') return false;
    if (designTools.some(function(t){ return t.id === 'fontfab'; })) return true;
    designTools.splice(2, 0, { id: 'fontfab', icon: 'text_fields', label: 'Font' });
    panelData.fontfab = { tabs: null, generate: buildPanelHTML };
    if (typeof renderSidebarTools === 'function') renderSidebarTools();
    return true;
  }

  /* ---- Delegated click handling for our own data-action values ---- */
  document.addEventListener('click', function(e){
    var el = e.target.closest('[data-action="apply-font"]');
    if (el) { applyFont(el.getAttribute('data-font')); return; }
    var step = e.target.closest('[data-fs-step]');
    if (step) { applySize(parseInt(step.getAttribute('data-fs-step'), 10)); return; }
    var styleBtn = e.target.closest('[data-style-toggle]');
    if (styleBtn) { applyStyleToggle(styleBtn.getAttribute('data-style-toggle')); return; }
  });
  document.addEventListener('change', function(e){
    if (e.target && e.target.id === 'font-fab-size-input') {
      applySize(0, parseFloat(e.target.value)); /* parseFloat: "126.4" stays 126.4 (parseInt turned it into garbage) */
    }
  });

  /* ---- Keep the panel in sync with canvas selection while it's open ---- */
  function hookCanvasEvents(){
    if (!window.fc || window.fc._fontFabHooked) return;
    window.fc._fontFabHooked = true;
    window.fc.on('selection:created', refreshPanelIfOpen);
    window.fc.on('selection:updated', refreshPanelIfOpen);
    window.fc.on('selection:cleared', refreshPanelIfOpen);
    window.fc.on('text:editing:entered', refreshPanelIfOpen);
  }

  function init(){
    registerTool();
    var tries = 0;
    var poll = setInterval(function(){
      tries++;
      if (window.fc) { hookCanvasEvents(); clearInterval(poll); }
      if (tries > 200) clearInterval(poll); // ~20s safety cutoff
    }, 100);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

</script>


<!-- ============================================================
     FILL-PLAN RECEIVER v4 (design + Haiku/Sonnet fill + Opus QA)
     Loads the dragged deck, fills single-region by rule, multi-region via
     /smart_fill (Haiku->check->Sonnet), then /qa_deck (Opus) on key pages.
     ============================================================ -->
<script>
/* FILL-PLAN RECEIVER (adapted for split: parse via server) */
(function(){
  var KEY='lazydog_fill_plan';

  function getPlan(){
    try{
      var u=new URLSearchParams(location.search).get('plan');
      if(u) return JSON.parse(decodeURIComponent(u));
      var raw=localStorage.getItem(KEY);
      return raw?JSON.parse(raw):null;
    }catch(e){ return null; }
  }

  function idbGet(key){
    return new Promise(function(res,rej){
      var r=indexedDB.open('lazydog',1);
      r.onupgradeneeded=function(){ try{ r.result.createObjectStore('files'); }catch(e){} };
      r.onsuccess=function(){ try{
        var db=r.result; var tx=db.transaction('files','readonly');
        var g=tx.objectStore('files').get(key);
        g.onsuccess=function(){ res(g.result||null); };
        g.onerror=function(){ rej(g.error); };
      }catch(e){ res(null); } };
      r.onerror=function(){ rej(r.error); };
    });
  }

  function nrm(x){ return (x||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim(); }
  function charsOf(el){ var n=0; (el.paragraphs||[]).forEach(function(pp){ (pp.runs||[]).forEach(function(r){ n+=(r.text||'').length; }); }); return n; }
  function textOfEl(el){ return (el.paragraphs||[]).map(function(pp){ return (pp.runs||[]).map(function(r){return r.text||'';}).join(''); }).join('\n'); }

  function bodyOf(slide){
    var t=(slide.text||'').trim(); if(!t) return '';
    var lines=t.split('\n');
    if(lines.length>1 && nrm(lines[0])===nrm(slide.title||'')) return lines.slice(1).join('\n').trim();
    return t;
  }

  function slideTextEls(ir){
    return (ir.elements||[]).filter(function(e){ return e.type==='text' && e.paragraphs && e.paragraphs.length && e.origin==='slide'; });
  }
  function isMultiRegion(ir){
    var content=slideTextEls(ir).filter(function(e){ return charsOf(e)>=30; });
    return content.length>=2;
  }

  function setElText(el, txt){
    var proto=(el.paragraphs[0]&&el.paragraphs[0].runs&&el.paragraphs[0].runs[0])?el.paragraphs[0].runs[0]:{sizePt:16,color:'#111111'};
    var palign=el.paragraphs[0]?el.paragraphs[0].align:'left';
    var lines=String(txt).split('\n').map(function(l){return l.trim();}).filter(Boolean);
    if(!lines.length) lines=[String(txt)];
    el.paragraphs=lines.map(function(line){ return { align:palign, runs:[ Object.assign({}, proto, {text:line}) ] }; });
  }

  function fillIR(slideIR, slide){
    var ir=JSON.parse(JSON.stringify(slideIR));
    var texts=(ir.elements||[]).filter(function(e){ return e.type==='text' && e.paragraphs && e.paragraphs.length; });
    if(!texts.length) return ir;
    var st=texts.filter(function(e){ return e.origin==='slide'; });
    var pool=st.length?st:texts;
    pool.sort(function(a,b){ return charsOf(b)-charsOf(a); });
    setElText(pool[0], bodyOf(slide));
    return ir;
  }

  async function smartFillSlide(slideIR, slide){
    var ir=JSON.parse(JSON.stringify(slideIR));
    var els=slideTextEls(ir);
    if(els.length<2) return fillIR(slideIR, slide);
    var regions=els.map(function(e){
      var t=textOfEl(e); var c=charsOf(e);
      return { id:e.id, text:t, cap:Math.max(c, 40), kind:(c<25?'label':'content') };
    });
    var res=await fetch((window.LAZYDOG_SMARTFILL_URL||'/smart_fill'),{
      method:'POST', headers:{'content-type':'application/json'},
      body:JSON.stringify({ title:slide.title, buyer:bodyOf(slide), regions:regions })
    });
    if(!res.ok) throw new Error('smart_fill HTTP '+res.status);
    var map=await res.json();
    if(map && map.error) throw new Error(map.error);
    var applied=0;
    els.forEach(function(e){ if(map && map[e.id]!=null && String(map[e.id]).trim()){ setElText(e, map[e.id]); applied++; } });
    if(!applied) throw new Error('no regions returned');
    return ir;
  }

  // pick the KEY pages (cover, first few filled content, closing) for Opus QA
  function pickKeyPages(plan){
    var idxs=[];
    function add(i){ if(i>=0 && i<state.pages.length && idxs.indexOf(i)<0) idxs.push(i); }
    add(0);                                   // cover
    add(state.pages.length-1);                // closing
    var got=0;
    for(var i=0;i<plan.slides.length && got<3;i++){
      var s=plan.slides[i];
      if(s && !s.passthrough && s.text){ add(i); got++; }
    }
    idxs.sort(function(a,b){return a-b;});
    var pages=[];
    idxs.forEach(function(i){
      var pg=state.pages[i]; if(!pg||!pg.ir) return;
      var regions=slideTextEls(pg.ir).map(function(e){ return { id:e.id, text:textOfEl(e) }; });
      if(regions.length) pages.push({ idx:i, title:(plan.slides[i]&&plan.slides[i].title)||'', regions:regions });
    });
    return pages;
  }

  var ENGINE=(window.LAZYDOG_ENGINE_URL)||((window.location&&window.location.origin)||'');
  async function parseViaServer(data){
    var r=await fetch(ENGINE+'/parse',{method:'POST',body:data});
    if(!r.ok) throw new Error('engine /parse '+r.status);
    return await r.json();
  }
  async function loadDeckIR(plan){
    try{ var blob=await idbGet('deck_pptx'); if(blob) return await parseViaServer(blob); }
    catch(e){ console.warn('dragged-deck read failed:', e); }
    var url = plan.pptx_url || ((plan.deck||'deck')+'.pptx');
    var res=await fetch(encodeURI(url));
    if(!res.ok) throw new Error('HTTP '+res.status+' for '+url);
    return await parseViaServer(await res.blob());
  }

  async function applyDesign(plan){
    var deckIR=await loadDeckIR(plan);
    window._deckIR=deckIR;
    try{
      var fset={}; deckIR.slides.forEach(function(sl){ (sl.elements||[]).forEach(function(e){
        if(e.type==='text'&&e.paragraphs) e.paragraphs.forEach(function(pp){ (pp.runs||[]).forEach(function(r){ if(r.font) fset[r.font]=1; }); });
      }); });
      var fn=Object.keys(fset);
      if(window.loadDeckFonts&&fn.length) await new Promise(function(res){ window.loadDeckFonts(fn,res); });
    }catch(e){}

    var pages=[], notes=[], smartJobs=[];
    plan.slides.forEach(function(s,i){
      var src=deckIR.slides[s.source_slide-1];
      var ir;
      if(!src) ir=null;
      else if(s.passthrough||!s.text) ir=src;
      else { ir=fillIR(src,s); if(isMultiRegion(src)) smartJobs.push({index:i, src:src, slide:s}); }
      pages.push(Object.assign(makeBlankPage(Date.now()+i), { ir: ir }));
      notes.push('');
    });
    state.pages=pages; state.notes=notes; state.currentPage=0;
    setSlideAspect(deckIR.size.w, deckIR.size.h);
    await loadPageIntoCanvas(0);
    try{ state.pages[0].thumb=fc.toDataURL({format:'png',multiplier:0.08}); }catch(e){}
    renderPageThumbs();
    var dt=document.querySelector('.doc-title'); if(dt&&plan.deck) dt.textContent=plan.deck;
    window._planApplied=true;
    if(typeof showToast==='function') showToast('Deck ready — placed your content in the real design');

    // Tier 1+2 (Haiku fill, Sonnet fixes flagged) — server-side, per grid slide
    if(smartJobs.length){
      if(typeof showToast==='function') showToast('Refining '+smartJobs.length+' detailed slide(s) with AI…', 6000);
      var okc=0;
      await Promise.all(smartJobs.map(function(job){
        return smartFillSlide(job.src, job.slide).then(function(smartIR){
          var pg=state.pages[job.index]; if(!pg) return;
          pg.ir=smartIR; pg.canvasJSON=null; pg.thumb=null; okc++;
          if(job.index===state.currentPage) return loadPageIntoCanvas(state.currentPage);
        }).catch(function(e){ console.warn('AI fill slide '+(job.index+1)+' failed:', e); });
      }));
      renderPageThumbs();
      if(typeof showToast==='function') showToast(okc>0?('AI-filled '+okc+' detailed slide(s) ✓'):'AI fill unavailable — kept simple layout', 3500);
    }

    // Tier 3 (Opus) — final QA on the key pages only
    try{
      var keyPages=pickKeyPages(plan);
      if(keyPages.length){
        if(typeof showToast==='function') showToast('Final quality check on key pages…', 6000);
        var res=await fetch((window.LAZYDOG_QA_URL||'/qa_deck'),{ method:'POST', headers:{'content-type':'application/json'},
          body:JSON.stringify({ deck:plan.deck, brand:'', pages:keyPages }) });
        if(res.ok){
          var out=await res.json(); var fixes=(out&&out.fixes)||[]; var applied=0;
          fixes.forEach(function(f){
            var pg=state.pages[f.idx]; if(!pg||!pg.ir) return;
            var el=(pg.ir.elements||[]).filter(function(e){return e.id===f.id;})[0];
            if(el && f.text){ setElText(el, f.text); pg.canvasJSON=null; pg.thumb=null; applied++; }
          });
          if(applied){ await loadPageIntoCanvas(state.currentPage); renderPageThumbs(); }
          if(typeof showToast==='function') showToast(applied?('Final QA fixed '+applied+' item(s) ✓'):'Final QA: key pages passed ✓', 4000);
        }
      }
    }catch(e){ console.warn('qa_deck skipped:', e); }
  }

  function addSlideContent(slide){
    if(typeof fabric==='undefined'||!window.fc) return;
    if(slide.title) fc.add(new fabric.IText(slide.title,{left:80,top:60,fontFamily:'DM Sans, sans-serif',fontSize:44,fontWeight:'700',fill:'#0F172A'}));
    if(slide.text) fc.add(new fabric.Textbox(slide.text,{left:80,top:170,width:1760,fontFamily:'DM Sans, sans-serif',fontSize:24,lineHeight:1.35,fill:'#334155'}));
    else if(slide.passthrough) fc.add(new fabric.IText('(original slide)',{left:80,top:170,fontFamily:'DM Sans, sans-serif',fontSize:18,fontStyle:'italic',fill:'#94A3B8'}));
    fc.renderAll();
  }
  function applyBlank(plan){
    try{
      var slides=(plan&&plan.slides)||[]; if(!slides.length) return;
      state.pages=[makeBlankPage(1)]; state.notes=['']; state.currentPage=0;
      window._bulkLoad=true; fc.clear(); fc.setBackgroundColor('#ffffff', fc.renderAll.bind(fc)); window._bulkLoad=false;
      for(var i=0;i<slides.length;i++){ if(i>0){ addPage(); } addSlideContent(slides[i]); }
      if(typeof captureCurrentPage==='function') captureCurrentPage();
      if(typeof switchPage==='function') switchPage(0);
      if(typeof renderPageThumbs==='function') renderPageThumbs();
      if(typeof showToast==='function') showToast('No deck design found — placed your text on blank slides');
      window._planApplied=true;
    }catch(e){ console.error('applyBlank failed:',e); }
  }

  async function apply(plan){
    try{ await applyDesign(plan); }
    catch(e){ console.warn('design fill failed, using blank fallback:', e);
      if(typeof showToast==='function') showToast('Could not load the deck design ('+e.message+') — blank fallback');
      applyBlank(plan);
    }
  }

  function boot(){
    var plan=getPlan(); if(!plan) return;
    var tries=0;
    var t=setInterval(function(){
      tries++;
      if(window.fc && typeof makeBlankPage==='function'){ clearInterval(t); apply(plan); }
      else if(tries>200){ clearInterval(t); }
    },100);
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();

</script>
