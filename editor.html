  if (_dbgRects) { _dbgRects.forEach(function(r){ fc.remove(r); }); _dbgRects = null; fc.renderAll(); showToast('X-ray off'); return; }
  _dbgRects = [];
  var report = [];
  fc.getObjects().slice().forEach(function(o, i) {
    var b = o.getBoundingRect(true, true);
    var r = new fabric.Rect({ left: b.left, top: b.top, width: b.width, height: b.height, fill: '', stroke: 'rgba(255,0,0,0.95)', strokeWidth: 1.5, strokeDashArray: [4,3], selectable: false, evented: false });
    _dbgRects.push(r); fc.add(r);
    report.push({ i: i, type: o.type, irId: o.irId || '', x: Math.round(b.left), y: Math.round(b.top), w: Math.round(b.width), h: Math.round(b.height), fill: (typeof o.fill === 'string' ? o.fill : (o.fill ? 'gradient' : '')), stroke: o.stroke || '' });
  });
  try { console.table(report); } catch (e) { console.log(report); }
  fc.renderAll();
  showToast('X-ray ON — red boxes = object bounds (see console)');
}
document.addEventListener('keydown', function(e){
  if (e.ctrlKey && e.shiftKey && (e.key === 'B' || e.key === 'b')) { e.preventDefault(); debugBounds(); }
});

function initFabric() {
  /* 1920 logical resolution + forced 2x supersampling: the canvas backing
     store renders at double density and downscales to CSS size — kills the
     "milky fog" of plain-density canvas rendering. */
  fabric.devicePixelRatio = Math.max(2, window.devicePixelRatio || 1);
  fc = new fabric.Canvas('canvas', { width: 1920, height: 1080, backgroundColor: '#ffffff', enableRetinaScaling: true, preserveObjectStacking: true }); /* selected objects keep their layer — default fabric painted the selection on TOP, so clicking the full-bleed background hid every element behind it */
  fc._baseWidth = 1920;
  fc._baseHeight = 1080;
  fc._pxPerPt = 2; /* blank 1920px canvas = 960pt slide; import overwrites with true scale */
  fc.on('object:modified', function(){ saveState(); });
  fc.on('object:added', function(){ saveState(); });
  fc.on('object:moving', _reflFollow);
  fc.on('object:scaling', _reflFollow);
  fc.on('object:modified', _reflFollow);
  fc.on('object:modified', _glowRegen);
  fc.on('selection:created', _chartSelHook);
  fc.on('selection:updated', _chartSelHook);
  fc.on('object:modified', _chartBarModified);
  fc.on('text:editing:exited', _chartTitleEdited);
  fc.on('mouse:dblclick', function (opt) {
    var t = opt.target;
    if (t && t.mediaSrc) { openMediaPlayer(t.mediaSrc, t.mediaKind || 'video'); return; }
    /* PPT opens the embedded workbook in Excel on double-click; our
       equivalent is an IN-APP worksheet editor over the same data */
    if (t && t.irTable && window._oleWb && window._oleWb[t.irTable]) {
      if (opt.e && opt.e.altKey) openWorkbookEditor(t.irTable);           /* Alt+dblclick: quick in-app sheet */
      else if (window.showDirectoryPicker || window.showSaveFilePicker) bridgeToExcel(t.irTable); /* PPT-style: straight to Excel bridge */
      else openWorkbookEditor(t.irTable);
      return;
    }
    /* generic OLE (Word, Publisher, Visio, ...) -> same bridge, native app */
    if (t && t.irId && window._oleDoc && window._oleDoc[t.irId]) bridgeOleDoc(t.irId);
  });
  fc.on('mouse:down', function (opt) {
    var t = opt.target;
    if (t && t.mediaSrc) {
      if (opt.e && opt.e.detail >= 2) { openMediaPlayer(t.mediaSrc, t.mediaKind || 'video'); }
      else showToast('Media object — double-click to play');
    }
  });
}

/* ── FREE SCISSOR TOOL (Editing rail) ───────────────────────────────────────
   Cloth-cutting: user places dots around the part to cut; clicking back on
   the FIRST dot closes the loop and the element is cut into TWO independent
   pieces — the patch inside the loop and the remainder with a hole. Both are
   plain images afterwards (movable/deletable, PPTX-exportable). Esc cancels. */
var _sciss = null; /* { target, pts, dots[], line } */
/* pressing the panel button decides: punch (shape on element) or dot mode */
function goScissor() {
  if (!fc) return;
  var o = fc.getActiveObject();
  if (!o) { showToast('Select the cutter shape (or the element itself) first'); return; }
  if (_sciss) { stopScissorMode(false); }
  var ob = o.getBoundingRect(true, true);
  var under = null, objs = fc.getObjects();
  for (var i = objs.length - 1; i >= 0; i--) {
    var t = objs[i];
    if (t === o || t.isBg || !t.visible) continue;
    var tb = t.getBoundingRect(true, true);
    /* never auto-punch a near-full-slide image (unflagged backgrounds):
       cutting the backdrop produces an invisible camouflage patch */
    if (tb.width > fc._baseWidth * 0.8 && tb.height > fc._baseHeight * 0.8) continue;
    var ix = Math.max(ob.left, tb.left), iy = Math.max(ob.top, tb.top);
    var ix2 = Math.min(ob.left + ob.width, tb.left + tb.width), iy2 = Math.min(ob.top + ob.height, tb.top + tb.height);
    if (ix2 - ix > 4 && iy2 - iy > 4) { under = t; break; }
  }
  if (under) { performPunchCut(o, under); return; }
  showToast('No element under the shape — starting dot mode on the selection instead');
  startScissorMode(o);
}
function startScissorMode(o) {
  if (!fc || !o) return;
  _sciss = { target: o, pts: [], dots: [], line: null };
  fc.discardActiveObject();
  fc.selection = false;
  fc.forEachObject(function (ob) { ob.__sciSel = ob.selectable; ob.selectable = false; ob.evented = false; });
  fc.defaultCursor = 'crosshair';
  fc.on('mouse:down', scissorClick);
  fc.on('mouse:dblclick', scissorDbl);
  fc.renderAll();
  showToast('Scissor: place dots around the part — double-click / Enter / first dot / Cut-now button to cut. Esc cancels');
}
function stopScissorMode(done) {
  if (!_sciss || !fc) { _sciss = null; return; }
  fc.off('mouse:down', scissorClick);
  fc.off('mouse:dblclick', scissorDbl);
  _sciss.dots.forEach(function (d) { fc.remove(d); });
  if (_sciss.line) fc.remove(_sciss.line);
  fc.forEachObject(function (ob) { if (ob.__sciSel !== undefined) { ob.selectable = ob.__sciSel; ob.evented = ob.__sciSel; delete ob.__sciSel; } });
  fc.selection = true;
  fc.defaultCursor = 'default';
  fc.renderAll();
  _sciss = null;
  if (!done) showToast('Scissor cancelled');
}
function scissorClick(opt) {
  if (!_sciss) return;
  var p = fc.getPointer(opt.e);
  var pts = _sciss.pts;
  if (pts.length >= 3) {
    var d0 = Math.hypot(p.x - pts[0].x, p.y - pts[0].y);
    if (d0 < 30 / fc.getZoom()) { performScissorCut(); return; } /* generous snap-to-close */
  }
  pts.push({ x: p.x, y: p.y });
  var r0 = pts.length === 1 ? 9 : 5; /* big first dot = easy close target */
  var dot = new fabric.Circle({ left: p.x - r0, top: p.y - r0, radius: r0, fill: pts.length === 1 ? '#E8590C' : '#7C3AED', stroke: '#fff', strokeWidth: 1.5, selectable: false, evented: false });
  _sciss.dots.push(dot);
  fc.add(dot);
  if (_sciss.line) fc.remove(_sciss.line);
  if (pts.length > 1) {
    _sciss.line = new fabric.Polyline(pts.map(function (q) { return { x: q.x, y: q.y }; }), { fill: '', stroke: '#7C3AED', strokeWidth: 1.5, strokeDashArray: [6, 4], selectable: false, evented: false });
    fc.add(_sciss.line);
  }
  fc.renderAll();
}
function performPunchCut(cutter, target) {
  try {
    var W = fc._baseWidth, H = fc._baseHeight, M = 2;
    target.clone(function (tc) {
      cutter.clone(function (cc) {
        var tt = new fabric.StaticCanvas(null, { width: W * M, height: H * M }); tt.setZoom(M); tt.add(tc); tt.renderAll();
        /* silhouette of the cutter: solid fill (covers stroke-only shapes) */
        function solidify(s) { try { s.set({ fill: '#000', stroke: '#000', opacity: 1 }); } catch (e) {} }
        if (cc.forEachObject) cc.forEachObject(solidify);
        solidify(cc);
        var mm = new fabric.StaticCanvas(null, { width: W * M, height: H * M }); mm.setZoom(M); mm.add(cc); mm.renderAll();
        var b = target.getBoundingRect(true, true), cb = cutter.getBoundingRect(true, true);
        var px = Math.max(b.left, cb.left), py = Math.max(b.top, cb.top);
        var px2 = Math.min(b.left + b.width, cb.left + cb.width), py2 = Math.min(b.top + b.height, cb.top + cb.height);
        if (px2 - px < 2 || py2 - py < 2) { showToast('The shape must sit ON the element you want to cut'); return; }
        var c1 = document.createElement('canvas'); c1.width = Math.ceil((px2 - px) * M); c1.height = Math.ceil((py2 - py) * M);
        var x1 = c1.getContext('2d');
        x1.drawImage(tt.lowerCanvasEl, -px * M, -py * M);
        x1.globalCompositeOperation = 'destination-in';
        x1.drawImage(mm.lowerCanvasEl, -px * M, -py * M);
        var c2 = document.createElement('canvas'); c2.width = Math.ceil(b.width * M); c2.height = Math.ceil(b.height * M);
        var x2 = c2.getContext('2d');
        x2.drawImage(tt.lowerCanvasEl, -b.left * M, -b.top * M);
        x2.globalCompositeOperation = 'destination-out';
        x2.drawImage(mm.lowerCanvasEl, -b.left * M, -b.top * M);
        tt.dispose(); mm.dispose();
        fabric.Image.fromURL(c2.toDataURL('image/png'), function (rest) {
          rest.set({ left: b.left, top: b.top, scaleX: 1 / M, scaleY: 1 / M });
          fabric.Image.fromURL(c1.toDataURL('image/png'), function (piece) {
            /* jump the piece aside so the cut is VISIBLE immediately —
               left in place it perfectly camouflages the hole it came from */
            piece.set({ left: px + 30, top: py + 30, scaleX: 1 / M, scaleY: 1 / M });
            fc.remove(target);
            fc.add(rest); fc.add(piece);
            fc.remove(cutter); /* the cutter's job is done */
            fc.setActiveObject(piece);
            fc.renderAll(); saveState();
            showToast('Punched! The piece jumped aside — the hole is behind it');
          });
        });
      }, FABRIC_JSON_PROPS);
    }, FABRIC_JSON_PROPS);
  } catch (err) { showToast('Punch failed: ' + err.message); }
}
function scissorDbl() { if (_sciss && _sciss.pts.length >= 3) performScissorCut(); }
document.addEventListener('keydown', function (e) {
  if (_sciss && e.key === 'Enter' && _sciss.pts.length >= 3) { e.preventDefault(); performScissorCut(); }
});
document.addEventListener('click', function (e) {
  if (e.target.closest && e.target.closest('#sciss-go')) { goScissor(); return; }
  if (e.target.closest && e.target.closest('#sciss-cut-btn')) {
    if (_sciss && _sciss.pts.length >= 3) performScissorCut();
    else showToast('Place at least 3 dots first');
  }
});
function performScissorCut() {
  try {
  var S = _sciss, o = S.target, pts = S.pts.slice();
  var W = fc._baseWidth, H = fc._baseHeight, M = 2; /* 2x for sharpness */
  o.clone(function (c) {
    var tmp = new fabric.StaticCanvas(null, { width: W * M, height: H * M });
    tmp.setZoom(M);
    tmp.add(c); tmp.renderAll();
    var src = tmp.lowerCanvasEl;
    var b = o.getBoundingRect(true, true);
    /* polygon bbox clamped to the object's bounds */
    var px = Math.max(b.left, Math.min.apply(null, pts.map(function(q){return q.x;})));
    var py = Math.max(b.top, Math.min.apply(null, pts.map(function(q){return q.y;})));
    var px2 = Math.min(b.left + b.width, Math.max.apply(null, pts.map(function(q){return q.x;})));
    var py2 = Math.min(b.top + b.height, Math.max.apply(null, pts.map(function(q){return q.y;})));
    if (px2 - px < 2 || py2 - py < 2) { stopScissorMode(false); showToast('Cut area does not touch the element'); return; }
    function poly(ctx, ox, oy) {
      ctx.beginPath();
      ctx.moveTo((pts[0].x - ox) * M, (pts[0].y - oy) * M);
      for (var i = 1; i < pts.length; i++) ctx.lineTo((pts[i].x - ox) * M, (pts[i].y - oy) * M);
      ctx.closePath();
    }
    /* piece INSIDE the loop */
    var c1 = document.createElement('canvas'); c1.width = Math.ceil((px2 - px) * M); c1.height = Math.ceil((py2 - py) * M);
    var x1 = c1.getContext('2d');
    x1.save(); poly(x1, px, py); x1.clip();
    x1.drawImage(src, -px * M, -py * M);
    x1.restore();
    /* remainder with the hole */
    var c2 = document.createElement('canvas'); c2.width = Math.ceil(b.width * M); c2.height = Math.ceil(b.height * M);
    var x2 = c2.getContext('2d');
    x2.drawImage(src, -b.left * M, -b.top * M);
    x2.globalCompositeOperation = 'destination-out';
    poly(x2, b.left, b.top); x2.fill();
    tmp.dispose();
    var placed = 0;
    fabric.Image.fromURL(c2.toDataURL('image/png'), function (imgRest) {
      imgRest.set({ left: b.left, top: b.top, scaleX: 1 / M, scaleY: 1 / M });
      fabric.Image.fromURL(c1.toDataURL('image/png'), function (imgPiece) {
        imgPiece.set({ left: px, top: py, scaleX: 1 / M, scaleY: 1 / M });
        fc.remove(o);
        fc.add(imgRest); fc.add(imgPiece);
        stopScissorMode(true);
        fc.setActiveObject(imgPiece);
        fc.renderAll();
        saveState();
        showToast('Cut into 2 pieces — the patch is selected');
      });
    });
  }, FABRIC_JSON_PROPS);
  } catch (err) { stopScissorMode(false); showToast('Cut failed: ' + err.message); }
}

/* ── STRAIGHT SCISSOR: trim selected element along the SLIDE border ─────────
   PowerPoint's crop works in the element's own rotated frame, so a tilted
   image can never be cropped along the slide edge. This rasterizes the
   element exactly as drawn, cuts it at the slide-aligned boundary (any
   rotation), and swaps in the trimmed result — a permanent cut that also
   exports cleanly to PPTX as a plain positioned image. */
function ctxTrimToSlide() {
  var o = fc && fc.getActiveObject();
  if (!o) { showToast('Select an element first'); return; }
  var W = fc._baseWidth || fc.getWidth() / fc.getZoom();
  var H = fc._baseHeight || fc.getHeight() / fc.getZoom();
  var b = o.getBoundingRect(true, true); /* scene coords, ignore viewport */
  var ix = Math.max(0, b.left), iy = Math.max(0, b.top);
  var ix2 = Math.min(W, b.left + b.width), iy2 = Math.min(H, b.top + b.height);
  if (ix2 - ix <= 1 || iy2 - iy <= 1) { fc.remove(o); fc.discardActiveObject(); fc.renderAll(); saveState(); showToast('Element was fully outside — removed'); return; }
  if (b.left >= -0.5 && b.top >= -0.5 && b.left + b.width <= W + 0.5 && b.top + b.height <= H + 0.5) { showToast('Nothing hangs outside the slide'); return; }
  o.clone(function (c) {
    var tmp = new fabric.StaticCanvas(null, { width: W, height: H });
    tmp.add(c);
    tmp.renderAll();
    var mult = 2; /* keep retina sharpness on the cut piece */
    var url = tmp.toDataURL({ left: ix, top: iy, width: ix2 - ix, height: iy2 - iy, multiplier: mult, format: 'png' });
    tmp.dispose();
    fabric.Image.fromURL(url, function (img) {
      img.set({ left: ix, top: iy, scaleX: 1 / mult, scaleY: 1 / mult, irOrigin: o.irOrigin });
      fc.remove(o);
      fc.add(img);
      fc.setActiveObject(img);
      fc.renderAll();
      saveState();
      showToast('Trimmed along the slide border');
    });
  }, FABRIC_JSON_PROPS);
}
/* inject the menu entry (shell HTML stays untouched) */
(function addTrimMenuItem(){
  var menu = document.getElementById('ctx-menu');
  if (!menu) return;
  var btn = document.createElement('button');
  btn.className = 'ctx-item';
  btn.setAttribute('data-ctx', 'trim');
  btn.innerHTML = '<span class="ctx-item-left"><span class="material-icons-outlined">content_cut</span>Trim to slide</span>';
  var anchor = menu.querySelector('[data-ctx="applycolor"]');
  if (anchor && anchor.nextSibling) menu.insertBefore(btn, anchor.nextSibling); else menu.appendChild(btn);
})();

/* ── PASTE IMAGE (Ctrl+V from OS clipboard) ── */
document.addEventListener('paste', function(e) {
  if (!e.clipboardData) return;
  var item = Array.from(e.clipboardData.items).find(function(i){ return i.type.includes('image'); });
  if (!item || !fc) return;
  fabric.Image.fromURL(URL.createObjectURL(item.getAsFile()), function(img) {
    img.scaleToWidth(fc.getWidth() * 0.5).set({ left:80, top:80 });
    fc.add(img).setActiveObject(img).renderAll();
    showToast('Image pasted');
  });
});

   RIGHT-CLICK CONTEXT MENU
   ============================================ */
dom.canvasArea.addEventListener('contextmenu', function(e) {
  e.preventDefault();
  var m = dom.ctxMenu;
  m.style.left = e.clientX + 'px';
  m.style.top = e.clientY + 'px';
  m.classList.add('open');
});
document.addEventListener('click', function(e) {

});
dom.ctxMenu.addEventListener('click', function(e) {
  const item = e.target.closest('[data-ctx]');
  if (!item) return;
  switch (item.dataset.ctx) {
    case 'copy': ctxCopy(); break;
    case 'paste': ctxPaste(); break;
    case 'duplicate': ctxDuplicate(); break;
    case 'delete': ctxDelete(); break;
    case 'align': ctxAlign(); break;
    case 'lock': ctxLock(); break;
    case 'link': ctxLink(); break;
    case 'alttext': ctxAltText(); break;
    case 'setbg': ctxSetBg(); break;
    case 'applycolor': ctxApplyColor(); break;
    case 'trim': ctxTrimToSlide(); break;
    case 'info': ctxInfo(); break;
  }
  dom.ctxMenu.classList.remove('open');
});

function ctxCopy()      { fc && fc.getActiveObject() && fc.getActiveObject().clone(function(c){ _clip=c; showToast('Copied'); }); }
function ctxPaste()     { _clip && _clip.clone(function(c){ c.set({left:c.left+20,top:c.top+20}); fc.add(c).setActiveObject(c).renderAll(); saveState(); }); }
function ctxDuplicate() { histLabel('Duplicated'); var o=fc&&fc.getActiveObject(); if(o){ o.clone(function(c){ c.set({left:o.left+20,top:o.top+20}); fc.add(c).setActiveObject(c).renderAll(); saveState(); }); } }
function ctxDelete()    { histLabel('Deleted'); var o=fc&&fc.getActiveObject(); if(o){ fc.remove(o); fc.discardActiveObject(); fc.renderAll(); saveState(); } }
function ctxAlign()     { var o=fc&&fc.getActiveObject(); if(!o){showToast('Select an element first');return;} o.set({left:(fc.getWidth()/fc.getZoom()-o.getScaledWidth())/2, top:(fc.getHeight()/fc.getZoom()-o.getScaledHeight())/2}); fc.renderAll(); saveState(); showToast('Aligned to center'); }
function ctxLock()      { var o=fc&&fc.getActiveObject(); if(!o){showToast('Select an element first');return;} var lock=!o.lockMovementX; o.set({lockMovementX:lock,lockMovementY:lock,hasControls:!lock,selectable:!lock}); fc.renderAll(); showToast(lock?'Element locked':'Element unlocked'); }
function ctxSetBg()     { var o=fc&&fc.getActiveObject(); if(!o||o.type!=='image'){showToast('Select an image first');return;} fc.setBackgroundImage(o,fc.renderAll.bind(fc),{scaleX:fc.getWidth()/fc.getZoom()/o.width,scaleY:fc.getHeight()/fc.getZoom()/o.height}); fc.remove(o); fc.renderAll(); showToast('Set as background'); }
function ctxInfo()      { var o=fc&&fc.getActiveObject(); if(!o){showToast('Select an element first');return;} showToast('Type: '+o.type+' | W:'+Math.round(o.getScaledWidth())+'px | H:'+Math.round(o.getScaledHeight())+'px | X:'+Math.round(o.left)+' Y:'+Math.round(o.top)); }
function ctxLink()      { var o=fc&&fc.getActiveObject(); if(!o){showToast('Select an element first');return;} var url=prompt('Enter URL:','https://'); if(url){ o.set('data',{link:url}); showToast('Link added: '+url); } }
function ctxAltText()   { var o=fc&&fc.getActiveObject(); if(!o){showToast('Select an element first');return;} var t=prompt('Enter alternative text:',o.altText||''); if(t!==null){ o.altText=t; showToast('Alt text set: '+t); } }
function ctxApplyColor(){ var o=fc&&fc.getActiveObject(); if(!o){showToast('Select an element first');return;} var c=o.fill||o.stroke||'#7C3AED'; fc.setBackgroundColor(c,fc.renderAll.bind(fc)); showToast('Page colour applied'); }

/* ============================================
   TEXT / SHAPES / UPLOADS (engine actions)
   ============================================ */
function addText(type) {
  if (!fc) return;
  var props = {
    heading:    { text:'Add a heading',    fontSize:44, fontWeight:'700', fill:'#0F172A', upper:false },
    subheading: { text:'Add a subheading', fontSize:28, fontWeight:'600', fill:'#0F172A', upper:false },
    body:       { text:'Add body text',    fontSize:16, fontWeight:'400', fill:'#334155', upper:false },
    caption:    { text:'Add a caption',    fontSize:12, fontWeight:'500', fill:'#64748B', upper:true  }
  }[type] || { text:'Text', fontSize:16, fontWeight:'400', fill:'#0F172A', upper:false };

  var t = new fabric.IText(props.upper ? props.text.toUpperCase() : props.text, {
    left: 80, top: 80, fontFamily: 'DM Sans, sans-serif',
    fontSize: props.fontSize, fontWeight: props.fontWeight, fill: props.fill, editable: true
  });
  fc.add(t).setActiveObject(t).renderAll();
  saveState();
  showToast(`Added ${type} text to slide`);
}

function makeStarPoints(outerR, innerR) {
  var spikes = 5, points = [];
  for (var i = 0; i < spikes * 2; i++) {
    var r = (i % 2 === 0) ? outerR : innerR;
    var angle = (Math.PI / spikes) * i - Math.PI / 2;
    points.push({ x: r * Math.cos(angle), y: r * Math.sin(angle) });
  }
  return points;
}

function addShape(type) {
  if (!fc) return;
  var defaults = { left: 100, top: 100, fill: '#7C3AED', opacity: 0.9 };
  var s;
  if (type === 'rect')          s = new fabric.Rect(Object.assign({}, defaults, { width:160, height:100 }));
  else if (type === 'circle')   s = new fabric.Circle(Object.assign({}, defaults, { radius:70 }));
  else if (type === 'triangle') s = new fabric.Triangle(Object.assign({}, defaults, { width:140, height:120 }));
  else if (type === 'line')     s = new fabric.Line([50,50,300,50], { left:100, top:150, stroke:'#7C3AED', strokeWidth:3 });
  else if (type === 'rounded-rect') s = new fabric.Rect(Object.assign({}, defaults, { width:160, height:100, rx:24, ry:24 }));
  else if (type === 'star')     s = new fabric.Polygon(makeStarPoints(70, 30), Object.assign({}, defaults, { left:120, top:100 }));
  if (s) { fc.add(s).setActiveObject(s).renderAll(); saveState(); }
  showToast('Element added to slide');
}

/* ════════════════════════════════════════════════════════════
   STICKERS
   Flat colour art with literal colours (stickers are brand-y, not
   palette-driven like illustrations). The Animated category carries a
   motion type that plays live on the canvas; the object's resting
   transform is kept separately so serialisation never captures a frame
   mid-animation.
   Authored in a 100x100 box.
   ════════════════════════════════════════════════════════════ */
var STICKER_LIB = [

var STICKER_CATS = ['Animated', 'Emoji', 'Social', 'Decorative', 'Favourites'];

function stickerFavourites() { return iconStore('ld_sticker_fav', []); }
function stickerToggleFav(name) {
  var f = stickerFavourites(), i = f.indexOf(name);
  if (i > -1) f.splice(i, 1); else f.unshift(name);
  iconSave('ld_sticker_fav', f.slice(0, 40));
  return i === -1;
}

function stickerSvg(st, size) {
  return '<svg viewBox="0 0 100 100" width="' + size + '" height="' + size + '">'
    + st.p.map(function (part) {
        return part[2] === 'st'
          ? '<path d="' + part[0] + '" fill="none" stroke="' + part[1]
            + '" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>'
          : '<path d="' + part[0] + '" fill="' + part[1] + '"/>';
      }).join('') + '</svg>';
}

function renderStickerPanel(tab) {
  var favs = stickerFavourites();
  var list = tab === 'Favourites'
    ? STICKER_LIB.filter(function (s) { return favs.indexOf(s.n) > -1; })
    : STICKER_LIB.filter(function (s) { return s.c === tab; });

  if (!list.length) {
    return '<div class="panel-placeholder"><span class="material-icons-outlined">star_border</span>'
      + '<p><strong>No favourites yet</strong><br>Tap the star on any sticker.</p></div>';
  }

  var note = tab === 'Animated' ? ' <span>motion plays on the slide</span>' : '';
  return '<div class="panel-subhead">' + tab + note + '</div>'
    + '<div class="sticker-grid">' + list.map(function (st) {
        var idx = STICKER_LIB.indexOf(st);
        var starred = favs.indexOf(st.n) > -1;
        return '<div class="sticker-card' + (starred ? ' fav' : '')
          + (st.anim ? ' anim-' + st.anim : '') + '" draggable="true"'
          + ' data-action="add-sticker" data-sticker="' + idx + '" title="' + st.n + '">'
          + stickerSvg(st, 62)
          + '<i class="sticker-star material-icons-outlined" data-action="fav-sticker"'
          + ' data-sticker="' + idx + '">' + (starred ? 'star' : 'star_border') + '</i></div>';
      }).join('') + '</div>';
}

function addSticker(idx, atX, atY) {
  var st = STICKER_LIB[idx];
  if (!st || !fc) return;
  var paths = st.p.map(function (part) {
    return new fabric.Path(part[0], part[2] === 'st'
      ? { fill: '', stroke: part[1], strokeWidth: 6,
          strokeLineCap: 'round', strokeLineJoin: 'round', objectCaching: false }
      : { fill: part[1], objectCaching: false });
  });
  var g = new fabric.Group(paths, {
    isSticker: true, stickerName: st.n, stickerAnim: st.anim || null,
    objectCaching: false
  });
  var slideW = fc.getWidth() / fc.getZoom();
  var slideH = fc.getHeight() / fc.getZoom();
  g.scaleToWidth(Math.min(slideW, slideH) * 0.2);
  g.set({
    left: atX != null ? atX - g.getScaledWidth() / 2  : (slideW - g.getScaledWidth()) / 2,
    top:  atY != null ? atY - g.getScaledHeight() / 2 : (slideH - g.getScaledHeight()) / 2
  });
  fc.add(g).setActiveObject(g);
  if (g.stickerAnim) stickerCaptureBase(g);
  fc.renderAll();
  saveState();
  showToast(st.n + ' added');
}

/* ── Live motion ──────────────────────────────────────────
   The resting transform is stashed on the object (runtime only, never
   serialised). Everything that reads the canvas — thumbnails, page
   capture, export — calls stickerFreeze() first, so a saved slide never
   records a half-way animation frame. */
function stickerCaptureBase(o) {
  o._animBase = { top: o.top, left: o.left, angle: o.angle || 0,
                  scaleX: o.scaleX || 1, scaleY: o.scaleY || 1 };
}

function stickerFreeze() {
  if (!fc || !fc.getObjects) return;
  (fc.getObjects() || []).forEach(function (o) {
    if (o.stickerAnim && o._animBase) {
      o.set({ top: o._animBase.top, left: o._animBase.left, angle: o._animBase.angle,
              scaleX: o._animBase.scaleX, scaleY: o._animBase.scaleY });
      o.setCoords();
    }
  });
}

var _stickerPaused = false;

(function stickerTicker() {
  var t0 = Date.now();
  function tick() {
    requestAnimationFrame(tick);
    if (_stickerPaused || typeof fc === 'undefined' || !fc || !fc.getObjects) return;
    var all = fc.getObjects();
    if (!all || !all.length) return;
    var objs = all.filter(function (o) { return o && o.stickerAnim; });
    if (!objs.length) return;
    var t = (Date.now() - t0) / 1000;
    var moved = false;
    objs.forEach(function (o) {
      if (!o._animBase) stickerCaptureBase(o);
      /* while the user is dragging or resizing, the base moves with them */
      if (fc.getActiveObject() === o && o.__corner) { stickerCaptureBase(o); return; }
      var b = o._animBase;
      if (o.stickerAnim === 'spin')  o.set({ angle: b.angle + (t * 60) % 360 });
      else if (o.stickerAnim === 'pulse') {
        var k = 1 + Math.sin(t * 3) * 0.07;
        o.set({ scaleX: b.scaleX * k, scaleY: b.scaleY * k });
      } else if (o.stickerAnim === 'bounce') {
        o.set({ top: b.top + Math.abs(Math.sin(t * 3)) * -10 });
      } else if (o.stickerAnim === 'float') {
        o.set({ top: b.top + Math.sin(t * 1.6) * 6 });
      }
      moved = true;
    });
    if (moved) fc.requestRenderAll();
  }
  if (typeof requestAnimationFrame === 'function') requestAnimationFrame(tick);
})();

function illoSvg(il, pal, size) {
  var c = ILLO_PALETTES[pal % ILLO_PALETTES.length].c;
  return '<svg viewBox="0 0 100 100" width="' + size + '" height="' + size + '">'
    + il.p.map(function (part) {
        var col = c[part[1]];
        return part[2] === 'st'
          ? '<path d="' + part[0] + '" fill="none" stroke="' + col
            + '" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>'
          : '<path d="' + part[0] + '" fill="' + col + '"/>';
      }).join('')
    + '</svg>';
}

var _illoPalette = 0;

function renderIllustrationPanel(tab) {
  var favs = illoFavourites();
  var list = tab === 'Favourites'
    ? ILLO_LIB.filter(function (i) { return favs.indexOf(i.n) > -1; })
    : ILLO_LIB.filter(function (i) { return i.s === tab; });

  var swatches = '<div class="illo-pal">' + ILLO_PALETTES.map(function (p, i) {
    return '<button class="illo-sw' + (i === _illoPalette ? ' on' : '') + '"'

      + ' style="background:linear-gradient(135deg,' + p.c[1] + ' 0 50%,' + p.c[3] + ' 50% 100%)"></button>';
  }).join('') + '</div>';

  if (!list.length) {
    return swatches + '<div class="panel-placeholder"><span class="material-icons-outlined">star_border</span>'
      + '<p><strong>No favourites yet</strong><br>Tap the star on an illustration.</p></div>';
  }

  return swatches + '<div class="panel-subhead">' + tab + ' <span>drag onto the slide</span></div>'
    + '<div class="illo-grid">' + list.map(function (il) {

          + ' data-action="add-illo" data-illo="' + idx + '" title="' + il.n + '">'

          + '<i class="illo-star material-icons-outlined" data-action="fav-illo" data-illo="' + idx + '">'
          + (starred ? 'star' : 'star_border') + '</i></div>';
      }).join('') + '</div>';
}

/* Build the fabric group. Every path keeps its role index so recolour can
   repaint it later without re-reading the source art. */
function makeIllustration(idx, pal) {
  var il = ILLO_LIB[idx];
  if (!il || !fc) return null;
  var cols = ILLO_PALETTES[pal % ILLO_PALETTES.length].c;
  var paths = il.p.map(function (part) {
    return new fabric.Path(part[0], part[2] === 'st'
      ? { fill: '', stroke: cols[part[1]], strokeWidth: 4,
          strokeLineCap: 'round', strokeLineJoin: 'round',
          illoRole: part[1], illoStroke: true, objectCaching: false }
      : { fill: cols[part[1]], illoRole: part[1], objectCaching: false });
  });
  var g = new fabric.Group(paths, {
    isIllo: true, illoIndex: idx, illoPalette: pal, illoName: il.n,
    objectCaching: false
  });
  return g;
}

function addIllustration(idx, atX, atY) {
  var g = makeIllustration(idx, _illoPalette);
  if (!g) return;
  var slideW = fc.getWidth() / fc.getZoom();
  var slideH = fc.getHeight() / fc.getZoom();
  var target = Math.min(slideW, slideH) * 0.42;
  g.scaleToWidth(target);
  g.set({
    left: atX != null ? atX - g.getScaledWidth() / 2  : (slideW - g.getScaledWidth()) / 2,
    top:  atY != null ? atY - g.getScaledHeight() / 2 : (slideH - g.getScaledHeight()) / 2
  });
  fc.add(g).setActiveObject(g);
  fc.renderAll();
  saveState();
  showToast(ILLO_LIB[idx].n + ' added');
}

/* Recolour by ROLE — depth and contrast survive the scheme change. */
function recolourIllustration(o, pal) {
  if (!o || !o.isIllo) return;
  var cols = ILLO_PALETTES[pal % ILLO_PALETTES.length].c;
  (o._objects || []).forEach(function (p) {
    if (p.illoRole == null) return;
    if (p.illoStroke) p.set('stroke', cols[p.illoRole]);
    else p.set('fill', cols[p.illoRole]);
  });
  o.illoPalette = pal;
  o.dirty = true;
  fc.renderAll();
  saveState();
  showToast(ILLO_PALETTES[pal % ILLO_PALETTES.length].n + ' scheme');
}

function cycleIllustrationColour(dir) {
  var o = fc && fc.getActiveObject();
  if (!o || !o.isIllo) { showToast('Select an illustration first'); return; }
  var n = ILLO_PALETTES.length;
  recolourIllustration(o, ((o.illoPalette || 0) + dir + n) % n);
}

   runs 100–700. That axis is the icon's actual line weight, so "stroke
   width" is a real property here, not a fake outline drawn around a glyph.

/* device-local memory: what you used, what you starred */
function iconStore(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch (e) { return fallback; }
}
function iconSave(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
}
function iconRecents()   { return iconStore('ld_icon_recent', []); }
function iconFavourites(){ return iconStore('ld_icon_fav', []); }

function iconPushRecent(name) {
  var r = iconRecents().filter(function (n) { return n !== name; });
  r.unshift(name);
  iconSave('ld_icon_recent', r.slice(0, 24));
}
function iconToggleFav(name) {
  var f = iconFavourites();
  var i = f.indexOf(name);
  if (i > -1) f.splice(i, 1); else f.unshift(name);
  iconSave('ld_icon_fav', f.slice(0, 60));
  return i === -1;

function iconCard(name, favs) {

    + ' data-icon="' + name + '" title="' + name.replace(/_/g, ' ') + '">'
    + '<span class="msym">' + name + '</span>'
    + '<i class="icon-star material-icons-outlined" data-action="fav-icon" data-icon="' + name + '"'
    + ' title="' + (starred ? 'Remove from favourites' : 'Add to favourites') + '">'
    + (starred ? 'star' : 'star_border') + '</i></button>';

function iconGrid(names, favs) {
  return '<div class="icon-grid">' + names.map(function (n) { return iconCard(n, favs); }).join('') + '</div>';
}

function renderIconPanel(tab) {
  var favs = iconFavourites();

  if (tab === 'Recent') {
    var r = iconRecents();
    return '<div class="panel-subhead">Recently used</div>'
      + (r.length ? iconGrid(r, favs)
        : '<div class="panel-placeholder"><span class="material-icons-outlined">history</span>'
          + '<p><strong>No recent icons</strong><br>Icons you insert show up here.</p></div>');
  }
  if (tab === 'Favourites') {
    return '<div class="panel-subhead">Favourites</div>'
      + (favs.length ? iconGrid(favs, favs)
        : '<div class="panel-placeholder"><span class="material-icons-outlined">star_border</span>'
          + '<p><strong>No favourites yet</strong><br>Tap the star on any icon to keep it here.</p></div>');
  }
  if (ICON_LIB[tab]) {
    return '<div class="panel-subhead">' + tab + '</div>' + iconGrid(ICON_LIB[tab], favs);

    return '<div class="panel-subhead">' + g + '</div>' + iconGrid(ICON_LIB[g], favs);
  }).join('');
}

/* Search runs across EVERY category, not just the visible one. */
function renderIconSearch(q) {
  var favs = iconFavourites(), hits = [], seen = {};
  Object.keys(ICON_LIB).forEach(function (g) {
    ICON_LIB[g].forEach(function (n) {
      if (seen[n]) return;
      if (n.replace(/_/g, ' ').indexOf(q) > -1 || g.toLowerCase().indexOf(q) > -1) {
        seen[n] = 1; hits.push(n);
      }
    });
  });
  if (!hits.length) {
    return '<div class="panel-placeholder"><span class="material-icons-outlined">search_off</span>'
      + '<p><strong>No icons for “' + q + '”</strong><br>Try a broader word.</p></div>';
  }
  return '<div class="panel-subhead">Results <span>' + hits.length + '</span></div>'
    + iconGrid(hits, favs);
}

/* Insert. The icon is a text object in the symbol font, so its colour and
   its wght (stroke width) remain live properties. */
var ICON_DEFAULT_WEIGHT = 400;

function addIcon(name) {
  if (!fc) return;
  histLabel('Added icon');
  var place = function () {
    var slideW = fc.getWidth() / fc.getZoom();
    var slideH = fc.getHeight() / fc.getZoom();
    var size = Math.round(Math.min(slideW, slideH) * 0.22);
    var t = new fabric.Text(name, {
      fontFamily: ICON_FONT,
      fontSize: size,
      fontWeight: ICON_DEFAULT_WEIGHT,
      fill: '#1B1B1B',
      isIcon: true,
      iconName: name,
      iconWeight: ICON_DEFAULT_WEIGHT,
      objectCaching: false
    });
    t.set({ left: (slideW - t.width) / 2, top: (slideH - t.height) / 2 });
    fc.add(t).setActiveObject(t);
    fc.renderAll();
    iconPushRecent(name);
    saveState();
    showToast('Icon added');
  };
  /* the glyph renders as literal text until the symbol font is ready */
  if (document.fonts && document.fonts.load) {
    document.fonts.load('400 48px "' + ICON_FONT + '"').then(place).catch(place);
  } else place();
}

function iconSelected() {
  var o = fc && fc.getActiveObject();
  return (o && o.isIcon) ? o : null;
}

function setIconWeight(delta) {
  var o = iconSelected();
  if (!o) { showToast('Select an icon first'); return; }
  var steps = [100, 200, 300, 400, 500, 600, 700];
  var cur = o.iconWeight || 400;
  var i = steps.indexOf(cur);
  if (i < 0) i = 3;
  i = Math.max(0, Math.min(steps.length - 1, i + delta));
  o.set({ fontWeight: steps[i] });
  o.iconWeight = steps[i];
  o.dirty = true;
  fc.renderAll();
  saveState();
  showToast('Stroke weight ' + steps[i]);
}

function setIconColour() {
  var o = iconSelected();
  if (!o) { showToast('Select an icon first'); return; }
  var c = prompt('Icon colour (hex):', o.fill || '#1B1B1B');
  if (c) { o.set('fill', c); fc.renderAll(); saveState(); }
}

/* Replace: keeps position, size, colour and weight — only the glyph swaps. */
var _iconReplaceMode = false;

function startIconReplace() {
  if (!iconSelected()) { showToast('Select an icon first'); return; }
  _iconReplaceMode = true;
  openPanel('icons');
  showToast('Pick a replacement icon');
}

function replaceIcon(name) {
  var o = iconSelected();
  if (!o) { _iconReplaceMode = false; return false; }
  o.set('text', name);
  o.iconName = name;
  o.dirty = true;
  fc.renderAll();
  iconPushRecent(name);
  saveState();
  _iconReplaceMode = false;
  showToast('Icon replaced');
  return true;
}

/* ════════════════════════════════════════════════════════════
   CHARTS — insertable chart library
   Each type is drawn to an offscreen canvas and placed as an image that
   carries its own chartDef, so the data stays with the object and a later
   session can turn it into a live editable chart without re-authoring the
   drawing code.
   ════════════════════════════════════════════════════════════ */
var CHART_PALETTE = ['#7C3AED', '#12A5A0', '#E8590C', '#EAB308', '#2563EB', '#DB2777', '#059669', '#64748B'];

var CHART_TYPES = [
  { id:'column',        name:'Column',          group:'Bar & column' },
  { id:'column-stack',  name:'Stacked column',  group:'Bar & column' },
  { id:'bar',           name:'Bar',             group:'Bar & column' },
  { id:'bar-stack',     name:'Stacked bar',     group:'Bar & column' },
  { id:'column-group',  name:'Grouped column',  group:'Bar & column' },
  { id:'line',          name:'Line',            group:'Line & area' },
  { id:'line-smooth',   name:'Smooth line',     group:'Line & area' },
  { id:'line-marker',   name:'Line + markers',  group:'Line & area' },
  { id:'area',          name:'Area',            group:'Line & area' },
  { id:'area-stack',    name:'Stacked area',    group:'Line & area' },
  { id:'pie',           name:'Pie',             group:'Pie & parts' },
  { id:'donut',         name:'Donut',           group:'Pie & parts' },
  { id:'half-donut',    name:'Half donut',      group:'Pie & parts' },
  { id:'progress',      name:'Progress ring',   group:'Pie & parts' },
  { id:'funnel',        name:'Funnel',          group:'Pie & parts' },
  { id:'scatter',       name:'Scatter',         group:'Distribution' },
  { id:'bubble',        name:'Bubble',          group:'Distribution' },
  { id:'radar',         name:'Radar',           group:'Distribution' },
  { id:'gauge',         name:'Gauge',           group:'Distribution' },
  { id:'waterfall',     name:'Waterfall',       group:'Distribution' },
];

var CHART_SAMPLE = {
  cats: ['Q1', 'Q2', 'Q3', 'Q4'],
  series: [
    { name: 'Revenue', data: [42, 58, 49, 71] },
    { name: 'Cost',    data: [28, 33, 30, 38] },
  ]
};

/* Draw a chart onto a 2D context sized w x h. Pure canvas, no libraries. */
function drawChart(ctx, w, h, type, def) {
  var d = def || CHART_SAMPLE;
  var s0 = d.series[0].data, s1 = (d.series[1] || d.series[0]).data;
  var pad = { l: 38, r: 14, t: 16, b: 26 };
  var iw = w - pad.l - pad.r, ih = h - pad.t - pad.b;
  var maxV = Math.max.apply(null, s0.concat(s1)) * 1.15;
  var P = CHART_PALETTE;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, w, h);
  ctx.font = '11px "Segoe UI", sans-serif';
  ctx.textBaseline = 'middle';

  function axes(vertical) {
    ctx.strokeStyle = '#E2E8F0'; ctx.lineWidth = 1;
    for (var i = 0; i <= 4; i++) {
      var y = pad.t + ih * i / 4;
      ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + iw, y); ctx.stroke();
      ctx.fillStyle = '#94A3B8'; ctx.textAlign = 'right';
      ctx.fillText(Math.round(maxV * (1 - i / 4)), pad.l - 6, y);
    }
    if (vertical !== false) {
      ctx.fillStyle = '#64748B'; ctx.textAlign = 'center';
      d.cats.forEach(function (c, i) {
        ctx.fillText(c, pad.l + iw * (i + 0.5) / d.cats.length, h - pad.b + 11);
      });
    }
  }
  function bars(horizontal, stacked, grouped) {
    axes(!horizontal);
    var n = d.cats.length;
    for (var i = 0; i < n; i++) {
      if (horizontal) {
        var slot = ih / n, bh = slot * 0.5, y0 = pad.t + slot * i + (slot - bh) / 2;
        var bw = iw * s0[i] / maxV;
        ctx.fillStyle = P[0]; ctx.fillRect(pad.l, y0, bw, bh);
        if (stacked) { ctx.fillStyle = P[1]; ctx.fillRect(pad.l + bw, y0, iw * s1[i] / maxV, bh); }
      } else {
        var slotw = iw / n, bwid = slotw * (grouped ? 0.28 : 0.46);
        var x0 = pad.l + slotw * i + (slotw - bwid * (grouped ? 2 : 1)) / 2;
        var bh0 = ih * s0[i] / maxV;
        ctx.fillStyle = P[0];
        ctx.fillRect(x0, pad.t + ih - bh0, bwid, bh0);
        if (grouped) {
          ctx.fillStyle = P[1];
          var bh1 = ih * s1[i] / maxV;
          ctx.fillRect(x0 + bwid + 2, pad.t + ih - bh1, bwid, bh1);
        } else if (stacked) {
          ctx.fillStyle = P[1];
          var bh2 = ih * s1[i] / maxV;
          ctx.fillRect(x0, pad.t + ih - bh0 - bh2, bwid, bh2);
        }
      }
    }
  }
  function pts(arr) {
    return arr.map(function (v, i) {
      return [pad.l + iw * (i + 0.5) / arr.length, pad.t + ih * (1 - v / maxV)];
    });
  }
  function poly(p, smooth) {
    ctx.beginPath(); ctx.moveTo(p[0][0], p[0][1]);
    for (var i = 1; i < p.length; i++) {
      if (smooth) {
        var cx = (p[i - 1][0] + p[i][0]) / 2;
        ctx.bezierCurveTo(cx, p[i - 1][1], cx, p[i][1], p[i][0], p[i][1]);
      } else ctx.lineTo(p[i][0], p[i][1]);
    }
  }
  function pieSlices(inner, sweep, cx, cy, r) {
    var tot = s0.reduce(function (a, b) { return a + b; }, 0), a0 = -Math.PI / 2;
    s0.forEach(function (v, i) {
      var a1 = a0 + sweep * v / tot;
      ctx.beginPath(); ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, a0, a1); ctx.closePath();
      ctx.fillStyle = P[i % P.length]; ctx.fill();
      a0 = a1;
    });
    if (inner) {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath(); ctx.arc(cx, cy, r * inner, 0, Math.PI * 2); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
    }
  }

  var cx = w / 2, cy = h / 2, r = Math.min(w, h) * 0.36;

  switch (type) {
    case 'column':       bars(false, false, false); break;
    case 'column-stack': bars(false, true,  false); break;
    case 'column-group': bars(false, false, true);  break;
    case 'bar':          bars(true,  false, false); break;
    case 'bar-stack':    bars(true,  true,  false); break;

    case 'line': case 'line-smooth': case 'line-marker': {
      axes();
      var p = pts(s0);
      poly(p, type === 'line-smooth');
      ctx.strokeStyle = P[0]; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.stroke();
      if (type === 'line-marker') {
        p.forEach(function (q) {
          ctx.beginPath(); ctx.arc(q[0], q[1], 4, 0, Math.PI * 2);
          ctx.fillStyle = '#fff'; ctx.fill();
          ctx.strokeStyle = P[0]; ctx.lineWidth = 2; ctx.stroke();
        });
      }
      break;
    }
    case 'area': case 'area-stack': {
      axes();
      [s1, s0].forEach(function (ser, k) {
        if (type === 'area' && k === 0) return;
        var q = pts(ser);
        poly(q, true);
        ctx.lineTo(q[q.length - 1][0], pad.t + ih);
        ctx.lineTo(q[0][0], pad.t + ih);
        ctx.closePath();
        ctx.fillStyle = k === 0 ? P[1] + '66' : P[0] + '66';
        ctx.fill();
        poly(q, true);
        ctx.strokeStyle = k === 0 ? P[1] : P[0]; ctx.lineWidth = 2; ctx.stroke();
      });
      break;
    }

    case 'pie':       pieSlices(0,    Math.PI * 2, cx, cy, r); break;
    case 'donut':     pieSlices(0.58, Math.PI * 2, cx, cy, r); break;
    case 'half-donut':
      pieSlices(0.55, Math.PI, cx, cy + r * 0.45, r * 1.2);
      break;
    case 'progress': {
      var pct = 0.68;
      ctx.lineWidth = r * 0.28; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = '#EDE9FE'; ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * pct);
      ctx.strokeStyle = P[0]; ctx.stroke();
      ctx.fillStyle = '#1B1B1B'; ctx.textAlign = 'center';
      ctx.font = '600 ' + Math.round(r * 0.5) + 'px "Segoe UI", sans-serif';
      ctx.fillText(Math.round(pct * 100) + '%', cx, cy);
      break;
    }
    case 'funnel': {
      var n = s0.length, fh = ih / n;
      s0.slice().sort(function (a, b) { return b - a; }).forEach(function (v, i) {
        var wTop = iw * v / maxV, wBot = iw * (s0[i + 1] || v * 0.7) / maxV;
        var y = pad.t + fh * i;
        ctx.beginPath();
        ctx.moveTo(cx - wTop / 2, y); ctx.lineTo(cx + wTop / 2, y);
        ctx.lineTo(cx + wBot / 2, y + fh - 3); ctx.lineTo(cx - wBot / 2, y + fh - 3);
        ctx.closePath();
        ctx.fillStyle = P[i % P.length]; ctx.fill();
      });
      break;
    }
    case 'scatter': case 'bubble': {
      axes(false);
      for (var i = 0; i < 14; i++) {
        var px = pad.l + iw * ((i * 37) % 100) / 100;
        var py = pad.t + ih * (1 - ((i * 53) % 90) / 100);
        var rad = type === 'bubble' ? 4 + ((i * 29) % 11) : 4;
        ctx.beginPath(); ctx.arc(px, py, rad, 0, Math.PI * 2);
        ctx.fillStyle = P[i % 3] + (type === 'bubble' ? '99' : 'FF');
        ctx.fill();
      }
      break;
    }
    case 'radar': {
      var n2 = 6, rr = Math.min(w, h) * 0.34;
      for (var ring = 1; ring <= 3; ring++) {
        ctx.beginPath();
        for (var k = 0; k <= n2; k++) {
          var a = -Math.PI / 2 + k * 2 * Math.PI / n2;
          var x = cx + Math.cos(a) * rr * ring / 3, y = cy + Math.sin(a) * rr * ring / 3;
          k ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
        }
        ctx.closePath(); ctx.strokeStyle = '#E2E8F0'; ctx.lineWidth = 1; ctx.stroke();
      }
      ctx.beginPath();
      var vals = [0.9, 0.6, 0.75, 0.5, 0.85, 0.65];
      for (var k2 = 0; k2 <= n2; k2++) {
        var a2 = -Math.PI / 2 + k2 * 2 * Math.PI / n2, v2 = vals[k2 % n2];
        var x2 = cx + Math.cos(a2) * rr * v2, y2 = cy + Math.sin(a2) * rr * v2;
        k2 ? ctx.lineTo(x2, y2) : ctx.moveTo(x2, y2);
      }
      ctx.closePath();
      ctx.fillStyle = P[0] + '55'; ctx.fill();
      ctx.strokeStyle = P[0]; ctx.lineWidth = 2; ctx.stroke();
      break;
    }
    case 'gauge': {
      var gcy = cy + r * 0.4;
      ctx.lineWidth = r * 0.26; ctx.lineCap = 'butt';
      ctx.beginPath(); ctx.arc(cx, gcy, r, Math.PI, 0);
      ctx.strokeStyle = '#EDE9FE'; ctx.stroke();
      ctx.beginPath(); ctx.arc(cx, gcy, r, Math.PI, Math.PI + Math.PI * 0.72);
      ctx.strokeStyle = P[0]; ctx.stroke();
      ctx.fillStyle = '#1B1B1B'; ctx.textAlign = 'center';
      ctx.font = '600 ' + Math.round(r * 0.34) + 'px "Segoe UI", sans-serif';
      ctx.fillText('72', cx, gcy - r * 0.28);
      break;
    }
    case 'waterfall': {
      axes();
      var run = 0, nn = s0.length, sw = iw / nn;
      s0.forEach(function (v, i) {
        var delta = i === 0 ? v : v - s0[i - 1];
        var y0 = pad.t + ih * (1 - (run + Math.max(delta, 0)) / maxV);
        var hh = Math.abs(ih * delta / maxV);
        ctx.fillStyle = delta >= 0 ? P[1] : P[2];
        ctx.fillRect(pad.l + sw * i + sw * 0.25, y0, sw * 0.5, Math.max(2, hh));
        run += delta;
      });
      break;
    }
  }
}

  document.querySelectorAll('[data-cthumb]').forEach(function (cv) {
    try { drawChart(cv.getContext('2d'), cv.width, cv.height, cv.dataset.cthumb); } catch (e) {}

function addChart(type) {
  if (!fc) return;
  histLabel('Added chart');
  var slideW = fc.getWidth() / fc.getZoom();
  var slideH = fc.getHeight() / fc.getZoom();
  var W = Math.round(Math.min(slideW * 0.55, 620));
  var H = Math.round(W * 0.62);
  var cv = document.createElement('canvas');
  var dpr = 2;                       /* draw at 2x so it stays sharp when scaled */
  cv.width = W * dpr; cv.height = H * dpr;
  var ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);
  drawChart(ctx, W, H, type);

  fabric.Image.fromURL(cv.toDataURL('image/png'), function (img) {
    img.set({
      left: (slideW - W) / 2, top: (slideH - H) / 2,
      scaleX: W / img.width, scaleY: H / img.height,
      chartType: type,
      chartDef: JSON.parse(JSON.stringify(CHART_SAMPLE))
    });
    fc.add(img).setActiveObject(img);
    fc.renderAll();
    saveState();
    showToast('Chart added — data stays editable later');
  });
}

function paintPattern(ctx, size, p) {
  ctx.fillStyle = p.bg; ctx.fillRect(0, 0, size, size);
  ctx.strokeStyle = p.fg; ctx.fillStyle = p.fg; ctx.lineWidth = 1.3;
  var s = size;
  if (p.fn === 'dots') {
    for (var y = 6; y < s; y += 12) for (var x = 6; x < s; x += 12) {
      ctx.beginPath(); ctx.arc(x, y, 1.9, 0, Math.PI * 2); ctx.fill();
    }
  } else if (p.fn === 'grid' || p.fn === 'graph') {
    var step = p.fn === 'graph' ? 8 : 16;
    for (var i = 0; i <= s; i += step) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(s, i); ctx.stroke();
    }
  } else if (p.fn === 'diag') {
    for (var k = -s; k < s * 2; k += 12) {
      ctx.beginPath(); ctx.moveTo(k, 0); ctx.lineTo(k + s, s); ctx.stroke();
    }
  } else if (p.fn === 'cross') {
    ctx.lineWidth = 1.6;
    for (var y2 = 10; y2 < s; y2 += 20) for (var x2 = 10; x2 < s; x2 += 20) {
      ctx.beginPath();
      ctx.moveTo(x2 - 3.5, y2); ctx.lineTo(x2 + 3.5, y2);
      ctx.moveTo(x2, y2 - 3.5); ctx.lineTo(x2, y2 + 3.5);
      ctx.stroke();
    }
  } else if (p.fn === 'chevron') {
    ctx.lineWidth = 1.6;
    for (var y3 = 0; y3 < s + 16; y3 += 16) {
      ctx.beginPath();
      for (var x3 = 0; x3 <= s; x3 += 16) {
        ctx.lineTo(x3, y3 + (x3 / 16 % 2 ? 0 : 8));
      }
      ctx.stroke();
    }
  } else if (p.fn === 'noise') {
    for (var i2 = 0; i2 < 260; i2++) {
      ctx.fillRect((i2 * 37) % s, (i2 * 53) % s, 1.8, 1.8);
    }
  }
}

function applyBgGradient(i) {

  var w = fc.getWidth() / fc.getZoom(), h = fc.getHeight() / fc.getZoom();
  var rad = (g.d - 90) * Math.PI / 180;
  fc.setBackgroundColor(new fabric.Gradient({
    type: 'linear',
    gradientUnits: 'pixels',
    coords: { x1: w / 2 - Math.cos(rad) * w / 2, y1: h / 2 - Math.sin(rad) * h / 2,
              x2: w / 2 + Math.cos(rad) * w / 2, y2: h / 2 + Math.sin(rad) * h / 2 },
    colorStops: [{ offset: 0, color: g.a }, { offset: 1, color: g.b }]
  }), fc.renderAll.bind(fc));
  saveState();
  showToast(g.n + ' background');
}

function applyBgPattern(i) {
  var p = BG_PATTERNS[i];
  if (!p || !fc) return;
  var cv = document.createElement('canvas');
  cv.width = cv.height = 64;
  paintPattern(cv.getContext('2d'), 64, p);
  fc.setBackgroundColor(new fabric.Pattern({ source: cv, repeat: 'repeat' }),
                        fc.renderAll.bind(fc));
  saveState();
  showToast(p.n + ' background');
}

/* ════════════════════════════════════════════════════════════
   CANVA-STYLE SELECTION HANDLES
   Fabric's default is a thin blue box with small square corners. Canva
   uses a violet outline, white circular corner handles and pill-shaped
   side handles, with the rotate grip BELOW the object. Purely cosmetic —
   the transform maths is untouched.
   ════════════════════════════════════════════════════════════ */
(function applyCanvaControls() {
  if (typeof fabric === 'undefined') return;
  var VIO = '#8B3DFF';

  fabric.Object.prototype.set({
    borderColor: VIO,
    borderScaleFactor: 1.5,
    cornerColor: '#FFFFFF',
    cornerStrokeColor: VIO,
    cornerSize: 11,
    cornerStyle: 'circle',
    transparentCorners: false,
    padding: 2,
    borderOpacityWhenMoving: 0.75
  });

  function roundRect(ctx, x, y, w, h, r) {
    if (ctx.roundRect) { ctx.roundRect(x, y, w, h, r); return; }
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
  }

  /* side handles: a short rounded bar, oriented along the edge it grabs */
  function pill(horizontal) {
    return function (ctx, left, top, styleOverride, obj) {
      var w = horizontal ? 18 : 6, h = horizontal ? 6 : 18;
      ctx.save();
      ctx.translate(left, top);
      ctx.rotate(fabric.util.degreesToRadians(obj.angle || 0));
      ctx.beginPath();
      roundRect(ctx, -w / 2, -h / 2, w, h, 3);
      ctx.fillStyle = '#FFFFFF';
      ctx.fill();
      ctx.lineWidth = 1.4;
      ctx.strokeStyle = VIO;
      ctx.stroke();
      ctx.restore();
    };
  }

  var C = fabric.Object.prototype.controls;
  if (C) {
    ['ml', 'mr'].forEach(function (k) { if (C[k]) C[k].render = pill(false); });
    ['mt', 'mb'].forEach(function (k) { if (C[k]) C[k].render = pill(true); });

    /* rotate grip: Canva puts it below the object, as a circle with a glyph */
    if (C.mtr) {
      C.mtr.y = 0.5;
      C.mtr.offsetY = 28;
      C.mtr.withConnection = false;
      C.mtr.render = function (ctx, left, top) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(left, top, 10, 0, Math.PI * 2);
        ctx.fillStyle = '#FFFFFF';
        ctx.fill();
        ctx.lineWidth = 1.2;
        ctx.strokeStyle = 'rgba(0,0,0,0.16)';
        ctx.stroke();
        /* curved arrow glyph */
        ctx.beginPath();
        ctx.arc(left, top, 4.6, Math.PI * 0.75, Math.PI * 0.25);
        ctx.lineWidth = 1.7;
        ctx.strokeStyle = '#333333';
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(left + 3.2, top - 4.6);
        ctx.lineTo(left + 5.6, top - 2.6);
        ctx.lineTo(left + 2.4, top - 1.4);
        ctx.closePath();
        ctx.fillStyle = '#333333';
        ctx.fill();
        ctx.restore();
      };
    }
  }

  /* the marquee you drag on empty canvas */
  fabric.Canvas.prototype.selectionColor = 'rgba(139,61,255,0.08)';
  fabric.Canvas.prototype.selectionBorderColor = VIO;
  fabric.Canvas.prototype.selectionLineWidth = 1.2;
})();

var _ribbonTab = 'home';

function ribbonSelection() {
  return (typeof fc !== 'undefined' && fc) ? fc.getActiveObject() : null;
}

function renderRibbon() {
  var tabsEl = document.getElementById('ribbon-tabs');
  var bodyEl = document.getElementById('ribbon-body');
  if (!tabsEl || !bodyEl) return;
  var hasSel = !!ribbonSelection();

  /* Contextual tabs drop out when nothing is selected, and only the tab
     matching WHAT is selected appears — an icon gets Icon format, anything
     else gets Shape format. Never both. */
  var sel = ribbonSelection();
  var ctxId = !hasSel ? null : sel.isIcon ? 'icon' : sel.isIllo ? 'illo' : 'shape';
  var visible = RIBBON.filter(function (t) {
    if (!t.ctx) return true;
    return t.id === ctxId;
  });
  if (!visible.some(function (t) { return t.id === _ribbonTab; })) _ribbonTab = 'home';

  tabsEl.innerHTML = visible.map(function (t) {
    return '<button class="rb-tab' + (t.ctx ? ' ctx' : '')
      + (t.id === _ribbonTab ? ' active' : '') + '" data-rbtab="' + t.id
      + '" role="tab">' + t.name + '</button>';
  }).join('');

  var tab = visible.filter(function (t) { return t.id === _ribbonTab; })[0];
  if (!tab) { bodyEl.innerHTML = ''; return; }

  bodyEl.innerHTML = tab.groups.map(function (g) {
    return '<div class="rb-group"><div class="rb-row">' + g.items.map(function (it) {
      var f = it[3] || '';
      var off = f.indexOf('s') > -1 && !hasSel;
      var cls = 'rb-btn'
        + (f.indexOf('w') > -1 ? ' wide' : '')
        + (f.indexOf('m') > -1 ? ' mini' : '')
        + (f.indexOf('d') > -1 ? ' danger' : '')
        + (off ? ' disabled' : '');
      return '<button class="' + cls + '" data-rb="' + it[2] + '" title="' + it[1] + '">'
        + '<span class="material-icons-outlined">' + it[0] + '</span>'
        + '<span>' + it[1] + '</span></button>';
    }).join('') + '</div><div class="rb-label">' + g.name + '</div></div>';
  }).join('');
}

/* Run a ribbon command. Anything already wired as a data-action is
   delegated rather than reimplemented, so there is one implementation
   of each behaviour in the file. */
function ribbonRun(key) {
  var o = ribbonSelection();

  /* prefixed keys: anim:fade, trig:click, trans:push */
  if (key.indexOf('anim:') === 0)  { animSet(key.slice(5)); return; }
  if (key.indexOf('trig:') === 0)  { rbAnimTrigger(key.slice(5)); return; }
  if (key.indexOf('trans:') === 0) { transSet(key.slice(6)); return; }

  switch (key) {
    /* ── Home ── */
    case 'painter':       rbPainterPick(); return;
    case 'font-family':   rbFontFamily(); return;
    case 'font-size':     rbFontSize(0); return;
    case 'font-up':       rbFontSize(2); return;
    case 'font-down':     rbFontSize(-2); return;
    case 'strike':        rbTextStyle('strike'); return;
    case 'clear-format':  rbClearFormatting(); return;
    case 'highlight':     rbHighlight(); return;
    case 'p-left':        rbAlignText('left'); return;
    case 'p-center':      rbAlignText('center'); return;
    case 'p-right':       rbAlignText('right'); return;
    case 'p-justify':     rbAlignText('justify'); return;
    case 'bullets':       rbList('bullet'); return;
    case 'numbering':     rbList('number'); return;
    case 'indent-in':     rbIndent(1); return;
    case 'indent-out':    rbIndent(-1); return;
    case 'line-spacing':  rbLineSpacing(); return;
    case 'select-all':    rbSelectAll(); return;
    case 'deselect':      rbDeselect(); return;
    case 'find':          rbFind(); return;

    /* ── Arrange ── */
    case 'a-left':        rbAlign('left'); return;
    case 'a-hcenter':     rbAlign('hcenter'); return;
    case 'a-right':       rbAlign('right'); return;
    case 'a-top':         rbAlign('top'); return;
    case 'a-vcenter':     rbAlign('vcenter'); return;
    case 'a-bottom':      rbAlign('bottom'); return;
    case 'dist-h':        rbDistribute('h'); return;
    case 'dist-v':        rbDistribute('v'); return;
    case 'rot-left':      rbRotate(-90); return;
    case 'rot-right':     rbRotate(90); return;
    case 'flip-h':        rbFlip('h'); return;
    case 'flip-v':        rbFlip('v'); return;
    case 'group':         layerGroup(); return;
    case 'ungroup':       layerUngroup(); return;
    case 'lock-on':       rbLock(true); return;
    case 'unlock-all':    rbUnlockAll(); return;

    /* ── Design ── */
    case 'theme-save':    rbSaveTheme(); return;
    case 'theme-accent':  rbThemeAccent(); return;
    case 'theme-fonts':   rbThemeFont(); return;
    case 'page-size':     rbPageSize(); return;
    case 'orientation':   rbOrientation(); return;
    case 'bg-to-all':     rbBgToAll(); return;

    /* ── Animate ── */
    case 'anim-ms':       rbAnimTiming('ms'); return;
    case 'anim-delay':    rbAnimTiming('delay'); return;

    /* ── View ── */
    case 'fit-width':     rbFitWidth(); return;
    case 'v-ruler':       rbToggleView('ruler'); return;
    case 'v-grid':        rbToggleView('grid'); return;
    case 'v-guides':      rbToggleView('guides'); return;
    case 'panel-layers':  rbTogglePanel('layers'); return;
    case 'panel-props':   rbTogglePanel('effects2'); return;

    /* ── Review ── */
    case 'proof-spell':     rbProof('spell'); return;
    case 'proof-grammar':   rbProof('grammar'); return;
    case 'comment-add':     rbAddComment(); return;
    case 'comment-resolve': rbResolveComment(); return;
    case 'a11y-check':      openPanel('a11y'); return;

    /* ── Present ── */
    case 'present-start':   rbPresent(false); return;
    case 'present-current': rbPresent(true); return;
    case 'presenter-view':  openPanel('presenter'); return;
    case 'rehearse':        openPanel('presenter'); rehearseStart(); return;
    case 'record':          openPanel('presenter'); return;

    /* ── Developer ── */
    case 'dev-json':  rbInspectJson(); return;
    case 'dev-layer': rbInspectLayer(); return;
    case 'dev-perf':  rbPerfStats(); return;
  }

  if (key.indexOf('panel:') === 0) { openPanel(key.slice(6)); return; }
  if (key.indexOf('act:') === 0) {
    var el = document.querySelector('[data-action="' + key.slice(4) + '"]');
    if (el) el.click();
    return;
  }

  switch (key) {
    /* delegate to the existing implementations */
    case 'copy':        ctxCopy(); break;
    case 'paste':       ctxPaste(); break;
    case 'cut':         ctxCopy(); ctxDelete(); break;
    case 'duplicate':   ctxDuplicate(); break;
    case 'delete':      ctxDelete(); break;
    case 'lock':        ctxLock(); break;
    case 'link':        ctxLink(); break;
    case 'alttext':     ctxAltText(); break;
    case 'info':        ctxInfo(); break;
    case 'centre':      ctxAlign(); break;

    case 'add-page':    addPage(); break;
    case 'del-page':    deletePage(); break;
    case 'dup-page': {
      var b = document.querySelector('.page-thumb.active [data-pt="dup"]');
      if (b) b.click(); else showToast('Open a slide first');
      break;
    }

    case 'front':       if (o) { o.bringToFront();  fc.renderAll(); saveState(); } break;
    case 'back':        if (o) { o.sendToBack();    fc.renderAll(); saveState(); } break;
    case 'forward':     if (o) { o.bringForward();  fc.renderAll(); saveState(); } break;
    case 'backward':    if (o) { o.sendBackwards(); fc.renderAll(); saveState(); } break;
    case 'middle':
      if (o) { o.set({ top: (fc.getHeight() / fc.getZoom() - o.getScaledHeight()) / 2 });
               fc.renderAll(); saveState(); }
      break;

    case 'zoom-in':  case 'zoom-out': case 'zoom-fit': {
      /* call the zoom functions directly — the fit button no longer exists
         in the bottom bar, so clicking a DOM node is not reliable */
      if (typeof setZoom !== 'function') break;
      if (key === 'zoom-fit') { setZoom(calculateFitZoom()); break; }
      setZoom(state.zoom + (key === 'zoom-in' ? 10 : -10));
      break;
    }

    case 'toggle-notes':   toggleNotes(); break;
    case 'toggle-sidebar': {
      var sb = document.querySelector('[data-action="toggle-sidebar"]');
      if (sb) sb.click();
      break;
    }
    case 'present': {
      var pb = document.querySelector('[data-action="present"]');
      if (pb) pb.click();
      break;
    }
    case 'upload-image': dom.uploadImgInput.click(); break;
    case 'upload-pptx':  dom.uploadPptxInput.click(); break;
    case 'add-textbox':  addText('heading'); break;

    /* frame-aware commands — the reason Shape format exists */
    case 'frame-fill':
      if (o && o.isFrame) { _frameFillTarget = o; dom.uploadImgInput.click(); }
      else showToast('Select a shape or frame first');
      break;
    case 'frame-clear':
      if (o && o.isFrame) {
        o.frameSrc = null; o.frameRect = null; o._frameImg = null;
        refreshFrame(o); saveState(); showToast('Photo removed');
      } else showToast('Select a frame first');
      break;
    case 'shapes': break;   /* handled as a flyout by the click listener */
    case 'shape-outline': {
      if (!o) { showToast('Select a shape first'); break; }
      var oc = prompt('Outline colour (hex), or blank for none:', o.stroke || '#1B1B1B');
      if (oc === null) break;
      if (o.isFrame && o._objects && o._objects[0]) {
        o._objects[0].set({ stroke: oc || '', strokeWidth: oc ? 2 : 0 });
        o.dirty = true;
      } else {
        o.set({ stroke: oc || '', strokeWidth: oc ? 2 : 0 });
      }
      fc.renderAll(); saveState();
      break;
    }
    case 'shape-fill': {
      if (!o) { showToast('Select a shape first'); break; }
      var cur = o.isFrame ? (o.frameFill || '#7C3AED') : (o.fill || '#7C3AED');
      var c = prompt('Fill colour (hex):', cur);
      if (!c) break;
      if (o.isFrame) { o.frameFill = c; refreshFrame(o); }
      else { o.set('fill', c); fc.renderAll(); }
      saveState();
      break;
    }

    /* text formatting — acts on the selected text object */
    case 'bold': case 'italic': case 'underline': {
      if (!o || !/text/.test(o.type)) { showToast('Select a text box first'); break; }
      if (key === 'bold')       o.set('fontWeight', o.fontWeight === 'bold' ? 'normal' : 'bold');
      if (key === 'italic')     o.set('fontStyle', o.fontStyle === 'italic' ? 'normal' : 'italic');
      if (key === 'underline')  o.set('underline', !o.underline);
      fc.renderAll(); saveState();
      break;
    }
    case 'text-colour': {
      if (!o || !/text/.test(o.type)) { showToast('Select a text box first'); break; }
      var tc = prompt('Text colour (hex):', o.fill || '#000000');
      if (tc) { o.set('fill', tc); fc.renderAll(); saveState(); }
      break;
    }
    case 'align-left': case 'align-center': case 'align-right': {
      if (!o) { showToast('Select something first'); break; }
      var side = key.slice(6);
      if (/text/.test(o.type)) {
        o.set('textAlign', side === 'center' ? 'center' : side);
        fc.renderAll(); saveState();
      } else {
        var sw = fc.getWidth() / fc.getZoom(), ow = o.getScaledWidth();
        o.set({ left: side === 'left' ? 0 : side === 'right' ? sw - ow : (sw - ow) / 2 });
        fc.renderAll(); saveState();
      }
      break;
    }

    /* slide setup */
    case 'size-169': case 'size-43': {
      var r = key === 'size-169' ? [12192000, 6858000] : [9144000, 6858000];
      if (typeof setSlideAspect === 'function') {
        setSlideAspect(r[0], r[1]);
        showToast(key === 'size-169' ? 'Slide set to 16:9' : 'Slide set to 4:3');
      }
      break;
    }
    case 'bg-colour': {
      var bc = prompt('Background colour (hex):', '#FFFFFF');
      if (bc) { fc.setBackgroundColor(bc, fc.renderAll.bind(fc)); saveState(); }
      break;
    }

    default: showToast('Not wired yet: ' + key);
  }
  renderRibbon();
}

/* When "Drop photo" is used, the next upload goes straight into that frame. */
var _frameFillTarget = null;

function initRibbon() {
  var ribbon = document.getElementById('ribbon');
  var tabsEl = document.getElementById('ribbon-tabs');
  var bodyEl = document.getElementById('ribbon-body');
  if (!ribbon || !tabsEl || !bodyEl) return;

  renderRibbon();

  tabsEl.addEventListener('click', function (e) {
    var t = e.target.closest('[data-rbtab]');
    if (!t) return;
    if (ribbon.classList.contains('collapsed')) ribbon.classList.remove('collapsed');
    _ribbonTab = t.dataset.rbtab;
    renderRibbon();
  });

  /* PowerPoint behaviour: double-click the strip to collapse to tabs only */
  tabsEl.addEventListener('dblclick', function () {
    ribbon.classList.toggle('collapsed');
    try { localStorage.setItem('ld_ribbon_collapsed',
      ribbon.classList.contains('collapsed') ? '1' : '0'); } catch (e) {}
    window.dispatchEvent(new Event('resize'));
  });
  try {
    if (localStorage.getItem('ld_ribbon_collapsed') === '1') ribbon.classList.add('collapsed');
  } catch (e) {}

  bodyEl.addEventListener('click', function (e) {
    var b = e.target.closest('[data-rb]');
    if (!b) return;
    /* Shapes is a gallery flyout, not a one-shot command */
    if (b.dataset.rb === 'shapes') {
      if (_sgOpen) closeShapesGallery(); else openShapesGallery(b);
      return;
    }
    closeShapesGallery();
    ribbonRun(b.dataset.rb);
  });

  /* selection drives the contextual tab + which buttons are live */
  var t = setInterval(function () {
    if (typeof fc === 'undefined' || !fc || !fc.on) return;
    clearInterval(t);
    ['selection:created', 'selection:updated', 'selection:cleared'].forEach(function (ev) {
      fc.on(ev, function () {
        /* jump to the matching format tab the moment something is selected */
        if (ev !== 'selection:cleared' && _ribbonTab === 'home') {
          var s = ribbonSelection();
          _ribbonTab = !s ? 'home' : s.isIcon ? 'icon' : s.isIllo ? 'illo' : 'shape';
        }
        renderRibbon();
      });
    });
    renderRibbon();
  }, 300);
}

/* Build the panel HTML for a tab — "All" shows every group. */
function renderElementCatalog(tab) {
  var html = '';
  ELEMENT_CATALOG.forEach(function (grp, gi) {
    if (tab && tab !== 'All' && grp.tab !== tab) return;
    html += '<div class="panel-subhead">' + grp.name
          + (grp.note ? ' <span>' + grp.note + '</span>' : '') + '</div>';
    html += '<div class="element-grid">' + grp.items.map(function (it, ii) {
      var style = it.s
        ? 'fill:none;stroke:currentColor;stroke-width:' + (it.w || 2)
          + ';stroke-linecap:round;stroke-linejoin:round'
          + (it.dash ? ';stroke-dasharray:' + it.dash.join(' ') : '')
        : 'fill:currentColor' + (it.e ? ';fill-rule:evenodd' : '');
      return '<div class="element-card' + (it.frame ? ' frame-card' : '')
        + '" style="animation-delay:' + (ii * 0.02) + 's"'
        + ' data-action="add-catalog" data-g="' + gi + '" data-i="' + ii + '"'
        + ' title="' + it.n + '">'
        + '<svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">'
        + '<path d="' + it.d + '" style="' + style + '"/></svg></div>';
    }).join('') + '</div>';
  });
  return html || '<div class="panel-placeholder">'
    + '<span class="material-icons-outlined">category</span>'
    + '<p><strong>Nothing here yet</strong><br>Pick another category.</p></div>';
}

/* Put one item (from either the catalog or the shapes gallery) on the slide.
   Filled = live frame (absorbs a picture). Stroke art = plain path. */
function placeShape(it) {
  if (!it || !fc) return;
  if (it.frame) { addFrame(it.frame); return; }

  var slideW = fc.getWidth() / fc.getZoom();
  var slideH = fc.getHeight() / fc.getZoom();

  if (!it.s) {
    makeFrameShape({ d: it.d, pathW: 50, pathH: 50, kind: it.n,
                     look: 'solid', fill: '#7C3AED', evenOdd: !!it.e,
                     boxW: Math.max(80, Math.min(slideW, slideH) * 0.32) });
    showToast(it.n + ' added — drop a photo in it');
    return;
  }

  var p = new fabric.Path(it.d, {
    fill: '', stroke: '#7C3AED', strokeWidth: it.w || 2,
    strokeLineCap: 'round', strokeLineJoin: 'round',
    strokeDashArray: it.dash || null, strokeUniform: true,
    objectCaching: false
  });
  var target = Math.max(60, Math.min(slideW, slideH) * 0.45);
  p.scale(target / Math.max(p.width || 1, p.height || 1));
  p.set({ left: (slideW - p.getScaledWidth()) / 2,
          top:  (slideH - p.getScaledHeight()) / 2 });
  fc.add(p).setActiveObject(p);
  fc.renderAll();
  saveState();
  showToast(it.n + ' added');
}

function addCatalogItem(gi, ii) {
  histLabel('Added element');
  var grp = ELEMENT_CATALOG[gi];
  placeShape(grp && grp.items[ii]);
}

var _sgOpen = false;

function openShapesGallery(anchor) {
  var g = document.getElementById('shape-gallery');
  if (!g) {
    g = document.createElement('div');
    g.id = 'shape-gallery';
    g.className = 'shape-gallery';
    g.innerHTML = SHAPES_GALLERY.map(function (grp, gi) {
      return '<div class="sg-head">' + grp.name + '</div><div class="sg-row">'
        + grp.items.map(function (it, ii) {
            var st = it.s
              ? 'fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round'
              : 'fill:currentColor' + (it.e ? ';fill-rule:evenodd' : '');
            return '<button class="sg-item" data-sg="' + gi + ':' + ii + '" title="' + it.n + '">'
              + '<svg viewBox="0 0 50 50"><path d="' + it.d + '" style="' + st + '"/></svg></button>';
          }).join('')
        + '</div>';
    }).join('');
    document.body.appendChild(g);
    g.addEventListener('click', function (e) {
      var b = e.target.closest('[data-sg]');
      if (!b) return;
      var p = b.dataset.sg.split(':');
      placeShape(SHAPES_GALLERY[+p[0]].items[+p[1]]);
      closeShapesGallery();
    });
  }
  var r = anchor.getBoundingClientRect();
  g.style.left = Math.min(r.left, window.innerWidth - 344) + 'px';
  g.style.top = (r.bottom + 4) + 'px';
  g.classList.add('open');
  _sgOpen = true;
}

function closeShapesGallery() {
  var g = document.getElementById('shape-gallery');
  if (g) g.classList.remove('open');
  _sgOpen = false;
}

document.addEventListener('click', function (e) {
  if (_sgOpen && !e.target.closest('#shape-gallery') && !e.target.closest('[data-rb="shapes"]')) {
    closeShapesGallery();
  }
});
