<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Media Kit Templates — LazyDogTemplates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --accent: #d4af37;
      --red: #e03030;
      --bg: #07071a;
      --bg-card: #0d0d26;
      --text: #e8eaf0;
      --muted: #8899aa;
    }
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ══ YELLOW STRIP ══ */
    .navbar-below-strip {
      width: 100%;
      height: 285px;
      background: #ffcc00;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      box-sizing: border-box;
      padding: 20px 0 0 34px;
    }

    /* ══ HERO SECTION ══ */
    .hero-section {
      width: 100%;
      height: 300px;
      background: #060626;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 0;
      gap: 0;
    }

    .hero-content {
      flex: 1;
      align-self: flex-start;
      padding: 12px 16px 0 34px;
    }

    .hero-img-box {
      flex-shrink: 0;
      background: transparent;
      align-self: flex-start;
    }
    .hero-img-box img {
      display: block;
      width: 1200px;
      height: 450px;
      max-width: 100%;
      object-fit: cover;
      border-radius: 0 0 18px 18px;
      filter: drop-shadow(0 26px 50px rgba(0,0,0,0.45));
    }

    /* ══ DECK CARD ══ */
    .deck-card {
      background: #fff;
      border-radius: 14px;
      width: 200px;
      flex-shrink: 0;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .deck-card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.5); }
    .deck-card-thumb {
      width: 100%;
      height: 118px;
      object-fit: cover;
      display: block;
    }
    .deck-card-body { padding: 10px 12px 12px; }
    .deck-card-badge {
      display: inline-block;
      background: #d4af37;
      color: #1a0a3a;
      font-size: 9px; font-weight: 800;
      letter-spacing: 0.8px; text-transform: uppercase;
      padding: 3px 8px; border-radius: 20px;
      margin-bottom: 5px;
    }
    .deck-card-cat {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: #7c5cbf;
      margin-bottom: 4px; font-family: 'Poppins', sans-serif;
    }
    .deck-card-title {
      font-size: 12.5px; font-weight: 700;
      color: #1a1a2e; line-height: 1.3;
      margin-bottom: 3px; font-family: 'Poppins', sans-serif;
    }
    .deck-card-meta { font-size: 10px; color: #8899aa; margin-bottom: 6px; }
    .deck-card-tag {
      display: inline-block;
      background: #e8f0fe; color: #3b5bdb;
      font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 12px;
      margin-bottom: 6px;
    }
    .deck-card-stars { font-size: 11px; color: #f59e0b; margin-bottom: 8px; }
    .deck-card-stars span { color: #8899aa; font-size: 10px; margin-left: 3px; }
    .deck-card-footer { display: flex; align-items: center; justify-content: space-between; }
    .deck-card-free { font-size: 12px; font-weight: 800; color: #22c55e; }
    .deck-card-btn {
      background: linear-gradient(135deg, #6b21c8, #9333ea);
      color: #fff; font-size: 11px; font-weight: 700;
      padding: 5px 12px; border-radius: 20px;
      border: none; cursor: pointer; font-family: 'Inter', sans-serif;
      transition: opacity 0.15s;
    }
    .deck-card-btn:hover { opacity: 0.85; }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(212,175,55,0.10);
      border: 1px solid rgba(212,175,55,0.30);
      color: var(--accent);
      font-size: 10.5px;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 20px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      font-family: 'Poppins', sans-serif;
      margin-bottom: 18px;
    }

    .hero-section h1, .navbar-below-strip h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 32px;
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.5px;
      color: #1a1a2e;
      margin-bottom: 16px;
    }

    .hero-section h1 span { color: var(--red); }

    /* ══ CATEGORY PANEL ══ */
    .cat-panel {
      position: fixed;
      background: linear-gradient(160deg, #0e0824 0%, #150d35 100%);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      padding: 10px 0;
      z-index: 9999;
      box-shadow: 0 24px 64px rgba(0,0,0,0.8), 0 0 0 1px rgba(180,100,255,0.08);
      min-width: 240px;
      max-height: 420px;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: opacity 0.18s, transform 0.18s;
      scrollbar-width: thin;
      scrollbar-color: rgba(180,100,255,0.3) transparent;
    }
    .cat-panel::-webkit-scrollbar { width: 4px; }
    .cat-panel::-webkit-scrollbar-thumb { background: rgba(180,100,255,0.3); border-radius: 4px; }
    .cat-panel.open { opacity: 1; pointer-events: all; transform: translateY(0); }

    .cat-panel-title {
      font-size: 9.5px; font-weight: 700; letter-spacing: 1.6px;
      text-transform: uppercase; color: rgba(255,255,255,0.35);
      padding: 4px 18px 10px; font-family: 'Poppins', sans-serif;
      border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 4px;
    }
    .cat-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 18px;
      font-size: 13.5px; font-family: 'Inter', sans-serif;
      color: #cdd0e0; cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .cat-item:hover { background: rgba(180,100,255,0.12); color: #fff; }
    .cat-item .ci-icon { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; }
    .cat-item .ci-name { flex: 1; }
    .cat-item .ci-arrow { font-size: 16px; color: rgba(255,255,255,0.25); margin-left: auto; transition: color 0.12s; }
    .cat-item:hover .ci-arrow { color: rgba(212,175,55,0.8); }

    /* ══ SUBMENU PANEL ══ */
    .cat-submenu {
      position: fixed;
      background: linear-gradient(160deg, #0e0824 0%, #150d35 100%);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 10px;
      padding: 6px 0;
      z-index: 10000;
      box-shadow: 0 16px 48px rgba(0,0,0,0.8), 0 0 0 1px rgba(180,100,255,0.06);
      min-width: 220px;
      max-height: 320px;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-6px);
      transition: opacity 0.15s, transform 0.15s;
      scrollbar-width: thin;
      scrollbar-color: rgba(180,100,255,0.3) transparent;
    }
    .cat-submenu::-webkit-scrollbar { width: 4px; }
    .cat-submenu::-webkit-scrollbar-thumb { background: rgba(180,100,255,0.3); border-radius: 4px; }
    .cat-submenu.open { opacity: 1; pointer-events: all; transform: translateX(0); }
    .sub-item {
      display: block;
      padding: 9px 16px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      color: #cdd0e0;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sub-item:hover { background: rgba(180,100,255,0.12); color: #fff; }
    .sub-item.coming-soon { color: rgba(255,255,255,0.25); font-style: italic; cursor: default; }
    .sub-item.coming-soon:hover { background: transparent; color: rgba(255,255,255,0.25); }

    .hero-sub {
      font-size: 15.5px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 480px;
      margin-bottom: 32px;
    }

    .hero-stats {
      display: flex;
      gap: 14px;
    }

    .hero-stat {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px;
      padding: 14px 22px;
      text-align: center;
      min-width: 90px;
      transition: border-color 0.2s, background 0.2s;
    }

    .hero-stat:hover {
      background: rgba(212,175,55,0.07);
      border-color: rgba(212,175,55,0.22);
    }

    .hero-stat-num {
      display: block;
      font-family: 'Poppins', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 4px;
    }

    .hero-stat-label {
      font-size: 10px;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
  </style>
</head>

  (function(){
    var grid = document.getElementById('deckGrid');
    DECKS.forEach(function(deck){
      var a = document.createElement('a');
      a.className = 'pd-card';
      a.href = deck.href;
      a.setAttribute('data-cat', deck.cat || '');

      var img = document.createElement('img');
      img.className = 'pd-card-img';
      img.src = deck.slides[0];
      img.alt = deck.title;
      a.appendChild(img);

      var info = document.createElement('div');
      info.className = 'pd-card-info';
      info.innerHTML =
        '<div class="pd-card-label">Media Kit Template &bull; ' + deck.slides.length + ' slides</div>' +
        '<div class="pd-card-title">' + deck.title + '</div>' +
        '<div class="pd-card-meta">' +
          '<span><span class="pd-card-stars">★★★★★</span><span class="pd-card-rating">(48)</span></span>' +
          '<span class="pd-card-price">FREE</span>' +
        '</div>' +
        '<div class="pd-card-actions"><div class="pd-card-btn-view">View Slides</div></div>';
      a.appendChild(info);

      var timer = null, idx = 0;
      a.addEventListener('mouseenter', function(){
        idx = 0;
        timer = setInterval(function(){
          idx = (idx + 1) % deck.slides.length;
          img.src = deck.slides[idx];
        }, 600);
      });
      a.addEventListener('mouseleave', function(){
        clearInterval(timer);
        img.src = deck.slides[0];
      });

      grid.appendChild(a);
    });
  })();
</script>

<!-- CATEGORY PANEL (dynamically built from DECKS array) -->
<div id="catPanel" class="cat-panel" onmouseenter="catEnter()" onmouseleave="catLeave()">
  <div class="cat-panel-title">Browse Categories</div>
  <!-- rows injected by JS below -->
</div>

<!-- SUBMENU PANEL (shared, repositioned on demand) -->
<div id="catSubmenu" class="cat-submenu" onmouseenter="subEnter()" onmouseleave="subLeave()">
  <!-- kit links injected by JS -->
</div>

<script>
// ── Category icon map ──
var CAT_ICONS = {
  'Fashion':              '👗',
  'Beauty / Wellness':    '💆',
  'Influencer / Creator': '📱',
  'Food / Restaurant':    '🍔',
  'Health / Wellness':    '🌿',
  'Corporate':            '🏢',
  'Tech / SaaS':          '💻',
  'Media / Entertainment':'🎬',
  'Sports / Fitness':     '🏋️',
  'Energy / Green Tech':  '🌱',
  'Finance / Business':   '💰',
  'Creative / Agency':    '🎨',
  'Startup':              '🚀'
};

var ALL_CATS = Object.keys(CAT_ICONS);
var activeCat = 'All';

function filterGrid(cat) {
  activeCat = cat;
  var cards = document.querySelectorAll('.pd-card');
  cards.forEach(function(c) {
    c.style.display = (cat === 'All' || c.getAttribute('data-cat') === cat) ? '' : 'none';
  });
  var nameEl = document.querySelector('#catBtn .ci-btn-name');
  if (nameEl) nameEl.textContent = (cat === 'All') ? 'Categories' : cat;
  document.getElementById('catPanel').classList.remove('open');
  hideSub();
}

(function() {
  var panel = document.getElementById('catPanel');

  // "All" row at top
  var allRow = document.createElement('div');
  allRow.className = 'cat-item';
  allRow.innerHTML =
    '<span class="ci-icon">\uD83D\uDDC2\uFE0F</span>' +
    '<span class="ci-name">All</span>';
  allRow.addEventListener('click', function() { filterGrid('All'); });
  allRow.addEventListener('mouseenter', function() { hideSub(); });
  panel.appendChild(allRow);

  ALL_CATS.forEach(function(cat) {
    var row = document.createElement('div');
    row.className = 'cat-item';
    row.setAttribute('data-cat', cat);
    row.innerHTML =
      '<span class="ci-icon">' + (CAT_ICONS[cat] || '\uD83D\uDCC1') + '</span>' +
      '<span class="ci-name">' + cat + '</span>' +
      '<span class="ci-arrow">\u203A</span>';
    row.addEventListener('click', function() { filterGrid(cat); });
    row.addEventListener('mouseenter', function() { showSub(cat, row); });
    row.addEventListener('mouseleave', function() { subHideTimer = setTimeout(hideSub, 120); });
    panel.appendChild(row);
  });
})();

function fillSubmenu(cat) {
  var sub = document.getElementById('catSubmenu');
  sub.innerHTML = '';
  var matches = KITS.filter(function(d) { return d.cat === cat; });
  if (matches.length === 0) {
    var cs = document.createElement('span');
    cs.className = 'sub-item coming-soon';
    cs.textContent = 'Coming Soon';
    sub.appendChild(cs);
  } else {
    matches.forEach(function(d) {
      var a = document.createElement('a');
      a.className = 'sub-item';
      a.href = d.href;
      a.textContent = d.title;
      sub.appendChild(a);
    });
  }
}

var catTimer = null;
var catLocked = false;
var subHideTimer = null;
var currentSubCat = null;

function catPosition() {
  var btn = document.getElementById('catBtn');
  var panel = document.getElementById('catPanel');
  var rect = btn.getBoundingClientRect();
  panel.style.top = (rect.bottom + 8) + 'px';
  panel.style.left = rect.left + 'px';
}

function showSub(cat, rowEl) {
  clearTimeout(subHideTimer);
  if (currentSubCat !== cat) {
    fillSubmenu(cat);
    currentSubCat = cat;
  }
  var panel = document.getElementById('catPanel');
  var sub = document.getElementById('catSubmenu');
  var rowRect = rowEl.getBoundingClientRect();
  var panelRect = panel.getBoundingClientRect();
  sub.style.top = rowRect.top + 'px';
  sub.style.left = (panelRect.right + 4) + 'px';
  sub.classList.add('open');
}

function hideSub() {
  document.getElementById('catSubmenu').classList.remove('open');
  currentSubCat = null;
}

window.subEnter = function() { clearTimeout(subHideTimer); };
window.subLeave = function() { subHideTimer = setTimeout(hideSub, 120); };

window.catShow = function() {
  clearTimeout(catTimer);
  catPosition();
  document.getElementById('catPanel').classList.add('open');
};
window.catLeaveBtn = function() {
  if (catLocked) return;
  catTimer = setTimeout(function() {
    document.getElementById('catPanel').classList.remove('open');
    hideSub();
  }, 200);
};
window.catEnter = function() { clearTimeout(catTimer); };
window.catLeave = function() {
  if (catLocked) return;
  clearTimeout(subHideTimer);
  subHideTimer = setTimeout(function() {
    document.getElementById('catPanel').classList.remove('open');
    hideSub();
  }, 150);
};
window.catToggleLock = function() {
  catLocked = !catLocked;
  if (catLocked) {
    clearTimeout(catTimer);
    catPosition();
    document.getElementById('catPanel').classList.add('open');
  } else {
    document.getElementById('catPanel').classList.remove('open');
    hideSub();
  }
};
document.addEventListener('click', function(e) {
  var btn = document.getElementById('catBtn');
  var panel = document.getElementById('catPanel');
  var sub = document.getElementById('catSubmenu');
  if (catLocked && !panel.contains(e.target) && !btn.contains(e.target) && !sub.contains(e.target)) {
    catLocked = false;
    panel.classList.remove('open');
    hideSub();
  }
});
</script>
