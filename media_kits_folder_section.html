    var grid = document.getElementById('deckGrid');
    DECKS.forEach(function(deck){
      var a = document.createElement('a');
      a.className = 'pd-card';
      a.href = deck.href;
      a.setAttribute('data-cat', deck.cat || '');

      var img = document.createElement('img');
      img.className = 'pd-card-img';
      img.src = deck.slides[0];
      img.alt = deck.title;
      a.appendChild(img);

      var info = document.createElement('div');
      info.className = 'pd-card-info';
      info.innerHTML =
        '<div class="pd-card-label">Media Kit Template &bull; ' + deck.slides.length + ' slides</div>' +

        '<div class="pd-card-actions"><div class="pd-card-btn-view">View Slides</div></div>';
      a.appendChild(info);

      var timer = null, idx = 0;
      a.addEventListener('mouseenter', function(){
        idx = 0;
        timer = setInterval(function(){
          idx = (idx + 1) % deck.slides.length;
          img.src = deck.slides[idx];
        }, 600);
      });
      a.addEventListener('mouseleave', function(){
        clearInterval(timer);
        img.src = deck.slides[0];
      });

      grid.appendChild(a);
    });
  })();

var CAT_ICONS = {
  'Fashion':              '👗',
  'Beauty / Wellness':    '💆',
  'Influencer / Creator': '📱',
  'Food / Restaurant':    '🍔',
  'Health / Wellness':    '🌿',
  'Corporate':            '🏢',
  'Tech / SaaS':          '💻',
  'Media / Entertainment':'🎬',
  'Sports / Fitness':     '🏋️',
  'Energy / Green Tech':  '🌱',
  'Finance / Business':   '💰',
  'Creative / Agency':    '🎨',
  'Startup':              '🚀'
};

var ALL_CATS = Object.keys(CAT_ICONS);
var activeCat = 'All';

function filterGrid(cat) {
  activeCat = cat;
  var cards = document.querySelectorAll('.pd-card');
  cards.forEach(function(c) {
    c.style.display = (cat === 'All' || c.getAttribute('data-cat') === cat) ? '' : 'none';
  });
  var nameEl = document.querySelector('#catBtn .ci-btn-name');
  if (nameEl) nameEl.textContent = (cat === 'All') ? 'Categories' : cat;
  document.getElementById('catPanel').classList.remove('open');
  hideSub();
}

(function() {
  var panel = document.getElementById('catPanel');

  // "All" row at top
  var allRow = document.createElement('div');
  allRow.className = 'cat-item';
  allRow.innerHTML =
    '<span class="ci-icon">\uD83D\uDDC2\uFE0F</span>' +
    '<span class="ci-name">All</span>';
  allRow.addEventListener('click', function() { filterGrid('All'); });
  allRow.addEventListener('mouseenter', function() { hideSub(); });
  panel.appendChild(allRow);

  ALL_CATS.forEach(function(cat) {
    var row = document.createElement('div');
    row.className = 'cat-item';
    row.setAttribute('data-cat', cat);
    row.innerHTML =
      '<span class="ci-icon">' + (CAT_ICONS[cat] || '\uD83D\uDCC1') + '</span>' +
      '<span class="ci-name">' + cat + '</span>' +
      '<span class="ci-arrow">\u203A</span>';
    row.addEventListener('click', function() { filterGrid(cat); });
    row.addEventListener('mouseenter', function() { showSub(cat, row); });
    row.addEventListener('mouseleave', function() { subHideTimer = setTimeout(hideSub, 120); });
    panel.appendChild(row);
  });
})();

function fillSubmenu(cat) {
  var sub = document.getElementById('catSubmenu');
  sub.innerHTML = '';
  var matches = KITS.filter(function(d) { return d.cat === cat; });
  if (matches.length === 0) {
    var cs = document.createElement('span');
    cs.className = 'sub-item coming-soon';
    cs.textContent = 'Coming Soon';
    sub.appendChild(cs);
  } else {
    matches.forEach(function(d) {
      var a = document.createElement('a');
      a.className = 'sub-item';
      a.href = d.href;
      a.textContent = d.title;
      sub.appendChild(a);
    });
  }
}

var catTimer = null;
var catLocked = false;
var subHideTimer = null;
var currentSubCat = null;

function catPosition() {
  var btn = document.getElementById('catBtn');
  var panel = document.getElementById('catPanel');
  var rect = btn.getBoundingClientRect();
  panel.style.top = (rect.bottom + 8) + 'px';
  panel.style.left = rect.left + 'px';
}

function showSub(cat, rowEl) {
  clearTimeout(subHideTimer);
  if (currentSubCat !== cat) {
    fillSubmenu(cat);
    currentSubCat = cat;
  }
  var panel = document.getElementById('catPanel');
  var sub = document.getElementById('catSubmenu');
  var rowRect = rowEl.getBoundingClientRect();
  var panelRect = panel.getBoundingClientRect();
  sub.style.top = rowRect.top + 'px';
  sub.style.left = (panelRect.right + 4) + 'px';
  sub.classList.add('open');
}

function hideSub() {
  document.getElementById('catSubmenu').classList.remove('open');
  currentSubCat = null;
}

window.subEnter = function() { clearTimeout(subHideTimer); };
window.subLeave = function() { subHideTimer = setTimeout(hideSub, 120); };

window.catShow = function() {
  clearTimeout(catTimer);
  catPosition();
  document.getElementById('catPanel').classList.add('open');
};
window.catLeaveBtn = function() {
  if (catLocked) return;
  catTimer = setTimeout(function() {
    document.getElementById('catPanel').classList.remove('open');
    hideSub();
  }, 200);
};
window.catEnter = function() { clearTimeout(catTimer); };
window.catLeave = function() {
  if (catLocked) return;
  clearTimeout(subHideTimer);
  subHideTimer = setTimeout(function() {
    document.getElementById('catPanel').classList.remove('open');
    hideSub();
  }, 150);
};
window.catToggleLock = function() {
  catLocked = !catLocked;
  if (catLocked) {
    clearTimeout(catTimer);
    catPosition();
    document.getElementById('catPanel').classList.add('open');
  } else {
    document.getElementById('catPanel').classList.remove('open');
    hideSub();
  }
};
document.addEventListener('click', function(e) {
  var btn = document.getElementById('catBtn');
  var panel = document.getElementById('catPanel');
  var sub = document.getElementById('catSubmenu');
  if (catLocked && !panel.contains(e.target) && !btn.contains(e.target) && !sub.contains(e.target)) {
    catLocked = false;
    panel.classList.remove('open');
    hideSub();
  }
});
</script>

<style>

.colour-panel.open{display:block!important;}
.colour-panel-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;font-family:'Poppins',sans-serif;}

</style>

<div class="colour-panel" id="colourPanel">
  <div class="colour-panel-label">Pick Theme Colour</div>
  <canvas id="colourCanvas" width="220" height="150"></canvas>
  <div class="colour-panel-preview">
    <div class="colour-swatch" id="colourSwatch" style="background:#d4af37;"></div>
    <span class="colour-hex" id="colourHex">#D4AF37</span>
    <button class="colour-reset" onclick="resetColour()">Reset</button>
  </div>
</div>

<script>
var cpOpen=false,cpR=null,cpG=null,cpB=null;
window.toggleColourPanel=function(){cpOpen=!cpOpen;var p=document.getElementById('colourPanel');if(cpOpen){p.classList.add('open');drawSpectrum();}else{p.classList.remove('open');}};
document.addEventListener('click',function(e){var p=document.getElementById('colourPanel'),b=document.getElementById('colourBtn');if(cpOpen&&p&&!p.contains(e.target)&&e.target!==b){p.classList.remove('open');cpOpen=false;}});
function drawSpectrum(){var c=document.getElementById('colourCanvas');if(!c)return;var ctx=c.getContext('2d'),w=c.width,h=c.height;var hg=ctx.createLinearGradient(0,0,w,0);hg.addColorStop(0,'hsl(0,100%,50%)');hg.addColorStop(0.17,'hsl(60,100%,50%)');hg.addColorStop(0.33,'hsl(120,100%,50%)');hg.addColorStop(0.5,'hsl(180,100%,50%)');hg.addColorStop(0.67,'hsl(240,100%,50%)');hg.addColorStop(0.83,'hsl(300,100%,50%)');hg.addColorStop(1,'hsl(360,100%,50%)');ctx.fillStyle=hg;ctx.fillRect(0,0,w,h);var vg=ctx.createLinearGradient(0,0,0,h);vg.addColorStop(0,'rgba(255,255,255,0.85)');vg.addColorStop(0.45,'rgba(255,255,255,0)');vg.addColorStop(0.55,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.85)');ctx.fillStyle=vg;ctx.fillRect(0,0,w,h);}
window.addEventListener('load',function(){var cv=document.getElementById('colourCanvas');if(!cv)return;cv.addEventListener('mousemove',function(e){var r=cv.getBoundingClientRect(),x=Math.max(0,Math.min(e.clientX-r.left,cv.width-1)),y=Math.max(0,Math.min(e.clientY-r.top,cv.height-1)),px=cv.getContext('2d').getImageData(x,y,1,1).data;cpApply(px[0],px[1],px[2]);});cv.addEventListener('mouseleave',function(){if(cpR!==null)cpApply(cpR,cpG,cpB);else resetColour();});cv.addEventListener('click',function(e){var r=cv.getBoundingClientRect(),x=Math.max(0,Math.min(e.clientX-r.left,cv.width-1)),y=Math.max(0,Math.min(e.clientY-r.top,cv.height-1)),px=cv.getContext('2d').getImageData(x,y,1,1).data;cpR=px[0];cpG=px[1];cpB=px[2];cpApply(cpR,cpG,cpB);});});
function cpApply(r,g,b){var hex='#'+[r,g,b].map(function(v){return v.toString(16).padStart(2,'0');}).join('');
  var bg='rgb('+r+','+g+','+b+')';
  // Apply exact colour to full hero area — navbar bar and cards stay untouched
  document.querySelectorAll('.navbar-below-strip,.hero-section,.deck-grid-section').forEach(function(el){el.style.setProperty('background',bg,'important');});
  var sw=document.getElementById('colourSwatch'),hx=document.getElementById('colourHex');if(sw)sw.style.background=hex;if(hx)hx.textContent=hex.toUpperCase();}
function resetColour(){cpR=null;cpG=null;cpB=null;document.querySelectorAll('.navbar-below-strip,.hero-section,.deck-grid-section').forEach(function(el){el.style.removeProperty('background');});var sw=document.getElementById('colourSwatch'),hx=document.getElementById('colourHex');if(sw)sw.style.background='#d4af37';if(hx)hx.textContent='#D4AF37';}
</script>
