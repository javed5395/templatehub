<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title id="pageTitle">Loading… — LazyDogTemplates Blog</title>
<meta id="metaDesc" name="description" content="" />
<link id="canonicalLink" rel="canonical" href="" />

<meta id="ogTitle" property="og:title" content="" />
<meta id="ogDesc" property="og:description" content="" />
<meta property="og:type" content="article" />
<meta id="ogUrl" property="og:url" content="" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #fdfaf6; font-family: 'Inter', sans-serif; }

  .post-hero {
    background: #07071a;
    padding: 70px 40px 60px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .post-hero::before {
    content: "";
    position: absolute;
    top: -120px; right: -80px;
    width: 340px; height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,175,55,0.16), transparent 70%);
  }
  .post-hero-tag {
    display: inline-block;
    background: #d4af37; color: #1a0a3a;
    font-size: 10px; font-weight: 800;
    letter-spacing: 0.8px; text-transform: uppercase;
    padding: 5px 12px; margin-bottom: 20px;
    font-family: 'Poppins', sans-serif;
  }
  .post-hero h1 {
    font-family: 'Poppins', sans-serif;
    font-size: clamp(28px, 4.5vw, 44px);
    font-weight: 800; color: #fff;
    max-width: 780px; margin: 0 auto 18px;
    line-height: 1.2;
  }
  .post-hero-meta {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    color: #b8bfd0; font-size: 13px;
  }
  .post-hero-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #6b21c8, #9333ea);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; font-weight: 800; font-family: 'Poppins', sans-serif;
  }

  .post-body {
    max-width: 720px; margin: 0 auto;
    padding: 56px 24px 90px;
  }
  .post-body p { font-size: 16.5px; line-height: 1.75; color: #2c2c38; margin: 0 0 24px; }
  .post-body h2 {
    font-family: 'Poppins', sans-serif;
    font-size: 23px; font-weight: 700; color: #1a1a2e;
    margin: 42px 0 16px;
  }
  .post-back {
    display: inline-flex; align-items: center; gap: 6px;
    color: #7c5cbf; text-decoration: none;
    font-size: 13px; font-weight: 600; font-family: 'Poppins', sans-serif;
    margin-bottom: 8px;
  }
  .post-back:hover { text-decoration: underline; }

  .post-cta {
    border-top: 1px solid #eee; margin-top: 46px; padding-top: 32px;
    text-align: center;
  }
  .post-cta a {
    display: inline-block;
    background: #1a1a2e; color: #fff;
    font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 14px;
    padding: 14px 30px; text-decoration: none;
    border-radius: 0;
    transition: background 0.2s;
  }
  .post-cta a:hover { background: #e03030; }

  .post-loading, .post-error {
    max-width: 720px; margin: 80px auto; padding: 0 24px;
    text-align: center; color: #98a0ae; font-family: 'Poppins', sans-serif;
  }

  @media (max-width: 600px) {
    .post-hero { padding: 50px 24px 44px; }
    .post-body { padding: 40px 20px 70px; }
  }
</style>
</head>
<body>

<script src="navbar.js"></script>

<div id="postLoading" class="post-loading">Loading post…</div>
<div id="postError" class="post-error" style="display:none;">
  Sorry — we couldn't find that post. <a href="blog.html" style="color:#7c5cbf;">Back to the Journal</a>
</div>

<div id="postContent" style="display:none;">
  <section class="post-hero">
    <div class="post-hero-tag" id="postTag">Update</div>
    <h1 id="postTitle"></h1>
    <div class="post-hero-meta">
      <div class="post-hero-avatar">LD</div>
      <span id="postAuthor">LazyDog Team</span>
      <span>·</span>
      <span id="postDate"></span>
    </div>
  </section>

  <article class="post-body">
    <a href="blog.html" class="post-back">← Back to Journal</a>
    <div id="postBody"></div>

    <div class="post-cta" id="postCtaWrap" style="display:none;">
      <a id="postCtaLink" href="#">Learn More</a>
    </div>
  </article>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

  // Same Firebase project already used site-wide (see navbar.js auth config).
  const firebaseConfig = {
    apiKey: "AIzaSyDIiOl6apoPuzpHxcamNsUQcDrt1AIVOes",
    authDomain: "templatehub-16cd7.firebaseapp.com",
    projectId: "templatehub-16cd7",
    storageBucket: "templatehub-16cd7.firebasestorage.app",
    messagingSenderId: "143000893683",
    appId: "1:143000893683:web:fd694de96f8c0fa6569f86"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function slugToTitleFallback(slug){
    return slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // Body content is stored as an array of blocks in Firestore, e.g.:
  // [{type:"p", text:"..."}, {type:"h2", text:"..."}, {type:"p", text:"..."}]
  // This keeps content editable without hand-writing HTML per post.
  function renderBody(blocks){
    if (!Array.isArray(blocks)) return '<p>' + escapeHtml(String(blocks || '')) + '</p>';
    return blocks.map(function(b){
      const safe = escapeHtml(b.text || '');
      if (b.type === 'h2') return '<h2>' + safe + '</h2>';
      return '<p>' + safe + '</p>';
    }).join('');
  }

  (async function initPost(){
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('post');

    if (!slug) {
      document.getElementById('postLoading').style.display = 'none';
      document.getElementById('postError').style.display = 'block';
      return;
    }

    try {
      const snap = await getDoc(doc(db, 'blog_posts', slug));
      if (!snap.exists()) {
        document.getElementById('postLoading').style.display = 'none';
        document.getElementById('postError').style.display = 'block';
        return;
      }
      const p = snap.data();

      document.getElementById('pageTitle').textContent = (p.title || slugToTitleFallback(slug)) + ' — LazyDogTemplates Blog';
      document.getElementById('metaDesc').setAttribute('content', p.excerpt || '');
      document.getElementById('canonicalLink').setAttribute('href', 'https://www.lazydogtemplates.com/blog-post.html?post=' + encodeURIComponent(slug));
      document.getElementById('ogTitle').setAttribute('content', p.title || '');
      document.getElementById('ogDesc').setAttribute('content', p.excerpt || '');
      document.getElementById('ogUrl').setAttribute('content', 'https://www.lazydogtemplates.com/blog-post.html?post=' + encodeURIComponent(slug));

      document.getElementById('postTag').textContent = p.tag || 'Update';
      document.getElementById('postTitle').textContent = p.title || slugToTitleFallback(slug);
      document.getElementById('postAuthor').textContent = p.author || 'LazyDog Team';
      document.getElementById('postDate').textContent = p.date || '';
      document.getElementById('postBody').innerHTML = renderBody(p.body);

      if (p.ctaLabel && p.ctaLink) {
        document.getElementById('postCtaLink').textContent = p.ctaLabel;
        document.getElementById('postCtaLink').setAttribute('href', p.ctaLink);
        document.getElementById('postCtaWrap').style.display = 'block';
      }

      document.getElementById('postLoading').style.display = 'none';
      document.getElementById('postContent').style.display = 'block';
    } catch (err) {
      console.error('Failed to load blog post:', err);
      document.getElementById('postLoading').style.display = 'none';
      document.getElementById('postError').style.display = 'block';
    }
  })();
</script>

<script src="footerbar.js"></script>

</body>
</html>
