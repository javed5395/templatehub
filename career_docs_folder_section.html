<script>
  // ── Render a single deck card ──
  function renderDeckCard(grid, deck) {
    var a = document.createElement('a');
    a.className = 'pd-card';
    a.href = deck.href;
    a.setAttribute('data-cat', deck.cat || '');

    var img = document.createElement('img');
    img.className = 'pd-card-img';
    img.src = deck.slides[0];
    img.alt = deck.title;
    img.loading = 'lazy';
    a.appendChild(img);

    // NEW badge — show if uploaded within 48 hours
    if (deck.uploadedAt) {
      var hoursDiff = (Date.now() - deck.uploadedAt.getTime()) / (1000 * 60 * 60);
      if (hoursDiff <= 48) {
        var badge = document.createElement('span');
        badge.className = 'pd-card-new-badge';
        badge.textContent = 'NEW';
        a.style.position = 'relative';
        a.appendChild(badge);
      }
    }

    var info = document.createElement('div');
    info.className = 'pd-card-info';
    info.innerHTML =
      '<div class="pd-card-label">Resume / CV Template &bull; ' + deck.slides.length + ' slides</div>' +
      '<div class="pd-card-title">' + deck.title + '</div>' +
      '<div class="pd-card-meta">' +
        '<span><span class="pd-card-stars">★★★★★</span><span class="pd-card-rating">(48)</span></span>' +
        (deck.price && deck.price !== 'free' && deck.price !== '0' && parseFloat(deck.price) > 0 ? '<span class="pd-card-price">USD ' + parseFloat(deck.price).toFixed(2) + '</span>' : '') +
      '</div>' +
      '<div class="pd-card-actions"><div class="pd-card-btn-view">View Slides</div></div>';
    a.appendChild(info);

    var timer = null, idx = 0;
    a.addEventListener('mouseenter', function(){
      idx = 0;
      timer = setInterval(function(){
        idx = (idx + 1) % deck.slides.length;
        img.src = deck.slides[idx];
      }, 600);
    });
    a.addEventListener('mouseleave', function(){
      clearInterval(timer);
      img.src = deck.slides[0];
    });

    grid.appendChild(a);
  }

  // ── Search-engine bridge: normalize a template for scoring + inject top-20 matches ──
  // METADATA CONTRACT (save these from the upload form so ranking works): colorFamily,
  // style, tone, audience, bestFor, formality, textWeight, imageWeight, graphWeight, aspectRatio
  function ldtNormalizeDeck(t, deckCard) {
    return {
      name: t.name || deckCard.title,
      contentType: 'resume-cv',
      slides: (t.slides ? t.slides.length : (parseInt(t.slideCount, 10) || 0)),
      industry: t.industry || '',
      colorFamily: t.colorFamily || t.colors || [],
      style: t.style || [], tone: t.tone || [], audience: t.audience || [], bestFor: t.bestFor || [],
      formality: t.formality || '', textWeight: t.textWeight || '', imageWeight: t.imageWeight || '',
      graphWeight: t.graphWeight || '', aspectRatio: t.aspectRatio || '',
      _card: deckCard
    };
  }
  window._ldtRenderFiltered = function(decks) {
    var defaultGrid = document.getElementById('deckGrid');
    var wrap = document.getElementById('ldtFilteredWrap');
    if (!decks || !decks.length) { if (wrap) wrap.parentNode.removeChild(wrap); return; }
    if (!defaultGrid) return;
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'ldtFilteredWrap';
      wrap.innerHTML = '<div class="ldt-filtered-head">Best matches for your filters <span id="ldtFilteredCount"></span></div>' +
                       '<div class="deck-grid ldt-filtered-grid" id="ldtFilteredGrid"></div>';
      defaultGrid.parentNode.insertBefore(wrap, defaultGrid);
    }
    var grid = document.getElementById('ldtFilteredGrid');
    grid.innerHTML = '';
    decks.forEach(function(nd){ if (nd && nd._card) renderDeckCard(grid, nd._card); });
    var c = document.getElementById('ldtFilteredCount');
    if (c) c.textContent = '· ' + decks.length + ' shown';
  };

  // ── Load approved media kits from Firebase (live / real-time) ──
  (async function loadFirebaseDecks(){
    try {
      var { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js");
      var { getFirestore, collection, onSnapshot, query, where } = await import("https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js");

      var firebaseConfig = {
        apiKey: "AIzaSyDIiOl6apoPuzpHxcamNsUQcDrt1AIVOes",
        authDomain: "templatehub-16cd7.firebaseapp.com",
        projectId: "templatehub-16cd7",
        storageBucket: "templatehub-16cd7.firebasestorage.app",
        messagingSenderId: "143000893683",
        appId: "1:143000893683:web:fd694de96f8c0fa6569f86"
      };
      var app = initializeApp(firebaseConfig);
      var db = getFirestore(app);

      var q = query(collection(db, 'templates'), where('status', '==', 'approved'), where('template.category', '==', 'resume_cv'));

      onSnapshot(q, function(snapshot) {
        var grid = document.getElementById('deckGrid');
        grid.innerHTML = '';                    // clear + rebuild on every change
        window._ldtAllDecks = [];               // rebuild the search-engine deck pool too
        var INDUSTRY_LABELS = {
  tech:'Tech & AI', healthcare:'Healthcare', finance:'Finance',
  construction:'Construction', retail:'Retail & E-commerce', education:'Education',
  realestate:'Real Estate', fashion:'Fashion & Beauty', food:'Food & Restaurant',
  general:'General Business', other:'Other'
};
function resolveSubCat(t) {
  if (t.subCategory) return t.subCategory;
  return t.industry || 'other';
}
function resolveSubCatLabel(t) {
  if (t.subCategory) return subCatLabel(t.subCategory);
  return INDUSTRY_LABELS[t.industry] || t.industry || 'Other';
}
window.mkCatMap = {};                   // reset live category map

        // Collect all docs first, then sort by uploadedAt descending (latest first)
        var allDocs = [];
        snapshot.forEach(function(docSnap){
          allDocs.push(docSnap);
        });
        allDocs.sort(function(a, b) {
          var aTime = a.data().uploadedAt ? (a.data().uploadedAt.toDate ? a.data().uploadedAt.toDate().getTime() : new Date(a.data().uploadedAt).getTime()) : 0;
          var bTime = b.data().uploadedAt ? (b.data().uploadedAt.toDate ? b.data().uploadedAt.toDate().getTime() : new Date(b.data().uploadedAt).getTime()) : 0;
          return bTime - aTime; // descending — latest first
        });

        allDocs.forEach(function(docSnap){
          var data = docSnap.data();
          var t = data.template || {};
          if (!t.slides || t.slides.length === 0) return;

          var subCat = resolveSubCat(t);
          var subCatDisplayLabel = resolveSubCatLabel(t);
          if (!window.mkCatLabelMap) window.mkCatLabelMap = {};
          window.mkCatLabelMap[subCat] = subCatDisplayLabel;
          var title  = t.name || 'Untitled Resume / CV';
          var href   = 'career_docs_slides.html?firebase=' + docSnap.id;

          // populate category map for panel
          if (!window.mkCatMap[subCat]) window.mkCatMap[subCat] = [];
          window.mkCatMap[subCat].push({ title: title, href: href });

          // render grid card
          var uploadedAt = data.uploadedAt ? (data.uploadedAt.toDate ? data.uploadedAt.toDate() : new Date(data.uploadedAt)) : null;
          var deck = { title: title, cat: subCat, href: href, slides: t.slides, price: t.price, uploadedAt: uploadedAt };
          renderDeckCard(grid, deck);
          window._ldtAllDecks.push(ldtNormalizeDeck(t, deck));   // feed the search engine
        });

        buildCatPanelFromData();   // rebuild panel with live data
        window.dispatchEvent(new CustomEvent('ldt:decks-ready'));  // let the widget re-score with real decks
      });
    } catch (err) {
      console.error('Firebase decks failed to load:', err);
    }
  })();
</script>

<script>
// ── Sub-category icon map (Resume / CV) ──
var MK_SUB_ICONS = {
  'freelancer': '💼', 'Freelancer': '💼',
  'podcast':    '🎙️', 'Podcast':    '🎙️',
  'press_pr':   '📰', 'Press / PR': '📰',
  'influencer': '✨', 'Influencer': '✨',
  'brand':      '🎨', 'Brand':      '🎨',
  'tech':       '💻', 'Tech':       '💻',
  'fashion':    '👗', 'Fashion':    '👗',
  'other':      '📦', 'Other':      '📦'
};

function subCatLabel(key) {
  var labels = { freelancer:'Freelancer', podcast:'Podcast', press_pr:'Press / PR',
                  influencer:'Influencer', brand:'Brand', tech:'Tech',
                  fashion:'Fashion', other:'Other' };
  return labels[key] || key;
}

var INDUSTRY_LABELS = {
  tech:'Tech & AI', healthcare:'Healthcare', finance:'Finance',
  construction:'Construction', retail:'Retail & E-commerce', education:'Education',
  realestate:'Real Estate', fashion:'Fashion & Beauty', food:'Food & Restaurant',
  general:'General Business', other:'Other'
};
function resolveSubCat(t) {
  if (t.subCategory) return t.subCategory;
  return t.industry || 'other';
}
function resolveSubCatLabel(t) {
  if (t.subCategory) return subCatLabel(t.subCategory);
  return INDUSTRY_LABELS[t.industry] || t.industry || 'Other';
}
window.mkCatMap = {};
var activeCat = 'All';

function filterGrid(cat) {
  activeCat = cat;
  var cards = document.querySelectorAll('.pd-card');
  cards.forEach(function(c) {
    c.style.display = (cat === 'All' || c.getAttribute('data-cat') === cat) ? '' : 'none';
  });
  var nameEl = document.querySelector('#catBtn .ci-btn-name');
  if (nameEl) nameEl.textContent = (cat === 'All') ? 'Categories' : subCatLabel(cat);
  document.getElementById('catPanel').classList.remove('open');
  hideSub();
}

function buildCatPanelFromData() {
  var panel = document.getElementById('catPanel');
  var title  = panel.querySelector('.cat-panel-title');
  panel.innerHTML = '';
  if (title) panel.appendChild(title);

  // "All" row
  var allRow = document.createElement('div');
  allRow.className = 'cat-item';
  allRow.innerHTML = '<span class="ci-icon">🗂️</span><span class="ci-name">All Resume / CV</span>';
  allRow.addEventListener('click', function() { filterGrid('All'); });
  allRow.addEventListener('mouseenter', function() { hideSub(); });
  panel.appendChild(allRow);

  // One row per sub-category that actually has templates
  Object.keys(window.mkCatMap).forEach(function(cat) {
    var label = (window.mkCatLabelMap && window.mkCatLabelMap[cat]) ? window.mkCatLabelMap[cat] : subCatLabel(cat);
    var icon  = MK_SUB_ICONS[cat] || '📁';
    var row = document.createElement('div');
    row.className = 'cat-item';
    row.setAttribute('data-cat', cat);
    row.innerHTML = '<span class="ci-icon">' + icon + '</span>' +
                    '<span class="ci-name">' + label + '</span>' +
                    '<span class="ci-arrow">›</span>';
    row.addEventListener('click', function() { filterGrid(cat); });
    row.addEventListener('mouseenter', function() { showSub(cat, row); });
    row.addEventListener('mouseleave', function() { subHideTimer = setTimeout(hideSub, 120); });
    panel.appendChild(row);
  });

  // Re-apply active filter after rebuild
  filterGrid(activeCat);
}

function fillSubmenu(cat) {
  var sub = document.getElementById('catSubmenu');
  sub.innerHTML = '';
  var items = window.mkCatMap[cat] || [];
  if (items.length === 0) {
    var cs = document.createElement('span');
    cs.className = 'sub-item coming-soon';
    cs.textContent = 'Coming Soon';
    sub.appendChild(cs);
  } else {
    items.forEach(function(d) {
      var a = document.createElement('a');
      a.className = 'sub-item';
      a.href = d.href;
      a.textContent = d.title;
      sub.appendChild(a);
    });
  }
}

var catTimer = null;
var catLocked = false;
var subHideTimer = null;
var currentSubCat = null;

function catPosition() {
  var btn = document.getElementById('catBtn');
  var panel = document.getElementById('catPanel');
  var rect = btn.getBoundingClientRect();
  panel.style.top = (rect.bottom + 8) + 'px';
  panel.style.left = rect.left + 'px';
}

function showSub(cat, rowEl) {
  clearTimeout(subHideTimer);
  if (currentSubCat !== cat) {
    fillSubmenu(cat);
    currentSubCat = cat;
  }
  var panel = document.getElementById('catPanel');
  var sub = document.getElementById('catSubmenu');
  var rowRect = rowEl.getBoundingClientRect();
  var panelRect = panel.getBoundingClientRect();
  sub.style.top = rowRect.top + 'px';
  sub.style.left = (panelRect.right + 4) + 'px';
  sub.classList.add('open');
}

function hideSub() {
  document.getElementById('catSubmenu').classList.remove('open');
  currentSubCat = null;
}

window.subEnter = function() { clearTimeout(subHideTimer); };
window.subLeave = function() { subHideTimer = setTimeout(hideSub, 120); };

window.catShow = function() {
  clearTimeout(catTimer);
  catPosition();
  document.getElementById('catPanel').classList.add('open');
};
window.catLeaveBtn = function() {
  if (catLocked) return;
  catTimer = setTimeout(function() {
    document.getElementById('catPanel').classList.remove('open');
    hideSub();
  }, 200);
};
window.catEnter = function() { clearTimeout(catTimer); };
window.catLeave = function() {
  if (catLocked) return;
  clearTimeout(subHideTimer);
  subHideTimer = setTimeout(function() {
    document.getElementById('catPanel').classList.remove('open');
    hideSub();
  }, 150);
};
window.catToggleLock = function() {
  catLocked = !catLocked;
  if (catLocked) {
    clearTimeout(catTimer);
    catPosition();
    document.getElementById('catPanel').classList.add('open');
  } else {
    document.getElementById('catPanel').classList.remove('open');
    hideSub();
  }
};
document.addEventListener('click', function(e) {
  var btn = document.getElementById('catBtn');
  var panel = document.getElementById('catPanel');
  var sub = document.getElementById('catSubmenu');
  if (catLocked && !panel.contains(e.target) && !btn.contains(e.target) && !sub.contains(e.target)) {
    catLocked = false;
    panel.classList.remove('open');
    hideSub();
  }
});
</script>
